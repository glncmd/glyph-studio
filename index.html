    function renderEffectChainForLayer(layer, list) {
      const chain = getEffectChain(layer);
      list.innerHTML = '';

      chain.forEach((fx, idx) => {
        const card = document.createElement('div');
        card.className = 'fx-card';
        card.draggable = false;
        card.dataset.fxId = fx.id;

        // Header row
        const header = document.createElement('div');
        header.className = 'flex items-center gap-2 px-2 py-1.5';
        header.innerHTML = `
          <span class="fx-drag text-[#52525b]">≡</span>
          <span class="text-[10px] text-[#71717a] uppercase tracking-wider flex-1 cursor-pointer fx-toggle-params flex items-center gap-1.5" style="font-family:'JetBrains Mono',monospace">${getEffectLabel(fx)}${state.forceGrid && ['pixelate','halftone','fractalGlass'].includes(fx.type) ? '<span class="fx-grid-badge" style="color:#00e5ff;display:inline-flex;align-items:center" title="Grid-locked"><svg viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="2" width="5" height="5"/><rect x="9" y="2" width="5" height="5"/><rect x="2" y="9" width="5" height="5"/><rect x="9" y="9" width="5" height="5"/></svg></span>' : ''}</span>
          <button class="fx-del text-[12px] text-[#555] hover:text-red-400 cursor-pointer bg-transparent border-none flex items-center justify-center w-[22px] h-[22px]" style="font-family:'JetBrains Mono',monospace">✕</button>
          <label class="toggle-switch" style="flex-shrink:0"><input type="checkbox" class="fx-enabled" ${fx.enabled ? 'checked' : ''}><span class="toggle-slider"></span></label>
        `;
        card.appendChild(header);

        // Params container (collapsible)
        const paramsDiv = document.createElement('div');
        paramsDiv.className = 'fx-params pl-5 pr-2 pb-3 flex flex-col gap-2';
        paramsDiv.style.display = (fx.enabled && !collapsedFxCards.has(fx.id)) ? '' : 'none';

        // Blur subtype selector
        const reg = EFFECT_REGISTRY[fx.type];
        if (reg && reg.subtypes) {
          const stRow = document.createElement('div');
          stRow.className = 'flex items-center justify-between';
          const stLabel = document.createElement('label');
          stLabel.className = 'text-[#71717a] text-[10px] uppercase tracking-[0.12em] font-label';
          stLabel.textContent = 'Type';
          const subtypeOptions = Object.entries(reg.subtypes).map(([key, st]) => ({ value: key, label: st.label }));
          const stButton = document.createElement('button');
          stButton.type = 'button';
          stButton.className = 'ui-select-btn ui-select-btn-sm w-[132px]';
          stButton.innerHTML = '<span class="ui-select-value"></span><span class="ui-select-caret">▾</span>';
          setSelectButtonLabel(stButton, labelForOption(subtypeOptions, fx.subtype));
          stButton.addEventListener('click', (e) => {
            e.stopPropagation();
            openOptionMenu(stButton, {
              options: subtypeOptions,
              value: fx.subtype,
              align: 'right',
              placement: 'bottom',
              compact: true,
              matchWidth: true,
              maxHeight: 220,
              gap: 4,
              onSelect: (newSub, option) => {
                setSelectButtonLabel(stButton, option.label);
                fx.subtype = newSub;
                const newDefs = reg.subtypes[newSub];
                fx.params = { ...newDefs.defaults };
                invalidatePostProcessCache();
                renderLayerPanel();
                render();
              }
            });
          });
          stRow.appendChild(stLabel);
          stRow.appendChild(stButton);
          paramsDiv.appendChild(stRow);
        }

        // Generate param controls

          // Hide full-frame-only params when texture isn't full-frame
          if (pDef.fullFrameOnly && !FULL_FRAME_TEXTURES.has(fx.params.texture)) return;

          const row = document.createElement('div');
          row.className = 'flex flex-col gap-1';

          if (pDef.type === 'range') {
            const labelRow = document.createElement('div');
            labelRow.className = 'flex items-center justify-between';
            const label = document.createElement('label');
            label.className = 'text-[#71717a] text-[10px] uppercase tracking-[0.12em] font-label';
            label.textContent = pDef.label;
            const valInput = document.createElement('input');
            valInput.type = 'text';
            valInput.className = 'text-primary text-[10px] tabular-nums px-1.5 py-0.5 bg-transparent text-right w-12 font-mono outline-none border-none';
            valInput.value = fx.params[pDef.key] ?? pDef.min;
            labelRow.appendChild(label);
            labelRow.appendChild(valInput);
            row.appendChild(labelRow);

            const slider = document.createElement('input');
            slider.type = 'range';
            slider.min = pDef.min;
            slider.max = pDef.max;
            slider.step = pDef.step;
            slider.value = fx.params[pDef.key] ?? pDef.min;

            slider.addEventListener('input', () => {
              const v = parseFloat(slider.value);
              fx.params[pDef.key] = v;
              valInput.value = v;
              if (fx.type === 'inkBleed') invalidatePostProcessCache(fx.id);
              scheduleRender();
            });
            valInput.addEventListener('change', () => {
              let v = parseFloat(valInput.value);
              if (isNaN(v)) v = pDef.min;
              v = Math.min(pDef.max, Math.max(pDef.min, v));
              fx.params[pDef.key] = v;
              slider.value = v;
              valInput.value = v;
              if (fx.type === 'inkBleed') invalidatePostProcessCache(fx.id);
              render();
            });
            valInput.addEventListener('keydown', (e) => {
              if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
              e.preventDefault();
              const step = parseFloat(pDef.step) * (e.shiftKey ? 10 : 1);
              let v = parseFloat(valInput.value) || 0;
              v += e.key === 'ArrowUp' ? step : -step;
              v = Math.min(pDef.max, Math.max(pDef.min, parseFloat(v.toFixed(6))));
              fx.params[pDef.key] = v;
              slider.value = v;
              valInput.value = v;
              if (fx.type === 'inkBleed') invalidatePostProcessCache(fx.id);
              scheduleRender();
            });
            row.appendChild(slider);

            const labelRow = document.createElement('div');

            toggle.type = 'checkbox';
            toggle.className = 'fx-enabled';
            toggle.checked = !!(fx.params[pDef.key]);

              fx.params[pDef.key] = toggle.checked ? 1 : 0;
              render();

            labelRow.appendChild(label);
            labelRow.appendChild(toggle);
            row.appendChild(labelRow);

            colorInput.addEventListener('input', () => {

              fx.params.preset = 'custom';
              scheduleRender();
            });
            labelRow.appendChild(label);
            labelRow.appendChild(colorInput);
            row.appendChild(labelRow);
          } else if (pDef.type === 'select') {
            const labelRow = document.createElement('div');
            labelRow.className = 'flex items-center justify-between';
            const label = document.createElement('label');
            label.className = 'text-[#71717a] text-[10px] uppercase tracking-[0.12em] font-label';

                align: 'right',
                placement: 'bottom',
                compact: true,
                matchWidth: true,
                maxHeight: 220,
                gap: 4,
                onSelect: (value, option) => {
                  fx.params[pDef.key] = value;
                  setSelectButtonLabel(selectButton, option.label);
                  // Sync color pickers when gradient map preset changes
                  if (fx.type === 'gradientMap' && pDef.key === 'preset' && GRADIENT_PRESETS[value]) {

                    fx.params.color0 = rgb01ToHex(pc[0]);

          if (fx.type === 'inkBleed') invalidatePostProcessCache(fx.id);
          render();
        });

        // Delete button
        header.querySelector('.fx-del').addEventListener('click', () => {
          const i = chain.indexOf(fx);
          if (i >= 0) chain.splice(i, 1);
          collapsedFxCards.delete(fx.id);
          if (fx.type === 'inkBleed') invalidatePostProcessCache(fx.id);
          renderLayerPanel();
          render();
        });

        // Only allow drag initiation from the ≡ handle
        const dragHandle = header.querySelector('.fx-drag');
        dragHandle.addEventListener('mousedown', () => { card.draggable = true; });

        // Drag-and-drop reorder
        card.addEventListener('dragstart', (e) => {
          fxDragState.draggedId = fx.id;
          e.dataTransfer.setData('text/plain', fx.id);
          e.dataTransfer.effectAllowed = 'move';
          card.classList.add('dragging');
        });
        card.addEventListener('dragend', () => {
          card.draggable = false;
          clearFxDropIndicators();
          card.classList.remove('dragging');
          fxDragState.draggedId = null;
          fxDragState.targetId = null;
          fxDragState.placement = null;
        });
        card.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (fxDragState.draggedId === fx.id) return;
          const rect = card.getBoundingClientRect();
          const placement = e.clientY < rect.top + rect.height / 2 ? 'before' : 'after';
          clearFxDropIndicators();
          card.classList.add(placement === 'before' ? 'drop-before' : 'drop-after');
          fxDragState.targetId = fx.id;
          fxDragState.placement = placement;
        });
        card.addEventListener('dragleave', () => {
          if (fxDragState.targetId === fx.id) {
            card.classList.remove('drop-before', 'drop-after');
          }
        });
        card.addEventListener('drop', (e) => {
          e.preventDefault();
          clearFxDropIndicators();
          const draggedId = fxDragState.draggedId;
          if (!draggedId || draggedId === fx.id) return;
          const fromIdx = chain.findIndex(f => f.id === draggedId);
          const toIdx = chain.findIndex(f => f.id === fx.id);
          if (fromIdx < 0 || toIdx < 0) return;
          const [moved] = chain.splice(fromIdx, 1);
          const insertIdx = fxDragState.placement === 'before' ? chain.findIndex(f => f.id === fx.id) : chain.findIndex(f => f.id === fx.id) + 1;
          chain.splice(insertIdx < 0 ? chain.length : insertIdx, 0, moved);
          fxDragState.draggedId = null;
          fxDragState.targetId = null;
          fxDragState.placement = null;
          invalidatePostProcessCache();
          renderLayerPanel();
          render();
        });

        list.appendChild(card);
      });
      requestAnimationFrame(initAllRangeFills);
    }

    // ============ RESIZE ============
    function resizeCanvas() {

      if (canvasSizeChanged) {
        outputCanvas.width = w;
        outputCanvas.height = h;
      }
      if (!state.sourceElement) {
        if (canvasSizeChanged) { invalidateMaskCaches(); invalidatePostProcessCache(); }
        return;
      }
      const src = state.sourceElement;
      const srcW = src.videoWidth || src.naturalWidth || src.width;
      const srcH = src.videoHeight || src.naturalHeight || src.height;
      const sourceSizeChanged = sourceCanvas.width !== srcW || sourceCanvas.height !== srcH;
      if (sourceSizeChanged) {
        sourceCanvas.width = srcW;
        sourceCanvas.height = srcH;
      }
      if (canvasSizeChanged || sourceSizeChanged) {
        invalidateMaskCaches();
        invalidatePostProcessCache();
        if (state.source === 'image' || (state.source === 'video' && state.sourceElement.paused)) render();
      }

    // ============ OFFSCREEN CANVAS POOL ============
    const layerCanvasPool = new Map();
    const layerRenderCache = new Map();   // layer.id → { key, canvas }
    function getLayerCanvas(id, w, h) {
      let entry = layerCanvasPool.get(id);
      if (!entry || entry.width !== w || entry.height !== h) {
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        layerCanvasPool.set(id, c);
        return c;
      }
      return entry;
    }

    // When the source (IMAGE) layer has effects, store its post-effect canvas
    // so other layers can draw from the effected source instead of the raw element.
    let _effectedSourceCanvas = null;
    let _effectedSourceKey = '';

    function renderSourceLayer(layerCtx, layer, geometry) {
      const filter = `brightness(${layer.brightness ?? 1}) contrast(${layer.contrast ?? 1}) saturate(${layer.saturation ?? 1})`;
      const transform = getImageTransform(geometry);
      if (!transform) return;
      const { rect } = transform;

      // If this is NOT the source layer itself, and the source layer has
      // already been rendered with effects, draw from the effected canvas.
      if (layer.kind !== 'source' && _effectedSourceCanvas) {
        layerCtx.save();
        layerCtx.filter = filter;
        layerCtx.drawImage(
          _effectedSourceCanvas,
          0, 0, _effectedSourceCanvas.width, _effectedSourceCanvas.height,
          0, 0, geometry.outW, geometry.outH
        );
        layerCtx.restore();
        return;
      }

      layerCtx.save();
      layerCtx.filter = filter;
      layerCtx.drawImage(
        state.sourceElement,
        rect.left,
        rect.top,
        rect.width,
        rect.height
      );
      layerCtx.restore();
    }

    function buildMaskPath(layer, geometry) {
      const mask = getMask(layer);
      if (!mask || !maskHasRegions(mask)) return null;
      const entry = maskPathCache.get(layer.id);
      if (entry && entry.key === geometry.key) return entry.paths;
      const transform = getImageTransform(geometry);
      if (!transform) return null;
      const { rect, scaleX, scaleY } = transform;

      const paths = [];
      for (const region of mask.regions) {
        if (region.points.length < 3) continue;
        const path = new Path2D();
        traceSmoothPath(path, region.points, (pt) => [
          rect.left + clamp(pt[0], 0, 1) * geometry.srcW * scaleX,
          rect.top + clamp(pt[1], 0, 1) * geometry.srcH * scaleY
        ], true);
        paths.push({ path, op: region.op });
      }
      maskPathCache.set(layer.id, { key: geometry.key, paths });
      return paths;
    }

    function applyLayerMask(layerCtx, layer, geometry, forExport) {
      const mask = getMask(layer);
      if (mask && mask.enabled === false) return;
      // If an effect (halftone) already handled the mask
      // with its own feather logic, skip the hard clip to avoid a visible edge
      if (layer._maskHandledByEffect) {
        delete layer._maskHandledByEffect;
        return;
      }
      const paths = buildMaskPath(layer, geometry);
      if (!mask || !paths || paths.length === 0) return;

      const w = geometry.outW;
      const h = geometry.outH;
      const scratch = getScratchCanvas('maskComposite', w, h);
      const sctx = scratch.getContext('2d');
      sctx.clearRect(0, 0, w, h);

      for (const { path, op } of paths) {
        switch (op) {
          case 'new':
            sctx.clearRect(0, 0, w, h);
            sctx.globalCompositeOperation = 'source-over';
            break;
          case 'add':
            sctx.globalCompositeOperation = 'source-over';
            break;
          case 'subtract':
            sctx.globalCompositeOperation = 'destination-out';
            break;
          case 'intersect':
            sctx.globalCompositeOperation = 'destination-in';
            break;
        }
        sctx.fillStyle = '#fff';
        sctx.fill(path);
      }

      // Apply feathering via GPU-accelerated canvas blur
      let maskSource = scratch;
      if (mask.feather > 0) {
        const blurred = getScratchCanvas('maskBlurred', w, h);
        const bctx = blurred.getContext('2d');
        bctx.clearRect(0, 0, w, h);
        bctx.filter = `blur(${mask.feather}px)`;
        bctx.drawImage(scratch, 0, 0);
        bctx.filter = 'none';
        maskSource = blurred;
      }

      layerCtx.save();
      layerCtx.globalCompositeOperation = mask.inverted ? 'destination-out' : 'destination-in';
      layerCtx.drawImage(maskSource, 0, 0);
      layerCtx.restore();
    }

    function clipToImageBounds(ctx, geometry) {
      const transform = getImageTransform(geometry);
      if (!transform) return;
      const { rect } = transform;
      // Use destination-in to erase everything outside the image rect
      ctx.save();
      ctx.globalCompositeOperation = 'destination-in';
      ctx.fillStyle = '#fff';
      ctx.fillRect(rect.left, rect.top, rect.width, rect.height);
      ctx.restore();
    }

    // ============ RENDER LAYER ============
    function renderLayer(layer, pixels, geometry, forExport = false) {
      const { srcW, srcH, scale, offsetX, offsetY, outW, outH } = geometry;
      const effectScale = getScreenEffectScale(geometry, forExport);
      const layerCanvas = getLayerCanvas(layer.id, outW, outH);
      const layerCtx = layerCanvas.getContext('2d');
      layerCtx.clearRect(0, 0, outW, outH);

      // Adjustment layers don't render their own content — they modify the composite
      if (layer.kind === 'adjustment') return layerCanvas;

      if (layer.kind === 'source') {
        renderSourceLayer(layerCtx, layer, geometry);
        // Apply effect chain to source layer too
        const srcChain = getEffectChain(layer);
        const hasActiveEffects = srcChain.some(fx => fx.enabled);
        if (srcChain.length > 0) {
          const gGrid = getGlobalGridStep(geometry);
          const srcCtx = { asciiCanvas: layerCanvas, outW, outH, layer, geometry, forExport, effectScale, gridStepX: gGrid, gridStepY: gGrid };
          if (!applyEffectChainGL(layerCtx, srcChain, srcCtx)) {
            for (const fx of srcChain) {
              if (!fx.enabled) continue;
              applyEffect(layerCtx, fx, srcCtx);
            }
          }
          // Clip to image bounds
          clipToImageBounds(layerCtx, geometry);
        }
        // Store effected source canvas so other layers can use it
        if (hasActiveEffects) {
          _effectedSourceCanvas = layerCanvas;
        } else {
          _effectedSourceCanvas = null;
        }
        return layerCanvas;
      }

      const variant = VARIANTS[layer.variant] || VARIANTS.None;

      // None variant — passthrough source image only if layer has effects or BCS adjustments
      if (variant.mode === 'none') {
        const chain = getEffectChain(layer);
        const hasActiveEffects = chain.some(fx => fx.enabled);
        const hasBCS = Math.abs((layer.brightness ?? 1) - 1) > 0.001 ||
                       Math.abs((layer.contrast ?? 1) - 1) > 0.001 ||
                       Math.abs((layer.saturation ?? 1) - 1) > 0.001;
        // Only render source if layer has effects or BCS adjustments;
        // otherwise return transparent canvas so it doesn't cover layers below
        if (hasActiveEffects || hasBCS) {
          renderSourceLayer(layerCtx, layer, geometry);
          if (hasActiveEffects) {
            const globalGrid = getGlobalGridStep(geometry);
            const noneCtx = { asciiCanvas: layerCanvas, outW, outH, layer, geometry, forExport, effectScale, gridStepX: globalGrid || 0, gridStepY: globalGrid || 0 };
            if (!applyEffectChainGL(layerCtx, chain, noneCtx)) {
              for (const fx of chain) {
                if (!fx.enabled) continue;
                applyEffect(layerCtx, fx, noneCtx);
              }
            }
            clipToImageBounds(layerCtx, geometry);
          }
        }
        applyLayerMask(layerCtx, layer, geometry, forExport);
        return layerCanvas;
      }

      const cellHeight = state.forceGrid ? state.forceGridSize : layer.cellSize;
      const cellWidth = (layer.variant === 'Dense' && !state.forceGrid) ? getDenseCellWidth(cellHeight) : cellHeight;
      const strideX = Math.round(cellWidth * (1 + layer.gap));
      const strideY = Math.round(cellHeight * (1 + layer.gap));
      const cols = Math.ceil(srcW / strideX);
      const rows = Math.ceil(srcH / strideY);
      const maskMetrics = prepareMaskMetrics(layer, srcW, srcH);

      // Swap outputCtx to layer canvas
      const savedCtx = outputCtx;
      try {
        // Always render ASCII to offscreen canvas (needed if any bloom exists in the chain)
        const offscreen = getBloomAsciiCanvas(outW, outH);
        const asciiCanvas = offscreen.canvas;
        outputCtx = offscreen.ctx;

        if (variant.mode === 'outline') {
          renderOutline(pixels, srcW, srcH, cols, rows, cellHeight, scale, offsetX, offsetY, layer, maskMetrics);
        } else if (variant.mode === 'highlight') {
          renderHighlight(pixels, srcW, srcH, cols, rows, cellHeight, scale, offsetX, offsetY, layer, maskMetrics);
        } else if (variant.mode === 'replacement') {
          renderReplacement(pixels, srcW, srcH, cols, rows, cellWidth, cellHeight, variant.chars, scale, offsetX, offsetY, layer, maskMetrics);
        }
        if (variant.mode === 'overlay') {
          renderOverlay(pixels, srcW, srcH, cols, rows, cellHeight, variant.chars, scale, offsetX, offsetY, layer, maskMetrics);
        }

        // Copy ASCII result to layer canvas
        outputCtx = layerCtx;
        layerCtx.drawImage(asciiCanvas, 0, 0);

        // Apply effect chain in order
        const globalGrid = getGlobalGridStep(geometry);
        const gridStepX = globalGrid || 0;
        const gridStepY = globalGrid || 0;
        const chain = getEffectChain(layer);
        const asciiEffCtx = { asciiCanvas, outW, outH, layer, geometry, forExport, effectScale, gridStepX, gridStepY };
        if (!applyEffectChainGL(layerCtx, chain, asciiEffCtx)) {
          for (const fx of chain) {
            if (!fx.enabled) continue;
            applyEffect(layerCtx, fx, asciiEffCtx);
          }
        }

        // Always clip ASCII layers to the image frame so partial edge cells
        // can render and then be cleanly cut off at the bounds.
        clipToImageBounds(layerCtx, geometry);

        // Outline mode handles masking internally via cell-level valid[] grid,
        // so skip the smooth pixel-level mask clip to preserve the grid-stepped edges
        if (variant.mode === 'outline') {
          layer._maskHandledByEffect = true;
        }
        applyLayerMask(layerCtx, layer, geometry, forExport);
      } finally {
        outputCtx = savedCtx;
      }
      return layerCanvas;
    }

    // ============ RENDER ============
    let _lastStatsFps = 0, _statsFrameCount = 0, _statsLastTime = performance.now();
    function updateStatsBar() {
      _statsFrameCount++;
      const now = performance.now();
      if (now - _statsLastTime >= 500) {
        _lastStatsFps = (_statsFrameCount / ((now - _statsLastTime) / 1000)).toFixed(1);
        _statsFrameCount = 0;
        _statsLastTime = now;
      }
      const layer = activeLayer();
      const src = state.sourceElement;
      const resW = src ? (src.videoWidth || src.naturalWidth || src.width) : 0;
      const resH = src ? (src.videoHeight || src.naturalHeight || src.height) : 0;
      const resEl = document.getElementById('statResolution');
      const lyEl = document.getElementById('statLayers');
      const fpEl = document.getElementById('statFps');
      if (resEl) {
        const pr = state.previewResolution;
        const suffix = pr && pr !== 'full' && state.source !== 'video' ? ` (${pr})` : '';
        resEl.textContent = resW ? `${resW}×${resH}${suffix}` : '—';
      }
      if (lyEl) lyEl.textContent = state.layers ? state.layers.length : '—';
      if (fpEl) fpEl.textContent = _lastStatsFps || '—';
    }

    let _renderPending = false;
    function scheduleRender() {
      if (_renderPending) return;
      _renderPending = true;
      requestAnimationFrame(() => { _renderPending = false; render(); });
    }

    function render() {
      const displayGeometry = getRenderGeometry();
      if (!displayGeometry) return;
      const src = state.sourceElement;
      const { srcW, srcH } = displayGeometry;
      const { outW: dispW, outH: dispH } = displayGeometry;

      // Determine preview resolution scale
      const forExport = false;
      let previewScale = 1;
      if (state.source === 'video') {
        previewScale = dispW / srcW; // match display (existing video behavior)
      } else {
        switch (state.previewResolution) {
          case 'full':  previewScale = 1; break;
          case '1/2':   previewScale = 0.5; break;
          case '1/4':   previewScale = 0.25; break;
          case 'auto':
          default: {
            const targetPx = 360000;
            previewScale = clamp(Math.sqrt(targetPx / Math.max(1, srcW * srcH)), 0.1, 1);
            break;
          }
        }
      }
      const prevW = Math.max(1, Math.round(srcW * previewScale));
      const prevH = Math.max(1, Math.round(srcH * previewScale));
      const renderGeometry = getRenderGeometry(prevW, prevH);
      if (!renderGeometry) return;
      const useFullRes = (prevW > dispW || prevH > dispH);
      const renderW = renderGeometry.outW;
      const renderH = renderGeometry.outH;

      // Composite layers into an offscreen canvas at render resolution
      const compositeCanvas = getScratchCanvas('preview-composite', renderW, renderH);
      const compositeCtx = compositeCanvas.getContext('2d');
      compositeCtx.fillStyle = '#0e0e0e';
      compositeCtx.fillRect(0, 0, renderW, renderH);

      // Reset effected source — will be set when the source layer renders with effects
      _effectedSourceCanvas = null;

      // Pixel data cache — reuse across layers with same brightness/contrast/saturation
      const pixelCache = new Map();

      for (let i = 0; i < state.layers.length; i++) {
        const layer = state.layers[i];
        if (!layer.visible) continue;

        // === Adjustment layer compositing ===
        if (layer.kind === 'adjustment') {
          const chain = getEffectChain(layer);
          const activeEffects = chain.filter(fx => fx.enabled);
          const adjBright = layer.brightness ?? 1;
          const adjContrast = layer.contrast ?? 1;
          const adjSat = layer.saturation ?? 1;
          const hasBCS = Math.abs(adjBright - 1) > 0.001 || Math.abs(adjContrast - 1) > 0.001 || Math.abs(adjSat - 1) > 0.001;
          if (activeEffects.length === 0 && !hasBCS) continue;
          const effectScale = getScreenEffectScale(renderGeometry, useFullRes);
          const hasMask = !!(layer.mask?.regions?.length);
          const needsBlend = hasMask || layer.opacity < 1 || layer.blendMode !== 'source-over';

          const adjGrid = getGlobalGridStep(renderGeometry);

          if (needsBlend) {
            const before = getScratchCanvas('adj-before', renderW, renderH);
            before.getContext('2d').drawImage(compositeCanvas, 0, 0);

            // Apply brightness/contrast/saturation
            if (hasBCS) {
              const bcsFilter = `brightness(${adjBright}) contrast(${adjContrast}) saturate(${adjSat})`;
              const temp = getScratchCanvas('adj-bcs', renderW, renderH);
              const tempCtx = temp.getContext('2d');
              tempCtx.clearRect(0, 0, renderW, renderH);
              tempCtx.filter = bcsFilter;
              tempCtx.drawImage(compositeCanvas, 0, 0);
              tempCtx.filter = 'none';
              compositeCtx.clearRect(0, 0, renderW, renderH);
              compositeCtx.drawImage(temp, 0, 0);
            }

            const adjCtx1 = { asciiCanvas: compositeCanvas, outW: renderW, outH: renderH, layer, geometry: renderGeometry, forExport, effectScale, gridStepX: adjGrid, gridStepY: adjGrid };
            if (!applyEffectChainGL(compositeCtx, activeEffects, adjCtx1)) {
              for (const fx of activeEffects) {
                applyEffect(compositeCtx, fx, adjCtx1);
              }
            }

            const after = getScratchCanvas('adj-after', renderW, renderH);
            const afterCtx = after.getContext('2d');
            afterCtx.clearRect(0, 0, renderW, renderH);
            afterCtx.drawImage(compositeCanvas, 0, 0);
            if (hasMask) applyLayerMask(afterCtx, layer, renderGeometry, useFullRes);

            compositeCtx.clearRect(0, 0, renderW, renderH);
            compositeCtx.drawImage(before, 0, 0);
            compositeCtx.save();
            compositeCtx.globalAlpha = layer.opacity;
            compositeCtx.globalCompositeOperation = layer.blendMode;
            compositeCtx.drawImage(after, 0, 0);
            compositeCtx.restore();
          } else {
            // Apply brightness/contrast/saturation
            if (hasBCS) {
              const bcsFilter = `brightness(${adjBright}) contrast(${adjContrast}) saturate(${adjSat})`;
              const temp = getScratchCanvas('adj-bcs', renderW, renderH);
              const tempCtx = temp.getContext('2d');
              tempCtx.clearRect(0, 0, renderW, renderH);
              tempCtx.filter = bcsFilter;
              tempCtx.drawImage(compositeCanvas, 0, 0);
              tempCtx.filter = 'none';
              compositeCtx.clearRect(0, 0, renderW, renderH);
              compositeCtx.drawImage(temp, 0, 0);
            }

            const adjCtx2 = { asciiCanvas: compositeCanvas, outW: renderW, outH: renderH, layer, geometry: renderGeometry, forExport, effectScale, gridStepX: adjGrid, gridStepY: adjGrid };
            if (!applyEffectChainGL(compositeCtx, activeEffects, adjCtx2)) {
              for (const fx of activeEffects) {
                applyEffect(compositeCtx, fx, adjCtx2);
              }
            }
          }
          continue;
        }

        // Layer-level render cache: skip full re-render if inputs unchanged.
        // Draft renders (during slider drags) get a separate cache key so they
        // never satisfy a full-quality request on slider release.
        const layerCacheKey = buildPostProcessKey(layer, renderGeometry, useFullRes);
        const cached = layerRenderCache.get(layer.id);
        let layerCanvas;
        if (cached && cached.key === layerCacheKey) {
          layerCanvas = cached.canvas;
          // Restore _effectedSourceCanvas from cache so ASCII layers can use it
          if (layer.kind === 'source') {
            const srcChain = getEffectChain(layer);
            _effectedSourceCanvas = srcChain.some(fx => fx.enabled) ? layerCanvas : null;
          }
        } else {
          let pixels = null;
          if (layer.kind !== 'source') {
            const useEffected = !!_effectedSourceCanvas;
            const filterKey = `${useEffected ? 'eff-' : ''}${layer.brightness}-${layer.contrast}-${layer.saturation}`;
            pixels = pixelCache.get(filterKey);
            if (!pixels) {
              sourceCtx.filter = `brightness(${layer.brightness}) contrast(${layer.contrast}) saturate(${layer.saturation})`;
              if (useEffected) {
                // Sample from the effected source (source layer + its effects)
                const imgT = getImageTransform(renderGeometry);
                if (imgT) {
                  sourceCtx.drawImage(
                    _effectedSourceCanvas,
                    imgT.rect.left, imgT.rect.top, imgT.rect.width, imgT.rect.height,
                    0, 0, srcW, srcH
                  );
                } else {
                  sourceCtx.drawImage(_effectedSourceCanvas, 0, 0, srcW, srcH);
                }
              } else {
                sourceCtx.drawImage(src, 0, 0, srcW, srcH);
              }
              sourceCtx.filter = 'none';
              pixels = sourceCtx.getImageData(0, 0, srcW, srcH).data;
              pixelCache.set(filterKey, pixels);
            }
          }

          layerCanvas = renderLayer(layer, pixels, renderGeometry, forExport);
          layerRenderCache.set(layer.id, { key: layerCacheKey, canvas: layerCanvas });
        }

        compositeCtx.save();
        compositeCtx.globalAlpha = layer.opacity;
        compositeCtx.globalCompositeOperation = layer.blendMode;
        compositeCtx.drawImage(layerCanvas, 0, 0);
        compositeCtx.restore();
      }

      // Draw to display canvas
      outputCtx.fillStyle = '#0e0e0e';
      outputCtx.fillRect(0, 0, dispW, dispH);
      if (renderW === dispW && renderH === dispH) {
        // Exact match — direct copy (video path, or display matching preview res)
        outputCtx.drawImage(compositeCanvas, 0, 0);
      } else {
        // Scale render to display (works for both downscale and upscale)
        outputCtx.save();
        outputCtx.imageSmoothingEnabled = true;
        outputCtx.imageSmoothingQuality = useFullRes ? 'high' : 'medium';
        outputCtx.drawImage(compositeCanvas,
          0, 0, renderW, renderH,
          displayGeometry.offsetX, displayGeometry.offsetY,
          srcW * displayGeometry.scale, srcH * displayGeometry.scale);
        outputCtx.restore();
      }

      if (!state.recording) drawSelectionOverlay(displayGeometry);
      updateStatsBar();
    }

    function drawPathOverlay(points, geometry, closePath, dashed, color, lineWidth) {
      if (!points || points.length === 0) return;
      outputCtx.save();
      if (dashed) outputCtx.setLineDash([6, 4]);
      outputCtx.strokeStyle = color;
      outputCtx.lineWidth = lineWidth;
      outputCtx.beginPath();
      traceSmoothPath(outputCtx, points, (pt) => {
        const mapped = sourceToCanvasPoint(pt[0], pt[1], geometry);
        return [mapped.x, mapped.y];
      }, closePath);
      outputCtx.stroke();
      outputCtx.restore();
    }

    function drawSelectionOverlay(geometry) {
      if (!selectionState.active) return;

      const guidesOn = selectionState.showGuides;

      // Draw existing mask region outlines (marching ants)
      if (guidesOn) {
        const mask = getMask(activeLayer());
        if (mask && maskHasRegions(mask)) {
          const paths = buildMaskPath(activeLayer(), geometry);
          if (paths) {
            for (const { path } of paths) {
              // Dark outline underneath for contrast on light areas
              outputCtx.save();
              outputCtx.setLineDash([6, 4]);
              outputCtx.strokeStyle = 'rgba(0,0,0,0.5)';
              outputCtx.lineWidth = 2;
              outputCtx.stroke(path);
              outputCtx.restore();
              // Orange marching ants on top
              outputCtx.save();
              outputCtx.setLineDash([6, 4]);
              outputCtx.strokeStyle = 'rgba(251,70,13,0.85)';
              outputCtx.lineWidth = 1;
              outputCtx.stroke(path);
              outputCtx.restore();
            }
          }
        }
      }

      // In-progress stroke — always visible, colored by mode, with real-time smoothing
      if (selectionState.drawing && selectionState.rawPoints.length > 1) {
        const modeColors = {
          'new': 'rgba(251,70,13,0.9)',
          'add': 'rgba(251,70,13,0.9)',
          'subtract': 'rgba(255,80,80,0.9)',
          'intersect': 'rgba(255,220,60,0.9)'
        };
        const color = modeColors[selectionState.compositionMode] || 'rgba(251,70,13,0.9)';
        // Apply lightweight real-time smoothing for smooth preview while drawing
        let displayPoints = selectionState.rawPoints;
        if (displayPoints.length > 6) {
          const stride = Math.max(1, Math.floor(displayPoints.length / 600));
          if (stride > 1) {
            const thinned = [];
            for (let i = 0; i < displayPoints.length; i += stride) thinned.push(displayPoints[i]);
            if ((displayPoints.length - 1) % stride !== 0) thinned.push(displayPoints[displayPoints.length - 1]);
            displayPoints = thinned;
          }
          // 1-pass moving average smoothing for real-time display
          const smoothed = [displayPoints[0]];
          for (let i = 1; i < displayPoints.length - 1; i++) {
            const prev = displayPoints[i - 1], curr = displayPoints[i], next = displayPoints[i + 1];
            smoothed.push([
              prev[0] * 0.2 + curr[0] * 0.6 + next[0] * 0.2,
              prev[1] * 0.2 + curr[1] * 0.6 + next[1] * 0.2
            ]);
          }
          smoothed.push(displayPoints[displayPoints.length - 1]);
          displayPoints = smoothed;
        }
        drawPathOverlay(displayPoints, geometry, false, true, color, 1.25);
      }

      // Preview points after stroke finalized
      if (guidesOn && !selectionState.drawing && selectionState.previewPoints.length > 2) {
        drawPathOverlay(selectionState.previewPoints, geometry, true, true, 'rgba(251,70,13,0.35)', 1);
        outputCtx.save();
        outputCtx.fillStyle = 'rgba(251,70,13,0.7)';
        for (const point of selectionState.previewPoints) {
          const pt = sourceToCanvasPoint(point[0], point[1], geometry);
          outputCtx.beginPath();
          outputCtx.arc(pt.x, pt.y, 1.5, 0, Math.PI * 2);
          outputCtx.fill();
        }
        outputCtx.restore();
      }
    }

    function pathArea(points) {
      let area = 0;
      for (let i = 0; i < points.length; i++) {
        const a = points[i];
        const b = points[(i + 1) % points.length];
        area += a[0] * b[1] - b[0] * a[1];
      }
      return Math.abs(area) * 0.5;
    }

    function distance2D(a, b) {
      const dx = b[0] - a[0];
      const dy = b[1] - a[1];
      return Math.sqrt(dx * dx + dy * dy);
    }

    // Stroke stabilization state
    const selectionCapture = {
      points: [],       // raw input points (unsmoothed)
      stabilized: null  // EMA-smoothed cursor position
    };

    // Stroke stabilization strength (0 = no smoothing, higher = smoother but more lag)
    const STABILIZE_FACTOR = 0.35; // blend toward raw cursor each event

    function appendSelectionStrokePoint(point, spacing, force = false) {
      if (!point) return false;
      const output = selectionState.rawPoints;

      // First point — no smoothing needed
      if (!selectionCapture.stabilized) {
        selectionCapture.stabilized = [point[0], point[1]];
        selectionCapture.points.push([point[0], point[1]]);
        output.push([point[0], point[1]]);
        return true;
      }

      // EMA stabilization: smoothed position chases the raw cursor
      const prev = selectionCapture.stabilized;
      const rawDist = distance2D(prev, point);
      if (rawDist < 0.01) return false;

      // Adaptive smoothing: less smoothing for slow/precise movement, more for fast
      const speed = rawDist;
      const adaptiveFactor = Math.min(1, STABILIZE_FACTOR + speed * 0.002);

      const smoothed = [
        prev[0] + (point[0] - prev[0]) * adaptiveFactor,
        prev[1] + (point[1] - prev[1]) * adaptiveFactor
      ];
      selectionCapture.stabilized = smoothed;

      // Only emit if moved enough from last emitted point
      const lastOut = output[output.length - 1];
      const emitDist = distance2D(lastOut, smoothed);
      if (!force && emitDist < spacing * 0.5) return false;

      // Interpolate between last output and new stabilized position
      const steps = Math.max(1, Math.ceil(emitDist / Math.max(0.5, spacing * 0.5)));
      for (let step = 1; step <= steps; step++) {
        const t = step / steps;
        output.push([
          lastOut[0] + (smoothed[0] - lastOut[0]) * t,
          lastOut[1] + (smoothed[1] - lastOut[1]) * t
        ]);
      }
      selectionCapture.points.push([point[0], point[1]]);
      return true;
    }

    function resampleClosedPath(points, spacing) {
      if (points.length < 2) return points.slice();
      const segments = [];
      let totalLength = 0;

      for (let i = 0; i < points.length; i++) {
        const start = points[i];
        const end = points[(i + 1) % points.length];
        const length = distance2D(start, end);
        if (!length) continue;
        segments.push({ start, end, length, from: totalLength, to: totalLength + length });
        totalLength += length;
      }

      if (!totalLength) return points.slice();

      const samples = [];
      for (let d = 0; d < totalLength; d += spacing) {
        const segment = segments.find(seg => d >= seg.from && d < seg.to) || segments[segments.length - 1];
        const t = (d - segment.from) / segment.length;
        samples.push([
          segment.start[0] + (segment.end[0] - segment.start[0]) * t,
          segment.start[1] + (segment.end[1] - segment.start[1]) * t
        ]);
      }

      return samples.length >= 3 ? samples : points.slice();
    }

    function smoothClosedPath(points, iterations = 1) {
      let current = points.slice();
      if (current.length < 3) return current;

      const passes = Math.max(0, Math.min(5, Math.round(iterations)));
      for (let pass = 0; pass < passes; pass++) {
        const next = [];
        for (let i = 0; i < current.length; i++) {
          const a = current[i];
          const b = current[(i + 1) % current.length];
          next.push([
            a[0] * 0.75 + b[0] * 0.25,
            a[1] * 0.75 + b[1] * 0.25
          ]);
          next.push([
            a[0] * 0.25 + b[0] * 0.75,
            a[1] * 0.25 + b[1] * 0.75
          ]);
        }
        current = next;
      }

      return current;
    }

    function finalizeSelectionStroke() {
      if (!selectionState.drawing) return;
      selectionState.drawing = false;

      if (selectionState.rawPoints.length < 3) {
        clearSelectionTransient();
        render();
        return;
      }

      const geometry = getRenderGeometry();
      if (!geometry) {
        clearSelectionTransient();
        return;
      }

      const area = pathArea(selectionState.rawPoints);
      if (area < 200) {
        clearSelectionTransient();
        render();
        return;
      }

      const savedRawPoints = [...selectionState.rawPoints];
      const sampleSpacing = Math.max(1.25, 3.5 / geometry.scale);
      const sampled = resampleClosedPath(savedRawPoints, sampleSpacing);
      const smoothPasses = sampled.length > 420 ? 3 : sampled.length > 180 ? 4 : 5;
      const smoothed = smoothClosedPath(sampled, smoothPasses);
      const finalPath = resampleClosedPath(smoothed, Math.max(1, sampleSpacing * 0.6));
      const previewPts = finalPath;
      const normalized = finalPath.map(([x, y]) => [
        clamp(x / geometry.srcW, 0, 1),
        clamp(y / geometry.srcH, 0, 1)
      ]);

      const currentMask = getMask(activeLayer());
      const mode = selectionState.compositionMode || 'new';
      if (mode === 'new' || !currentMask || !maskHasRegions(currentMask)) {
        activeLayer().mask = {
          regions: [{ points: normalized, op: 'new' }],
          inverted: currentMask ? currentMask.inverted : false,
          feather: currentMask ? currentMask.feather : 0
        };
      } else {
        currentMask.regions.push({ points: normalized, op: mode });
      }
      selectionState.previewPoints = previewPts;
      selectionState.rawPoints = [];
      invalidateMaskCaches(activeLayer().id);
      invalidatePostProcessCache(activeLayer().id);
      updateMaskControls();
      renderLayerPanel();
      render();
    }

    function sobelAt(pixels, srcW, srcH, x, y) {
      function lum(px, py) {
        px = Math.max(0, Math.min(srcW - 1, px));
        py = Math.max(0, Math.min(srcH - 1, py));
        const i = (py * srcW + px) * 4;
        return 0.299 * pixels[i] + 0.587 * pixels[i + 1] + 0.114 * pixels[i + 2];
      }
      const tl = lum(x - 1, y - 1), tc = lum(x, y - 1), tr = lum(x + 1, y - 1);
      const ml = lum(x - 1, y),                           mr = lum(x + 1, y);
      const bl = lum(x - 1, y + 1), bc = lum(x, y + 1), br = lum(x + 1, y + 1);
      const gx = -tl + tr - 2 * ml + 2 * mr - bl + br;
      const gy = -tl - 2 * tc - tr + bl + 2 * bc + br;
      return {
        magnitude: Math.sqrt(gx * gx + gy * gy),
        angle: Math.atan2(gy, gx)
      };
    }

    function sourcePixelOffset(srcW, srcH, x, y) {
      const px = Math.max(0, Math.min(srcW - 1, x));
      const py = Math.max(0, Math.min(srcH - 1, y));
      return (py * srcW + px) * 4;
    }

    // Separable Gaussian blur on a flat grid of floats
    function gaussianBlurGrid(grid, cols, rows, sigma) {
      if (sigma < 0.5) return new Float32Array(grid);
      const radius = Math.ceil(sigma * 3);
      const size = radius * 2 + 1;
      const kernel = new Float32Array(size);
      let sum = 0;
      for (let i = 0; i < size; i++) {
        const x = i - radius;
        kernel[i] = Math.exp(-0.5 * (x * x) / (sigma * sigma));
        sum += kernel[i];
      }
      for (let i = 0; i < size; i++) kernel[i] /= sum;

      const tmp = new Float32Array(rows * cols);
      const out = new Float32Array(rows * cols);

      // Horizontal pass
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          let v = 0;
          for (let k = -radius; k <= radius; k++) {
            const cc = Math.max(0, Math.min(cols - 1, c + k));
            v += grid[r * cols + cc] * kernel[k + radius];
          }
          tmp[r * cols + c] = v;
        }
      }
      // Vertical pass
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          let v = 0;
          for (let k = -radius; k <= radius; k++) {
            const rr = Math.max(0, Math.min(rows - 1, r + k));
            v += tmp[rr * cols + c] * kernel[k + radius];
          }
          out[r * cols + c] = v;
        }
      }
      return out;
    }

    // Shared: build luminance grid from source pixels
    function buildLumGrid(pixels, srcW, srcH, cols, rows, cellSize, stride) {
      const n = rows * cols;
      const lum = new Float32Array(n);
      const sampleStep = Math.max(1, Math.floor(cellSize / 3));
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          let total = 0, count = 0;
          for (let dy = 0; dy < cellSize; dy += sampleStep) {
            for (let dx = 0; dx < cellSize; dx += sampleStep) {
              const px = col * stride + dx;
              const py = row * stride + dy;
              const i = sourcePixelOffset(srcW, srcH, px, py);
              total += 0.299 * pixels[i] + 0.587 * pixels[i + 1] + 0.114 * pixels[i + 2];
              count++;
            }
          }
          lum[row * cols + col] = total / count;
        }
      }
      return lum;
    }

    // Shared: distance field spread from edge cells
    function buildDistanceField(edgeCells, angles, cols, rows, maxDist) {
      const n = rows * cols;
      const dist = new Int8Array(n).fill(-1);
      for (let i = 0; i < n; i++) {
        if (edgeCells[i]) dist[i] = 0;
      }
      if (maxDist <= 0) return dist;
      for (let i = 0; i < n; i++) {
        if (!edgeCells[i]) continue;
        const r0 = Math.floor(i / cols), c0 = i % cols;
        const a = angles ? angles[i] : 0;
        const gr = angles ? Math.sin(a) : 0;
        const gc = angles ? Math.cos(a) : 0;
        if (angles) {
          for (const sign of [1, -1]) {
            for (let step = 1; step <= maxDist; step++) {
              const nr = Math.round(r0 + sign * gr * step);
              const nc = Math.round(c0 + sign * gc * step);
              if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) break;
              const ni = nr * cols + nc;
              if (dist[ni] >= 0 && dist[ni] <= step) continue;
              if (edgeCells[ni]) break;
              dist[ni] = step;
            }
          }
        } else {
          // BFS spread for topo mode (no gradient direction)
          for (let dr = -maxDist; dr <= maxDist; dr++) {
            for (let dc = -maxDist; dc <= maxDist; dc++) {
              if (!dr && !dc) continue;
              const step = Math.max(Math.abs(dr), Math.abs(dc));
              if (step > maxDist) continue;
              const nr = r0 + dr, nc = c0 + dc;
              if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
              const ni = nr * cols + nc;
              if (edgeCells[ni]) continue;
              if (dist[ni] >= 0 && dist[ni] <= step) continue;
              dist[ni] = step;
            }
          }
        }
      }
      return dist;
    }

    // Shared: draw contour characters to outputCtx
    function drawContourChars(dist, charPicker, angles, pixels, srcW, srcH, cols, rows, cellSize, stride, scale, offsetX, offsetY, layer, maskMetrics, palette) {
      const fontSize = cellSize * scale * gapFontScale(layer.gap);
      outputCtx.font = `${fontSize}px ${layer.font}`;
      outputCtx.textBaseline = 'middle';
      outputCtx.textAlign = 'center';
      const ovPad = state.forceGrid ? state.forceGridPadding / 100 : 0;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const idx = row * cols + col;
          const d = dist[idx];
          if (d < 0) continue;

          let char = charPicker(idx, d);
          const aChar = wordArtifactChar(row, col, layer);
          if (aChar) char = aChar;
          const cx = col * stride + Math.floor(cellSize / 2);
          const cy = row * stride + Math.floor(cellSize / 2);
          const strength = sampleMaskStrength(maskMetrics, cx, cy);
          if (!shouldRenderByStrength(strength, row, col)) continue;
          char = attenuateCharFromPalette(char, palette, strength);
          if (char === ' ') continue;

          const pi = sourcePixelOffset(srcW, srcH, cx, cy);
          const baseFill = layer.colorMode ? `rgb(${pixels[pi]},${pixels[pi+1]},${pixels[pi+2]})` : '#ffffff';
          outputCtx.fillStyle = getLayerDrawColor(layer, baseFill);

          const x = offsetX + (col + 0.5) * stride * scale;
          const y = offsetY + (row + 0.5) * stride * scale;
          if (layer.charRotation && angles) {
            outputCtx.save();
            outputCtx.translate(x, y);
            outputCtx.rotate(angles[idx]);
            if (ovPad > 0) outputCtx.scale(1 - ovPad, 1 - ovPad);
            outputCtx.fillText(char, 0, 0);
            outputCtx.restore();
          } else if (ovPad > 0) {
            outputCtx.save();
            outputCtx.translate(x, y);
            outputCtx.scale(1 - ovPad, 1 - ovPad);
            outputCtx.fillText(char, 0, 0);
            outputCtx.restore();
          } else {
            outputCtx.fillText(char, x, y);
          }
        }
      }
    }

    // ============ TOPO MODE ============
    function renderContourTopo(pixels, srcW, srcH, cols, rows, cellSize, scale, offsetX, offsetY, layer, maskMetrics) {
      const stride = Math.round(cellSize * (1 + layer.gap));
      const n = rows * cols;
      const levels = layer.contourLevels || 8;
      const smoothing = layer.contourSmoothing || 0;
      const thickness = layer.contourThickness || 0;
      const detail = layer.contourDetail || 5;
      const fill = layer.contourFill;

      // Build luminance grid and smooth it
      let lum = buildLumGrid(pixels, srcW, srcH, cols, rows, cellSize, stride);
      if (smoothing > 0) {
        lum = gaussianBlurGrid(lum, cols, rows, smoothing * 0.8);
      }

      // Quantize into N levels
      const quantized = new Uint8Array(n);
      for (let i = 0; i < n; i++) {
        quantized[i] = Math.min(levels - 1, Math.floor(lum[i] / 255 * levels));
      }

      // Find boundary cells (where adjacent cells differ in level)
      const edgeCells = new Uint8Array(n);
      // Track which neighbors differ for direction-aware characters
      const hasTop = new Uint8Array(n);
      const hasBottom = new Uint8Array(n);
      const hasLeft = new Uint8Array(n);
      const hasRight = new Uint8Array(n);
      const hasTL = new Uint8Array(n);
      const hasTR = new Uint8Array(n);
      const hasBL = new Uint8Array(n);
      const hasBR = new Uint8Array(n);

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const idx = row * cols + col;
          const v = quantized[idx];
          if (row > 0 && quantized[(row-1)*cols+col] !== v) { edgeCells[idx] = 1; hasTop[idx] = 1; }
          if (row < rows-1 && quantized[(row+1)*cols+col] !== v) { edgeCells[idx] = 1; hasBottom[idx] = 1; }
          if (col > 0 && quantized[row*cols+col-1] !== v) { edgeCells[idx] = 1; hasLeft[idx] = 1; }
          if (col < cols-1 && quantized[row*cols+col+1] !== v) { edgeCells[idx] = 1; hasRight[idx] = 1; }
          if (row > 0 && col > 0 && quantized[(row-1)*cols+col-1] !== v) { hasTL[idx] = 1; }
          if (row > 0 && col < cols-1 && quantized[(row-1)*cols+col+1] !== v) { hasTR[idx] = 1; }
          if (row < rows-1 && col > 0 && quantized[(row+1)*cols+col-1] !== v) { hasBL[idx] = 1; }
          if (row < rows-1 && col < cols-1 && quantized[(row+1)*cols+col+1] !== v) { hasBR[idx] = 1; }
        }
      }

      // Connected component filter — remove small fragments based on Detail
      const minChain = Math.max(1, Math.floor(11 - detail));
      if (minChain > 1) {
        const labels = new Int32Array(n).fill(-1);
        let labelId = 0;
        for (let i = 0; i < n; i++) {
          if (!edgeCells[i] || labels[i] >= 0) continue;
          const comp = [];
          const bfs = [i];
          labels[i] = labelId;
          while (bfs.length > 0) {
            const idx = bfs.shift();
            comp.push(idx);
            const r = Math.floor(idx / cols), c = idx % cols;
            for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
              if (!dr && !dc) continue;
              const nr = r+dr, nc = c+dc;
              if (nr>=0 && nr<rows && nc>=0 && nc<cols) {
                const ni = nr*cols+nc;
                if (edgeCells[ni] && labels[ni] < 0) { labels[ni] = labelId; bfs.push(ni); }
              }
            }
          }
          if (comp.length < minChain) for (const idx of comp) edgeCells[idx] = 0;
          labelId++;
        }
      }

      // Distance field for thickness
      const dist = buildDistanceField(edgeCells, null, cols, rows, thickness);

      // Fill characters palette
      const fillPalette = ' .:-=+*#%@';

      // Direction-aware character picker
      const topoCharPicker = (idx, d) => {
        if (d > 0) {
          // Spread cells get thinner chars
          return d === 1 ? '·' : '.';
        }
        // Edge cell — pick direction-aware line character
        const t = hasTop[idx], b = hasBottom[idx], l = hasLeft[idx], r = hasRight[idx];
        const tl = hasTL[idx], tr = hasTR[idx], bl = hasBL[idx], br = hasBR[idx];
        const hCount = (l ? 1 : 0) + (r ? 1 : 0);
        const vCount = (t ? 1 : 0) + (b ? 1 : 0);

        // Pure horizontal boundary
        if (hCount === 0 && vCount > 0) return '─';
        // Pure vertical boundary
        if (vCount === 0 && hCount > 0) return '│';
        // Corner/junction cases
        if (t && r && !b && !l) return '└';
        if (t && l && !b && !r) return '┘';
        if (b && r && !t && !l) return '┌';
        if (b && l && !t && !r) return '┐';
        // Diagonal: only diagonal neighbors differ
        if (!t && !b && !l && !r) {
          if ((tl || br) && !tr && !bl) return '╲';
          if ((tr || bl) && !tl && !br) return '╱';
          return '·';
        }
        // Cross/T-junctions
        if (t && b && l && r) return '┼';
        if (t && b && r) return '├';
        if (t && b && l) return '┤';
        if (l && r && b) return '┬';
        if (l && r && t) return '┴';
        return '─';
      };

      // If fill is on, draw fill characters first
      if (fill) {
        const fontSize = cellSize * scale * gapFontScale(layer.gap);
        outputCtx.font = `${fontSize}px ${layer.font}`;
        outputCtx.textBaseline = 'middle';
        outputCtx.textAlign = 'center';
        const ovPad = state.forceGrid ? state.forceGridPadding / 100 : 0;

        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const idx = row * cols + col;
            if (dist[idx] === 0) continue; // skip edge cells, drawn later
            const level = quantized[idx];
            const charIdx = Math.min(fillPalette.length - 1, Math.floor(level / levels * fillPalette.length));
            let char = fillPalette[charIdx];
            if (char === ' ') continue;

            const cx = col * stride + Math.floor(cellSize / 2);
            const cy = row * stride + Math.floor(cellSize / 2);
            const strength = sampleMaskStrength(maskMetrics, cx, cy);
            if (!shouldRenderByStrength(strength, row, col)) continue;
            char = attenuateCharFromPalette(char, fillPalette, strength);
            if (char === ' ') continue;

            const pi = sourcePixelOffset(srcW, srcH, cx, cy);
            const baseFill = layer.colorMode ? `rgb(${pixels[pi]},${pixels[pi+1]},${pixels[pi+2]})` : '#ffffff';
            outputCtx.fillStyle = getLayerDrawColor(layer, baseFill);
            outputCtx.globalAlpha = 0.4;

            const x = offsetX + (col + 0.5) * stride * scale;
            const y = offsetY + (row + 0.5) * stride * scale;
            if (ovPad > 0) {
              outputCtx.save();
              outputCtx.translate(x, y);
              outputCtx.scale(1 - ovPad, 1 - ovPad);
              outputCtx.fillText(char, 0, 0);
              outputCtx.restore();
            } else {
              outputCtx.fillText(char, x, y);
            }
          }
        }
        outputCtx.globalAlpha = 1;
      }

      // Draw contour line characters
      drawContourChars(dist, topoCharPicker, null, pixels, srcW, srcH, cols, rows, cellSize, stride, scale, offsetX, offsetY, layer, maskMetrics, ' .·─│╱╲┌┐└┘├┤┬┴┼');
    }

    // ============ EDGE MODE (DoG) ============
    function renderContourEdge(pixels, srcW, srcH, cols, rows, cellSize, scale, offsetX, offsetY, layer, maskMetrics) {
      const stride = Math.round(cellSize * (1 + layer.gap));
      const n = rows * cols;
      const smoothing = layer.contourSmoothing || 0;
      const detail = layer.contourDetail || 5;
      const thickness = layer.contourThickness || 0;
      const sigmaRatio = layer.contourSigmaRatio || 1.6;

      // Build luminance grid
      let lum = buildLumGrid(pixels, srcW, srcH, cols, rows, cellSize, stride);

      // Pre-blur for noise reduction (independent of DoG)
      if (smoothing > 0) {
        lum = gaussianBlurGrid(lum, cols, rows, smoothing * 0.8);
      }

      // DoG: two Gaussian blurs at small fixed sigmas (controlled by sigmaRatio only)
      const sigma1 = 0.7;
      const sigma2 = sigma1 * sigmaRatio;
      const blur1 = gaussianBlurGrid(lum, cols, rows, sigma1);
      const blur2 = gaussianBlurGrid(lum, cols, rows, sigma2);

      // Subtract to get DoG response + compute gradient angles via Sobel on blurred image
      const dog = new Float32Array(n);
      const mags = new Float32Array(n);
      const angles = new Float32Array(n);
      for (let i = 0; i < n; i++) {
        dog[i] = Math.abs(blur1[i] - blur2[i]);
      }

      // Compute gradient angles from the smoothed luminance for NMS and char rotation
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const idx = row * cols + col;
          // Sobel on the blurred grid
          const tl = (row>0&&col>0) ? blur1[(row-1)*cols+col-1] : blur1[idx];
          const tc = (row>0) ? blur1[(row-1)*cols+col] : blur1[idx];
          const tr = (row>0&&col<cols-1) ? blur1[(row-1)*cols+col+1] : blur1[idx];
          const ml = (col>0) ? blur1[row*cols+col-1] : blur1[idx];
          const mr = (col<cols-1) ? blur1[row*cols+col+1] : blur1[idx];
          const bl = (row<rows-1&&col>0) ? blur1[(row+1)*cols+col-1] : blur1[idx];
          const bc = (row<rows-1) ? blur1[(row+1)*cols+col] : blur1[idx];
          const br = (row<rows-1&&col<cols-1) ? blur1[(row+1)*cols+col+1] : blur1[idx];
          const gx = -tl + tr - 2*ml + 2*mr - bl + br;
          const gy = -tl - 2*tc - tr + bl + 2*bc + br;
          angles[idx] = Math.atan2(gy, gx);
          mags[idx] = dog[idx];
        }
      }

      // Threshold based on Detail (detail=10 → low threshold, detail=1 → high threshold)
      const threshold = Math.max(2, 30 - detail * 2.8);

      // NMS — thin edges to 1-cell wide
      const nms = new Uint8Array(n);
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const idx = row * cols + col;
          const mag = mags[idx];
          if (mag < threshold * 0.5) continue;
          const a = ((angles[idx] % Math.PI) + Math.PI) % Math.PI;
          let dr1, dc1, dr2, dc2;
          if (a < Math.PI * 0.125 || a >= Math.PI * 0.875) { dr1=0;dc1=-1;dr2=0;dc2=1; }
          else if (a < Math.PI * 0.375) { dr1=-1;dc1=-1;dr2=1;dc2=1; }
          else if (a < Math.PI * 0.625) { dr1=-1;dc1=0;dr2=1;dc2=0; }
          else { dr1=-1;dc1=1;dr2=1;dc2=-1; }
          const r1=row+dr1,c1=col+dc1,r2=row+dr2,c2=col+dc2;
          const m1=(r1>=0&&r1<rows&&c1>=0&&c1<cols)?mags[r1*cols+c1]:0;
          const m2=(r2>=0&&r2<rows&&c2>=0&&c2<cols)?mags[r2*cols+c2]:0;
          if (mag >= m1 && mag >= m2) nms[idx] = 1;
        }
      }

      // Hysteresis thresholding
      const strongThresh = threshold;
      const weakThresh = threshold * 0.4;
      const keep = new Uint8Array(n);
      const queue = [];
      for (let i = 0; i < n; i++) {
        if (!nms[i]) continue;
        if (mags[i] >= strongThresh) { keep[i] = 2; queue.push(i); }
        else if (mags[i] >= weakThresh) keep[i] = 1;
      }
      while (queue.length > 0) {
        const idx = queue.shift();
        const r = Math.floor(idx / cols), c = idx % cols;
        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
          if (!dr && !dc) continue;
          const nr = r+dr, nc = c+dc;
          if (nr>=0 && nr<rows && nc>=0 && nc<cols) {
            const ni = nr*cols+nc;
            if (keep[ni] === 1) { keep[ni] = 2; queue.push(ni); }
          }
        }
      }

      // Connected component filter
      const minChain = Math.max(2, Math.floor(11 - detail));
      const edgeCells = new Uint8Array(n);
      const labels = new Int32Array(n).fill(-1);
      let labelId = 0;
      for (let i = 0; i < n; i++) {
        if (keep[i] !== 2 || labels[i] >= 0) continue;
        const comp = [];
        const bfs = [i];
        labels[i] = labelId;
        while (bfs.length > 0) {
          const idx = bfs.shift();
          comp.push(idx);
          const r = Math.floor(idx / cols), c = idx % cols;
          for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
            if (!dr && !dc) continue;
            const nr = r+dr, nc = c+dc;
            if (nr>=0 && nr<rows && nc>=0 && nc<cols) {
              const ni = nr*cols+nc;
              if (keep[ni] === 2 && labels[ni] < 0) { labels[ni] = labelId; bfs.push(ni); }
            }
          }
        }
        if (comp.length >= minChain) for (const idx of comp) edgeCells[idx] = 1;
        labelId++;
      }

      // Distance field spread
      const dist = buildDistanceField(edgeCells, angles, cols, rows, thickness);

      // Character picker
      const edgeCharPicker = (idx, d) => {
        if (d === 0) return mags[idx] >= threshold * 2 ? 'O' : 'o';
        if (d === 1) return ':';
        return '.';
      };

      drawContourChars(dist, edgeCharPicker, angles, pixels, srcW, srcH, cols, rows, cellSize, stride, scale, offsetX, offsetY, layer, maskMetrics, ' .:oO');
    }

    // ============ CONTOUR DISPATCHER ============
    function renderOverlay(pixels, srcW, srcH, cols, rows, cellSize, chars, scale, offsetX, offsetY, layer, maskMetrics) {
      if ((layer.contourStyle || 'edge') === 'topo') {
        renderContourTopo(pixels, srcW, srcH, cols, rows, cellSize, scale, offsetX, offsetY, layer, maskMetrics);
      } else {
        renderContourEdge(pixels, srcW, srcH, cols, rows, cellSize, scale, offsetX, offsetY, layer, maskMetrics);
      }
    }

    // Dense mode: draws sub-pixel dot patterns in each cell for seamless tiling
    // Each cell is divided into a 4x4 sub-grid, and dots are filled based on luminance
    const DENSE_PATTERNS = [
      [],                                                          // 0: empty
      [[1,1],[2,2]],                                               // 1: 2 dots
      [[0,0],[2,2]],                                               // 2: 2 corner dots
      [[0,0],[2,0],[0,2],[2,2]],                                   // 3: 4 corner dots
      [[0,0],[2,0],[1,1],[3,1],[0,2],[2,2],[1,3],[3,3]],           // 4: sparse checker
      [[0,0],[2,0],[0,2],[2,2],[1,1],[3,1],[1,3],[3,3]],           // 5: regular grid
      // checkerboard
      [[0,0],[2,0],[1,1],[3,1],[0,2],[2,2],[1,3],[3,3],[0,1],[2,1],[1,0],[3,0]], // 6: dense checker
      // mostly filled
      [[0,0],[1,0],[2,0],[3,0],[0,1],[1,1],[2,1],[3,1],[0,2],[1,2],[2,2],[3,2],[0,3],[1,3],[2,3]], // 7: almost full
      // full
      [[0,0],[1,0],[2,0],[3,0],[0,1],[1,1],[2,1],[3,1],[0,2],[1,2],[2,2],[3,2],[0,3],[1,3],[2,3],[3,3]] // 8: full
    ];

    function renderDense(pixels, srcW, srcH, cols, rows, cellSize, scale, offsetX, offsetY, layer, maskMetrics) {
      const stride = Math.round(cellSize * (1 + layer.gap));
      const cellW = stride * scale;
      const cellH = stride * scale;
      const subSize = (cellSize * scale) / 4;
      const sampleStep = Math.max(1, Math.floor(cellSize / 4));

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          let r = 0, g = 0, b = 0, count = 0;
          for (let dy = 0; dy < cellSize; dy += sampleStep) {
            for (let dx = 0; dx < cellSize; dx += sampleStep) {
              const px = col * stride + dx;
              const py = row * stride + dy;
              const i = sourcePixelOffset(srcW, srcH, px, py);
              r += pixels[i]; g += pixels[i + 1]; b += pixels[i + 2]; count++;
            }
          }
          r = Math.round(r / count); g = Math.round(g / count); b = Math.round(b / count);

          let lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
          if (layer.invert) lum = 1 - lum;

          const cxSrc = col * stride + Math.floor(cellSize / 2);
          const cySrc = row * stride + Math.floor(cellSize / 2);
          const strength = sampleMaskStrength(maskMetrics, cxSrc, cySrc);
          if (!shouldRenderByStrength(strength, row, col)) continue;

          const patIdxBase = Math.min(Math.floor(lum * DENSE_PATTERNS.length), DENSE_PATTERNS.length - 1);
          const patIdx = attenuateIndex(patIdxBase, strength);
          const pattern = DENSE_PATTERNS[patIdx];
          if (pattern.length === 0) continue;
          const aChar = wordArtifactChar(row, col, layer);
          if (aChar && strength > 0.66) {
            const fontSize = cellSize * scale * gapFontScale(layer.gap);
            outputCtx.font = `${fontSize}px ${layer.font}`;
            outputCtx.textBaseline = 'middle';
            outputCtx.textAlign = 'center';
            const baseFill = layer.colorMode ? `rgb(${r},${g},${b})` : '#ffffff';
            outputCtx.fillStyle = getLayerDrawColor(layer, baseFill);
            const acx = offsetX + (col + 0.5) * cellW;
            const acy = offsetY + (row + 0.5) * cellH;
            outputCtx.fillText(aChar, acx, acy);
            continue;
          }

          const cx = offsetX + col * cellW;
          const cy = offsetY + row * cellH;

          const baseFill = layer.colorMode ? `rgb(${r},${g},${b})` : '#ffffff';
          outputCtx.fillStyle = getLayerDrawColor(layer, baseFill);
          for (const [sx, sy] of pattern) {
            outputCtx.fillRect(
              Math.round(cx + sx * subSize),
              Math.round(cy + sy * subSize),
              Math.ceil(subSize),
              Math.ceil(subSize)
            );
          }
        }
      }
    }

    // Bloom offscreen canvases (reused across frames)
    // Mip-chain bloom: progressive downsample → small blur → upsample
    // Adapted from physically-based bloom (LearnOpenGL / Unreal Engine)
    let _mipChain = [];     // [{canvas, ctx}, ...] reused across frames
    let _bloomAsciiCanvas = null;
    let _bloomAsciiCtx = null;

    function _getMip(i) {
      if (!_mipChain[i]) {
        const c = document.createElement('canvas');
        _mipChain[i] = { canvas: c, ctx: c.getContext('2d') };
      }
      return _mipChain[i];
    }

    function applyBloomPost(targetCtx, asciiCanvas, w, h, layer) {
      if (!layer.bloom) return;

      const radius = layer.bloomRadius;
      const intensity = layer.bloomIntensity;

      // Determine mip levels from radius: each level halves resolution
      const mipCount = Math.min(7, Math.max(3, Math.ceil(Math.log2(radius)) + 1));
      const blurPerLevel = 3; // small blur at each level — stays in 8-bit precision

      // === DOWNSAMPLE PHASE ===
      // Progressively halve resolution, applying a small blur at each step.
      for (let i = 0; i < mipCount; i++) {
        const mip = _getMip(i);
        const srcCanvas = i === 0 ? asciiCanvas : _getMip(i - 1).canvas;
        const mw = Math.max(1, Math.ceil(srcCanvas.width / 2));
        const mh = Math.max(1, Math.ceil(srcCanvas.height / 2));

        if (mip.canvas.width !== mw || mip.canvas.height !== mh) {
          mip.canvas.width = mw;
          mip.canvas.height = mh;
        } else {
          mip.ctx.clearRect(0, 0, mw, mh);
        }

        // Downsample: drawImage at half size does bilinear 2x2 averaging
        mip.ctx.imageSmoothingEnabled = true;
        mip.ctx.imageSmoothingQuality = 'high';
        mip.ctx.drawImage(srcCanvas, 0, 0, mw, mh);

        // Small blur at this mip level — stays well within 8-bit precision
        mip.ctx.filter = `blur(${blurPerLevel}px)`;
        mip.ctx.drawImage(mip.canvas, 0, 0);
        mip.ctx.filter = 'none';
      }

      // === UPSAMPLE PHASE ===
      // Walk back up the chain, blending each level into the one above it.
      const upsampleBlend = layer.bloomStyle === 'intense' ? 0.75 : 0.55;

      for (let i = mipCount - 1; i > 0; i--) {
        const src = _getMip(i);
        const dst = _getMip(i - 1);

        dst.ctx.imageSmoothingEnabled = true;
        dst.ctx.imageSmoothingQuality = 'high';
        dst.ctx.globalAlpha = upsampleBlend;
        dst.ctx.globalCompositeOperation = 'lighter';
        dst.ctx.drawImage(src.canvas, 0, 0, dst.canvas.width, dst.canvas.height);
        dst.ctx.globalAlpha = 1;
        dst.ctx.globalCompositeOperation = 'source-over';
      }

      // === COMPOSITE ===
      // Draw the accumulated bloom (mip[0]) onto the output with screen blending
      targetCtx.save();
      targetCtx.imageSmoothingEnabled = true;
      targetCtx.imageSmoothingQuality = 'high';

            medium * mediumWeight +

    function mod(n, m) {

    function normalizeWordArtifactDistribution(mode) {

    function wordArtifactChar(row, col, layer) {
      if (!layer.wordArtifactEnabled || !layer.wordArtifact) return null;

      if (density <= 0) return null;

      const glyphs = Array.from(word);
      const wordLen = glyphs.length;
      if (!wordLen) return null;

      const seed = hashString(`${layer.id}:${word}`);
      const basePhase = seed % Math.max(1, wordLen);

      if (mode === 'random') {

      } else if (mode === 'cluster') {

        occupied = density >= 0.995 || field >= (1 - density);
        coherentIndex = mod(Math.floor(col * 0.75 + row * 1.35) + basePhase, wordLen);
      } else {

        const rowHash = ((row * 1103515245) ^ (wordLen * 2654435761) ^ seed) >>> 0;

    function drawBlockGlyph(ctx, char, x, y, cellW, cellH, rotation = 0) {

    function measureGlyphInk(ctx, char) {
      const metrics = ctx.measureText(char);
      const inkLeft = metrics.actualBoundingBoxLeft || 0;
      const inkRight = metrics.actualBoundingBoxRight || metrics.width || 1;
      const inkAscent = metrics.actualBoundingBoxAscent || parseFloat(ctx.font) || 1;
      const inkDescent = metrics.actualBoundingBoxDescent || 0;
      return {
        inkLeft,
        inkRight,
        inkAscent,
        inkDescent,
        inkWidth: Math.max(1, inkLeft + inkRight),
        inkHeight: Math.max(1, inkAscent + inkDescent)

    }

    function measureCharsetInk(ctx, chars) {
      const glyphs = Array.from(chars).filter(char => char.trim() !== '');
      const summary = { maxWidth: 1, maxHeight: 1 };
      for (const char of glyphs) {
        const metrics = measureGlyphInk(ctx, char);
        summary.maxWidth = Math.max(summary.maxWidth, metrics.inkWidth);
        summary.maxHeight = Math.max(summary.maxHeight, metrics.inkHeight);

    const denseGlyphPathCache = new Map();

        const glyph = outlines[char];
        if (!glyph) continue;

        maxHeight = Math.max(maxHeight, Math.max(1, glyph.yMax - glyph.yMin));

        maxWidth,
        maxHeight,
        aspect: maxWidth / maxHeight

      const glyphHeight = Math.max(1, glyph.yMax - glyph.yMin);

        : Math.min(width / glyphWidth, height / glyphHeight);

      '▆': 6 / 8,
      '▇': 7 / 8,

    // ============ OUTLINE MODE ============

          const queue = [startIdx];

          const level = grid[startIdx];
          componentIds[startIdx] = componentId;

          if (col > 0 && !valid[idx - 1]) vEdges[row * (cols + 1) + col] = 1;
