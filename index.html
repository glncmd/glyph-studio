    function clientToCanvasPoint(clientX, clientY) {
      const rect = outputCanvas.getBoundingClientRect();
      return {
        x: (clientX - rect.left) * (outputCanvas.width / rect.width),
        y: (clientY - rect.top) * (outputCanvas.height / rect.height)
      };
    }

    function canvasToSourcePoint(canvasX, canvasY, geometry) {
      const transform = getImageTransform(geometry);
      if (!transform) return { x: 0, y: 0, inside: false };
      const { rect, scaleX, scaleY } = transform;
      const rawX = (canvasX - rect.left) / Math.max(1e-4, scaleX);
      const rawY = (canvasY - rect.top) / Math.max(1e-4, scaleY);
      return {
        x: clamp(rawX, 0, geometry.srcW),
        y: clamp(rawY, 0, geometry.srcH),
        inside: rawX >= 0 && rawX <= geometry.srcW && rawY >= 0 && rawY <= geometry.srcH
      };
    }

    function sourceToCanvasPoint(x, y, geometry) {
      const transform = getImageTransform(geometry);
      if (!transform) return { x: 0, y: 0 };
      const { rect, scaleX, scaleY } = transform;
      return {
        x: rect.left + x * scaleX,
        y: rect.top + y * scaleY
      };
    }

    // ============ VARIANTS ============
    function popcount(n) { let c = 0; while (n) { c += n & 1; n >>= 1; } return c; }

    function generateBrailleChars() {
      const chars = [];
      for (let i = 1; i < 256; i++) {
        const bits = popcount(i);
        if (bits < 3) continue;
        chars.push({ cp: 0x2800 + i, bits });
      }
      chars.sort((a, b) => a.bits - b.bits || a.cp - b.cp);
      return chars.map(c => String.fromCharCode(c.cp)).join('');
    }

    // ============ ARROW KEY NUDGE FOR NUMBER INPUTS ============
    // Up/Down arrow keys adjust the value by the paired range slider's step.
    // Shift multiplies step by 10 for coarse adjustment.
    document.getElementById('settingsDrawer').addEventListener('keydown', (e) => {
      if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
      const el = e.target;
      if (el.tagName !== 'INPUT' || el.type !== 'text') return;
      // Find the paired range slider — it's the next range input in the same container
      const container = el.closest('.flex.flex-col.gap-2');
      if (!container) return;
      const slider = container.querySelector('input[type="range"]');
      if (!slider) return;

      e.preventDefault();
      const step = parseFloat(slider.step) || 1;
      const min = parseFloat(slider.min);
      const max = parseFloat(slider.max);
      const mult = e.shiftKey ? 10 : 1;
      const dir = e.key === 'ArrowUp' ? 1 : -1;
      const cur = parseFloat(el.value) || 0;
      const next = Math.round((cur + dir * step * mult) * 1e6) / 1e6;
      const clamped = Math.min(max, Math.max(min, next));
      el.value = clamped;
      el.dispatchEvent(new Event('change'));
    });

    function getSourceDimensions() {
      const src = state.sourceElement;
      if (src) {
        const w = src.videoWidth || src.naturalWidth || src.width || sourceCanvas.width;
        const h = src.videoHeight || src.naturalHeight || src.height || sourceCanvas.height;

      if (sourceCanvas.width > 0 && sourceCanvas.height > 0) {
        return { w: sourceCanvas.width, h: sourceCanvas.height };
      }
      return null;
    }

    function getAdaptiveCellSizeMax(layer = activeLayer()) {
      const dims = getSourceDimensions();
      const layerSize = layer && layer.kind !== 'source' ? layer.cellSize || CELL_SIZE_DEFAULT : CELL_SIZE_DEFAULT;
      if (!dims) return Math.max(CELL_SIZE_EMPTY_MAX, layerSize);
      const shorterEdge = Math.min(dims.w, dims.h);
      const adaptiveMax = Math.round(shorterEdge / 12);
      return clamp(Math.max(CELL_SIZE_BASE_MAX, adaptiveMax, layerSize), CELL_SIZE_BASE_MAX, CELL_SIZE_ABS_MAX);
    }

        return st ? st.label : reg.label;

      return reg.label;

      const reg = EFFECT_REGISTRY[fx.type];
      if (!reg) return [];
      if (reg.subtypes && fx.subtype) {
        const st = reg.subtypes[fx.subtype];
        return st ? st.params : [];
      }
      return reg.params || [];

          const toIdx = chain.findIndex(f => f.id === fx.id);
          if (fromIdx < 0 || toIdx < 0) return;
          const [moved] = chain.splice(fromIdx, 1);
          const insertIdx = fxDragState.placement === 'before' ? chain.findIndex(f => f.id === fx.id) : chain.findIndex(f => f.id === fx.id) + 1;
          chain.splice(insertIdx < 0 ? chain.length : insertIdx, 0, moved);
          fxDragState.draggedId = null;
          fxDragState.targetId = null;
          fxDragState.placement = null;
          invalidatePostProcessCache();
          renderEffectChainUI();
          render();

    // ============ RESIZE ============
    function resizeCanvas() {
      const area = canvasArea.getBoundingClientRect();
      const w = Math.round(area.width);
      const h = Math.round(area.height);
      if (outputCanvas.width === w && outputCanvas.height === h) return;
      outputCanvas.width = w;
      outputCanvas.height = h;
      invalidateMaskCaches();
      invalidatePostProcessCache();
      if (!state.sourceElement) return;
      const src = state.sourceElement;
      const srcW = src.videoWidth || src.naturalWidth || src.width;
      const srcH = src.videoHeight || src.naturalHeight || src.height;
      sourceCanvas.width = srcW;
      sourceCanvas.height = srcH;
      if (state.source === 'image' || (state.source === 'video' && state.sourceElement.paused)) render();
    }
    new ResizeObserver(resizeCanvas).observe(canvasArea);
    window.addEventListener('resize', resizeCanvas);

    // ============ OFFSCREEN CANVAS POOL ============
    const layerCanvasPool = new Map();
    function getLayerCanvas(id, w, h) {
      let entry = layerCanvasPool.get(id);
      if (!entry || entry.width !== w || entry.height !== h) {
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        layerCanvasPool.set(id, c);
        return c;
      }
      return entry;
    }

    function renderSourceLayer(layerCtx, layer, geometry) {
      const filter = `brightness(${layer.brightness ?? 1}) contrast(${layer.contrast ?? 1}) saturate(${layer.saturation ?? 1})`;
      const transform = getImageTransform(geometry);
      if (!transform) return;
      const { rect } = transform;
      layerCtx.save();
      layerCtx.filter = filter;
      layerCtx.drawImage(
        state.sourceElement,
        rect.left,
        rect.top,
        rect.width,
        rect.height
      );
      layerCtx.restore();
    }

    function buildMaskPath(layer, geometry) {
      const mask = getMask(layer);
      if (!mask || !maskHasRegions(mask)) return null;
      const entry = maskPathCache.get(layer.id);
      if (entry && entry.key === geometry.key) return entry.paths;
      const transform = getImageTransform(geometry);
      if (!transform) return null;
      const { rect, scaleX, scaleY } = transform;

      const paths = [];
      for (const region of mask.regions) {
        if (region.points.length < 3) continue;
        const path = new Path2D();
        traceSmoothPath(path, region.points, (pt) => [
          rect.left + clamp(pt[0], 0, 1) * geometry.srcW * scaleX,
          rect.top + clamp(pt[1], 0, 1) * geometry.srcH * scaleY
        ], true);
        paths.push({ path, op: region.op });
      }
      maskPathCache.set(layer.id, { key: geometry.key, paths });
      return paths;
    }

    function applyLayerMask(layerCtx, layer, geometry, forExport) {
      const mask = getMask(layer);
      const paths = buildMaskPath(layer, geometry);
      if (!mask || !paths || paths.length === 0) return;

      const w = geometry.outW;
      const h = geometry.outH;
      const scratch = getScratchCanvas('maskComposite', w, h);
      const sctx = scratch.getContext('2d');
      sctx.clearRect(0, 0, w, h);

      for (const { path, op } of paths) {
        switch (op) {
          case 'new':
            sctx.clearRect(0, 0, w, h);
            sctx.globalCompositeOperation = 'source-over';
            break;
          case 'add':
            sctx.globalCompositeOperation = 'source-over';
            break;
          case 'subtract':
            sctx.globalCompositeOperation = 'destination-out';
            break;
          case 'intersect':
            sctx.globalCompositeOperation = 'destination-in';
            break;
        }
        sctx.fillStyle = '#fff';
        sctx.fill(path);
      }

      layerCtx.save();
      layerCtx.globalCompositeOperation = mask.inverted ? 'destination-out' : 'destination-in';
      layerCtx.drawImage(scratch, 0, 0);
      layerCtx.restore();
    }

    function clipToImageBounds(ctx, geometry) {
      const transform = getImageTransform(geometry);
      if (!transform) return;
      const { rect } = transform;
      // Use destination-in to erase everything outside the image rect
      ctx.save();
      ctx.globalCompositeOperation = 'destination-in';
      ctx.fillStyle = '#fff';
      ctx.fillRect(rect.left, rect.top, rect.width, rect.height);
      ctx.restore();
    }

    // ============ RENDER LAYER ============
    function renderLayer(layer, pixels, geometry, forExport = false) {
      const { srcW, srcH, scale, offsetX, offsetY, outW, outH } = geometry;
      const effectScale = getScreenEffectScale(geometry, forExport);
      const layerCanvas = getLayerCanvas(layer.id, outW, outH);
      const layerCtx = layerCanvas.getContext('2d');
      layerCtx.clearRect(0, 0, outW, outH);

      if (layer.kind === 'source') {
        renderSourceLayer(layerCtx, layer, geometry);
        // Apply effect chain to source layer too
        const srcChain = getEffectChain(layer);
        if (srcChain.length > 0) {
          for (const fx of srcChain) {
            if (!fx.enabled) continue;
            applyEffect(layerCtx, fx, { asciiCanvas: layerCanvas, outW, outH, layer, geometry, forExport, effectScale });
          }
          // Clip to image bounds
          clipToImageBounds(layerCtx, geometry);
        }
        return layerCanvas;
      }

      const variant = VARIANTS[layer.variant];
      const cellHeight = layer.cellSize;
      const cellWidth = layer.variant === 'Dense' ? getDenseCellWidth(cellHeight) : cellHeight;
      const strideX = Math.round(cellWidth * (1 + layer.gap));
      const strideY = Math.round(cellHeight * (1 + layer.gap));
      const cols = Math.ceil(srcW / strideX);
      const rows = Math.ceil(srcH / strideY);
      const maskMetrics = prepareMaskMetrics(layer, srcW, srcH);

      // Swap outputCtx to layer canvas
      const savedCtx = outputCtx;
      try {
        // Always render ASCII to offscreen canvas (needed if any bloom exists in the chain)
        const offscreen = getBloomAsciiCanvas(outW, outH);
        const asciiCanvas = offscreen.canvas;
        outputCtx = offscreen.ctx;

        if (variant.mode === 'outline') {
          renderOutline(pixels, srcW, srcH, cols, rows, cellHeight, scale, offsetX, offsetY, layer, maskMetrics);
        } else if (variant.mode === 'highlight') {
          renderHighlight(pixels, srcW, srcH, cols, rows, cellHeight, scale, offsetX, offsetY, layer, maskMetrics);
        } else if (variant.mode === 'replacement') {
          renderReplacement(pixels, srcW, srcH, cols, rows, cellWidth, cellHeight, variant.chars, scale, offsetX, offsetY, layer, maskMetrics);
        }
        if (variant.mode === 'overlay') {
          renderOverlay(pixels, srcW, srcH, cols, rows, cellHeight, variant.chars, scale, offsetX, offsetY, layer, maskMetrics);
        }

        // Copy ASCII result to layer canvas
        outputCtx = layerCtx;
        layerCtx.drawImage(asciiCanvas, 0, 0);

        // Apply effect chain in order
        const chain = getEffectChain(layer);
        for (const fx of chain) {
          if (!fx.enabled) continue;
          applyEffect(layerCtx, fx, { asciiCanvas, outW, outH, layer, geometry, forExport, effectScale });
        }

        // Always clip ASCII layers to the image frame so partial edge cells
        // can render and then be cleanly cut off at the bounds.
        clipToImageBounds(layerCtx, geometry);

        applyLayerMask(layerCtx, layer, geometry, forExport);
      } finally {
        outputCtx = savedCtx;
      }
      return layerCanvas;
    }

    // ============ RENDER ============
    function render() {
      const geometry = getRenderGeometry();
      if (!geometry) return;
      const src = state.sourceElement;
      const { srcW, srcH, outW, outH, scale, offsetX, offsetY } = geometry;

      // Clear output
      outputCtx.fillStyle = '#0a0a0a';
      outputCtx.fillRect(0, 0, outW, outH);

      // Pixel data cache — reuse across layers with same brightness/contrast/saturation
      const pixelCache = new Map();

      for (let i = 0; i < state.layers.length; i++) {
        const layer = state.layers[i];
        if (!layer.visible) continue;

        let pixels = null;
        if (layer.kind !== 'source') {
          const filterKey = `${layer.brightness}-${layer.contrast}-${layer.saturation}`;
          pixels = pixelCache.get(filterKey);
          if (!pixels) {
            sourceCtx.filter = `brightness(${layer.brightness}) contrast(${layer.contrast}) saturate(${layer.saturation})`;
            sourceCtx.drawImage(src, 0, 0, srcW, srcH);
            sourceCtx.filter = 'none';
            pixels = sourceCtx.getImageData(0, 0, srcW, srcH).data;
            pixelCache.set(filterKey, pixels);
          }
        }

        const layerCanvas = renderLayer(layer, pixels, geometry, false);

        outputCtx.save();
        outputCtx.globalAlpha = layer.opacity;
        outputCtx.globalCompositeOperation = layer.blendMode;
        outputCtx.drawImage(layerCanvas, 0, 0);
        outputCtx.restore();
      }

      if (!state.recording) drawSelectionOverlay(geometry);
    }

    function drawPathOverlay(points, geometry, closePath, dashed, color, lineWidth) {
      if (!points || points.length === 0) return;
      outputCtx.save();
      if (dashed) outputCtx.setLineDash([6, 4]);
      outputCtx.strokeStyle = color;
      outputCtx.lineWidth = lineWidth;
      outputCtx.beginPath();
      traceSmoothPath(outputCtx, points, (pt) => {
        const mapped = sourceToCanvasPoint(pt[0], pt[1], geometry);
        return [mapped.x, mapped.y];
      }, closePath);
      outputCtx.stroke();
      outputCtx.restore();
    }

    function drawSelectionOverlay(geometry) {
      if (!selectionState.active) return;

      const guidesOn = selectionState.showGuides;

      // Draw existing mask region outlines (marching ants)
      if (guidesOn) {
        const mask = getMask(activeLayer());
        if (mask && maskHasRegions(mask)) {
          const paths = buildMaskPath(activeLayer(), geometry);
          if (paths) {
            for (const { path } of paths) {
              // Dark outline underneath for contrast on light areas
              outputCtx.save();
              outputCtx.setLineDash([6, 4]);
              outputCtx.strokeStyle = 'rgba(0,0,0,0.5)';
              outputCtx.lineWidth = 2;
              outputCtx.stroke(path);
              outputCtx.restore();
              // Cyan marching ants on top
              outputCtx.save();
              outputCtx.setLineDash([6, 4]);
              outputCtx.strokeStyle = 'rgba(0,255,255,0.85)';
              outputCtx.lineWidth = 1;
              outputCtx.stroke(path);
              outputCtx.restore();
            }
          }
        }
      }

      // In-progress stroke — always visible, colored by mode
      if (selectionState.drawing && selectionState.rawPoints.length > 1) {
        const modeColors = {
          'new': 'rgba(0,255,255,0.9)',
          'add': 'rgba(0,255,255,0.9)',
          'subtract': 'rgba(255,80,80,0.9)',
          'intersect': 'rgba(255,220,60,0.9)'
        };
        const color = modeColors[selectionState.compositionMode] || 'rgba(0,255,255,0.9)';
        drawPathOverlay(selectionState.rawPoints, geometry, false, true, color, 1.25);
      }

      // Preview points after stroke finalized
      if (guidesOn && !selectionState.drawing && selectionState.previewPoints.length > 2) {
        drawPathOverlay(selectionState.previewPoints, geometry, true, true, 'rgba(0,255,255,0.35)', 1);
        outputCtx.save();
        outputCtx.fillStyle = 'rgba(0,255,255,0.7)';
        for (const point of selectionState.previewPoints) {
          const pt = sourceToCanvasPoint(point[0], point[1], geometry);
          outputCtx.beginPath();
          outputCtx.arc(pt.x, pt.y, 1.5, 0, Math.PI * 2);
          outputCtx.fill();
        }
        outputCtx.restore();
      }
    }

    function pathArea(points) {
      let area = 0;
      for (let i = 0; i < points.length; i++) {
        const a = points[i];
        const b = points[(i + 1) % points.length];
        area += a[0] * b[1] - b[0] * a[1];
      }
      return Math.abs(area) * 0.5;
    }

    function distance2D(a, b) {
      const dx = b[0] - a[0];
      const dy = b[1] - a[1];
      return Math.sqrt(dx * dx + dy * dy);
    }

    function appendSelectionStrokePoint(point, spacing, force = false) {
      if (!point) return false;
      const points = selectionState.rawPoints;
      if (!points.length) {
        points.push([point[0], point[1]]);
        return true;
      }

      const prev = points[points.length - 1];
      const distance = distance2D(prev, point);
      if (!distance) return false;
      if (!force && distance < spacing) return false;

      const safeSpacing = Math.max(0.0001, spacing);
      const steps = Math.max(1, Math.ceil(distance / safeSpacing));
      for (let step = 1; step <= steps; step++) {
        const t = step / steps;
        points.push([
          prev[0] + (point[0] - prev[0]) * t,
          prev[1] + (point[1] - prev[1]) * t
        ]);
      }
      return true;
    }

    function resampleClosedPath(points, spacing) {
      if (points.length < 2) return points.slice();
      const segments = [];
      let totalLength = 0;

      for (let i = 0; i < points.length; i++) {
        const start = points[i];
        const end = points[(i + 1) % points.length];
        const length = distance2D(start, end);
        if (!length) continue;
        segments.push({ start, end, length, from: totalLength, to: totalLength + length });
        totalLength += length;
      }

      if (!totalLength) return points.slice();

      const samples = [];
      for (let d = 0; d < totalLength; d += spacing) {
        const segment = segments.find(seg => d >= seg.from && d < seg.to) || segments[segments.length - 1];
        const t = (d - segment.from) / segment.length;
        samples.push([
          segment.start[0] + (segment.end[0] - segment.start[0]) * t,
          segment.start[1] + (segment.end[1] - segment.start[1]) * t
        ]);
      }

      return samples.length >= 3 ? samples : points.slice();
    }

    function smoothClosedPath(points, iterations = 1) {
      let current = points.slice();
      if (current.length < 3) return current;

      const passes = Math.max(0, Math.min(3, Math.round(iterations)));
      for (let pass = 0; pass < passes; pass++) {
        const next = [];
        for (let i = 0; i < current.length; i++) {
          const a = current[i];
          const b = current[(i + 1) % current.length];
          next.push([
            a[0] * 0.75 + b[0] * 0.25,
            a[1] * 0.75 + b[1] * 0.25
          ]);
          next.push([
            a[0] * 0.25 + b[0] * 0.75,
            a[1] * 0.25 + b[1] * 0.75
          ]);
        }
        current = next;
      }

      return current;
    }

    function finalizeSelectionStroke() {
      if (!selectionState.drawing) return;
      selectionState.drawing = false;

      if (selectionState.rawPoints.length < 3) {
        clearSelectionTransient();
        render();
        return;
      }

      const geometry = getRenderGeometry();
      if (!geometry) {
        clearSelectionTransient();
        return;
      }

      const area = pathArea(selectionState.rawPoints);
      if (area < 200) {
        clearSelectionTransient();
        render();
        return;
      }

      const savedRawPoints = [...selectionState.rawPoints];
      const sampleSpacing = Math.max(1.25, 3.5 / geometry.scale);
      const sampled = resampleClosedPath(savedRawPoints, sampleSpacing);
      const smoothPasses = sampled.length > 420 ? 2 : sampled.length > 180 ? 3 : 4;
      const smoothed = smoothClosedPath(sampled, smoothPasses);
      const finalPath = resampleClosedPath(smoothed, Math.max(1, sampleSpacing * 0.6));
      const previewPts = finalPath;
      const normalized = finalPath.map(([x, y]) => [
        clamp(x / geometry.srcW, 0, 1),
        clamp(y / geometry.srcH, 0, 1)
      ]);

      const currentMask = getMask(activeLayer());
      const mode = selectionState.compositionMode || 'new';
      if (mode === 'new' || !currentMask || !maskHasRegions(currentMask)) {
        activeLayer().mask = {
          regions: [{ points: normalized, op: 'new' }],
          inverted: currentMask ? currentMask.inverted : false,
          feather: currentMask ? currentMask.feather : 0
        };
      } else {
        currentMask.regions.push({ points: normalized, op: mode });
      }
      selectionState.previewPoints = previewPts;
      selectionState.rawPoints = [];
      invalidateMaskCaches(activeLayer().id);
      invalidatePostProcessCache(activeLayer().id);
      updateMaskControls();
      renderLayerPanel();
      render();
    }

    function sobelAt(pixels, srcW, srcH, x, y) {
      function lum(px, py) {
        px = Math.max(0, Math.min(srcW - 1, px));
        py = Math.max(0, Math.min(srcH - 1, py));
        const i = (py * srcW + px) * 4;
        return 0.299 * pixels[i] + 0.587 * pixels[i + 1] + 0.114 * pixels[i + 2];
      }
      const tl = lum(x - 1, y - 1), tc = lum(x, y - 1), tr = lum(x + 1, y - 1);
      const ml = lum(x - 1, y),                           mr = lum(x + 1, y);
      const bl = lum(x - 1, y + 1), bc = lum(x, y + 1), br = lum(x + 1, y + 1);
      const gx = -tl + tr - 2 * ml + 2 * mr - bl + br;
      const gy = -tl - 2 * tc - tr + bl + 2 * bc + br;
      return {
        magnitude: Math.sqrt(gx * gx + gy * gy),
        angle: Math.atan2(gy, gx)
      };
    }

    function sourcePixelOffset(srcW, srcH, x, y) {
      const px = Math.max(0, Math.min(srcW - 1, x));
      const py = Math.max(0, Math.min(srcH - 1, y));
      return (py * srcW + px) * 4;
    }

    function renderOverlay(pixels, srcW, srcH, cols, rows, cellSize, chars, scale, offsetX, offsetY, layer, maskMetrics) {
      // Background: render() handles black fill and imageUnderlay image draw
      const stride = Math.round(cellSize * (1 + layer.gap));

      // Use Canny-style pipeline for clean object boundaries
      const n = rows * cols;
      const mags = new Float32Array(n);
      const angles = new Float32Array(n);

      // Sobel pass — sample multiple points per cell and keep the strongest edge
      const sampleStep = Math.max(1, Math.floor(cellSize / 3));
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          let bestMag = 0, bestAngle = 0;
          for (let dy = 0; dy < cellSize; dy += sampleStep) {
            for (let dx = 0; dx < cellSize; dx += sampleStep) {
              const px = col * stride + dx;
              const py = row * stride + dy;
              const { magnitude, angle } = sobelAt(pixels, srcW, srcH, px, py);
              if (magnitude > bestMag) { bestMag = magnitude; bestAngle = angle; }
            }
          }
          mags[row * cols + col] = bestMag;
          angles[row * cols + col] = bestAngle;
        }
      }

      // Non-maximum suppression — thin edges to 1-cell wide
      const nms = new Uint8Array(n);
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const idx = row * cols + col;
          const mag = mags[idx];
          if (mag < 50) continue;
          const a = ((angles[idx] % Math.PI) + Math.PI) % Math.PI;
          let dr1, dc1, dr2, dc2;
          if (a < Math.PI * 0.125 || a >= Math.PI * 0.875) { dr1=0;dc1=-1;dr2=0;dc2=1; }
          else if (a < Math.PI * 0.375) { dr1=-1;dc1=-1;dr2=1;dc2=1; }
          else if (a < Math.PI * 0.625) { dr1=-1;dc1=0;dr2=1;dc2=0; }
          else { dr1=-1;dc1=1;dr2=1;dc2=-1; }
          const r1=row+dr1,c1=col+dc1,r2=row+dr2,c2=col+dc2;
          const m1=(r1>=0&&r1<rows&&c1>=0&&c1<cols)?mags[r1*cols+c1]:0;
          const m2=(r2>=0&&r2<rows&&c2>=0&&c2<cols)?mags[r2*cols+c2]:0;
          if (mag >= m1 && mag >= m2) nms[idx] = 1;
        }
      }

      // Hysteresis — thresholds scaled by sensitivity (1=least sensitive, 10=most)
      const sens = layer.contourSens;
      const baseStrong = Math.max(80, 160 - cellSize * 4);
      const baseWeak = Math.max(40, 80 - cellSize * 2);
      const sensScale = 1 + (5 - sens) * 0.15; // sens=5 → 1x, sens=10 → 0.25x (lower thresholds), sens=1 → 1.6x (higher)
      const strongThresh = Math.max(20, Math.round(baseStrong * sensScale));
      const weakThresh = Math.max(10, Math.round(baseWeak * sensScale));
      const keep = new Uint8Array(n);
      const queue = [];
      for (let i = 0; i < n; i++) {
        if (!nms[i]) continue;
        if (mags[i] >= strongThresh) { keep[i] = 2; queue.push(i); }
        else if (mags[i] >= weakThresh) keep[i] = 1;
      }
      while (queue.length > 0) {
        const idx = queue.shift();
        const r = Math.floor(idx / cols), c = idx % cols;
        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
          if (!dr && !dc) continue;
          const nr = r+dr, nc = c+dc;
          if (nr>=0 && nr<rows && nc>=0 && nc<cols) {
            const ni = nr*cols+nc;
            if (keep[ni] === 1) { keep[ni] = 2; queue.push(ni); }
          }
        }
      }

      // Connected component filter — remove short fragments (noise)
      const minChain = Math.max(3, Math.min(20, Math.floor(Math.min(cols, rows) / 4)));
      const labels = new Int32Array(n).fill(-1);
      const finalKeep = new Uint8Array(n);
      let labelId = 0;
      for (let i = 0; i < n; i++) {
        if (keep[i] !== 2 || labels[i] >= 0) continue;
        const comp = [];
        const bfs = [i];
        labels[i] = labelId;
        while (bfs.length > 0) {
          const idx = bfs.shift();
          comp.push(idx);
          const r = Math.floor(idx / cols), c = idx % cols;
          for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
            if (!dr && !dc) continue;
            const nr = r+dr, nc = c+dc;
            if (nr>=0 && nr<rows && nc>=0 && nc<cols) {
              const ni = nr*cols+nc;
              if (keep[ni] === 2 && labels[ni] < 0) { labels[ni] = labelId; bfs.push(ni); }
            }
          }
        }
        if (comp.length >= minChain) for (const idx of comp) finalKeep[idx] = 1;
        labelId++;
      }

      // Distance field — spread outward from edges along both gradient directions
      // Each edge cell seeds falloff in both perpendicular directions (both sides of boundary)
      // but NOT along the edge itself, preventing interior fill between nearby parallel edges
      const maxDist = layer.contourSpread;
      const dist = new Int8Array(n).fill(-1);
      for (let i = 0; i < n; i++) {
        if (finalKeep[i]) dist[i] = 0;
      }

      // For each edge cell, walk outward in the gradient direction (perpendicular to edge)
      for (let i = 0; i < n; i++) {
        if (!finalKeep[i]) continue;
        const r0 = Math.floor(i / cols), c0 = i % cols;
        const a = angles[i];
        // Gradient direction components (perpendicular to edge)
        const gr = Math.sin(a), gc = Math.cos(a);

        // Walk in both +gradient and -gradient directions
        for (const sign of [1, -1]) {
          for (let step = 1; step <= maxDist; step++) {
            const nr = Math.round(r0 + sign * gr * step);
            const nc = Math.round(c0 + sign * gc * step);
            if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) break;
            const ni = nr * cols + nc;
            // Don't overwrite edge cells or closer distances
            if (dist[ni] >= 0 && dist[ni] <= step) continue;
            // Stop if we hit another edge (don't fill between edges)
            if (finalKeep[ni]) break;
            dist[ni] = step;
          }
        }
      }

      // Draw contour characters
      // chars = '.:oO' — edge cells get o/O by magnitude, falloff gets ./:
      const fontSize = cellSize * scale * gapFontScale(layer.gap);
      outputCtx.font = `${fontSize}px ${layer.font}`;
      outputCtx.textBaseline = 'middle';
      outputCtx.textAlign = 'center';

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const idx = row * cols + col;
          const d = dist[idx];
          if (d < 0) continue;

          let char;
          if (d === 0) {
            char = mags[idx] >= 200 ? 'O' : 'o';
          } else if (d === 1) {
            char = ':';
          } else {
            char = '.';
          }
          const aChar = wordArtifactChar(row, col, layer);
          if (aChar) char = aChar;
          const x = offsetX + (col + 0.5) * stride * scale;
          const y = offsetY + (row + 0.5) * stride * scale;
          const cx = col * stride + Math.floor(cellSize / 2);
          const cy = row * stride + Math.floor(cellSize / 2);
          const strength = sampleMaskStrength(maskMetrics, cx, cy);
          if (!shouldRenderByStrength(strength, row, col)) continue;
          char = attenuateCharFromPalette(char, ' .:oO', strength);
          if (char === ' ') continue;
          const pi = sourcePixelOffset(srcW, srcH, cx, cy);

          const baseFill = layer.colorMode ? `rgb(${pixels[pi]},${pixels[pi+1]},${pixels[pi+2]})` : '#ffffff';
          outputCtx.fillStyle = getLayerDrawColor(layer, baseFill);
          if (layer.charRotation) {
            outputCtx.save();
            outputCtx.translate(x, y);
            outputCtx.rotate(angles[idx]);
            outputCtx.fillText(char, 0, 0);
            outputCtx.restore();
          } else {
            outputCtx.fillText(char, x, y);
          }
        }
      }
    }

    // Dense mode: draws sub-pixel dot patterns in each cell for seamless tiling
    // Each cell is divided into a 4x4 sub-grid, and dots are filled based on luminance
    const DENSE_PATTERNS = [
      [],                                                          // 0: empty
      [[1,1],[2,2]],                                               // 1: 2 dots
      [[0,0],[2,2]],                                               // 2: 2 corner dots
      [[0,0],[2,0],[0,2],[2,2]],                                   // 3: 4 corner dots
      [[0,0],[2,0],[1,1],[3,1],[0,2],[2,2],[1,3],[3,3]],           // 4: sparse checker
      [[0,0],[2,0],[0,2],[2,2],[1,1],[3,1],[1,3],[3,3]],           // 5: regular grid
      // checkerboard
      [[0,0],[2,0],[1,1],[3,1],[0,2],[2,2],[1,3],[3,3],[0,1],[2,1],[1,0],[3,0]], // 6: dense checker
      // mostly filled
      [[0,0],[1,0],[2,0],[3,0],[0,1],[1,1],[2,1],[3,1],[0,2],[1,2],[2,2],[3,2],[0,3],[1,3],[2,3]], // 7: almost full
      // full
      [[0,0],[1,0],[2,0],[3,0],[0,1],[1,1],[2,1],[3,1],[0,2],[1,2],[2,2],[3,2],[0,3],[1,3],[2,3],[3,3]] // 8: full
    ];

    function renderDense(pixels, srcW, srcH, cols, rows, cellSize, scale, offsetX, offsetY, layer, maskMetrics) {
      const stride = Math.round(cellSize * (1 + layer.gap));
      const cellW = stride * scale;
      const cellH = stride * scale;
      const subSize = (cellSize * scale) / 4;
      const sampleStep = Math.max(1, Math.floor(cellSize / 4));

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          let r = 0, g = 0, b = 0, count = 0;
          for (let dy = 0; dy < cellSize; dy += sampleStep) {
            for (let dx = 0; dx < cellSize; dx += sampleStep) {
              const px = col * stride + dx;
              const py = row * stride + dy;
              const i = sourcePixelOffset(srcW, srcH, px, py);
              r += pixels[i]; g += pixels[i + 1]; b += pixels[i + 2]; count++;
            }
          }
          r = Math.round(r / count); g = Math.round(g / count); b = Math.round(b / count);

          let lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
          if (layer.invert) lum = 1 - lum;

          const cxSrc = col * stride + Math.floor(cellSize / 2);
          const cySrc = row * stride + Math.floor(cellSize / 2);
          const strength = sampleMaskStrength(maskMetrics, cxSrc, cySrc);
          if (!shouldRenderByStrength(strength, row, col)) continue;

          const patIdxBase = Math.min(Math.floor(lum * DENSE_PATTERNS.length), DENSE_PATTERNS.length - 1);
          const patIdx = attenuateIndex(patIdxBase, strength);
          const pattern = DENSE_PATTERNS[patIdx];
          if (pattern.length === 0) continue;
          const aChar = wordArtifactChar(row, col, layer);
          if (aChar && strength > 0.66) {
            const fontSize = cellSize * scale * gapFontScale(layer.gap);
            outputCtx.font = `${fontSize}px ${layer.font}`;
            outputCtx.textBaseline = 'middle';
            outputCtx.textAlign = 'center';
            const baseFill = layer.colorMode ? `rgb(${r},${g},${b})` : '#ffffff';
            outputCtx.fillStyle = getLayerDrawColor(layer, baseFill);
            const acx = offsetX + (col + 0.5) * cellW;
            const acy = offsetY + (row + 0.5) * cellH;
            outputCtx.fillText(aChar, acx, acy);
            continue;
          }

          const cx = offsetX + col * cellW;
          const cy = offsetY + row * cellH;

          const baseFill = layer.colorMode ? `rgb(${r},${g},${b})` : '#ffffff';
          outputCtx.fillStyle = getLayerDrawColor(layer, baseFill);
          for (const [sx, sy] of pattern) {
            outputCtx.fillRect(
              Math.round(cx + sx * subSize),
              Math.round(cy + sy * subSize),
              Math.ceil(subSize),
              Math.ceil(subSize)

          }
        }
      }
    }

    // Bloom offscreen canvases (reused across frames)
    // Mip-chain bloom: progressive downsample → small blur → upsample
    // Adapted from physically-based bloom (LearnOpenGL / Unreal Engine)
    let _mipChain = [];     // [{canvas, ctx}, ...] reused across frames
    let _bloomAsciiCanvas = null;
    let _bloomAsciiCtx = null;

    function _getMip(i) {
      if (!_mipChain[i]) {
        const c = document.createElement('canvas');
        _mipChain[i] = { canvas: c, ctx: c.getContext('2d') };
      }
      return _mipChain[i];

    function applyBloomPost(targetCtx, asciiCanvas, w, h, layer) {
      if (!layer.bloom) return;

      const radius = layer.bloomRadius;
      const intensity = layer.bloomIntensity;

      // Determine mip levels from radius: each level halves resolution
      const mipCount = Math.min(7, Math.max(3, Math.ceil(Math.log2(radius)) + 1));
      const blurPerLevel = 3; // small blur at each level — stays in 8-bit precision

      // === DOWNSAMPLE PHASE ===
      // Progressively halve resolution, applying a small blur at each step.
      for (let i = 0; i < mipCount; i++) {
        const mip = _getMip(i);
        const srcCanvas = i === 0 ? asciiCanvas : _getMip(i - 1).canvas;
        const mw = Math.max(1, Math.ceil(srcCanvas.width / 2));
        const mh = Math.max(1, Math.ceil(srcCanvas.height / 2));

        if (mip.canvas.width !== mw || mip.canvas.height !== mh) {
          mip.canvas.width = mw;
          mip.canvas.height = mh;
        } else {
          mip.ctx.clearRect(0, 0, mw, mh);
        }

        // Downsample: drawImage at half size does bilinear 2x2 averaging
        mip.ctx.imageSmoothingEnabled = true;
        mip.ctx.imageSmoothingQuality = 'high';
        mip.ctx.drawImage(srcCanvas, 0, 0, mw, mh);

        // Small blur at this mip level — stays well within 8-bit precision
        mip.ctx.filter = `blur(${blurPerLevel}px)`;
        mip.ctx.drawImage(mip.canvas, 0, 0);
        mip.ctx.filter = 'none';

      // Walk back up the chain, blending each level into the one above it.
      const upsampleBlend = layer.bloomStyle === 'intense' ? 0.75 : 0.55;

        const dst = _getMip(i - 1);

        dst.ctx.imageSmoothingQuality = 'high';
        dst.ctx.globalAlpha = upsampleBlend;
        dst.ctx.globalCompositeOperation = 'lighter';
        dst.ctx.drawImage(src.canvas, 0, 0, dst.canvas.width, dst.canvas.height);
        dst.ctx.globalAlpha = 1;
        dst.ctx.globalCompositeOperation = 'source-over';

      targetCtx.save();
      targetCtx.imageSmoothingEnabled = true;
      targetCtx.imageSmoothingQuality = 'high';
      targetCtx.globalCompositeOperation = 'screen';
      targetCtx.globalAlpha = Math.min(1, intensity);
      targetCtx.drawImage(_getMip(0).canvas, 0, 0, w, h);

      if (intensity > 1) {

        const extraPasses = Math.ceil(extra);

      // Re-draw sharp ASCII on top so characters stay crisp and readable
      targetCtx.drawImage(asciiCanvas, 0, 0);
    }

    function getBloomAsciiCanvas(w, h) {

        _bloomAsciiCanvas.height = h;

    let _grainSeed = 0;
    function applyGrain(ctx, w, h, layer, effectScale = 1) {

      const size = Math.max(1, grainSizeToPixels(layer.grainSize) * effectScale);
      const roughness = layer.grainRoughness / 100;
      const strength = amount * 80; // max ±80 levels at full amount
      const seed = _grainSeed++;
      const roughCurve = Math.pow(roughness, 1.35);
      const fineCell = Math.max(1, size * (1 - roughCurve * 0.94));
      const mediumScale = Math.max(1, size * (0.9 - roughCurve * 0.55));
      const coarseScale = Math.max(1, size * 1.35);

      const imageData = ctx.getImageData(0, 0, w, h);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        if (data[i + 3] === 0) continue; // skip transparent pixels
        const px = (i >> 2) % w;
        const py = ((i >> 2) / w) | 0;

        const coarse = valueNoise2D(px / coarseScale, py / coarseScale, seed) * 2 - 1;
        const medium = valueNoise2D(px / mediumScale, py / mediumScale, seed + 101) * 2 - 1;
        const cellNoise = hashNoise2D(Math.floor(px / fineCell), Math.floor(py / fineCell), seed + 211) * 2 - 1;
        const speckle = hashNoise2D(px, py, seed + 307) * 2 - 1;

        const coarseWeight = 1 - roughCurve;
        const mediumWeight = 0.35 + roughCurve * 0.35;
        const cellWeight = roughCurve * 0.95;
        const speckleWeight = roughCurve * roughCurve * 0.55;
        const totalWeight = coarseWeight + mediumWeight + cellWeight + speckleWeight;
        const noise = totalWeight > 0
          ? (
            coarse * coarseWeight +
            medium * mediumWeight +
            cellNoise * cellWeight +
            speckle * speckleWeight
          ) / totalWeight
          : coarse;
        const contrastBoost = 0.85 + roughCurve * 0.75;
        const offset = noise * strength * contrastBoost;

        data[i]     = Math.max(0, Math.min(255, data[i]     + offset));
        data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + offset));
        data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + offset));

    function mod(n, m) {
      return ((n % m) + m) % m;
    }

    function normalizeWordArtifactDistribution(mode) {
      if (mode === 'brick' || mode === 'random' || mode === 'cluster') return mode;
      return 'stream';

    function wordArtifactChar(row, col, layer) {
      if (!layer.wordArtifactEnabled || !layer.wordArtifact) return null;
      const word = layer.wordArtifact.trim();
      if (!word) return null;
      const density = clamp(layer.wordArtifactDensity ?? 0, 0, 1);
      const coherence = clamp(layer.wordArtifactCoherence ?? 0, 0, 1);
      if (density <= 0) return null;

      const glyphs = Array.from(word);
      const wordLen = glyphs.length;
      if (!wordLen) return null;
      const mode = normalizeWordArtifactDistribution(layer.wordArtifactDistribution);
      const seed = hashString(`${layer.id}:${word}`);
      const basePhase = seed % Math.max(1, wordLen);

      let coherentIndex = 0;
      let occupied = false;

      if (mode === 'random') {
        occupied = density >= 0.995 || hashNoise2D(col, row, seed + 17) <= density;
        coherentIndex = mod(col + row * 2 + basePhase, wordLen);
      } else if (mode === 'cluster') {
        const field = fbmNoise2D(col * 0.18, row * 0.18, seed + 71) * 0.82 + hashNoise2D(col, row, seed + 131) * 0.18;
        occupied = density >= 0.995 || field >= (1 - density);
        coherentIndex = mod(Math.floor(col * 0.75 + row * 1.35) + basePhase, wordLen);
      } else {
        // Rows and Brick both keep word streams intact; Brick simply staggers alternating rows.
        const rowHash = ((row * 1103515245) ^ (wordLen * 2654435761) ^ seed) >>> 0;
        const rowRand = (rowHash % 10000) / 10000;
        const rowCoverage = Math.min(1, density * 1.35);
        if (rowRand > rowCoverage) return null;

        const gapCells = density >= 0.995 ? 0 : Math.round(Math.pow(1 - density, 1.15) * wordLen * 4);
        const period = wordLen + gapCells;
        const rowPhase = Math.round((((rowHash >>> 8) % Math.max(1, wordLen * 2)) - wordLen) * (1 - coherence));
        const brickShift = mode === 'brick' ? Math.floor(period * 0.5) * (row & 1) : 0;
        const streamIndex = mod(col + basePhase + rowPhase + brickShift, period);
        if (streamIndex >= wordLen) return null;
        occupied = true;
        coherentIndex = streamIndex;
      }

      if (!occupied) return null;

      const coherentChar = glyphs[coherentIndex];
      if (coherence >= 0.995) return coherentChar;

      const seqRand = hashNoise2D(col, row, seed + 211);
      if (seqRand < coherence) {
        return coherentChar;
      }

      const randomIndex = Math.floor(hashNoise2D(col + basePhase, row - basePhase, seed + 307) * wordLen) % wordLen;

    function drawBlockGlyph(ctx, char, x, y, cellW, cellH, rotation = 0) {
      const metrics = ctx.measureText(char);
      const inkWidth = Math.max(1, (metrics.actualBoundingBoxLeft || 0) + (metrics.actualBoundingBoxRight || 0) || metrics.width || 1);
      const inkCenter = ((metrics.actualBoundingBoxRight || 0) - (metrics.actualBoundingBoxLeft || 0)) * 0.5;
      const scaleX = cellW / inkWidth;

      ctx.save();
      ctx.beginPath();
      ctx.rect(x - cellW * 0.5, y - cellH * 0.5, cellW, cellH);
      ctx.clip();
      ctx.translate(x, y);
      if (rotation) ctx.rotate(rotation);
      ctx.scale(scaleX, 1);
      ctx.fillText(char, -inkCenter, 0);
      ctx.restore();
    }

    function measureGlyphInk(ctx, char) {
      const metrics = ctx.measureText(char);
      const inkLeft = metrics.actualBoundingBoxLeft || 0;
      const inkRight = metrics.actualBoundingBoxRight || metrics.width || 1;
      const inkAscent = metrics.actualBoundingBoxAscent || parseFloat(ctx.font) || 1;
      const inkDescent = metrics.actualBoundingBoxDescent || 0;
      return {
        inkLeft,
        inkRight,
        inkAscent,
        inkDescent,
        inkWidth: Math.max(1, inkLeft + inkRight),
        inkHeight: Math.max(1, inkAscent + inkDescent)
      };
    }

    function measureCharsetInk(ctx, chars) {
      const glyphs = Array.from(chars).filter(char => char.trim() !== '');
      const summary = { maxWidth: 1, maxHeight: 1 };
      for (const char of glyphs) {
        const metrics = measureGlyphInk(ctx, char);
        summary.maxWidth = Math.max(summary.maxWidth, metrics.inkWidth);
        summary.maxHeight = Math.max(summary.maxHeight, metrics.inkHeight);
      }
      return summary;

    const denseGlyphPathCache = new Map();
    const denseOutlineMetrics = (() => {
      const outlines = window.DENSE_GLYPH_OUTLINES || {};

      let maxHeight = 1;
      for (const char of ['░', '▒', '▓', '█']) {
        const glyph = outlines[char];
        if (!glyph) continue;
        maxWidth = Math.max(maxWidth, Math.max(1, glyph.xMax - glyph.xMin));
        maxHeight = Math.max(maxHeight, Math.max(1, glyph.yMax - glyph.yMin));
      }
      return {
        maxWidth,
        maxHeight,
        aspect: maxWidth / maxHeight

    function getDenseCellWidth(cellHeight) {
      return Math.max(1, Math.round(cellHeight * denseOutlineMetrics.aspect));

    function getDenseGlyphOutline(char) {
      const data = (window.DENSE_GLYPH_OUTLINES || {})[char];

        denseGlyphPathCache.set(char, { ...data, path2d: new Path2D(data.path) });

      return denseGlyphPathCache.get(char);

    function drawDenseGlyphOutline(ctx, char, left, top, width, height) {
      const glyph = getDenseGlyphOutline(char);
      if (!glyph) return false;

      const glyphWidth = Math.max(1, glyph.xMax - glyph.xMin);
      const glyphHeight = Math.max(1, glyph.yMax - glyph.yMin);
      const drawScale = Math.min(width / glyphWidth, height / glyphHeight);
      const drawWidth = glyphWidth * drawScale;
      const drawHeight = glyphHeight * drawScale;
      const drawLeft = left + (width - drawWidth) * 0.5;
      const drawTop = top + (height - drawHeight) * 0.5;

      ctx.save();
      ctx.beginPath();
      ctx.rect(left, top, width, height);
      ctx.clip();
      ctx.translate(drawLeft, drawTop + drawHeight);
      ctx.scale(drawScale, -drawScale);
      ctx.translate(-glyph.xMin, -glyph.yMin);
      ctx.fill(glyph.path2d);
      ctx.restore();

    function drawFittedGlyph(ctx, char, left, top, width, height) {

      const prevBaseline = ctx.textBaseline;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      const metrics = ctx.measureText(char);
      const inkLeft = metrics.actualBoundingBoxLeft || 0;
      const inkRight = metrics.actualBoundingBoxRight || metrics.width || 1;
      const inkAscent = metrics.actualBoundingBoxAscent || parseFloat(ctx.font) || 1;
      const inkDescent = metrics.actualBoundingBoxDescent || 0;
      const inkWidth = Math.max(1, inkLeft + inkRight);
      const inkHeight = Math.max(1, inkAscent + inkDescent);

      const scaleY = height / inkHeight;

      ctx.scale(scaleX, scaleY);

    const BLOCK_HEIGHT_MAP = Object.freeze({

      '▃': 3 / 8,
      '▄': 4 / 8,
      '▅': 5 / 8,
      '▆': 6 / 8,
      '▇': 7 / 8,
      '█': 1

      const fillRatio = BLOCK_HEIGHT_MAP[char];

      const fillHeight = Math.max(1, Math.round(height * fillRatio));
      const fillTop = top + height - fillHeight;
      ctx.fillRect(left, fillTop, width, fillHeight);

    function renderReplacement(pixels, srcW, srcH, cols, rows, cellWidth, cellHeight, chars, scale, offsetX, offsetY, layer, maskMetrics) {

      const isBlocks = layer.variant === 'Blocks';
      const isDense = layer.variant === 'Dense';

              b += pixels[i + 2];

          g = Math.round(g / count);
          b = Math.round(b / count);

          const cy = row * strideY + Math.floor(cellHeight / 2);

          if (!shouldRenderByStrength(strength, row, col)) continue;

          const charIndexBase = Math.min(Math.floor(lum * chars.length), chars.length - 1);
          const charIndex = attenuateIndex(charIndexBase, strength);

          const y = offsetY + (row * strideY + cellHeight * 0.5) * scale;

          const cellH = Math.max(1, cellHeight * scale);

          const top = Math.round(offsetY + row * strideY * scale);

    // ============ OUTLINE MODE ============
    function renderOutline(pixels, srcW, srcH, cols, rows, cellSize, scale, offsetX, offsetY, layer, maskMetrics) {
      const stride = Math.round(cellSize * (1 + layer.gap));
      const levels = 8;
      const sampleStep = Math.max(1, Math.floor(cellSize / 4));
      const total = rows * cols;
      const strokeWidth = Math.max(0.5, (layer.outlineStrokeSize || 1.5) * scale);
      const strideScale = stride * scale;
      const cornerRadius = Math.max(0, Math.min((layer.outlineCornerRadius || 0) * scale, Math.max(0, strideScale * 0.5 - strokeWidth * 0.25)));

      const grid = new Uint8Array(rows * cols);
      const valid = new Uint8Array(rows * cols);

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {

          const cy = row * stride + Math.floor(cellSize / 2);
          valid[row * cols + col] = sampleMaskStrength(maskMetrics, cx, cy) > 0 ? 1 : 0;

          let r = 0, g = 0, b = 0, count = 0;
          for (let dy = 0; dy < cellSize; dy += sampleStep) {
            for (let dx = 0; dx < cellSize; dx += sampleStep) {
              const px = col * stride + dx;
              const py = row * stride + dy;
              const i = sourcePixelOffset(srcW, srcH, px, py);

      const hEdges = new Uint8Array((rows + 1) * cols);

      for (let row = 0; row < rows; row++) {

          const val = grid[idx];
          const leftMatch = col > 0 && valid[idx - 1] && grid[idx - 1] === val;
          const rightMatch = col < cols - 1 && valid[idx + 1] && grid[idx + 1] === val;
          const topMatch = row > 0 && valid[idx - cols] && grid[idx - cols] === val;
          const bottomMatch = row < rows - 1 && valid[idx + cols] && grid[idx + cols] === val;

          if (!topMatch) hEdges[row * cols + col] = 1;
          if (!bottomMatch) hEdges[(row + 1) * cols + col] = 1;
          if (!leftMatch) vEdges[row * (cols + 1) + col] = 1;
          if (!rightMatch) vEdges[row * (cols + 1) + col + 1] = 1;

        let componentId = 0;

        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const startIdx = row * cols + col;
            if (!valid[startIdx] || componentIds[startIdx] !== -1) continue;

            const queue = [startIdx];
            const cells = [];
            const level = grid[startIdx];
            componentIds[startIdx] = componentId;
            let touchesBoundary = row === 0 || row === rows - 1 || col === 0 || col === cols - 1;

            while (queue.length) {
              const idx = queue.pop();
              cells.push(idx);
              const r = Math.floor(idx / cols);
              const c = idx % cols;

              if (r === 0 || r === rows - 1 || c === 0 || c === cols - 1) {
                touchesBoundary = true;
              }

              const neighbors = [
                [r, c - 1],
                [r, c + 1],
                [r - 1, c],
                [r + 1, c]
              ];

              for (const [nr, nc] of neighbors) {
                if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
                const ni = nr * cols + nc;
                if (!valid[ni]) continue;
                if (grid[ni] !== level) continue;
                if (componentIds[ni] !== -1) continue;
                componentIds[ni] = componentId;
                queue.push(ni);
              }
            }

            components.push({ id: componentId, cells, touchesBoundary });
            componentId++;
          }
        }

        let exteriorId = -1;
        let exteriorSize = -1;
        for (const component of components) {
          if (!component.touchesBoundary) continue;
          if (component.cells.length > exteriorSize) {
            exteriorSize = component.cells.length;
            exteriorId = component.id;
          }
        }

        outputCtx.fillStyle = layer.outlineFillColor || '#1f7a4f';
        for (const component of components) {
          if (component.id === exteriorId) continue;
          for (const idx of component.cells) {
            const row = Math.floor(idx / cols);
            const col = idx % cols;
            const x = offsetX + col * stride * scale;
            const y = offsetY + row * stride * scale;
            const w = stride * scale;
            const h = stride * scale;
            outputCtx.fillRect(x, y, w, h);
          }
        }
      }

      const strokeColor = getLayerDrawColor(layer, '#ffffff');
      outputCtx.strokeStyle = strokeColor;
      outputCtx.lineWidth = strokeWidth;
      outputCtx.lineJoin = 'round';
      outputCtx.lineCap = 'round';
      const vertexCodes = new Uint8Array((rows + 1) * (cols + 1));
      if (cornerRadius > 0) {
        for (let vr = 0; vr <= rows; vr++) {
          for (let vc = 0; vc <= cols; vc++) {
            const hasLeft = vc > 0 && hEdges[vr * cols + (vc - 1)] === 1;
            const hasRight = vc < cols && hEdges[vr * cols + vc] === 1;
            const hasUp = vr > 0 && vEdges[(vr - 1) * (cols + 1) + vc] === 1;
            const hasDown = vr < rows && vEdges[vr * (cols + 1) + vc] === 1;
            const horizCount = (hasLeft ? 1 : 0) + (hasRight ? 1 : 0);
            const vertCount = (hasUp ? 1 : 0) + (hasDown ? 1 : 0);

            if (horizCount !== 1 || vertCount !== 1) continue;
            let code = 0;
            if (hasRight && hasDown) code = 1;
            else if (hasLeft && hasDown) code = 2;
            else if (hasRight && hasUp) code = 3;
            else if (hasLeft && hasUp) code = 4;
            vertexCodes[vr * (cols + 1) + vc] = code;
          }
        }
      }

      outputCtx.beginPath();
      for (let row = 0; row <= rows; row++) {
        for (let col = 0; col < cols; col++) {
          if (!hEdges[row * cols + col]) continue;
          const leftCode = vertexCodes[row * (cols + 1) + col];
          const rightCode = vertexCodes[row * (cols + 1) + col + 1];
          const trimStart = (leftCode === 1 || leftCode === 3) ? cornerRadius : 0;
          const trimEnd = (rightCode === 2 || rightCode === 4) ? cornerRadius : 0;
          const x1 = offsetX + col * strideScale + trimStart;
          const x2 = offsetX + (col + 1) * strideScale - trimEnd;
          const y = offsetY + row * strideScale;
          if (x2 <= x1) continue;
          outputCtx.moveTo(x1, y);
          outputCtx.lineTo(x2, y);
        }
      }
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col <= cols; col++) {
          if (!vEdges[row * (cols + 1) + col]) continue;
          const topCode = vertexCodes[row * (cols + 1) + col];
          const bottomCode = vertexCodes[(row + 1) * (cols + 1) + col];
          const trimStart = (topCode === 1 || topCode === 2) ? cornerRadius : 0;
          const trimEnd = (bottomCode === 3 || bottomCode === 4) ? cornerRadius : 0;
          const x = offsetX + col * strideScale;
          const y1 = offsetY + row * strideScale + trimStart;
          const y2 = offsetY + (row + 1) * strideScale - trimEnd;
          if (y2 <= y1) continue;
          outputCtx.moveTo(x, y1);
          outputCtx.lineTo(x, y2);
        }
      }
      if (cornerRadius > 0) {
        for (let row = 0; row <= rows; row++) {
          for (let col = 0; col <= cols; col++) {
            const code = vertexCodes[row * (cols + 1) + col];
            if (!code) continue;
            const x = offsetX + col * strideScale;
            const y = offsetY + row * strideScale;
            if (code === 1) {
              outputCtx.moveTo(x + cornerRadius, y);
              outputCtx.arcTo(x, y, x, y + cornerRadius, cornerRadius);
            } else if (code === 2) {
              outputCtx.moveTo(x - cornerRadius, y);
              outputCtx.arcTo(x, y, x, y + cornerRadius, cornerRadius);
            } else if (code === 3) {
              outputCtx.moveTo(x + cornerRadius, y);
              outputCtx.arcTo(x, y, x, y - cornerRadius, cornerRadius);
            } else if (code === 4) {
              outputCtx.moveTo(x - cornerRadius, y);
              outputCtx.arcTo(x, y, x, y - cornerRadius, cornerRadius);
            }
          }
        }
      }
      outputCtx.stroke();
      outputCtx.lineJoin = 'miter';
      outputCtx.lineCap = 'butt';
    }

    // ============ HIGHLIGHT MODE ============
    // Shared Canny pipeline used by both render and transparent export
    function computeHighlightEdges(pixels, srcW, srcH, cols, rows, cellSize, layer) {
      const stride = Math.round(cellSize * (1 + layer.gap));
      const n = rows * cols;
      const mags = new Float32Array(n);
      const angles = new Float32Array(n);

      // Sobel pass — sample multiple points per cell and keep the strongest edge
      const sampleStep = Math.max(1, Math.floor(cellSize / 3));
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          let bestMag = 0, bestAngle = 0;
          for (let dy = 0; dy < cellSize; dy += sampleStep) {
            for (let dx = 0; dx < cellSize; dx += sampleStep) {
              const px = col * stride + dx;
              const py = row * stride + dy;
              const { magnitude, angle } = sobelAt(pixels, srcW, srcH, px, py);
              if (magnitude > bestMag) { bestMag = magnitude; bestAngle = angle; }
            }
          }
          mags[row * cols + col] = bestMag;
          angles[row * cols + col] = bestAngle;
        }
      }

      // Non-maximum suppression
      const nms = new Uint8Array(n);
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const idx = row * cols + col;
          const mag = mags[idx];
          if (mag < 10) continue;
          const a = ((angles[idx] % Math.PI) + Math.PI) % Math.PI;
          let dr1, dc1, dr2, dc2;
          if (a < Math.PI * 0.125 || a >= Math.PI * 0.875) { dr1=0;dc1=-1;dr2=0;dc2=1; }
          else if (a < Math.PI * 0.375) { dr1=-1;dc1=-1;dr2=1;dc2=1; }
          else if (a < Math.PI * 0.625) { dr1=-1;dc1=0;dr2=1;dc2=0; }
          else { dr1=-1;dc1=1;dr2=1;dc2=-1; }
          const r1=row+dr1,c1=col+dc1,r2=row+dr2,c2=col+dc2;
          const m1=(r1>=0&&r1<rows&&c1>=0&&c1<cols)?mags[r1*cols+c1]:0;
          const m2=(r2>=0&&r2<rows&&c2>=0&&c2<cols)?mags[r2*cols+c2]:0;
          if (mag >= m1 && mag >= m2) nms[idx] = 1;
        }
      }

      // Hysteresis
      const strongThresh = 50;
      const weakThresh = 20;
      const keep = new Uint8Array(n);
      const queue = [];
      for (let i = 0; i < n; i++) {
        if (!nms[i]) continue;
        if (mags[i] >= strongThresh) { keep[i] = 2; queue.push(i); }
        else if (mags[i] >= weakThresh) keep[i] = 1;
      }
      while (queue.length > 0) {
        const idx = queue.shift();
        const r = Math.floor(idx / cols), c = idx % cols;
        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
          if (!dr && !dc) continue;
          const nr = r+dr, nc = c+dc;
          if (nr>=0 && nr<rows && nc>=0 && nc<cols) {
            const ni = nr*cols+nc;
            if (keep[ni] === 1) { keep[ni] = 2; queue.push(ni); }
          }
        }
      }

      // Connected component filtering — remove short fragments
      const minChainLength = Math.max(3, Math.min(10, Math.floor(Math.min(cols, rows) / 5)));
      const labels = new Int32Array(n).fill(-1);
      const components = []; // array of arrays of indices
      let labelId = 0;
      for (let i = 0; i < n; i++) {
        if (keep[i] !== 2 || labels[i] >= 0) continue;
        const comp = [];
        const bfs = [i];
        labels[i] = labelId;
        while (bfs.length > 0) {
          const idx = bfs.shift();
          comp.push(idx);
          const r = Math.floor(idx / cols), c = idx % cols;
          for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
            if (!dr && !dc) continue;
            const nr = r+dr, nc = c+dc;
            if (nr>=0 && nr<rows && nc>=0 && nc<cols) {
              const ni = nr*cols+nc;
              if (keep[ni] === 2 && labels[ni] < 0) {
                labels[ni] = labelId;
                bfs.push(ni);
              }
            }
          }
        }
        components.push(comp);
        labelId++;
      }

      // Build final keep set — only cells in long-enough chains
      const finalKeep = new Uint8Array(n);
      for (const comp of components) {
        if (comp.length >= minChainLength) {
          for (const idx of comp) finalKeep[idx] = 1;
        }
      }

      return { mags, angles, finalKeep };
    }

    function angleToChar(angle) {
      // Sobel gives gradient direction (perpendicular to edge).
      // Rotate 90° to get edge direction, then map to character.
      const edgeAngle = angle + Math.PI * 0.5;
      const a = ((edgeAngle % Math.PI) + Math.PI) % Math.PI;
      if (a < Math.PI * 0.125 || a >= Math.PI * 0.875) return '-';
      if (a < Math.PI * 0.375) return '\\';
      if (a < Math.PI * 0.625) return '|';
      return '/';
    }

    function drawHighlightChars(ctx, mags, angles, finalKeep, pixels, srcW, cols, rows, cellSize, scale, offsetX, offsetY, layer, maskMetrics) {
      const stride = Math.round(cellSize * (1 + layer.gap));
      const fontSize = cellSize * scale * gapFontScale(layer.gap);
      ctx.font = `${fontSize}px ${layer.font}`;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const idx = row * cols + col;
          if (!finalKeep[idx]) continue;
          const cx = col * stride + Math.floor(cellSize / 2);
          const cy = row * stride + Math.floor(cellSize / 2);
          const strength = sampleMaskStrength(maskMetrics, cx, cy);
          if (!shouldRenderByStrength(strength, row, col)) continue;

          let char = angleToChar(angles[idx]);
          if (strength < 0.7) char = strength < 0.4 ? '.' : ':';
          const aChar = wordArtifactChar(row, col, layer);
          if (aChar && strength > 0.66) char = aChar;
          const x = offsetX + (col + 0.5) * stride * scale;
          const y = offsetY + (row + 0.5) * stride * scale;

          let fill = '#ffffff';
          if (layer.colorMode) {
            const pi = sourcePixelOffset(srcW, srcH, cx, cy);
            fill = `rgb(${pixels[pi]},${pixels[pi+1]},${pixels[pi+2]})`;
          }

          ctx.fillStyle = getLayerDrawColor(layer, fill);
          ctx.fillText(char, x, y);
        }
      }
    }

    function renderHighlight(pixels, srcW, srcH, cols, rows, cellSize, scale, offsetX, offsetY, layer, maskMetrics) {
      const drawW = srcW * scale;
      const drawH = srcH * scale;

      // Background: render() handles black fill and imageUnderlay image draw

      const { mags, angles, finalKeep } = computeHighlightEdges(pixels, srcW, srcH, cols, rows, cellSize, layer);
      drawHighlightChars(outputCtx, mags, angles, finalKeep, pixels, srcW, cols, rows, cellSize, scale, offsetX, offsetY, layer, maskMetrics);
    }

    // Update selection mode label on modifier key changes
    function updateModeFromModifiers(e) {
      if (!selectionState.active || selectionState.drawing) return;
      selectionState.compositionMode =
        (e.shiftKey && e.altKey) ? 'intersect' :
        e.shiftKey ? 'add' :
        e.altKey ? 'subtract' : 'new';
      updateSelectionModeLabel();
    }
    document.addEventListener('keydown', updateModeFromModifiers);
    document.addEventListener('keyup', updateModeFromModifiers);

    // Spacebar play/pause
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Escape' && selectionState.active) {
        e.preventDefault();
        exitSelectionMode();
        render();
        return;
      }
      if (e.code === 'Space' && state.source === 'video' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
        e.preventDefault();
        const video = state.sourceElement;
        if (video.paused) video.play();
        else video.pause();
      }
    });

    outputCanvas.addEventListener('pointerdown', (e) => {
      if (!selectionState.active || !state.sourceElement) return;
      const geometry = getRenderGeometry();
      if (!geometry) return;
      const canvasPoint = clientToCanvasPoint(e.clientX, e.clientY);
      const sourcePoint = canvasToSourcePoint(canvasPoint.x, canvasPoint.y, geometry);
      if (!sourcePoint.inside) return;

      selectionState.compositionMode =
        (e.shiftKey && e.altKey) ? 'intersect' :
        e.shiftKey ? 'add' :
        e.altKey ? 'subtract' : 'new';
      updateSelectionModeLabel();
      selectionState.drawing = true;
      selectionState.pointerId = e.pointerId;
      selectionState.rawPoints = [[sourcePoint.x, sourcePoint.y]];
      selectionState.previewPoints = [];
      outputCanvas.setPointerCapture(e.pointerId);
      e.preventDefault();
      render();
    });

    outputCanvas.addEventListener('pointermove', (e) => {
      if (!selectionState.active || !selectionState.drawing || e.pointerId !== selectionState.pointerId) return;
      const geometry = getRenderGeometry();
      if (!geometry) return;
      const events = typeof e.getCoalescedEvents === 'function'
        ? e.getCoalescedEvents()
        : [e];
      const captureSpacing = Math.max(0.75, 2.5 / geometry.scale);
      let changed = false;
      for (const sampleEvent of events) {
        const canvasPoint = clientToCanvasPoint(sampleEvent.clientX, sampleEvent.clientY);
        const sourcePoint = canvasToSourcePoint(canvasPoint.x, canvasPoint.y, geometry);
        changed = appendSelectionStrokePoint([sourcePoint.x, sourcePoint.y], captureSpacing) || changed;
      }
      if (changed) {
        render();
      }
      e.preventDefault();
    });

    function finishPointerStroke(e) {
      if (!selectionState.drawing || e.pointerId !== selectionState.pointerId) return;
      const geometry = getRenderGeometry();
      if (geometry) {
        const events = typeof e.getCoalescedEvents === 'function'
          ? e.getCoalescedEvents()
          : [e];
        const captureSpacing = Math.max(0.75, 2.5 / geometry.scale);
        for (const sampleEvent of events) {
          const canvasPoint = clientToCanvasPoint(sampleEvent.clientX, sampleEvent.clientY);
          const sourcePoint = canvasToSourcePoint(canvasPoint.x, canvasPoint.y, geometry);
          appendSelectionStrokePoint([sourcePoint.x, sourcePoint.y], captureSpacing, sampleEvent === events[events.length - 1]);
        }
      }
      if (outputCanvas.hasPointerCapture(e.pointerId)) outputCanvas.releasePointerCapture(e.pointerId);
      finalizeSelectionStroke();
      selectionState.pointerId = null;
      e.preventDefault();
    }

    outputCanvas.addEventListener('pointerup', finishPointerStroke);
    outputCanvas.addEventListener('pointercancel', (e) => {
      if (outputCanvas.hasPointerCapture(e.pointerId)) outputCanvas.releasePointerCapture(e.pointerId);
      cancelSelectionStroke();
      selectionState.pointerId = null;
    });

    // ============ PNG EXPORT ============
    // Re-render at source image native dimensions onto a temp canvas
    function renderToExportCanvas(transparent) {
      if (!state.sourceElement) return null;
      const src = state.sourceElement;
      const srcW = sourceCanvas.width;
      const srcH = sourceCanvas.height;

      const tmpCanvas = document.createElement('canvas');
      tmpCanvas.width = srcW;
      tmpCanvas.height = srcH;
      const tmpCtx = tmpCanvas.getContext('2d');

      const geometry = getRenderGeometry(srcW, srcH);
      if (!geometry) return null;

      // Background
      if (transparent) {
        tmpCtx.clearRect(0, 0, srcW, srcH);
      } else {
        tmpCtx.fillStyle = '#0a0a0a';
        tmpCtx.fillRect(0, 0, srcW, srcH);
      }

      // Swap outputCtx for rendering functions
      const realCtx = outputCtx;
      state._exporting = transparent;

      // Pixel data cache
      const pixelCache = new Map();

      for (let i = 0; i < state.layers.length; i++) {
        const layer = state.layers[i];
        if (!layer.visible) continue;

        let pixels = null;
        if (layer.kind !== 'source') {
          const filterKey = `${layer.brightness}-${layer.contrast}-${layer.saturation}`;
          pixels = pixelCache.get(filterKey);
          if (!pixels) {
            sourceCtx.filter = `brightness(${layer.brightness}) contrast(${layer.contrast}) saturate(${layer.saturation})`;
            sourceCtx.drawImage(src, 0, 0, srcW, srcH);
            sourceCtx.filter = 'none';
            pixels = sourceCtx.getImageData(0, 0, srcW, srcH).data;
            pixelCache.set(filterKey, pixels);
          }
        }

        const layerCanvas = renderLayer(layer, pixels, geometry, true);

        tmpCtx.save();
        tmpCtx.globalAlpha = layer.opacity;
        tmpCtx.globalCompositeOperation = layer.blendMode;
        tmpCtx.drawImage(layerCanvas, 0, 0);
        tmpCtx.restore();
      }

      state._exporting = false;
      outputCtx = realCtx;
      return tmpCanvas;
    }

    function exportPNG() {
      const canvas = renderToExportCanvas(false);
      if (!canvas) return;
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'ascii-export.png';
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    }

    function exportTransparentPNG() {
      const canvas = renderToExportCanvas(true);
      if (!canvas) return;
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'ascii-export-transparent.png';
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    }

    // ============ VIDEO RECORDING ============
    let mediaRecorder = null;
    let recordedChunks = [];
    const RECORDING_PRESETS = {
      high: { label: 'High', baseBitrate: 18000000 },
      max: { label: 'Max', baseBitrate: 32000000 }
    };

    function pickRecordingMimeType() {
      const candidates = [
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm'
      ];
      for (const candidate of candidates) {
        if (window.MediaRecorder?.isTypeSupported?.(candidate)) return candidate;
      }
      return '';
    }

    function getRecordingSettings() {
      const quality = recordQualitySelect?.value || 'high';
      const fps = parseInt(recordFpsSelect?.value || '60', 10);
      return {
        quality: RECORDING_PRESETS[quality] ? quality : 'high',
        fps: fps === 30 ? 30 : 60
      };
    }

    function estimateRecordingBitrate(width, height, fps, quality) {
      const preset = RECORDING_PRESETS[quality] || RECORDING_PRESETS.high;
      const pixelScale = Math.max(0.55, (width * height) / (1920 * 1080));
      const fpsScale = Math.pow(Math.max(1, fps) / 30, 0.9);
      return Math.round(clamp(preset.baseBitrate * pixelScale * fpsScale, 12000000, 80000000));
    }

    function updateRecordingCodecHint() {
      const hint = document.getElementById('recordCodecHint');
      if (!hint) return;
      const mimeType = pickRecordingMimeType();
      let label = 'Auto';
      if (mimeType.includes('vp9')) label = 'VP9';
      else if (mimeType.includes('vp8')) label = 'VP8';
      else if (mimeType.includes('webm')) label = 'WebM';
      hint.textContent = `Codec: ${label}`;
    }

    recordQualitySelect.value = 'high';
    recordFpsSelect.value = '60';
    bindStaticPicker(recordQualityBtn, recordQualitySelect, RECORD_QUALITY_OPTIONS, () => {
      updateRecordingCodecHint();
    }, { align: 'right', placement: 'bottom', compact: true, matchWidth: true, maxHeight: 160, gap: 4 });
    bindStaticPicker(recordFpsBtn, recordFpsSelect, RECORD_FPS_OPTIONS, () => {
      updateRecordingCodecHint();
    }, { align: 'right', placement: 'bottom', compact: true, matchWidth: true, maxHeight: 160, gap: 4 });
    updateRecordingCodecHint();

    function startRecording() {
      if (!state.sourceElement) return;
      const { quality, fps } = getRecordingSettings();
      const stream = outputCanvas.captureStream(fps);
      const mimeType = pickRecordingMimeType();
      const recorderOptions = {
        videoBitsPerSecond: estimateRecordingBitrate(outputCanvas.width, outputCanvas.height, fps, quality)
      };
      if (mimeType) recorderOptions.mimeType = mimeType;
      mediaRecorder = new MediaRecorder(stream, recorderOptions);
      recordedChunks = [];
      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };
      mediaRecorder.onstop = () => {
        const blobType = mediaRecorder?.mimeType || mimeType || 'video/webm';
        const blob = new Blob(recordedChunks, { type: blobType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'ascii-recording.webm';
        a.click();
        URL.revokeObjectURL(url);
        state.recording = false;
        updateRecordButton();
        render();
      };
      mediaRecorder.start();
      state.recording = true;
      updateRecordButton();
      render();
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
    }

    function toggleRecording() {
      if (state.recording) stopRecording();
      else startRecording();
    }

      } else {

    function moveLayerRelative(draggedId, targetId, placement) {
      const fromIdx = state.layers.findIndex(l => l.id === draggedId);
      const targetIdx = state.layers.findIndex(l => l.id === targetId);
      if (fromIdx === -1 || targetIdx === -1) return false;

      let insertIdx = placement === 'before' ? targetIdx + 1 : targetIdx;
      const [moved] = state.layers.splice(fromIdx, 1);
      if (fromIdx < insertIdx) insertIdx--;
      state.layers.splice(insertIdx, 0, moved);
      return true;
    }

    function syncUIToLayer(layer) {
      const isSource = layer.kind === 'source';
      // Toggle section visibility based on layer kind
      for (const id of ['variantSection', 'contourControls', 'outlineControls', 'settingsSection', 'artifactsSection']) {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('hidden', isSource);
      }
      // Effects section is always visible
      const postEl = document.getElementById('postProcessSection');
      if (postEl) postEl.classList.remove('hidden');
      const adjustEl = document.getElementById('adjustSection');
      if (adjustEl) adjustEl.classList.remove('hidden');

      if (isSource) {
        brightnessInput.value = layer.brightness ?? 1;
        brightnessValue.value = formatAdj(layer.brightness ?? 1);
        contrastInput.value = layer.contrast ?? 1;
        contrastValue.value = formatAdj(layer.contrast ?? 1);
        saturationInput.value = layer.saturation ?? 1;
        saturationValue.value = formatAdj(layer.saturation ?? 1);
        renderEffectChainUI();
        return;
      }
      // Variant
      variantSelect.value = layer.variant;
      document.getElementById('variantBtn').textContent = layer.variant;
      // Cell size
      const cellSizeMax = syncCellSizeControlRange(layer);
      const clampedCellSize = clamp(layer.cellSize || CELL_SIZE_DEFAULT, CELL_SIZE_MIN, cellSizeMax);
      if (clampedCellSize !== layer.cellSize) layer.cellSize = clampedCellSize;
      cellSizeInput.value = clampedCellSize;
      cellSizeValue.value = clampedCellSize;
      // Gap
      gapInput.value = layer.gap;
      gapValue.value = layer.gap;
      // Font
      fontSelect.value = layer.font;
      setSelectButtonLabel(fontBtn, labelForOption(FONT_OPTIONS, layer.font));
      // Toggles
      document.getElementById('invertToggle').checked = layer.invert;
      document.getElementById('colorModeToggle').checked = layer.colorMode;
      document.getElementById('charRotationToggle').checked = layer.charRotation;
      manualColorToggle.checked = !!layer.manualColorEnabled;
      outlineFillToggle.checked = !!layer.outlineFill;
      // Contour
      contourSpreadSlider.value = layer.contourSpread;
      contourSpreadValue.value = layer.contourSpread;
      contourSensSlider.value = layer.contourSens;
      contourSensValue.value = layer.contourSens;
      outlineStrokeSizeSlider.value = layer.outlineStrokeSize;
      outlineStrokeSizeValue.value = formatAdj(layer.outlineStrokeSize);
      outlineCornerRadiusSlider.value = layer.outlineCornerRadius;
      outlineCornerRadiusValue.value = formatAdj(layer.outlineCornerRadius);
      // Effect chain
      renderEffectChainUI();
      // Word artifact
      const wordArtifactsEnabled = !!layer.wordArtifactEnabled;
      wordArtifactToggle.checked = wordArtifactsEnabled;
      wordArtifactInput.value = layer.wordArtifact;
      wordArtifactDistributionSelect.value = normalizeWordArtifactDistribution(layer.wordArtifactDistribution);
      setSelectButtonLabel(wordArtifactDistributionBtn, labelForOption(WORD_ARTIFACT_DISTRIBUTION_OPTIONS, wordArtifactDistributionSelect.value));
      wordArtifactDensitySlider.value = Math.round(layer.wordArtifactDensity * 100);
      wordArtifactDensityValue.value = Math.round(layer.wordArtifactDensity * 100);
      wordArtifactCoherenceSlider.value = Math.round(layer.wordArtifactCoherence * 100);
      wordArtifactCoherenceValue.value = Math.round(layer.wordArtifactCoherence * 100);
      wordArtifactControls.classList.toggle('hidden', !wordArtifactsEnabled);
      // Brightness / Contrast / Saturation
      brightnessInput.value = layer.brightness;
      brightnessValue.value = formatAdj(layer.brightness);
      contrastInput.value = layer.contrast;
      contrastValue.value = formatAdj(layer.contrast);
      saturationInput.value = layer.saturation;
      saturationValue.value = formatAdj(layer.saturation);
      // Show/hide variant-specific controls
      updateVariantSections();
      updateManualColorUI();
      updateOutlineFillUI();
      updateMaskControls();
    }

    function renderLayerPanel() {
      const list = document.getElementById('layerList');
