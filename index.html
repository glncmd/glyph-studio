        row.dataset.layerId = layer.id;
        const variantLabel = layer.kind === 'source' ? (state.source === 'video' ? 'VIDEO' : 'IMAGE') : layer.variant;
        const opacityLabel = `${Math.round(layer.opacity * 100)}%`;
        const duplicateHidden = layer.kind === 'source' ? 'invisible' : '';
        const deleteHidden = layer.kind === 'source' || asciiLayerCount() <= 1 ? 'invisible' : '';
        row.innerHTML = `
          <button class="layer-vis text-[10px] font-mono ${layer.visible ? 'text-white' : 'text-[#333]'}" data-id="${layer.id}" title="${layer.visible ? 'Hide layer' : 'Show layer'}">${layerVisibilityIcon(layer.visible)}</button>
          <div class="flex-1 min-w-0 flex flex-col gap-1">
            <div class="text-[10px] font-mono text-white truncate uppercase tracking-wider">${layer.name}</div>
            <div class="text-[10px] font-mono text-[#666] uppercase tracking-wider">${variantLabel} · ${opacityLabel}</div>
          </div>
          <div class="flex flex-col items-end justify-center gap-1 w-[34px]">
            <button class="layer-dup text-[8px] font-mono uppercase tracking-wider text-[#444] hover:text-white text-right ${duplicateHidden}" data-id="${layer.id}">DUP</button>
            <button class="layer-del text-[10px] font-mono text-[#444] hover:text-red-400 text-right ${deleteHidden}" data-id="${layer.id}">\u2715</button>
          </div>
        `;
        // Drag-and-drop reordering
        row.draggable = true;
        row.addEventListener('dragstart', (e) => {
          layerDragState.draggedId = layer.id;
          e.dataTransfer.setData('text/plain', layer.id);
          e.dataTransfer.effectAllowed = 'move';
          row.classList.add('dragging');
        });
        row.addEventListener('dragend', () => {
          clearLayerDropIndicators();
          layerDragState.draggedId = null;
          layerDragState.targetId = null;
          layerDragState.placement = null;
        });
        row.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (layerDragState.draggedId === layer.id) return;
          const rect = row.getBoundingClientRect();
          const placement = e.clientY < rect.top + rect.height / 2 ? 'before' : 'after';
          clearLayerDropIndicators();
          row.classList.add(placement === 'before' ? 'drop-before' : 'drop-after');
          layerDragState.targetId = layer.id;
          layerDragState.placement = placement;
        });
        row.addEventListener('dragleave', () => {
          if (layerDragState.targetId === layer.id) {
            row.classList.remove('drop-before', 'drop-after');
          }
        });
        row.addEventListener('drop', (e) => {
          e.preventDefault();
          const draggedId = layerDragState.draggedId || e.dataTransfer.getData('text/plain');
          clearLayerDropIndicators();
          if (draggedId && draggedId !== layer.id && moveLayerRelative(draggedId, layer.id, layerDragState.placement || 'after')) {
            renderLayerPanel();
            render();
          }
          layerDragState.draggedId = null;
          layerDragState.targetId = null;
          layerDragState.placement = null;
        });
        row.addEventListener('click', (e) => {
          if (e.target.closest('.layer-vis') || e.target.closest('.layer-dup') || e.target.closest('.layer-del')) return;
          if (selectionState.active) cancelSelectionStroke();
          state.activeLayerId = layer.id;
          syncUIToLayer(layer);
          renderLayerPanel();
          render();
        });
        // Visibility toggle
        row.querySelector('.layer-vis').addEventListener('click', (e) => {
          e.stopPropagation();
          layer.visible = !layer.visible;
          renderLayerPanel();
          render();
        });
        row.querySelector('.layer-dup').addEventListener('click', (e) => {
          e.stopPropagation();
          duplicateLayer(layer.id);
        });
        // Delete button
        row.querySelector('.layer-del').addEventListener('click', (e) => {
          e.stopPropagation();
          removeLayer(layer.id);
        });
        list.appendChild(row);
      });

      const al = activeLayer();
      const effectiveLayer = al.kind === 'source' ? (state.layers.find(layer => layer.kind !== 'source') || al) : al;
      const bmLabel = (BLEND_MODES || []).find(b => b[0] === effectiveLayer.blendMode);
      document.getElementById('blendModeBtn').textContent = bmLabel ? bmLabel[1] : 'Normal';
      document.getElementById('layerOpacity').value = Math.round(effectiveLayer.opacity * 100);
      document.getElementById('layerOpacityValue').value = Math.round(effectiveLayer.opacity * 100);
      updateMaskControls();
    }

    function cloneLayerData(layer, overrides = {}) {
      const duplicate = {
        ...layer,
        ...overrides,
        id: crypto.randomUUID()
      };
      if (layer.postProcess) duplicate.postProcess = { ...layer.postProcess };
      if (layer.effectChain) {
        duplicate.effectChain = layer.effectChain.map(fx => ({
          ...fx,
          id: newFxId(),
          params: { ...fx.params }
        }));
      }
      if (layer.mask) {
        duplicate.mask = { ...layer.mask };
        if (layer.mask.regions) {
          duplicate.mask.regions = layer.mask.regions.map(region => ({
            ...region,
            points: region.points.map(point => [...point])
          }));
        }
        if (layer.mask.points) {
          duplicate.mask.points = layer.mask.points.map(point => [...point]);
        }
      }
      return duplicate;
    }

    function addLayer() {
      if (selectionState.active) cancelSelectionStroke();
      const layer = createLayer();
      state.layers.push(layer);
      state.activeLayerId = layer.id;
      syncUIToLayer(layer);
      renderLayerPanel();
      render();
    }

    function duplicateLayer(id) {
      const source = state.layers.find(layer => layer.id === id);
      if (!source || source.kind === 'source') return;
      if (selectionState.active) cancelSelectionStroke();
      const idx = state.layers.findIndex(layer => layer.id === id);
      const duplicate = cloneLayerData(source, { name: `${source.name} Copy` });
      state.layers.splice(idx + 1, 0, duplicate);
      state.activeLayerId = duplicate.id;
      syncUIToLayer(duplicate);
      renderLayerPanel();
      render();
    }

    function removeLayer(id) {
      if (id === getSourceLayer()?.id) return;
      if (asciiLayerCount() <= 1) return;
      const idx = state.layers.findIndex(l => l.id === id);
      state.layers.splice(idx, 1);
      if (state.activeLayerId === id) {
        state.activeLayerId = state.layers[Math.min(idx, state.layers.length - 1)].id;
        syncUIToLayer(activeLayer());
      }
      layerCanvasPool.delete(id);
      invalidateMaskCaches(id);
      invalidatePostProcessCache(id);
      if (selectionState.active) cancelSelectionStroke();
      renderLayerPanel();
      render();
    }

    // Ctrl/Cmd+S to save project
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        doSaveProject();
      }
    });

    // ============ INIT ============
    syncUIToLayer(activeLayer());
    renderLayerPanel();
    resizeCanvas();
  </script>
</body>
</html>
