<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII_FX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./dense-glyph-paths.js"></script>
  <script>
    tailwind.config = {
      theme: {
        fontFamily: {
          mono: ['IBM Plex Mono', 'monospace'],
        },
      }
    }
  </script>
  <style>
    *, *::before, *::after { font-family: 'IBM Plex Mono', monospace; }

    /* Brutalist range slider — flat bar, square thumb */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 2px;
      background: #333;
      border-radius: 0;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 8px;
      height: 10px;
      background: #fff;
      border-radius: 0;
      cursor: pointer;
      border: none;
    }
    input[type="range"]::-moz-range-thumb {
      width: 8px;
      height: 10px;
      background: #fff;
      border-radius: 0;
      cursor: pointer;
      border: none;
    }

    /* Toggle — brutalist square */
    .toggle-switch {
      position: relative;
      width: 32px;
      height: 16px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #1a1a1a;
      border: 1px solid #333;
      transition: background-color 0.15s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      height: 10px;
      width: 10px;
      left: 2px;
      bottom: 2px;
      background-color: #555;
      transition: transform 0.15s, background-color 0.15s;
    }
    .toggle-switch input:checked + .toggle-slider {
      border-color: #fff;
    }
    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(16px);
      background-color: #fff;
    }

    /* Drawer min-width */
    #settingsDrawer > div { min-width: 280px; }

    /* Recording pulse */
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.6); }
      50% { box-shadow: 0 0 0 6px rgba(255, 0, 0, 0); }
    }
    .recording {
      background: #ff0000 !important;
      border-color: #ff0000 !important;
      color: #000 !important;
      animation: pulse-red 1.2s infinite;
    }

    /* Select arrow override */
    select { background-image: none; }

    /* Toolbar button base */
    .tb {
      border: 1px solid #333;
      background: transparent;
      color: #666;
      padding: 6px 10px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
      white-space: nowrap;
    }
    .tb:hover { color: #fff; border-color: #666; }
    .tb:disabled,
    .tb[disabled] {
      color: #333;
      border-color: #222;
      cursor: not-allowed;
    }
    .tb-active {
      color: #fff;
      border-color: #e2ff3a;
    }
    .variant-arrow { border-color: #333; position: relative; }
    .variant-arrow:hover { color: #fff; border-color: #666; z-index: 1; }
    .panel-trigger-open {
      position: relative;
      z-index: 2;
      border-color: #e2ff3a !important;
      box-shadow: inset 0 0 0 1px rgba(226,255,58,0.12);
    }
    #variantBtn { position: relative; }
    #variantBtn:hover,
    #variantBtn:focus-visible {
      z-index: 2;
    }
    .artifact-word-input {
      width: 116px;
      min-height: 26px;
      padding: 5px 10px;
      border: 1px solid #333;
      background: #0a0a0a;
      color: #9b9b9b;
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.12s, color 0.12s;
    }
    .artifact-word-input::placeholder {
      color: #4f4f4f;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .artifact-word-input:focus {
      border-color: #666;
      color: #c2c2c2;
    }

    /* Section divider */
    .section-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #444;
      padding-bottom: 6px;
      border-bottom: 1px solid #1a1a1a;
      margin-bottom: 10px;
    }

    /* Scrollbar */
    #settingsDrawer::-webkit-scrollbar { width: 4px; }
    #settingsDrawer::-webkit-scrollbar-track { background: transparent; }
    #settingsDrawer::-webkit-scrollbar-thumb { background: #222; }
    #layerList::-webkit-scrollbar { width: 4px; }
    #layerList::-webkit-scrollbar-track { background: transparent; }
    #layerList::-webkit-scrollbar-thumb { background: #222; }
    .layer-row.dragging {
      opacity: 0.35;
      transform: scale(0.985);
    }
    .layer-row.drop-before {
      box-shadow: inset 0 2px 0 0 rgba(255,255,255,0.95);
      background: #171717;
    }
    .layer-row.drop-after {
      box-shadow: inset 0 -2px 0 0 rgba(255,255,255,0.95);
      background: #171717;
    }
    .fx-card { border: 1px solid #222; border-radius: 4px; background: #111; margin-bottom: 2px; }
    .fx-card.dragging { opacity: 0.35; transform: scale(0.985); }
    .fx-card.drop-before { box-shadow: inset 0 2px 0 0 rgba(255,255,255,0.95); background: #171717; }
    .fx-card.drop-after { box-shadow: inset 0 -2px 0 0 rgba(255,255,255,0.95); background: #171717; }
    .fx-drag { cursor: grab; user-select: none; font-size: 14px; line-height: 1; }
    .fx-card[draggable="true"]:active .fx-drag { cursor: grabbing; }
    #addEffectDropdown { position: absolute; z-index: 50; background: #111; border: 1px solid #333; border-radius: 4px; min-width: 180px; max-height: 300px; overflow-y: auto; }
    #addEffectDropdown .fx-menu-item { display: block; width: 100%; padding: 6px 12px; border: 0; background: transparent; text-align: left; font-size: 10px; font-family: monospace; text-transform: uppercase; letter-spacing: 0.05em; color: #888; cursor: pointer; white-space: nowrap; }
    #addEffectDropdown .fx-menu-item:hover { background: #1a1a1a; color: #fff; }
    #addEffectDropdown .fx-menu-header { padding: 6px 12px; font-size: 9px; font-family: monospace; text-transform: uppercase; letter-spacing: 0.1em; color: #444; pointer-events: none; }
    .ui-select-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      min-height: 31px;
      padding: 6px 12px;
      border: 1px solid #333;
      background: #0a0a0a;
      color: #fff;
      font-family: monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s, box-shadow 0.12s;
    }
    .ui-select-btn:hover {
      border-color: #666;
    }
    .ui-select-btn.ui-select-open {
      border-color: #e2ff3a;
      box-shadow: inset 0 0 0 1px rgba(226,255,58,0.12);
    }
    .ui-select-btn-sm {
      min-height: 26px;
      padding: 5px 10px;
      font-size: 10px;
    }
    .ui-select-value {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }
    .ui-select-caret {
      color: #555;
      font-size: 10px;
      line-height: 1;
      flex-shrink: 0;
    }
    .ui-menu-panel {
      z-index: 80;
      background: #111;
      border: 1px solid #333;
      box-shadow: 0 18px 40px rgba(0,0,0,0.45);
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .ui-menu-panel::-webkit-scrollbar {
      width: 8px;
    }
    .ui-menu-panel::-webkit-scrollbar-track {
      background: transparent;
    }
    .ui-menu-panel::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 999px;
      border: 2px solid #111;
    }
    .ui-menu-panel::-webkit-scrollbar-thumb:hover {
      background: #4a4a4a;
    }
    .ui-menu-item {
      display: block;
      width: 100%;
      padding: 12px 24px;
      border: 0;
      background: transparent;
      color: #888;
      text-align: left;
      font-family: monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, box-shadow 0.12s;
    }
    .ui-menu-item:hover,
    .fx-menu-item:hover {
      background: #242424;
      color: #fff;
      box-shadow: inset 2px 0 0 #e2ff3a;
    }
    .ui-menu-item.active {
      background: #242424;
      color: #fff;
      box-shadow: inset 2px 0 0 #e2ff3a;
    }
    .fx-menu-item.active {
      background: #242424;
      color: #fff;
      box-shadow: inset 2px 0 0 #e2ff3a;
    }
    .ui-menu-item-compact {
      padding: 9px 12px;
    }
    .ui-menu-panel button:focus,
    .ui-menu-panel button:focus-visible,
    .ui-menu-item:focus,
    .ui-menu-item:focus-visible,
    .fx-menu-item:focus {
      outline: none;
    }
    .fx-menu-item:focus-visible {
      outline: none;
    }
    .menu-nav-active {
      background: #242424 !important;
      color: #fff !important;
      box-shadow: inset 2px 0 0 #e2ff3a;
    }
    .ui-menu-panel:hover .ui-menu-item.active:not(:hover):not(.menu-nav-active),
    .ui-menu-panel:hover .fx-menu-item.active:not(:hover):not(.menu-nav-active) {
      background: transparent;
      color: #888;
      box-shadow: none;
    }
    .ui-menu-panel.keyboard-nav .ui-menu-item.active:not(.menu-nav-active),
    .ui-menu-panel.keyboard-nav .fx-menu-item.active:not(.menu-nav-active) {
      background: transparent;
      color: #888;
      box-shadow: none;
    }
    .layer-vis svg {
      width: 16px;
      height: 16px;
      display: block;
    }
    .mini-swatch {
      width: 18px;
      height: 18px;
      border: 1px solid #444;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.55);
    }

    #outputCanvas.masking-active {
      cursor: crosshair;
      touch-action: none;
    }

    .app-modal-backdrop {
      background:
        radial-gradient(circle at top, rgba(226,255,58,0.08), transparent 38%),
        rgba(5,5,5,0.78);
      backdrop-filter: blur(3px);
    }
    .app-modal-card {
      border: 1px solid #333;
      background:
        linear-gradient(180deg, rgba(20,20,20,0.98), rgba(10,10,10,0.98));
      box-shadow: 0 28px 80px rgba(0,0,0,0.55);
    }
    .app-modal-field {
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid #333;
      background: #090909;
      color: #fff;
      outline: none !important;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }
    .app-modal-field:focus {
      outline: none !important;
      border-color: #e2ff3a;
      box-shadow: 0 0 0 1px rgba(226,255,58,0.18);
    }
    .app-modal-field:focus-visible {
      outline: none !important;
      border-color: #e2ff3a;
      box-shadow: 0 0 0 1px rgba(226,255,58,0.18);
    }
    .app-modal-btn {
      border: 1px solid #333;
      background: #111;
      color: #888;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
    }
    .app-modal-btn:hover {
      border-color: #666;
      color: #fff;
    }
    .app-modal-btn-primary {
      border-color: #e2ff3a;
      background: #e2ff3a;
      color: #080808;
    }
    .app-modal-btn-primary:hover {
      border-color: #f2ff8a;
      background: #f2ff8a;
      color: #000;
    }
  </style>
</head>
<body class="bg-[#0a0a0a] h-screen overflow-hidden flex flex-col font-mono text-white">

  <!-- Top Bar -->
  <div class="flex items-center px-3 py-1.5 border-b border-[#1a1a1a] bg-[#0a0a0a] gap-2">
    <!-- Brand -->
    <div class="text-[11px] tracking-[0.25em] text-[#e2ff3a] uppercase select-none font-semibold mx-2 hidden sm:block">ASCII<span class="text-[#c8e030]">_FX</span></div>

    <!-- Source -->
    <div class="flex items-center gap-1">
      <button id="imageBtn" class="tb" title="Upload Image (drag & drop supported)">IMG</button>
      <button id="videoBtn" class="tb" title="Upload Video">VID</button>
    </div>
    <div class="w-px h-5 bg-[#222]"></div>

    <!-- Project -->
    <div class="relative">
      <button id="projectBtn" class="tb" title="Project" style="max-width:160px;overflow:hidden;text-overflow:ellipsis">Untitled ▾</button>
      <div id="projectMenu" class="ui-menu-panel hidden absolute left-0 top-full mt-px z-50 whitespace-nowrap min-w-[180px] overflow-y-auto">
        <button id="projectSave" class="ui-menu-item ui-menu-item-compact">Save<span class="float-right text-[#444] normal-case tracking-normal ml-4">&#8984;S</span></button>
        <button id="projectSaveAs" class="ui-menu-item ui-menu-item-compact border-t border-[#222]">Save As…</button>
        <button id="projectRename" class="ui-menu-item ui-menu-item-compact border-t border-[#222]">Rename</button>
        <button id="projectDelete" class="ui-menu-item ui-menu-item-compact border-t border-[#222]">Delete</button>
        <button id="projectClose" class="ui-menu-item ui-menu-item-compact border-t border-[#222]">Close</button>
        <div id="projectListDivider" class="border-t border-[#333] mt-1 pt-1 hidden"></div>
        <div id="projectList"></div>
      </div>
    </div>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Workspace -->
      <div class="flex items-center gap-1">
        <button id="layerPanelToggle" class="tb" title="Toggle Layers">LAYERS</button>
        <button id="settingsBtn" class="tb" title="Settings">CFG</button>
      </div>
      <div class="w-px h-5 bg-[#222]"></div>

    <!-- Export -->
    <div class="flex items-center gap-1">
      <div class="relative">
        <button id="exportPngBtn" class="tb" title="Export PNG">EXPORT</button>
        <div id="exportMenu" class="ui-menu-panel hidden absolute right-0 top-full mt-px z-50 whitespace-nowrap overflow-y-auto">
          <button id="exportNormal" class="ui-menu-item ui-menu-item-compact">PNG</button>
          <button id="exportTransparent" class="ui-menu-item ui-menu-item-compact border-t border-[#222]">PNG TRANSPARENT</button>
          <div class="border-t border-[#222] px-3 py-2 flex flex-col gap-2">
            <div class="text-[9px] uppercase tracking-[0.18em] text-[#555]">Rec WebM</div>
            <div class="flex items-center justify-between gap-3">
              <label for="recordQualitySelect" class="text-[10px] uppercase tracking-wider text-[#666]">Quality</label>
              <div class="relative w-[92px]">
                <button id="recordQualityBtn" type="button" class="ui-select-btn ui-select-btn-sm">
                  <span class="ui-select-value">High</span>
                  <span class="ui-select-caret">▾</span>
                </button>
                <input id="recordQualitySelect" type="hidden" value="high">
              </div>
            </div>
            <div class="flex items-center justify-between gap-3">
              <label for="recordFpsSelect" class="text-[10px] uppercase tracking-wider text-[#666]">FPS</label>
              <div class="relative w-[92px]">
                <button id="recordFpsBtn" type="button" class="ui-select-btn ui-select-btn-sm">
                  <span class="ui-select-value">60</span>
                  <span class="ui-select-caret">▾</span>
                </button>
                <input id="recordFpsSelect" type="hidden" value="60">
              </div>
            </div>
            <div id="recordCodecHint" class="text-[9px] uppercase tracking-[0.14em] text-[#444]">Codec: Auto</div>
          </div>
        </div>
      </div>
      <button id="recordBtn" class="tb" title="Record Video">REC</button>
    </div>
  </div>

  <!-- Main area -->
  <div class="flex flex-1 overflow-hidden relative">
    <!-- Layer Panel -->
      <div id="layerPanel" class="w-[220px] flex-shrink-0 bg-[#111] border-r border-[#333] flex flex-col transition-all duration-200 overflow-hidden">
      <div class="flex items-center justify-between px-3 py-2 border-b border-[#333]">
        <span class="text-[#888] text-[10px] uppercase tracking-wider font-mono">Layers</span>
        <button id="addLayerBtn" class="text-[#888] hover:text-white text-[11px] font-mono px-2 py-0.5 border border-[#333] hover:border-[#666]">+ ADD</button>
      </div>
      <div id="layerList" class="flex-1 overflow-y-auto flex flex-col">
        <!-- Layer rows inserted here dynamically -->
      </div>
      <div id="layerProperties" class="border-t border-[#333] px-3 py-2 pb-4 flex flex-col gap-2">
        <div class="flex items-center justify-between relative">
          <label class="text-[#666] text-[10px] uppercase tracking-wider">Blend</label>
          <button id="blendModeBtn" class="w-[132px] bg-[#0a0a0a] border border-[#333] text-white text-[10px] font-mono px-3 py-1 outline-none cursor-pointer hover:border-[#666] text-center uppercase tracking-wider">Normal</button>
          <div id="blendModeDropdown" class="ui-menu-panel hidden absolute right-0 bottom-full mb-1 z-50 min-w-[156px] max-h-[260px]" style="scrollbar-width:thin;scrollbar-color:#333 transparent">
          </div>
        </div>
        <div class="flex items-center justify-between">
          <label class="text-[#666] text-[10px] uppercase tracking-wider">Opacity</label>
          <input id="layerOpacityValue" type="text" class="text-[#fff] text-[10px] tabular-nums border border-[#333] px-1.5 py-0.5 bg-transparent text-right w-10 font-mono outline-none focus:border-[#666]" value="100">
        </div>
        <input type="range" id="layerOpacity" min="0" max="100" value="100" step="1">
        <div class="border-t border-[#222] pt-3 mt-1 flex flex-col gap-2">
          <div class="flex items-center justify-between">
            <label class="text-[#666] text-[10px] uppercase tracking-wider">Mask</label>
            <span id="maskStatus" class="text-[10px] font-mono text-[#888]">NONE</span>
          </div>
          <div class="flex items-center gap-1">
            <button id="maskEditBtn" class="tb flex-1 px-2 py-1 text-[10px]">EDIT</button>
            <button id="maskClearBtn" class="tb flex-1 px-2 py-1 text-[10px]">CLEAR</button>
          </div>
          <button id="maskInvertBtn" class="tb w-full px-2 py-1 text-[10px]">INVERT</button>
          <div class="flex items-center justify-between">
            <label class="text-[#666] text-[10px] uppercase tracking-wider">Feather</label>
            <input id="maskFeatherValue" type="text" class="text-[#fff] text-[10px] tabular-nums border border-[#333] px-1.5 py-0.5 bg-transparent text-right w-10 font-mono outline-none focus:border-[#666]" value="0">
          </div>
          <input type="range" id="maskFeather" min="0" max="200" value="0" step="1">
        </div>
      </div>
    </div>

    <div id="canvasArea" class="flex-1 relative">
      <canvas id="outputCanvas" class="absolute inset-0 w-full h-full"></canvas>
      <div id="selectionToolbar" class="hidden absolute top-3 left-1/2 -translate-x-1/2 z-20 flex items-center gap-1 bg-[rgba(10,10,10,0.92)] border border-[#333] px-2 py-2 backdrop-blur-sm">
        <span id="selectionModeLabel" class="text-[10px] text-[#666] font-mono px-1 select-none">NEW</span>
        <button id="selectionClearBtn" class="tb px-2 py-1 text-[10px]">CLEAR</button>
        <button id="selectionInvertBtn" class="tb px-2 py-1 text-[10px]">INVERT</button>
        <button id="selectionGuidesBtn" class="tb tb-active px-2 py-1 text-[10px]">GUIDES</button>
        <button id="selectionDoneBtn" class="tb px-2 py-1 text-[10px]">DONE</button>
      </div>
      <!-- Empty state -->
      <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none select-none gap-3">
        <div class="text-[#222] text-xs uppercase tracking-[0.2em]">NO SOURCE</div>
        <div class="text-[#1a1a1a] text-[10px] tracking-wider">DROP FILE OR SELECT INPUT</div>
      </div>
    </div>

    <!-- Settings Drawer -->
    <div id="settingsDrawer" class="w-0 overflow-hidden bg-[#0e0e0e] border-l border-[#1a1a1a] overflow-y-auto z-10 transition-all duration-200 ease-out">
      <div class="p-4 flex flex-col gap-5">
        <!-- Header -->
        <div class="flex items-center justify-between">
          <span class="text-[10px] uppercase tracking-[0.2em] text-[#666]">CONFIG</span>
          <div class="flex items-center gap-3">
            <button id="resetSettings" class="cursor-pointer text-[#333] hover:text-white text-[10px] font-mono uppercase tracking-wider">RST</button>
            <button id="drawerClose" class="cursor-pointer text-[#333] hover:text-white text-xs font-mono">[X]</button>
          </div>
        </div>

        <!-- Variant selector -->
        <div id="variantSection">
          <div class="section-label">VARIANT</div>
          <div class="flex items-stretch relative">
            <button id="variantPrev" class="variant-arrow tb text-[10px] px-3 -mr-px flex items-center">&lt;</button>
            <button id="variantBtn" class="flex-1 bg-[#0a0a0a] border border-[#333] text-white text-[11px] px-3 py-1.5 text-center cursor-pointer font-mono uppercase tracking-wider hover:border-[#666]">Standard</button>
            <input type="hidden" id="variantSelect" value="Standard">
            <button id="variantNext" class="variant-arrow tb text-[10px] px-3 -ml-px flex items-center">&gt;</button>
            <div id="variantDropdown" class="ui-menu-panel hidden absolute left-0 right-0 top-full mt-1 z-50 max-h-[300px]" style="scrollbar-width:thin;scrollbar-color:#333 transparent"></div>
          </div>
        </div>

        <!-- Contour Controls -->
        <div id="contourControls" class="hidden">
          <div class="section-label">CONTOUR</div>
          <div class="flex flex-col gap-3">
            <div class="flex flex-col gap-2">
              <div class="flex items-center justify-between">
                <label class="text-[#666] text-[10px] uppercase tracking-wider">Spread</label>

  <script>
    // ============ STATE ============
    let layerCounter = 1;
    /* ── Effect Registry ── */
    const EFFECT_REGISTRY = {
      bloom: {
        label: 'Bloom',
        defaults: { style: 'soft', radius: 8, intensity: 0.6 },
        params: [
          { key: 'style', type: 'select', options: ['soft', 'intense'], label: 'Style' },
          { key: 'radius', type: 'range', min: 2, max: 100, step: 1, label: 'Radius' },
          { key: 'intensity', type: 'range', min: 0, max: 3, step: 0.05, label: 'Intensity' }
        ]
      },
      grain: {
        label: 'Grain',
        defaults: { amount: 25, size: 25, roughness: 50 },
        params: [
          { key: 'amount', type: 'range', min: 0, max: 100, step: 1, label: 'Amount' },
          { key: 'size', type: 'range', min: 1, max: 100, step: 1, label: 'Size' },
          { key: 'roughness', type: 'range', min: 0, max: 100, step: 1, label: 'Roughness' }
        ]
      },
      inkBleed: {
        label: 'Ink Bleed',
        defaults: { spread: 50, organic: 30, splatter: 0, roundness: 60, softness: 0 },
        params: [
          { key: 'spread', type: 'range', min: 0, max: 100, step: 1, label: 'Spread' },
          { key: 'organic', type: 'range', min: 0, max: 100, step: 1, label: 'Organic' },
          { key: 'splatter', type: 'range', min: 0, max: 100, step: 1, label: 'Splatter' },
          { key: 'roundness', type: 'range', min: 0, max: 100, step: 1, label: 'Roundness' },
          { key: 'softness', type: 'range', min: 0, max: 100, step: 1, label: 'Softness' }
        ]
      },
      chromatic: {
        label: 'Chromatic Aberration',
        defaults: { amount: 5, angle: 0 },
        params: [
          { key: 'amount', type: 'range', min: 0, max: 30, step: 0.5, label: 'Offset' },
          { key: 'angle', type: 'range', min: 0, max: 360, step: 1, label: 'Angle' }
        ]
      },
      pixelate: {
        label: 'Pixelate',
        defaults: { amount: 8 },
        params: [
          { key: 'amount', type: 'range', min: 2, max: 64, step: 1, label: 'Block Size' }
        ]
      },
      blur: {
        label: 'Blur',
        subtypes: {
          gaussian:  { label: 'Gaussian',  defaults: { amount: 5 },  params: [{ key: 'amount', type: 'range', min: 0, max: 50, step: 0.5, label: 'Radius' }] },
          motion:    { label: 'Motion',    defaults: { amount: 10, angle: 0 }, params: [{ key: 'amount', type: 'range', min: 0, max: 50, step: 1, label: 'Distance' }, { key: 'angle', type: 'range', min: 0, max: 360, step: 1, label: 'Angle' }] },
          radial:    { label: 'Radial',    defaults: { amount: 10, centerX: 50, centerY: 50 }, params: [{ key: 'amount', type: 'range', min: 0, max: 50, step: 1, label: 'Amount' }, { key: 'centerX', type: 'range', min: 0, max: 100, step: 1, label: 'Center X' }, { key: 'centerY', type: 'range', min: 0, max: 100, step: 1, label: 'Center Y' }] },
          box:       { label: 'Box Blur',  defaults: { amount: 5 },  params: [{ key: 'amount', type: 'range', min: 1, max: 30, step: 1, label: 'Radius' }] }
        }
      }
    };

    let _fxIdCounter = 0;
    function newFxId() { return 'fx-' + (++_fxIdCounter); }

    function createEffect(type, subtype) {
      const reg = EFFECT_REGISTRY[type];
      if (!reg) return null;
      let defaults;
      if (reg.subtypes) {
        const st = reg.subtypes[subtype || Object.keys(reg.subtypes)[0]];
        defaults = st ? { ...st.defaults } : {};
        subtype = subtype || Object.keys(reg.subtypes)[0];
      } else {
        defaults = { ...reg.defaults };
        subtype = null;
      }
      return { id: newFxId(), type, subtype, enabled: true, params: defaults };
    }

    const DEFAULT_ASCII_LAYER_SETTINGS = Object.freeze({
      visible: true,
      opacity: 1.0,
      blendMode: 'source-over',
      variant: 'Standard',
      cellSize: 10,
      gap: 0,
      font: 'monospace',
      invert: false,
      colorMode: false,
      charRotation: false,
      manualColorEnabled: false,
      manualColor: '#f2f0d8',
      outlineFill: false,
      outlineFillColor: '#1f7a4f',
      brightness: 1,
      contrast: 1,
      saturation: 1,
      contourSpread: 2,
      contourSens: 5,
      outlineStrokeSize: 1.5,
      outlineCornerRadius: 0,
      bloom: false,
      bloomStyle: 'soft',
      bloomRadius: 8,
      bloomIntensity: 0.6,
      grain: false,
      grainAmount: 25,
      grainSize: 25,
      grainRoughness: 50,
      wordArtifactEnabled: false,
      wordArtifact: '',
      wordArtifactDistribution: 'stream',
      wordArtifactDensity: 0.05,
      wordArtifactCoherence: 0.3,
      postProcess: {
        enabled: false,
        spread: 50,
        organic: 30,
        splatter: 0,
        roundness: 60,
        softness: 0
      },
      effectChain: null,
      mask: null
    });

    function getDefaultAsciiLayerSettings() {
      return {
        ...DEFAULT_ASCII_LAYER_SETTINGS,
        postProcess: { ...DEFAULT_ASCII_LAYER_SETTINGS.postProcess },
        effectChain: null,
        mask: null
      };
    }

    function applyLayerDefaults(layer, overrides = {}) {
      return Object.assign(layer, getDefaultAsciiLayerSettings(), overrides);
    }

    function createLayer(overrides = {}) {
      return {
        id: crypto.randomUUID(),
        name: `Layer ${layerCounter++}`,
        kind: 'ascii',
        ...getDefaultAsciiLayerSettings(),
        ...overrides
      };
    }

    function createSourceLayer(overrides = {}) {
      return createLayer({
        kind: 'source',
        name: 'Source',
        variant: 'Source',
        ...overrides
      });
    }

    const state = {
      source: null,
      sourceElement: null,
      drawerOpen: false,
      layerPanelOpen: true,
      recording: false,
      _exporting: false,
      sourceVersion: 0,
      layers: [createLayer()],
      activeLayerId: null
    };
    state.activeLayerId = state.layers[0].id;

    // ============ PROJECT SAVES ============
    let currentProjectName = null;
    const STORAGE_KEY = 'glyphStudio_projects';

    function getProjects() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function saveProjectToStorage(name, data) {
      const projects = getProjects();
      projects[name] = { saved: Date.now(), data };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
    }

    function deleteProjectFromStorage(name) {
      const projects = getProjects();
      delete projects[name];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
    }

    function listProjects() {
      const projects = getProjects();
      return Object.entries(projects)
        .map(([name, v]) => ({ name, saved: v.saved }))
        .sort((a, b) => b.saved - a.saved);
    }

    function serializeProject() {
      return {
        version: 2,
        activeLayerId: state.activeLayerId,
        sourceHint: state.source,
        layers: state.layers.map(l => {
          const clone = { ...l };
          if (l.postProcess) clone.postProcess = { ...l.postProcess };
          if (l.effectChain) {
            clone.effectChain = l.effectChain.map(fx => ({
              ...fx, params: { ...fx.params }
            }));
          }
          if (l.mask) {
            clone.mask = { ...l.mask };
            if (l.mask.regions) {
              clone.mask.regions = l.mask.regions.map(r => ({ ...r, points: r.points.map(p => [...p]) }));
            }
            if (l.mask.points) clone.mask.points = l.mask.points.map(p => [...p]);
          }
          return clone;
        })
      };
    }

    function deserializeProject(data) {
      state.layers = data.layers.map(l => {
        if (l.postProcess) l.postProcess = { ...l.postProcess };
        if (typeof l.wordArtifactDistribution !== 'string') {
          l.wordArtifactDistribution = 'stream';
        }
        if (l.mask) {
          l.mask = { ...l.mask };
          if (l.mask.points && !l.mask.regions) {
            l.mask.regions = [{ points: l.mask.points, op: 'new' }];
            delete l.mask.points;
          }
        }
        // Trigger effect chain migration from old format if needed
        getEffectChain(l);
        return l;
      });
      state.activeLayerId = data.activeLayerId || state.layers[0]?.id;
      invalidateMaskCaches();
      invalidatePostProcessCache();
      renderLayerPanel();
      syncUIToLayer(activeLayer());
      if (state.sourceElement) {
        document.getElementById('emptyState').classList.add('hidden');
        resizeCanvas();
        render();
      } else {
        // Show empty state with upload prompt
        const es = document.getElementById('emptyState');
        es.classList.remove('hidden');
        es.children[0].textContent = 'LAYERS RESTORED';
        es.children[1].textContent = 'UPLOAD AN IMAGE TO RENDER';
        outputCtx.fillStyle = '#0a0a0a';
        outputCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
        // Auto-open file picker so user can quickly re-upload
        document.getElementById('imageInput').click();
      }
    }

    function updateProjectBtnText() {
      document.getElementById('projectBtn').textContent = (currentProjectName || 'Untitled') + ' \u25BE';
    }

    const projectNameModal = document.getElementById('projectNameModal');
    const projectNameModalForm = document.getElementById('projectNameModalForm');
    const projectNameModalTitle = document.getElementById('projectNameModalTitle');
    const projectNameModalLabel = document.getElementById('projectNameModalLabel');
    const projectNameModalHint = document.getElementById('projectNameModalHint');
    const projectNameModalInput = document.getElementById('projectNameModalInput');
    const projectNameModalConfirm = document.getElementById('projectNameModalConfirm');
    let projectNameModalResolve = null;

    function closeProjectNameModal(value = null) {
      if (projectNameModal.classList.contains('hidden')) return;
      projectNameModal.classList.add('hidden');
      const resolve = projectNameModalResolve;
      projectNameModalResolve = null;
      if (resolve) resolve(value);
    }

    function openProjectNameModal({ title, label, value = '', confirmLabel = 'Save', hint = 'Names are saved locally' }) {
      projectNameModalTitle.textContent = title;
      projectNameModalLabel.textContent = label;
      projectNameModalInput.value = value;
      projectNameModalConfirm.textContent = confirmLabel;
      projectNameModalHint.textContent = hint;
      projectNameModal.classList.remove('hidden');
      requestAnimationFrame(() => {
        projectNameModalInput.focus();
        projectNameModalInput.select();
      });
      return new Promise(resolve => {
        projectNameModalResolve = resolve;
      });
    }

    projectNameModal.addEventListener('click', (e) => {
      if (!projectNameModalForm.contains(e.target)) closeProjectNameModal(null);
    });
    projectNameModalForm.addEventListener('click', (e) => e.stopPropagation());
    document.getElementById('projectNameModalClose').addEventListener('click', () => closeProjectNameModal(null));
    document.getElementById('projectNameModalCancel').addEventListener('click', () => closeProjectNameModal(null));
    projectNameModalForm.addEventListener('submit', (e) => {
      e.preventDefault();
      closeProjectNameModal(projectNameModalInput.value);
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !projectNameModal.classList.contains('hidden')) {
        e.preventDefault();
        closeProjectNameModal(null);
      }
    });

    async function doSaveProject() {
      if (!currentProjectName) {
        const name = await openProjectNameModal({
          title: 'Save Project',
          label: 'Project Name',
          confirmLabel: 'Save',
          value: currentProjectName || ''
        });
        if (!name || !name.trim()) return;
        currentProjectName = name.trim();
      }
      saveProjectToStorage(currentProjectName, serializeProject());
      updateProjectBtnText();
    }

    async function doSaveAsProject() {
      const name = await openProjectNameModal({
        title: 'Save As',
        label: 'Project Name',
        confirmLabel: 'Save Copy',
        value: currentProjectName || ''
      });
      if (!name || !name.trim()) return;
      currentProjectName = name.trim();
      saveProjectToStorage(currentProjectName, serializeProject());
      updateProjectBtnText();
    }

    async function doRenameProject() {
      if (!currentProjectName) return;
      const name = await openProjectNameModal({
        title: 'Rename Project',
        label: 'New Name',
        confirmLabel: 'Rename',
        value: currentProjectName
      });
      if (!name || !name.trim() || name.trim() === currentProjectName) return;
      const oldName = currentProjectName;
      const projects = getProjects();
      if (projects[oldName]) {
        projects[name.trim()] = projects[oldName];
        delete projects[oldName];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
      }
      currentProjectName = name.trim();
      updateProjectBtnText();
    }

    function doDeleteProject() {
      if (!currentProjectName) return;
      if (!confirm(`Delete project "${currentProjectName}"?`)) return;
      deleteProjectFromStorage(currentProjectName);
      currentProjectName = null;
      updateProjectBtnText();
    }

    function doCloseProject() {
      currentProjectName = null;
      // Clear source
      if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
      state.source = null;
      state.sourceElement = null;
      state.sourceVersion = 0;
      sourceCanvas.width = 0;
      sourceCanvas.height = 0;
      hideVideoControls();
      // Reset to a single default layer
      layerCounter = 1;
      state.layers = [createLayer()];
      state.activeLayerId = state.layers[0].id;
      invalidateMaskCaches();
      invalidatePostProcessCache();
      renderLayerPanel();
      syncUIToLayer(activeLayer());
      updateProjectBtnText();
      const es = document.getElementById('emptyState');
      es.classList.remove('hidden');
      es.children[0].textContent = 'NO SOURCE';
      es.children[1].textContent = 'DROP FILE OR SELECT INPUT';
      outputCtx.fillStyle = '#0a0a0a';
      outputCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
    }

    function doLoadProject(name) {
      const projects = getProjects();
      const entry = projects[name];
      if (!entry) return;
      currentProjectName = name;
      deserializeProject(entry.data);
      updateProjectBtnText();
    }

    function renderProjectList() {
      const list = document.getElementById('projectList');
      const divider = document.getElementById('projectListDivider');
      const projects = listProjects();
      list.innerHTML = '';
      if (projects.length === 0) {
        divider.classList.add('hidden');
        return;
      }
      divider.classList.remove('hidden');
      for (const p of projects) {
        const btn = document.createElement('button');
        btn.className = `ui-menu-item ui-menu-item-compact${p.name === currentProjectName ? ' active' : ''}`;
        btn.textContent = p.name;
        btn.addEventListener('click', () => {
          doLoadProject(p.name);
          hideFloatingPanel(document.getElementById('projectMenu'));
        });
        list.appendChild(btn);
      }
    }

    function activeLayer() {
      return state.layers.find(l => l.id === state.activeLayerId) || state.layers[0];
    }

    function getSourceLayer() {
      return state.layers.find(layer => layer.kind === 'source') || null;
    }

    function asciiLayerCount() {
      return state.layers.filter(layer => layer.kind !== 'source').length;
    }

    function ensureSourceLayer(name = 'Source') {
      let sourceLayer = getSourceLayer();
      if (!sourceLayer) {
        sourceLayer = createSourceLayer({ name });
        state.layers.unshift(sourceLayer);
      } else {
        sourceLayer.name = name;
        sourceLayer.visible = true;
      }
      return sourceLayer;
    }

    const selectionState = {
      active: false,
      drawing: false,
      rawPoints: [],
      previewPoints: [],
      pointerId: null,
      videoWasPlaying: false,
      compositionMode: 'new',
      showGuides: true
    };
    const maskPathCache = new Map();
    const maskAlphaCache = new Map();
    const postProcessCache = new Map();
    const scratchCanvasPool = new Map();
    const layerDragState = {
      draggedId: null,
      targetId: null,
      placement: null
    };

    // ============ DOM REFS ============
    const sourceCanvas = document.getElementById('sourceCanvas');
    const sourceCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const outputCanvas = document.getElementById('outputCanvas');
    let outputCtx = outputCanvas.getContext('2d');
    const canvasArea = document.getElementById('canvasArea');
    const drawer = document.getElementById('settingsDrawer');
    const settingsBtn = document.getElementById('settingsBtn');

    let animFrameId = null;
    window.addEventListener('resize', refreshFloatingPanels);
    document.addEventListener('scroll', (e) => {
      const target = e.target;
      for (const panel of activeFloatingPanels.keys()) {
        if (!panel || panel.classList.contains('hidden')) continue;
        if (target === panel || (target instanceof Node && panel.contains(target))) {
          return;
        }
      }
      refreshFloatingPanels();
    }, true);

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    const activeFloatingPanels = new Map();

    function positionFloatingPanel(panel, anchor, options = {}) {
      if (!panel || !anchor) return;
      const margin = options.margin ?? 8;
      const gap = options.gap ?? 4;
      const anchorRect = anchor.getBoundingClientRect();
      const viewportMaxWidth = Math.max(160, window.innerWidth - margin * 2);

      panel.style.position = 'fixed';
      panel.style.left = '0px';
      panel.style.top = '0px';
      panel.style.right = 'auto';
      panel.style.bottom = 'auto';
      if (options.matchWidth) {
        const targetWidth = Math.min(Math.round(anchorRect.width), viewportMaxWidth);
        panel.style.width = `${targetWidth}px`;
        panel.style.minWidth = `${targetWidth}px`;
      } else {
        panel.style.width = '';
        panel.style.minWidth = '';
      }

      panel.style.maxWidth = `${viewportMaxWidth}px`;
      panel.style.maxHeight = `${Math.max(120, window.innerHeight - margin * 2)}px`;

      const panelRect = panel.getBoundingClientRect();
      const availBelow = window.innerHeight - anchorRect.bottom - margin - gap;
      const availAbove = anchorRect.top - margin - gap;
      const preferTop = options.placement === 'top';
      const placeAbove = preferTop
        ? (panelRect.height > availAbove && availBelow > availAbove)
        : (panelRect.height > availBelow && availAbove > availBelow);
      const availableHeight = Math.max(80, placeAbove ? availAbove : availBelow);
      panel.style.maxHeight = `${Math.min(options.maxHeight ?? availableHeight, availableHeight)}px`;

      const finalRect = panel.getBoundingClientRect();
      let left;
      if (options.align === 'right') left = anchorRect.right - finalRect.width;
      else if (options.align === 'center') left = anchorRect.left + (anchorRect.width - finalRect.width) * 0.5;
      else left = anchorRect.left;

      let top = placeAbove
        ? anchorRect.top - finalRect.height - gap
        : anchorRect.bottom + gap;

      left = clamp(left, margin, Math.max(margin, window.innerWidth - finalRect.width - margin));
      top = clamp(top, margin, Math.max(margin, window.innerHeight - finalRect.height - margin));

      panel.style.left = `${Math.round(left)}px`;
      panel.style.top = `${Math.round(top)}px`;
    }

    function showFloatingPanel(panel, anchor, options = {}) {
      if (!panel || !anchor) return;
      closeFloatingPanelsExcept(panel);
      panel.classList.remove('hidden');
      anchor.classList.add(options.anchorOpenClass || 'panel-trigger-open');
      activeFloatingPanels.set(panel, { anchor, options });
      positionFloatingPanel(panel, anchor, options);
    }

    function hideFloatingPanel(panel) {
      if (!panel) return;
      const config = activeFloatingPanels.get(panel);
      if (config?.anchor) {
        config.anchor.classList.remove(config.options?.anchorOpenClass || 'panel-trigger-open');
      }
      panel.classList.remove('keyboard-nav');
      panel.querySelectorAll('.menu-nav-active').forEach(item => item.classList.remove('menu-nav-active'));
      panel.classList.add('hidden');
      activeFloatingPanels.delete(panel);
    }

    function toggleFloatingPanel(panel, anchor, options = {}) {
      if (!panel || !anchor) return false;
      if (panel.classList.contains('hidden')) {
        showFloatingPanel(panel, anchor, options);
        return true;
      }
      hideFloatingPanel(panel);
      return false;
    }

    function refreshFloatingPanels() {
      for (const [panel, config] of activeFloatingPanels.entries()) {
        if (panel.classList.contains('hidden') || !document.body.contains(panel)) {
          activeFloatingPanels.delete(panel);
          continue;
        }
        positionFloatingPanel(panel, config.anchor, config.options);
      }
    }

    let activeOptionMenu = null;

    function closeFloatingPanelsExcept(exceptPanel = null) {
      if (activeOptionMenu && activeOptionMenu.panel !== exceptPanel) {
        closeOptionMenu();
      }
      for (const panel of Array.from(activeFloatingPanels.keys())) {
        if (!panel || panel === exceptPanel) continue;
        hideFloatingPanel(panel);
        if (panel.id === 'addEffectDropdown' && panel.parentNode) {
          panel.parentNode.removeChild(panel);
        }
      }
    }

    function setSelectButtonLabel(button, label) {
      if (!button) return;
      const valueEl = button.querySelector('.ui-select-value');
      if (valueEl) valueEl.textContent = label;
      else button.textContent = label;
    }

    function closeOptionMenu() {
      if (!activeOptionMenu) return;
      const { panel, anchor, cleanup } = activeOptionMenu;
      if (anchor) anchor.classList.remove('ui-select-open');
      if (panel) {
        hideFloatingPanel(panel);
        if (panel.parentNode) panel.parentNode.removeChild(panel);
      }
      if (cleanup) cleanup();
      activeOptionMenu = null;
    }

    function openOptionMenu(anchor, config) {
      if (!anchor || !config?.options?.length) return false;
      if (activeOptionMenu?.anchor === anchor) {
        closeOptionMenu();
        return false;
      }
      closeOptionMenu();

      const panel = document.createElement('div');
      panel.className = 'ui-menu-panel';
      panel.addEventListener('pointerdown', (e) => e.stopPropagation());
      panel.addEventListener('click', (e) => e.stopPropagation());

      config.options.forEach(option => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = `ui-menu-item${config.compact ? ' ui-menu-item-compact' : ''}${option.value === config.value ? ' active' : ''}`;
        item.textContent = option.label;
        item.addEventListener('click', () => {
          config.onSelect?.(option.value, option);
          closeOptionMenu();
        });
        panel.appendChild(item);
      });

      document.body.appendChild(panel);
      anchor.classList.add('ui-select-open');
      showFloatingPanel(panel, anchor, {
        align: config.align ?? 'left',
        placement: config.placement ?? 'bottom',
        gap: config.gap ?? 6,
        matchWidth: config.matchWidth ?? true,
        maxHeight: config.maxHeight ?? 320,
        anchorOpenClass: 'ui-select-open'
      });
      setupMenuNavigation(panel, {
        itemSelector: '.ui-menu-item',
        onEscape: () => closeOptionMenu()
      });
      requestAnimationFrame(() => focusMenuNavigationDefault(panel));

      const onDocClick = (e) => {
        if (!eventIsInsidePanel(panel, anchor, e)) {
          closeOptionMenu();
        }
      };
      const onKeyDown = (e) => {
        if (e.key === 'Escape' && activeOptionMenu?.panel === panel) {
          e.preventDefault();
          closeOptionMenu();
        }
      };
      setTimeout(() => document.addEventListener('click', onDocClick), 0);
      document.addEventListener('keydown', onKeyDown);
      activeOptionMenu = {
        panel,
        anchor,
        cleanup: () => {
          document.removeEventListener('click', onDocClick);
          document.removeEventListener('keydown', onKeyDown);
        }
      };
      return true;
    }

    function labelForOption(options, value) {
      return (options.find(option => option.value === value) || options[0] || { label: '' }).label;
    }

    function bindStaticPicker(button, input, options, onChange, config = {}) {
      if (!button || !input) return;
      setSelectButtonLabel(button, labelForOption(options, input.value));
      button.addEventListener('click', (e) => {
        e.stopPropagation();
        openOptionMenu(button, {
          options,
          value: input.value,
          align: config.align ?? 'left',
          placement: config.placement ?? 'bottom',
          gap: config.gap ?? 6,
          matchWidth: config.matchWidth ?? true,
          maxHeight: config.maxHeight ?? 320,
          compact: config.compact ?? false,
          onSelect: (value, option) => {
            input.value = value;
            setSelectButtonLabel(button, option.label);
            onChange?.(value, option);
          }
        });
      });
    }

    function getTopFloatingPanelForEscape(target) {
      const panels = Array.from(activeFloatingPanels.keys()).filter(panel => panel && !panel.classList.contains('hidden'));
      if (!panels.length) return null;
      const focused = document.activeElement;
      for (let i = panels.length - 1; i >= 0; i--) {
        const panel = panels[i];
        if (panel === target || panel.contains(target) || panel.contains(focused)) {
          return panel;
        }
      }
      return panels[panels.length - 1];
    }

    function pointWithinPanelBounds(panel, clientX, clientY) {
      if (!panel || !Number.isFinite(clientX) || !Number.isFinite(clientY)) return false;
      const rect = panel.getBoundingClientRect();
      return clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom;
    }

    function eventIsInsidePanel(panel, anchor, event) {
      if (!panel || !event) return false;
      const target = event.target;
      if (target && (panel.contains(target) || target === anchor || anchor?.contains?.(target))) {
        return true;
      }
      return pointWithinPanelBounds(panel, event.clientX, event.clientY);
    }

    function getTopFloatingPanelForPointer(clientX, clientY, target = null) {
      const panels = Array.from(activeFloatingPanels.keys()).filter(panel => panel && !panel.classList.contains('hidden'));
      for (let i = panels.length - 1; i >= 0; i--) {
        const panel = panels[i];
        if ((target && panel.contains(target)) || pointWithinPanelBounds(panel, clientX, clientY)) {
          return panel;
        }
      }
      return null;
    }

    document.addEventListener('wheel', (e) => {
      const panel = getTopFloatingPanelForPointer(e.clientX, e.clientY, e.target);
      if (!panel || panel.scrollHeight <= panel.clientHeight) return;
      const delta = e.deltaMode === 1
        ? e.deltaY * 16
        : e.deltaMode === 2
          ? e.deltaY * panel.clientHeight
          : e.deltaY;
      if (!delta) return;
      e.preventDefault();
      e.stopPropagation();
      panel.scrollTop += delta;
    }, { passive: false, capture: true });

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (activeOptionMenu) {
        e.preventDefault();
        const anchor = activeOptionMenu.anchor;
        closeOptionMenu();
        anchor?.focus?.({ preventScroll: true });
        return;
      }
      const panel = getTopFloatingPanelForEscape(e.target);
      if (!panel) return;
      e.preventDefault();
      const config = activeFloatingPanels.get(panel);
      hideFloatingPanel(panel);
      if (panel.id === 'addEffectDropdown' && panel.parentNode) {
        panel.parentNode.removeChild(panel);
      }
      config?.anchor?.focus?.({ preventScroll: true });
    });

    const menuNavigationConfigs = new WeakMap();
    const menuPointerPositions = new WeakMap();

    function getMenuNavigationItems(panel) {
      const config = menuNavigationConfigs.get(panel) || {};
      const selector = config.itemSelector || 'button';
      return Array.from(panel.querySelectorAll(selector)).filter(item => {
        if (!item || item.disabled) return false;
        const style = window.getComputedStyle(item);
        return style.display !== 'none' && style.visibility !== 'hidden';
      });
    }

    function focusMenuNavigationItem(panel, item) {
      if (!panel || !item) return;
      const items = getMenuNavigationItems(panel);
      items.forEach(entry => {
        entry.tabIndex = entry === item ? 0 : -1;
        entry.classList.toggle('menu-nav-active', entry === item);
      });
      panel.classList.add('keyboard-nav');
      item.focus({ preventScroll: true });
      item.scrollIntoView({ block: 'nearest' });
    }

    function focusMenuNavigationByIndex(panel, index) {
      const items = getMenuNavigationItems(panel);
      if (!items.length) return;
      const clamped = clamp(index, 0, items.length - 1);
      focusMenuNavigationItem(panel, items[clamped]);
    }

    function focusMenuNavigationDefault(panel, preferredSelector = '.active') {
      const items = getMenuNavigationItems(panel);
      if (!items.length) {
        panel.focus({ preventScroll: true });
        return;
      }
      const preferred = preferredSelector ? panel.querySelector(preferredSelector) : null;
      focusMenuNavigationItem(panel, items.includes(preferred) ? preferred : items[0]);
    }

    function syncMenuNavigationFromPointer(panel, clientX, clientY) {
      if (!panel || !Number.isFinite(clientX) || !Number.isFinite(clientY)) return;
      if (!pointWithinPanelBounds(panel, clientX, clientY)) return;
      const hovered = document.elementFromPoint(clientX, clientY);
      const item = hovered instanceof HTMLElement ? hovered.closest('button') : null;
      if (!item || !panel.contains(item)) return;
      const items = getMenuNavigationItems(panel);
      if (!items.includes(item) || item.classList.contains('menu-nav-active')) return;
      focusMenuNavigationItem(panel, item);
    }

    function setupMenuNavigation(panel, config = {}) {
      if (!panel) return;
      const existing = menuNavigationConfigs.get(panel) || {};
      menuNavigationConfigs.set(panel, { ...existing, ...config });
      if (panel.dataset.menuNavReady === '1') return;
      panel.dataset.menuNavReady = '1';
      panel.tabIndex = -1;
      panel.addEventListener('pointerdown', (e) => e.stopPropagation());
      panel.addEventListener('wheel', (e) => {
        if (panel.scrollHeight <= panel.clientHeight) return;
        const delta = e.deltaMode === 1
          ? e.deltaY * 16
          : e.deltaMode === 2
            ? e.deltaY * panel.clientHeight
            : e.deltaY;
        if (!delta) return;
        e.preventDefault();
        e.stopPropagation();
        panel.scrollTop += delta;
        requestAnimationFrame(() => syncMenuNavigationFromPointer(panel, e.clientX, e.clientY));
      }, { passive: false, capture: true });
      panel.addEventListener('focusin', (e) => {
        const item = e.target instanceof HTMLElement ? e.target.closest('button') : null;
        if (!item || !panel.contains(item)) return;
        const items = getMenuNavigationItems(panel);

        ectx.drawImage(srcCanvas, left, top, width, 1, left, 0, width, top);
      }
      if (bottom < geometry.outH) {
        ectx.drawImage(srcCanvas, left, bottom - 1, width, 1, left, bottom, width, geometry.outH - bottom);
      }
      if (left > 0) {
        ectx.drawImage(srcCanvas, left, top, 1, height, 0, top, left, height);
      }
      if (right < geometry.outW) {
        ectx.drawImage(srcCanvas, right - 1, top, 1, height, right, top, geometry.outW - right, height);
      }
      if (left > 0 && top > 0) {
        ectx.drawImage(srcCanvas, left, top, 1, 1, 0, 0, left, top);
      }
      if (right < geometry.outW && top > 0) {
        ectx.drawImage(srcCanvas, right - 1, top, 1, 1, right, 0, geometry.outW - right, top);
      }
      if (left > 0 && bottom < geometry.outH) {
        ectx.drawImage(srcCanvas, left, bottom - 1, 1, 1, 0, bottom, left, geometry.outH - bottom);
      }
      if (right < geometry.outW && bottom < geometry.outH) {
        ectx.drawImage(srcCanvas, right - 1, bottom - 1, 1, 1, right, bottom, geometry.outW - right, geometry.outH - bottom);
      }

      return extended;
    }

    function applyGaussianBlur(ctx, w, h, fx, effectScale = 1, geometry = null) {
      const r = fx.params.amount * effectScale;
      if (r <= 0.5) return;
      const pad = Math.ceil(r * 3);
      const effectInput = extendCanvasToImageBounds(ctx.canvas, geometry, fx.id);
      const { canvas: padded, pw, ph } = padCanvasForBlur(effectInput, w, h, pad, fx.id);
      const blurred = getScratchCanvas('fx-gauss-' + fx.id, pw, ph);
      const bctx = blurred.getContext('2d');
      bctx.filter = `blur(${r}px)`;
      bctx.drawImage(padded, 0, 0);
      bctx.filter = 'none';
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(blurred, pad, pad, w, h, 0, 0, w, h);
    }

    function applyMotionBlur(ctx, w, h, fx, effectScale = 1, geometry = null) {
      const dist = fx.params.amount * effectScale;
      if (dist <= 0) return;
      const angle = (fx.params.angle || 0) * Math.PI / 180;
      const dx = Math.cos(angle);
      const dy = Math.sin(angle);
      const steps = Math.min(24, Math.max(8, Math.round(dist)));
      const pad = Math.ceil(dist + 2);
      const effectInput = extendCanvasToImageBounds(ctx.canvas, geometry, fx.id + '-m-src');
      const { canvas: padded, pw, ph } = padCanvasForBlur(effectInput, w, h, pad, fx.id + '-m');
      const result = getScratchCanvas('fx-motion-' + fx.id, pw, ph);
      const rctx = result.getContext('2d');
      const total = 2 * steps + 1;
      for (let i = -steps; i <= steps; i++) {
        rctx.globalAlpha = 1 / total;
        rctx.drawImage(padded, dx * i * dist / steps, dy * i * dist / steps);
      }
      rctx.globalAlpha = 1;
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(result, pad, pad, w, h, 0, 0, w, h);
    }

    function applyRadialBlur(ctx, w, h, fx, effectScale = 1, geometry = null) {
      const amount = fx.params.amount * effectScale;
      if (amount <= 0) return;
      const steps = Math.min(20, Math.max(8, Math.round(amount)));
      const pad = Math.ceil(amount * 1.5 + 2);
      const effectInput = extendCanvasToImageBounds(ctx.canvas, geometry, fx.id + '-r-src');
      const { canvas: padded, pw, ph } = padCanvasForBlur(effectInput, w, h, pad, fx.id + '-r');
      const result = getScratchCanvas('fx-radial-' + fx.id, pw, ph);
      const rctx = result.getContext('2d');
      const pcx = (fx.params.centerX ?? 50) / 100 * w + pad;
      const pcy = (fx.params.centerY ?? 50) / 100 * h + pad;
      const total = 2 * steps + 1;
      for (let i = -steps; i <= steps; i++) {
        const s = 1 + (i / steps) * (amount / 100);
        rctx.save();
        rctx.globalAlpha = 1 / total;
        rctx.translate(pcx, pcy);
        rctx.scale(s, s);
        rctx.translate(-pcx, -pcy);
        rctx.drawImage(padded, 0, 0);
        rctx.restore();
      }
      rctx.globalAlpha = 1;
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(result, pad, pad, w, h, 0, 0, w, h);
    }

    function applyChromaticAberration(ctx, w, h, fx, effectScale = 1, geometry = null) {
      const offset = fx.params.amount * effectScale;
      if (offset <= 0) return;
      const angle = (fx.params.angle || 0) * Math.PI / 180;
      const dx = Math.cos(angle) * offset;
      const dy = Math.sin(angle) * offset;
      const effectInput = extendCanvasToImageBounds(ctx.canvas, geometry, fx.id + '-c-src');
      const srcX = effectInput.getContext('2d', { willReadFrequently: true });
      const src = srcX.getImageData(0, 0, w, h);
      const dst = ctx.createImageData(w, h);
      const sd = src.data;
      const dd = dst.data;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const idx = (y * w + x) * 4;
          // Red channel: offset in +direction
          const rx = Math.round(x + dx);
          const ry = Math.round(y + dy);
          if (rx >= 0 && rx < w && ry >= 0 && ry < h) {
            dd[idx] = sd[(ry * w + rx) * 4];
          }
          // Green channel: no offset
          dd[idx + 1] = sd[idx + 1];
          // Blue channel: offset in -direction
          const bx = Math.round(x - dx);
          const by = Math.round(y - dy);
          if (bx >= 0 && bx < w && by >= 0 && by < h) {
            dd[idx + 2] = sd[(by * w + bx) * 4 + 2];
          }
          // Alpha: max of all sampled positions
          dd[idx + 3] = sd[idx + 3];
        }
      }
      ctx.putImageData(dst, 0, 0);
    }

    function applyPixelate(ctx, w, h, fx, effectScale = 1, geometry = null) {
      const blockSize = Math.max(2, Math.round(fx.params.amount * effectScale));
      if (blockSize < 2) return;
      const sw = Math.max(1, Math.ceil(w / blockSize));
      const sh = Math.max(1, Math.ceil(h / blockSize));
      const small = getScratchCanvas('fx-pix-' + fx.id, sw, sh);
      const sctx = small.getContext('2d');
      sctx.imageSmoothingEnabled = true;
      const effectInput = extendCanvasToImageBounds(ctx.canvas, geometry, fx.id + '-p-src');
      sctx.drawImage(effectInput, 0, 0, sw, sh);
      ctx.clearRect(0, 0, w, h);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(small, 0, 0, w, h);
      ctx.imageSmoothingEnabled = true;
    }

    function applyBoxBlur(ctx, w, h, fx, effectScale = 1, geometry = null) {
      const radius = Math.max(1, Math.round(fx.params.amount * effectScale));
      if (radius < 1) return;
      const effectInput = extendCanvasToImageBounds(ctx.canvas, geometry, fx.id + '-b-src');
      const imageData = effectInput.getContext('2d', { willReadFrequently: true }).getImageData(0, 0, w, h);
      const src = imageData.data;
      const dst = new Uint8ClampedArray(src.length);
      // Horizontal pass — clamp edges, preserve alpha
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          let r = 0, g = 0, b = 0, count = 0;
          for (let k = -radius; k <= radius; k++) {
            const sx = Math.min(w - 1, Math.max(0, x + k));
            const si = (y * w + sx) * 4;
            r += src[si]; g += src[si+1]; b += src[si+2]; count++;
          }
          const di = (y * w + x) * 4;
          dst[di] = r / count; dst[di+1] = g / count; dst[di+2] = b / count; dst[di+3] = src[di+3];
        }
      }
      // Vertical pass — clamp edges, preserve alpha
      const result = new Uint8ClampedArray(src.length);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          let r = 0, g = 0, b = 0, count = 0;
          for (let k = -radius; k <= radius; k++) {
            const sy = Math.min(h - 1, Math.max(0, y + k));
            const si = (sy * w + x) * 4;
            r += dst[si]; g += dst[si+1]; b += dst[si+2]; count++;
          }
          const di = (y * w + x) * 4;
          result[di] = r / count; result[di+1] = g / count; result[di+2] = b / count; result[di+3] = src[di+3];
        }
      }
      imageData.data.set(result);
      ctx.putImageData(imageData, 0, 0);
    }

    function applyBlurEffect(ctx, fx, context) {
      const { outW, outH, effectScale, geometry } = context;
      switch (fx.subtype) {
        case 'gaussian': applyGaussianBlur(ctx, outW, outH, fx, effectScale, geometry); break;
        case 'motion': applyMotionBlur(ctx, outW, outH, fx, effectScale, geometry); break;
        case 'radial': applyRadialBlur(ctx, outW, outH, fx, effectScale, geometry); break;
        case 'chromatic': applyChromaticAberration(ctx, outW, outH, fx, effectScale, geometry); break;
        case 'pixelate': applyPixelate(ctx, outW, outH, fx, effectScale, geometry); break;
        case 'box': applyBoxBlur(ctx, outW, outH, fx, effectScale, geometry); break;
      }
    }

    function applyBloomEffect(ctx, fx, context) {
      const { asciiCanvas, outW, outH, effectScale } = context;
      // Create a temporary layer-like object for the existing applyBloomPost
      const pseudoLayer = {
        bloom: true,
        bloomStyle: fx.params.style || 'soft',
        bloomRadius: (fx.params.radius ?? 8) * effectScale,
        bloomIntensity: fx.params.intensity ?? 0.6
      };
      applyBloomPost(ctx, asciiCanvas, outW, outH, pseudoLayer);
    }

    function applyGrainEffect(ctx, fx, context) {
      const { outW, outH, effectScale } = context;
      const pseudoLayer = {
        grain: true,
        grainAmount: fx.params.amount ?? 25,
        grainSize: fx.params.size ?? 25,
        grainRoughness: fx.params.roughness ?? 50
      };
      applyGrain(ctx, outW, outH, pseudoLayer, effectScale);
    }

    function applyInkBleedEffect(ctx, fx, context) {
      const { layer, geometry, forExport, outW, outH } = context;
      const pp = fx.params;
      if (!pp || (pp.spread ?? 0) <= 0) return;

      const origC = getScratchCanvas(`pp-orig-${fx.id}`, outW, outH);
      origC.getContext('2d').drawImage(ctx.canvas, 0, 0);

      // Build cache key for this specific effect instance
      const frameKey = state.source === 'video'
        ? `${state.sourceVersion}:${state.sourceElement?.currentTime?.toFixed(3) || '0'}`
        : `${state.sourceVersion}`;
      const cacheKey = [
        geometry.key, forExport ? 'export' : 'preview', frameKey,
        layer.variant, layer.cellSize, layer.gap, layer.font,
        layer.invert ? 1 : 0, layer.colorMode ? 1 : 0, layer.charRotation ? 1 : 0,
        layer.brightness, layer.contrast, layer.saturation,
        pp.spread, pp.organic, pp.splatter, pp.roundness, pp.softness, fx.id
      ].join('|');

      let mask = null;
      const canCache = state.source !== 'video' || (state.sourceElement && state.sourceElement.paused);
      const entry = postProcessCache.get(fx.id);
      if (canCache && entry && entry.key === cacheKey) {
        mask = entry.canvas;
      } else {
        // Create a pseudo-layer with postProcess for buildInkBleedMask
        const pseudoLayer = {
          ...layer,
          id: fx.id,
          postProcess: { enabled: true, spread: pp.spread ?? 50, organic: pp.organic ?? 30, splatter: pp.splatter ?? 0, roundness: pp.roundness ?? 60, softness: pp.softness ?? 0 }
        };
        mask = buildInkBleedMask(origC, pseudoLayer, geometry, forExport);
        if (canCache) postProcessCache.set(fx.id, { key: cacheKey, canvas: mask });
      }
      if (!mask) return;

      const nSpread = (pp.spread ?? 50) / 100;
      const nSplatter = (pp.splatter ?? 0) / 100;
      const nSoft = (pp.softness ?? 0) / 100;
      const spreadCurve = Math.pow(nSpread, 1.15);
      const splatterCurve = Math.pow(nSplatter, 2.5);

      const { scale } = geometry;
      const cellScreen = Math.max(1, layer.cellSize * scale);
      const splatterReach = splatterCurve * cellScreen * 2.5;
      const colorBlurR = Math.max(cellScreen * 0.6, spreadCurve * cellScreen * 1.2 + spreadCurve * 4, splatterReach);

      const fillC = getScratchCanvas(`pp-fill-${fx.id}`, outW, outH);
      const fillX = fillC.getContext('2d');
      fillX.clearRect(0, 0, outW, outH);
      if (colorBlurR > 0.5) fillX.filter = `blur(${colorBlurR}px)`;
      fillX.drawImage(origC, 0, 0);
      fillX.filter = 'none';
      fillX.drawImage(origC, 0, 0);

      fillX.globalCompositeOperation = 'destination-in';
      fillX.drawImage(mask, 0, 0);
      fillX.globalCompositeOperation = 'source-over';

      const maskData = mask.getContext('2d', { willReadFrequently: true })
        .getImageData(0, 0, outW, outH).data;
      const fillImg = fillX.getImageData(0, 0, outW, outH);
      const fd = fillImg.data;

      if (nSoft < 0.01) {
        for (let i = 0; i < outW * outH; i++) {
          if (maskData[i * 4 + 3] > 20) fd[i * 4 + 3] = 255;
        }
      } else {
        for (let i = 0; i < outW * outH; i++) {
          const ma = maskData[i * 4 + 3];
          if (ma > fd[i * 4 + 3]) fd[i * 4 + 3] = ma;
        }
      }

      fillX.putImageData(fillImg, 0, 0);
      ctx.clearRect(0, 0, outW, outH);
      ctx.drawImage(fillC, 0, 0);
    }

    const EFFECT_APPLY = {
      bloom: applyBloomEffect,
      grain: applyGrainEffect,
      inkBleed: applyInkBleedEffect,
      chromatic: (ctx, fx, context) => applyChromaticAberration(ctx, context.outW, context.outH, fx),
      pixelate: (ctx, fx, context) => applyPixelate(ctx, context.outW, context.outH, fx),
      blur: applyBlurEffect
    };

    function applyEffect(ctx, fx, context) {
      const fn = EFFECT_APPLY[fx.type];
      if (fn) fn(ctx, fx, context);
    }

    function buildPostProcessKey(layer, geometry, forExport) {
      const mask = getMask(layer);
      const chain = getEffectChain(layer);
      const frameKey = state.source === 'video'
        ? `${state.sourceVersion}:${state.sourceElement?.currentTime?.toFixed(3) || '0'}`
        : `${state.sourceVersion}`;
      const chainKey = chain.map(fx =>
        `${fx.type}:${fx.subtype || ''}:${fx.enabled ? 1 : 0}:${JSON.stringify(fx.params)}`
      ).join('|');
      return [
        geometry.key,
        forExport ? 'export' : 'preview',
        frameKey,
        layer.variant,
        layer.cellSize,
        layer.gap,
        layer.font,
        layer.invert ? 1 : 0,
        layer.colorMode ? 1 : 0,
        layer.charRotation ? 1 : 0,
        layer.brightness,
        layer.contrast,
        layer.saturation,
        layer.contourSpread,
        layer.contourSens,
        layer.outlineStrokeSize,
        layer.outlineCornerRadius,
        layer.outlineFill ? 1 : 0,
        layer.wordArtifactEnabled ? 1 : 0,
        layer.wordArtifact,
        layer.wordArtifactDistribution,
        layer.wordArtifactDensity,
        layer.wordArtifactCoherence,
        chainKey,
        mask ? `${mask.inverted ? 1 : 0}:${mask.feather}:${mask.regions.map(r => r.op + r.points.length).join(',')}` : 'nomask'
      ].join('|');
    }

    function computePostProcessWorkScale(outW, outH, forExport) {
      if (forExport) return 1;
      const targetPixels = state.source === 'video' ? 180000 : 360000;
      const raw = Math.sqrt(targetPixels / Math.max(1, outW * outH));
      return clamp(raw, 0.35, 1);
    }

    function buildInkBleedMask(sourceCanvas, layer, geometry, forExport) {
      const post = getPostProcess(layer);
      if (post.spread <= 0) return null;
      const { outW, outH, scale, offsetX, offsetY } = geometry;
      const workScale = computePostProcessWorkScale(outW, outH, forExport);
      const workW = Math.max(1, Math.round(outW * workScale));
      const workH = Math.max(1, Math.round(outH * workScale));
      const seed = hashString(layer.id);
      const cellPx = Math.max(1, layer.cellSize * scale * workScale);

      // Normalize controls to 0..1
      const nSpread = post.spread / 100;
      const nOrganic = post.organic / 100;
      const nSplatter = post.splatter / 100;
      const nRound = post.roundness / 100;
      const nSoft = post.softness / 100;

      /* ── 1. Source at work resolution ── */
      const srcC = getScratchCanvas(`pp-src-${layer.id}`, workW, workH);
      const srcX = srcC.getContext('2d', { willReadFrequently: true });
      srcX.clearRect(0, 0, workW, workH);
      srcX.drawImage(sourceCanvas, 0, 0, workW, workH);

      /* ── 2. Gaussian blur → SDF approximation ── */
      // Gentler curve: visible effect starts around spread=10,
      // ramps steadily, heavy merging at high values.
      const spreadCurve = Math.pow(nSpread, 1.15);
      const blurR = spreadCurve * cellPx * 1.5 + spreadCurve * 3;
      const sdfC = getScratchCanvas(`pp-sdf-${layer.id}`, workW, workH);
      blurCanvas(srcC, sdfC, blurR);

      /* ── 2b. Splatter: proximity field for scatter zone ── */
      // A moderate blur defines how far from content splatters can appear.
      // Cubic curve so low values are subtle, high values reach further.
      let splatterField = null;
      if (nSplatter > 0.01) {
        const splatterCurve = Math.pow(nSplatter, 2.5);
        const splatterReach = cellPx * (0.4 + splatterCurve * 2.5);
        const splC = getScratchCanvas(`pp-splat-field-${layer.id}`, workW, workH);
        blurCanvas(srcC, splC, splatterReach);
        const splX = splC.getContext('2d', { willReadFrequently: true });
        splatterField = splX.getImageData(0, 0, workW, workH).data;
      }

      /* ── 3. Noise-modulated threshold + splatter → organic blob shape ── */
      const sdfX = sdfC.getContext('2d', { willReadFrequently: true });
      const sdfImg = sdfX.getImageData(0, 0, workW, workH);
      const px = sdfImg.data;

      // Lower starting threshold so small spread values still produce
      // visible expansion. Range: 0.38 (spread=0) → 0.02 (spread=100)
      const baseThresh = 0.38 - spreadCurve * 0.36;
      const organicPow = Math.pow(nOrganic, 0.7);
      const noiseFreqA = 14 + (1 - nOrganic / 100) * 30;
      const noiseFreqB = noiseFreqA * 0.3;

      // Splatter noise uses a separate frequency for distinct small blobs
      const splatterFreq = 3 + (1 - nSplatter) * 5;
      // Cubic curve on threshold: at low values almost nothing passes,
      // gradually opens up. Range: 0.92 (splatter=0) → 0.52 (splatter=100)
      const splatterCurve = Math.pow(nSplatter, 2.5);
      const splatterThresh = 0.92 - splatterCurve * 0.40;
      // Require meaningful proximity — must be close-ish to content
      const splatterMinAlpha = 0.06;

      for (let y = 0; y < workH; y++) {
        for (let x = 0; x < workW; x++) {
          const i = (y * workW + x) * 4;
          const alpha = px[i + 3] / 255;

          const sx = ((x / workScale) - offsetX) / Math.max(1e-4, scale);
          const sy = ((y / workScale) - offsetY) / Math.max(1e-4, scale);

          const n1 = fbmNoise2D(sx / noiseFreqA, sy / noiseFreqA, seed);
          const n2 = fbmNoise2D(sx / noiseFreqB, sy / noiseFreqB, seed + 777);
          const noise = (n1 * 0.6 + n2 * 0.4) * 2 - 1;

          const thresh = baseThresh + noise * organicPow * 0.35;
          let keep = alpha > thresh;

          // Splatter: in the outer zone beyond normal expansion,
          // noise peaks create small isolated ink blobs
          if (!keep && splatterField) {
            const proximity = splatterField[i + 3] / 255;
            if (proximity > splatterMinAlpha) {
              const sn = fbmNoise2D(sx / splatterFreq, sy / splatterFreq, seed + 4919);
              // Proximity gates: closer to content = slightly easier to splatter
              const proxBoost = proximity * 0.12;
              keep = sn > (splatterThresh - proxBoost);
            }
          }

          px[i + 3] = keep ? 255 : 0;
        }
      }
      sdfX.putImageData(sdfImg, 0, 0);

      /* ── 4. Roundness: blur+threshold passes smooth the blob edges ── */
      // Each pass smooths jagged noise edges into rounder, more liquid shapes.
      const passes = Math.max(0, Math.round(nRound * 5));
      const smoothR = 0.6 + nRound * 2.0 + spreadCurve * 1.2;
      const tmpC = getScratchCanvas(`pp-round-${layer.id}`, workW, workH);

      for (let p = 0; p < passes; p++) {
        blurCanvas(sdfC, tmpC, smoothR);
        // Hard threshold at 0.5 to re-binarize
        const tX = tmpC.getContext('2d', { willReadFrequently: true });
        const tImg = tX.getImageData(0, 0, workW, workH);
        const td = tImg.data;
        for (let i = 3; i < td.length; i += 4) td[i] = td[i] > 128 ? 255 : 0;
        tX.putImageData(tImg, 0, 0);
        copyCanvas(tmpC, sdfC);
      }

      /* ── 5. Ensure original content always included ── */
      const sdfCtx = sdfC.getContext('2d');
      sdfCtx.globalCompositeOperation = 'lighter';
      sdfCtx.drawImage(srcC, 0, 0);
      sdfCtx.globalCompositeOperation = 'source-over';

      /* ── 6. Softness: optional gradient edges ── */
      // At softness=0 edges are crisp binary (print/stamp look).
      // At softness=100 edges fade out smoothly (spray-paint look).
      // Exponential curve: most of the 0-100 range is subtle feathering,
      // only the top end gives heavy spray-paint blur.
      if (nSoft > 0.01) {
        const softCurve = Math.pow(nSoft, 3);
        const softBlurR = softCurve * (cellPx * 0.5 + spreadCurve * cellPx * 0.8);
        const softC = getScratchCanvas(`pp-soft-${layer.id}`, workW, workH);
        blurCanvas(sdfC, softC, softBlurR);
        copyCanvas(softC, sdfC);
      } else {
        // Hard binarize for crisp edges
        const fX = sdfC.getContext('2d', { willReadFrequently: true });
        const fImg = fX.getImageData(0, 0, workW, workH);
        const fd = fImg.data;
        for (let i = 3; i < fd.length; i += 4) fd[i] = fd[i] > 20 ? 255 : 0;
        fX.putImageData(fImg, 0, 0);
      }

      /* ── 7. Upscale to output resolution ── */
      const outC = getScratchCanvas(`pp-final-mask-${layer.id}`, outW, outH);
      const outX = outC.getContext('2d', { willReadFrequently: true });
      outX.clearRect(0, 0, outW, outH);
      outX.imageSmoothingEnabled = true;
      outX.drawImage(sdfC, 0, 0, outW, outH);

      // Composite original at full res to guarantee it's always present
      outX.globalCompositeOperation = 'lighter';
      outX.drawImage(sourceCanvas, 0, 0);
      outX.globalCompositeOperation = 'source-over';

      return outC;
    }

    function applyPostProcess(layerCtx, layer, geometry, forExport) {
      const post = getPostProcess(layer);
      if (!post.enabled || post.spread <= 0) return;
      const { outW, outH, scale, offsetX, offsetY } = geometry;

      /* ── Snapshot original layer content ── */
      const origC = getScratchCanvas(`pp-orig-${layer.id}`, outW, outH);
      origC.getContext('2d').drawImage(layerCtx.canvas, 0, 0);

      /* ── Build or retrieve cached mask ── */
      const cacheKey = buildPostProcessKey(layer, geometry, forExport);
      let mask = null;
      const canCache = state.source !== 'video' || (state.sourceElement && state.sourceElement.paused);
      const entry = postProcessCache.get(layer.id);
      if (canCache && entry && entry.key === cacheKey) {
        mask = entry.canvas;
      } else {
        mask = buildInkBleedMask(origC, layer, geometry, forExport);
        if (canCache) postProcessCache.set(layer.id, { key: cacheKey, canvas: mask });
      }
      if (!mask) return;

      const nSpread = post.spread / 100;
      const nSplatter = post.splatter / 100;
      const nSoft = post.softness / 100;
      const spreadCurve = Math.pow(nSpread, 1.15);
      const splatterCurve = Math.pow(nSplatter, 2.5);

      /* ── Color-spread: blur original so expansion area picks up nearby colors ── */
      // Must reach at least as far as the mask (including splatter) expands,
      // otherwise expansion pixels have no color (show as black).
      const cellScreen = Math.max(1, layer.cellSize * scale);
      const splatterReach = splatterCurve * cellScreen * 2.5;
      const colorBlurR = Math.max(cellScreen * 0.6, spreadCurve * cellScreen * 1.2 + spreadCurve * 4, splatterReach);

      const fillC = getScratchCanvas(`pp-fill-${layer.id}`, outW, outH);
      const fillX = fillC.getContext('2d');
      fillX.clearRect(0, 0, outW, outH);
      if (colorBlurR > 0.5) fillX.filter = `blur(${colorBlurR}px)`;
      fillX.drawImage(origC, 0, 0);
      fillX.filter = 'none';
      // Crisp original on top so center stays sharp
      fillX.drawImage(origC, 0, 0);

      /* ── Apply mask ── */
      fillX.globalCompositeOperation = 'destination-in';
      fillX.drawImage(mask, 0, 0);
      fillX.globalCompositeOperation = 'source-over';

      /* ── Solidify alpha where mask is active (for hard mode) ── */
      const maskData = mask.getContext('2d', { willReadFrequently: true })
        .getImageData(0, 0, outW, outH).data;
      const fillImg = fillX.getImageData(0, 0, outW, outH);
      const fd = fillImg.data;

      if (nSoft < 0.01) {
        // Hard edges: fully opaque wherever mask > threshold
        for (let i = 0; i < outW * outH; i++) {
          if (maskData[i * 4 + 3] > 20) fd[i * 4 + 3] = 255;
        }
      } else {
        // Soft edges: preserve the gradient alpha from the mask
        for (let i = 0; i < outW * outH; i++) {
          const ma = maskData[i * 4 + 3];
          if (ma > fd[i * 4 + 3]) fd[i * 4 + 3] = ma;
        }
      }

      fillX.putImageData(fillImg, 0, 0);
      layerCtx.clearRect(0, 0, outW, outH);
      layerCtx.drawImage(fillC, 0, 0);
    }
