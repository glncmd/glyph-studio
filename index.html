    };

    // Full-frame textures stretch across the whole image instead of tiling
    const FULL_FRAME_TEXTURES = new Set(['lens']);

    function blurDisplacementMap(map, w, h, radius) {
      radius = Math.min(radius, Math.floor(Math.min(w, h) / 2) - 1);
      if (radius < 1) return map;
      const out = new Float32Array(map.length);
      const tmp = new Float32Array(map.length);
      const diam = 2 * radius + 1;
      const invDiam = 1 / diam;
      // Horizontal pass — sliding window
      for (let y = 0; y < h; y++) {
        const row = y * w;
        let sum = 0;
        for (let k = -radius; k <= radius; k++)
          sum += map[row + ((k % w) + w) % w];
        for (let x = 0; x < w; x++) {
          tmp[row + x] = sum * invDiam;
          sum += map[row + ((x + radius + 1) % w)]
               - map[row + (((x - radius) % w + w) % w)];
        }
      }
      // Vertical pass — sliding window
      for (let x = 0; x < w; x++) {
        let sum = 0;
        for (let k = -radius; k <= radius; k++)
          sum += tmp[((k % h) + h) % h * w + x];
        for (let y = 0; y < h; y++) {
          out[y * w + x] = sum * invDiam;
          sum += tmp[((y + radius + 1) % h) * w + x]
               - tmp[(((y - radius) % h + h) % h) * w + x];
        }
      }
      return out;
    }

    const _glassMapCache = { key: '', map: null, gradX: null, gradY: null, tileW: 0, tileH: 0 };

    function getGlassDisplacementMap(texture, scale, smoothness, centerX, centerY, imgW, imgH, jitter) {
      const isFF = FULL_FRAME_TEXTURES.has(texture);
      const ffRings = isFF ? Math.max(1, Math.round(scale) / 5) : 0;
      const baseTileW = isFF ? Math.max(128, Math.min(512, Math.round(ffRings * 4))) : Math.max(4, Math.round(scale));
      // Expand tile for reeded with jitter to fit multiple columns for width variation
      const needsExpand = !isFF && jitter > 0 && texture === 'reeded';
      const tileW = needsExpand ? baseTileW * 8 : baseTileW;
      const tileH = tileW;
      // Convert image-space center % to map UV space
      // Map covers [0,1]x[0,1], image covers [0,w/longEdge]x[0,h/longEdge]
      const longEdge = Math.max(imgW || 1, imgH || 1);
      const cx = isFF ? Math.round(((centerX ?? 50) / 100 * (imgW || 1) / longEdge) * 1000) / 1000 : 0.5;
      const cy = isFF ? Math.round(((centerY ?? 50) / 100 * (imgH || 1) / longEdge) * 1000) / 1000 : 0.5;
      const jit = Math.round((jitter || 0) * 100) / 100;
      const cacheKey = texture + '|' + tileW + '|' + scale + '|' + smoothness + '|' + cx + '|' + cy + '|' + jit;
      if (_glassMapCache.key === cacheKey) return { map: _glassMapCache.map, gradX: _glassMapCache.gradX, gradY: _glassMapCache.gradY, tileW: _glassMapCache.tileW, tileH: _glassMapCache.tileH };
      const gen = GLASS_TEXTURE_GENERATORS[texture] || GLASS_TEXTURE_GENERATORS.reeded;
      let map = isFF ? gen(tileW, tileH, 42, jit, scale, cx, cy) : gen(tileW, tileH, 42, jit);
      if (smoothness > 0) {
        const featureScale = baseTileW;
        const maxR = Math.max(2, Math.min(20, Math.round(featureScale / 8)));
        const blurR = Math.max(1, Math.min(maxR, Math.round(smoothness * featureScale / 200)));
        for (let pass = 0; pass < 3; pass++) map = blurDisplacementMap(map, tileW, tileH, blurR);
      }
      // Pre-compute central-difference gradients
      const len = tileW * tileH;
      const gradX = new Float32Array(len);
      const gradY = new Float32Array(len);
      for (let ty = 0; ty < tileH; ty++) {
        const tyP = isFF ? Math.min(ty + 1, tileH - 1) : (ty + 1) % tileH;
        const tyN = isFF ? Math.max(ty - 1, 0) : (ty - 1 + tileH) % tileH;
        for (let tx = 0; tx < tileW; tx++) {
          const txP = isFF ? Math.min(tx + 1, tileW - 1) : (tx + 1) % tileW;
          const txN = isFF ? Math.max(tx - 1, 0) : (tx - 1 + tileW) % tileW;
          const idx = ty * tileW + tx;
          gradX[idx] = (map[ty * tileW + txP] - map[ty * tileW + txN]) * 0.5;
          gradY[idx] = (map[tyP * tileW + tx] - map[tyN * tileW + tx]) * 0.5;
        }
      }
      _glassMapCache.key = cacheKey;
      _glassMapCache.map = map;
      _glassMapCache.gradX = gradX;
      _glassMapCache.gradY = gradY;
      _glassMapCache.tileW = tileW;
      _glassMapCache.tileH = tileH;
      return { map, gradX, gradY, tileW, tileH };
    }

    /* ── Ink bleed helpers ── */

    function blurCanvas(srcCanvas, dstCanvas, radius) {
      const ctx = dstCanvas.getContext('2d');
      ctx.clearRect(0, 0, dstCanvas.width, dstCanvas.height);
      if (radius > 0.5) ctx.filter = `blur(${radius}px)`;
      ctx.drawImage(srcCanvas, 0, 0);
      ctx.filter = 'none';
    }

    function copyCanvas(src, dst) {
      const ctx = dst.getContext('2d');
      ctx.clearRect(0, 0, dst.width, dst.height);
      ctx.drawImage(src, 0, 0);
    }

    /* ── Blur effect implementations ── */

    // Create a padded canvas with edge pixels clamped (mirrored) to prevent
    // dark vignetting when blur samples outside the image bounds.
    function padCanvasForBlur(srcCanvas, w, h, pad, fxId) {
      const pw = w + pad * 2;
      const ph = h + pad * 2;
      const padded = getScratchCanvas('fx-pad-' + fxId, pw, ph);
      const pctx = padded.getContext('2d');
      // Center: original image
      pctx.drawImage(srcCanvas, 0, 0, w, h, pad, pad, w, h);
      // Edges: stretch 1px strips to fill padding
      // Top
      pctx.drawImage(srcCanvas, 0, 0, w, 1, pad, 0, w, pad);
      // Bottom
      pctx.drawImage(srcCanvas, 0, h - 1, w, 1, pad, pad + h, w, pad);
      // Left
      pctx.drawImage(srcCanvas, 0, 0, 1, h, 0, pad, pad, h);
      // Right
      pctx.drawImage(srcCanvas, w - 1, 0, 1, h, pad + w, pad, pad, h);
      // Corners: stretch 1x1 pixel
      pctx.drawImage(srcCanvas, 0, 0, 1, 1, 0, 0, pad, pad);
      pctx.drawImage(srcCanvas, w - 1, 0, 1, 1, pad + w, 0, pad, pad);
      pctx.drawImage(srcCanvas, 0, h - 1, 1, 1, 0, pad + h, pad, pad);
      pctx.drawImage(srcCanvas, w - 1, h - 1, 1, 1, pad + w, pad + h, pad, pad);
      return { canvas: padded, pad, pw, ph };
    }

    function getImageBoundsRect(geometry) {
      if (!geometry) return null;
      const left = clamp(Math.floor(geometry.offsetX), 0, geometry.outW);
      const top = clamp(Math.floor(geometry.offsetY), 0, geometry.outH);
      const right = clamp(Math.ceil(geometry.offsetX + geometry.srcW * geometry.scale), 0, geometry.outW);
      const bottom = clamp(Math.ceil(geometry.offsetY + geometry.srcH * geometry.scale), 0, geometry.outH);
      const width = Math.max(0, right - left);
      const height = Math.max(0, bottom - top);
      if (!width || !height) return null;
      return { left, top, right, bottom, width, height };
    }

    function getImageTransform(geometry) {
      const rect = getImageBoundsRect(geometry);
      if (!rect) return null;
      return {
        rect,
        scaleX: rect.width / Math.max(1, geometry.srcW),
        scaleY: rect.height / Math.max(1, geometry.srcH)
      };
    }

    function extendCanvasToImageBounds(srcCanvas, geometry, fxId) {
      if (!geometry) return srcCanvas;
      const rect = getImageBoundsRect(geometry);
      if (!rect) return srcCanvas;

      const extended = getScratchCanvas('fx-bounds-' + fxId, geometry.outW, geometry.outH);
      const ectx = extended.getContext('2d');
      ectx.clearRect(0, 0, geometry.outW, geometry.outH);
      ectx.drawImage(srcCanvas, 0, 0);

      const { left, top, right, bottom, width, height } = rect;

      if (top > 0) {
        ectx.drawImage(srcCanvas, left, top, width, 1, left, 0, width, top);
      }
      if (bottom < geometry.outH) {
        ectx.drawImage(srcCanvas, left, bottom - 1, width, 1, left, bottom, width, geometry.outH - bottom);
      }
      if (left > 0) {
        ectx.drawImage(srcCanvas, left, top, 1, height, 0, top, left, height);
      }
      if (right < geometry.outW) {
        ectx.drawImage(srcCanvas, right - 1, top, 1, height, right, top, geometry.outW - right, height);
      }
      if (left > 0 && top > 0) {
        ectx.drawImage(srcCanvas, left, top, 1, 1, 0, 0, left, top);
      }
      if (right < geometry.outW && top > 0) {
        ectx.drawImage(srcCanvas, right - 1, top, 1, 1, right, 0, geometry.outW - right, top);
      }
      if (left > 0 && bottom < geometry.outH) {
        ectx.drawImage(srcCanvas, left, bottom - 1, 1, 1, 0, bottom, left, geometry.outH - bottom);
      }
      if (right < geometry.outW && bottom < geometry.outH) {
        ectx.drawImage(srcCanvas, right - 1, bottom - 1, 1, 1, right, bottom, geometry.outW - right, geometry.outH - bottom);
      }

      return extended;
    }

    function applyGaussianBlur(ctx, w, h, fx, effectScale = 1, geometry = null) {
      const r = fx.params.amount * effectScale;
      if (r <= 0.5) return;
      const pad = Math.ceil(r * 3);
      const effectInput = extendCanvasToImageBounds(ctx.canvas, geometry, fx.id);
      const { canvas: padded, pw, ph } = padCanvasForBlur(effectInput, w, h, pad, fx.id);
      const blurred = getScratchCanvas('fx-gauss-' + fx.id, pw, ph);
      const bctx = blurred.getContext('2d');
      bctx.filter = `blur(${r}px)`;
      bctx.drawImage(padded, 0, 0);
      bctx.filter = 'none';
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(blurred, pad, pad, w, h, 0, 0, w, h);
    }

    function applyMotionBlur(ctx, w, h, fx, effectScale = 1, geometry = null) {
      const dist = fx.params.amount * effectScale;
      if (dist <= 0) return;
      const angle = (fx.params.angle || 0) * Math.PI / 180;
      const dx = Math.cos(angle);
      const dy = Math.sin(angle);
      const steps = Math.min(24, Math.max(8, Math.round(dist)));
      const pad = Math.ceil(dist + 2);
      const effectInput = extendCanvasToImageBounds(ctx.canvas, geometry, fx.id + '-m-src');
      const { canvas: padded, pw, ph } = padCanvasForBlur(effectInput, w, h, pad, fx.id + '-m');
      const result = getScratchCanvas('fx-motion-' + fx.id, pw, ph);
      const rctx = result.getContext('2d');
      const total = 2 * steps + 1;
      for (let i = -steps; i <= steps; i++) {
        rctx.globalAlpha = 1 / total;
        rctx.drawImage(padded, dx * i * dist / steps, dy * i * dist / steps);
      }
      rctx.globalAlpha = 1;
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(result, pad, pad, w, h, 0, 0, w, h);
    }

    function applyRadialBlur(ctx, w, h, fx, effectScale = 1, geometry = null) {
      const amount = fx.params.amount * effectScale;
      if (amount <= 0) return;
      const steps = Math.min(20, Math.max(8, Math.round(amount)));
      const pad = Math.ceil(amount * 1.5 + 2);
      const effectInput = extendCanvasToImageBounds(ctx.canvas, geometry, fx.id + '-r-src');
      const { canvas: padded, pw, ph } = padCanvasForBlur(effectInput, w, h, pad, fx.id + '-r');
      const result = getScratchCanvas('fx-radial-' + fx.id, pw, ph);
      const rctx = result.getContext('2d');
      const pcx = (fx.params.centerX ?? 50) / 100 * w + pad;
      const pcy = (fx.params.centerY ?? 50) / 100 * h + pad;
      const total = 2 * steps + 1;
      for (let i = -steps; i <= steps; i++) {
        const s = 1 + (i / steps) * (amount / 100);
        rctx.save();
        rctx.globalAlpha = 1 / total;
        rctx.translate(pcx, pcy);
        rctx.scale(s, s);
        rctx.translate(-pcx, -pcy);
        rctx.drawImage(padded, 0, 0);
        rctx.restore();
      }
      rctx.globalAlpha = 1;
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(result, pad, pad, w, h, 0, 0, w, h);
    }

    function applyChromaticAberration(ctx, w, h, fx, effectScale = 1, geometry = null) {
      const offset = fx.params.amount * effectScale;
      if (offset <= 0) return;
      const angle = (fx.params.angle || 0) * Math.PI / 180;
      const dx = Math.cos(angle) * offset;
      const dy = Math.sin(angle) * offset;
      const effectInput = extendCanvasToImageBounds(ctx.canvas, geometry, fx.id + '-c-src');
      const srcX = effectInput.getContext('2d', { willReadFrequently: true });
      const src = srcX.getImageData(0, 0, w, h);
      const dst = ctx.createImageData(w, h);
      const sd = src.data;
      const dd = dst.data;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const idx = (y * w + x) * 4;
          // Red channel: offset in +direction
          const rx = Math.round(x + dx);
          const ry = Math.round(y + dy);
          if (rx >= 0 && rx < w && ry >= 0 && ry < h) {
            dd[idx] = sd[(ry * w + rx) * 4];
          }
          // Green channel: no offset
          dd[idx + 1] = sd[idx + 1];
          // Blue channel: offset in -direction
          const bx = Math.round(x - dx);
          const by = Math.round(y - dy);
          if (bx >= 0 && bx < w && by >= 0 && by < h) {
            dd[idx + 2] = sd[(by * w + bx) * 4 + 2];
          }
          // Alpha: max of all sampled positions
          dd[idx + 3] = sd[idx + 3];
        }
      }
      ctx.putImageData(dst, 0, 0);
    }

    function applyPixelate(ctx, w, h, fx, effectScale = 1, geometry = null, gridStep = 0) {
      const blockSize = gridStep > 0 ? gridStep : Math.max(2, Math.round(fx.params.amount * effectScale));
      if (blockSize < 2) return;
      const sw = Math.max(1, Math.ceil(w / blockSize));
      const sh = Math.max(1, Math.ceil(h / blockSize));
      const small = getScratchCanvas('fx-pix-' + fx.id, sw, sh);
      const sctx = small.getContext('2d');
      sctx.imageSmoothingEnabled = true;
      const effectInput = extendCanvasToImageBounds(ctx.canvas, geometry, fx.id + '-p-src');
      sctx.drawImage(effectInput, 0, 0, sw, sh);
      ctx.clearRect(0, 0, w, h);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(small, 0, 0, w, h);
      ctx.imageSmoothingEnabled = true;
    }

    function applyCmykHalftone(ctx, w, h, fx, effectScale = 1, gridStep = 0, layer = null, geometry = null) {
      const cellSize = gridStep > 0 ? gridStep : Math.max(2, Math.round((fx.params.dotSize || 8) * effectScale));
      const contrastVal = (fx.params.contrast ?? 50) / 100;
      const bleedVal = (fx.params.bleed ?? 30) / 100;
      const paperVal = (fx.params.paper ?? 100) / 100;
      const colorMixVal = (fx.params.colorMix ?? 0) / 100;
      const shape = fx.params.shape || 'round';
      const misregVal = (fx.params.misreg ?? 0) / 100;
      const dotGrainVal = (fx.params.dotGrain ?? 15) / 100;
      const paperToneVal = (fx.params.paperTone ?? 0) / 100;
      const inkWeightVal = (fx.params.inkWeight ?? 50) / 100;
      const angleShift = fx.params.angleShift ?? 0;

      const srcData = ctx.getImageData(0, 0, w, h);
      const src = srcData.data;
      const len = w * h;

      // Pre-compute CMYK channels for all pixels into flat arrays
      const cmyk = new Float32Array(len * 4); // C,M,Y,K interleaved
      for (let i = 0; i < len; i++) {
        const i4 = i * 4;
        const r = src[i4], g = src[i4 + 1], b = src[i4 + 2];
        const maxRGB = r > g ? (r > b ? r : b) : (g > b ? g : b);
        if (maxRGB === 0) {
          cmyk[i4 + 3] = 1; // K=1, C=M=Y=0
        } else {
          const inv = 1 / 255;
          const k = 1 - maxRGB * inv;
          const invK = 1 / (1 - k);
          cmyk[i4]     = (1 - r * inv - k) * invK; // C
          cmyk[i4 + 1] = (1 - g * inv - k) * invK; // M
          cmyk[i4 + 2] = (1 - b * inv - k) * invK; // Y
          cmyk[i4 + 3] = k;                         // K
        }
      }

      const halfCell = cellSize * 0.5;
      const halfCell2 = halfCell * halfCell;
      const invCell = 1 / cellSize;

      // Ink opacity from ink weight
      const inkOpacity = 0.3 + inkWeightVal * 0.7;

      // Paper tone: white -> warm cream
      const paperR = 255 - paperToneVal * 10;
      const paperG = 255 - paperToneVal * 20;
      const paperB = 255 - paperToneVal * 35;

      // Misregistration offsets (deterministic per-channel, K stays at 0,0)
      const misregPx = misregVal * cellSize * 1.5;
      function hashF(seed) { let s = Math.sin(seed) * 43758.5453; return s - Math.floor(s); }
      const offsets = [
        [0, 0], // K - reference plate
        [(hashF(cellSize * 7.919) - 0.5) * misregPx * 2, (hashF(cellSize * 13.731) - 0.5) * misregPx * 2], // C
        [(hashF(cellSize * 23.197) - 0.5) * misregPx * 2, (hashF(cellSize * 31.853) - 0.5) * misregPx * 2], // M
        [(hashF(cellSize * 47.629) - 0.5) * misregPx * 2, (hashF(cellSize * 59.371) - 0.5) * misregPx * 2]  // Y
      ];

      // Contrast curve multiplier
      const contrastMul = 1 + contrastVal * 3;
      const hasBleed = bleedVal >= 0.01;
      const innerMul = 1 - bleedVal;
      const outerMul = 1 + bleedVal * 0.5;
      const innerMul2 = innerMul * innerMul;
      const outerMul2 = outerMul * outerMul;
      const bleedRange = outerMul - innerMul;

      // Shape flags (avoid string comparison in hot loop)
      const isRound = shape === 'round';
      const isElliptical = shape === 'elliptical';
      const isDiamond = shape === 'diamond';
      const isLine = shape === 'line';
      const isStochastic = shape === 'stochastic';

      // Output buffer: start with paper tone color
      const out = new Float32Array(len * 3);
      for (let i = 0; i < len; i++) {
        out[i * 3] = paperR;
        out[i * 3 + 1] = paperG;
        out[i * 3 + 2] = paperB;
      }

      // Track max dot coverage per pixel (needed for paper opacity)
      const dotCoverage = new Float32Array(len);

      // Deterministic hash for dot noise
      function cellHash(gu, gv, pass) {
        let h = ((gu * 2654435761) ^ (gv * 2246822519) ^ (pass * 13)) >>> 0;
        return ((h & 0xFFFF) / 65535.0 - 0.5) * 2; // -1 to 1
      }

      // Stochastic (FM) screening path
      if (isStochastic) {
        // 8x8 Bayer threshold matrix
        const bayer8 = new Uint8Array([
          0,32,8,40,2,34,10,42, 48,16,56,24,50,18,58,26,
          12,44,4,36,14,46,6,38, 60,28,52,20,62,30,54,22,
          3,35,11,43,1,33,9,41, 51,19,59,27,49,17,57,25,
          15,47,7,39,13,45,5,37, 63,31,55,23,61,29,53,21
        ]);
        for (let y = 0; y < h; y++) {
          const yRow = y * w;
          for (let x = 0; x < w; x++) {
            const pixIdx = yRow + x;
            const i4 = pixIdx * 4;
            const threshold = bayer8[(y & 7) * 8 + (x & 7)] / 64.0;
            // Get CMYK at this pixel
            let ck = cmyk[i4 + 3], cc = cmyk[i4], cm = cmyk[i4 + 1], cy = cmyk[i4 + 2];
            // Apply contrast
            if (contrastVal > 0) {
              ck = Math.max(0, Math.min(1, (ck - 0.5) * contrastMul + 0.5));
              cc = Math.max(0, Math.min(1, (cc - 0.5) * contrastMul + 0.5));
              cm = Math.max(0, Math.min(1, (cm - 0.5) * contrastMul + 0.5));
              cy = Math.max(0, Math.min(1, (cy - 0.5) * contrastMul + 0.5));
            }
            // Dot noise
            if (dotGrainVal > 0) {
              ck += cellHash(x, y, 0) * dotGrainVal * 0.3;
              cc += cellHash(x, y, 1) * dotGrainVal * 0.3;
              cm += cellHash(x, y, 2) * dotGrainVal * 0.3;
              cy += cellHash(x, y, 3) * dotGrainVal * 0.3;
              ck = Math.max(0, Math.min(1, ck));
              cc = Math.max(0, Math.min(1, cc));
              cm = Math.max(0, Math.min(1, cm));
              cy = Math.max(0, Math.min(1, cy));
            }
            // Mask
            if (maskStr) {
              const ms = maskStr[pixIdx];
              if (ms <= 0) continue;
              if (ms < 1) { ck *= ms; cc *= ms; cm *= ms; cy *= ms; }
            }
            const pi = pixIdx * 3;
            let maxCov = 0;
            // K channel
            if (ck > threshold) { out[pi] *= 1 - inkOpacity; out[pi+1] *= 1 - inkOpacity; out[pi+2] *= 1 - inkOpacity; maxCov = 1; }
            // C channel (with misreg)
            const cx2 = x + offsets[1][0], cy2 = y + offsets[1][1];
            const cThresh = bayer8[((cy2 & 7) >>> 0) * 8 + ((cx2 & 7) >>> 0)] / 64.0;
            if (cc > cThresh) { out[pi] *= 1 - inkOpacity; maxCov = 1; }
            // M channel (with misreg)
            const mx2 = x + offsets[2][0], my2 = y + offsets[2][1];
            const mThresh = bayer8[((my2 & 7) >>> 0) * 8 + ((mx2 & 7) >>> 0)] / 64.0;
            if (cm > mThresh) { out[pi+1] *= 1 - inkOpacity; maxCov = 1; }
            // Y channel (with misreg)
            const yx2 = x + offsets[3][0], yy2 = y + offsets[3][1];
            const yThresh = bayer8[((yy2 & 7) >>> 0) * 8 + ((yx2 & 7) >>> 0)] / 64.0;
            if (cy > yThresh) { out[pi+2] *= 1 - inkOpacity; maxCov = 1; }
            dotCoverage[pixIdx] = maxCov;
          }
        }
      } else {
        // AM screening (grid-based) path
        const FO = 1048576;
        const wm1 = w - 1, hm1 = h - 1;

        // Channel config: [cmykIndex, angle, blendOffset (-1 = all three)]
        const channels = [[3, 45 + angleShift, -1], [0, 15 + angleShift, 0], [1, 75 + angleShift, 1], [2, 0 + angleShift, 2]];

        for (let pass = 0; pass < 4; pass++) {
          const [chI, angle, blendOff] = channels[pass];
          const rad = angle * Math.PI / 180;
          const cosA = Math.cos(rad), sinA = Math.sin(rad);
          const offX = offsets[pass][0], offY = offsets[pass][1];

          let prevGu = -1e9, prevGv = -1e9;
          let cIntensity = 0, cDotR2 = 0, cCu = 0, cCv = 0;

          for (let y = 0; y < h; y++) {
            const yRow = y * w;
            const ysinA = y * sinA, ycosA = y * cosA;
            prevGu = -1e9;

            for (let x = 0; x < w; x++) {
              // Rotate pixel (with misregistration offset) to grid space
              const px = x + offX, py = y + offY;
              const u = px * cosA + py * sinA;
              const v = -px * sinA + py * cosA;

              const gu = ((u * invCell + FO) | 0) - FO;
              const gv = ((v * invCell + FO) | 0) - FO;

              if (gu !== prevGu || gv !== prevGv) {
                prevGu = gu; prevGv = gv;
                cCu = (gu + 0.5) * cellSize;
                cCv = (gv + 0.5) * cellSize;
                // Un-rotate cell center to image space for sampling
                const sx = cCu * cosA - cCv * sinA - offX;
                const sy = cCu * sinA + cCv * cosA - offY;
                const ix = sx < 0 ? 0 : sx > wm1 ? wm1 : (sx + 0.5) | 0;
                const iy = sy < 0 ? 0 : sy > hm1 ? hm1 : (sy + 0.5) | 0;
                let val = cmyk[(iy * w + ix) * 4 + chI];
                // Dot noise
                if (dotGrainVal > 0) {
                  val += cellHash(gu, gv, pass) * dotGrainVal * 0.3;
                  if (val < 0) val = 0; else if (val > 1) val = 1;
                }
                if (contrastVal > 0) {
                  val = ((val - 0.5) * contrastMul) + 0.5;
                  if (val < 0) val = 0; else if (val > 1) val = 1;
                }
                cIntensity = val;
                // Density-dependent dot gain
                cDotR2 = halfCell2 * val;
                if (hasBleed) cDotR2 *= 1 + bleedVal * val * 0.6;
              }

              if (cIntensity < 0.01) continue;

              let dotR2 = cDotR2;
              if (maskStr) {
                const ms = maskStr[yRow + x];
                if (ms <= 0) continue;
                if (ms < 1) dotR2 = cDotR2 * ms;
              }

              const du = u - cCu;
              const dv = v - cCv;
              let dist2;
              if (isRound) {
                dist2 = du * du + dv * dv;
              } else if (isElliptical) {
                const duS = du * 1.4;
                dist2 = duS * duS + dv * dv;
              } else if (isLine) {
                dist2 = dv * dv;
              } else if (isDiamond) {
                const d = (du < 0 ? -du : du) + (dv < 0 ? -dv : dv);
                dist2 = d * d;
              } else { // square
                const adu = du < 0 ? -du : du;
                const adv = dv < 0 ? -dv : dv;
                const d = adu > adv ? adu : adv;
                dist2 = d * d;
              }

              let coverage;
              if (!hasBleed) {
                coverage = dist2 <= dotR2 ? 1 : 0;
              } else {
                const innerR2 = dotR2 * innerMul2;
                const outerR2 = dotR2 * outerMul2;
                if (dist2 <= innerR2) {
                  coverage = 1;
                } else if (dist2 >= outerR2) {
                  coverage = 0;
                } else {
                  const d = Math.sqrt(dist2);
                  const dotR = Math.sqrt(dotR2);
                  const t = (d - dotR * innerMul) / (dotR * bleedRange);
                  coverage = 1 - t * t * (3 - 2 * t);
                }
              }

              if (coverage <= 0) continue;

              const pixIdx = yRow + x;
              if (coverage > dotCoverage[pixIdx]) dotCoverage[pixIdx] = coverage;

              // Multiply blend with ink weight
              const m = 1 - coverage * inkOpacity;
              const pi = pixIdx * 3;
              if (blendOff < 0) {
                out[pi] *= m; out[pi + 1] *= m; out[pi + 2] *= m;
              } else {
                out[pi + blendOff] *= m;
              }
            }
          }
        }
      }

      // Write output with paper opacity and color mix
      const dst = ctx.createImageData(w, h);
      const dd = dst.data;
      if (paperVal >= 1 && colorMixVal <= 0) {
        for (let i = 0; i < len; i++) {
          const i3 = i * 3, i4 = i * 4;
          dd[i4]     = (out[i3] + 0.5) | 0;
          dd[i4 + 1] = (out[i3 + 1] + 0.5) | 0;
          dd[i4 + 2] = (out[i3 + 2] + 0.5) | 0;
          dd[i4 + 3] = src[i4 + 3];
        }
      } else {
        for (let i = 0; i < len; i++) {
          const i3 = i * 3, i4 = i * 4;
          const maxCov = dotCoverage[i];
          let r = out[i3], g = out[i3 + 1], b = out[i3 + 2];
          if (paperVal < 1) {
            const showThrough = (1 - maxCov) * (1 - paperVal);
            r = r * (1 - showThrough) + src[i4]     * showThrough;
            g = g * (1 - showThrough) + src[i4 + 1] * showThrough;
            b = b * (1 - showThrough) + src[i4 + 2] * showThrough;
          }
          if (colorMixVal > 0) {
            r = r * (1 - colorMixVal) + src[i4]     * colorMixVal;
            g = g * (1 - colorMixVal) + src[i4 + 1] * colorMixVal;
            b = b * (1 - colorMixVal) + src[i4 + 2] * colorMixVal;
          }
          dd[i4]     = (r + 0.5) | 0;
          dd[i4 + 1] = (g + 0.5) | 0;
          dd[i4 + 2] = (b + 0.5) | 0;
          dd[i4 + 3] = src[i4 + 3];
        }
      }

      ctx.putImageData(dst, 0, 0);
    }

    function applyBoxBlur(ctx, w, h, fx, effectScale = 1, geometry = null) {
      const radius = Math.max(1, Math.round(fx.params.amount * effectScale));
      if (radius < 1) return;
      const effectInput = extendCanvasToImageBounds(ctx.canvas, geometry, fx.id + '-b-src');
      const imageData = effectInput.getContext('2d', { willReadFrequently: true }).getImageData(0, 0, w, h);
      const src = imageData.data;
      const dst = new Uint8ClampedArray(src.length);
      // Horizontal pass — clamp edges, preserve alpha
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          let r = 0, g = 0, b = 0, count = 0;
          for (let k = -radius; k <= radius; k++) {
            const sx = Math.min(w - 1, Math.max(0, x + k));
            const si = (y * w + sx) * 4;
            r += src[si]; g += src[si+1]; b += src[si+2]; count++;
          }
          const di = (y * w + x) * 4;
          dst[di] = r / count; dst[di+1] = g / count; dst[di+2] = b / count; dst[di+3] = src[di+3];
        }
      }
      // Vertical pass — clamp edges, preserve alpha
      const result = new Uint8ClampedArray(src.length);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          let r = 0, g = 0, b = 0, count = 0;
          for (let k = -radius; k <= radius; k++) {
            const sy = Math.min(h - 1, Math.max(0, y + k));
            const si = (sy * w + x) * 4;
            r += dst[si]; g += dst[si+1]; b += dst[si+2]; count++;
          }
          const di = (y * w + x) * 4;
          result[di] = r / count; result[di+1] = g / count; result[di+2] = b / count; result[di+3] = src[di+3];
        }
      }
      imageData.data.set(result);
      ctx.putImageData(imageData, 0, 0);
    }

    function applyBlurEffect(ctx, fx, context) {
      const { outW, outH, effectScale, geometry } = context;
      switch (fx.subtype) {
        case 'gaussian': applyGaussianBlur(ctx, outW, outH, fx, effectScale, geometry); break;
        case 'motion': applyMotionBlur(ctx, outW, outH, fx, effectScale, geometry); break;
        case 'radial': applyRadialBlur(ctx, outW, outH, fx, effectScale, geometry); break;
        case 'chromatic': applyChromaticAberration(ctx, outW, outH, fx, effectScale, geometry); break;
        case 'pixelate': applyPixelate(ctx, outW, outH, fx, effectScale, geometry, context.gridStepY); break;
        case 'box': applyBoxBlur(ctx, outW, outH, fx, effectScale, geometry); break;
      }
    }

    function applyBloomEffect(ctx, fx, context) {
      const { asciiCanvas, outW, outH, effectScale } = context;
      // Create a temporary layer-like object for the existing applyBloomPost
      const pseudoLayer = {
        bloom: true,
        bloomStyle: fx.params.style || 'soft',
        bloomRadius: (fx.params.radius ?? 8) * effectScale,
        bloomIntensity: fx.params.intensity ?? 0.6
      };
      applyBloomPost(ctx, asciiCanvas, outW, outH, pseudoLayer);
    }

    function applySepiaEffect(ctx, fx, context) {
      const { outW, outH } = context;
      const intensity = (fx.params.intensity ?? 80) / 100;
      if (intensity <= 0) return;
      const imageData = ctx.getImageData(0, 0, outW, outH);
      const d = imageData.data;
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], g = d[i + 1], b = d[i + 2];
        const sr = Math.min(255, 0.393 * r + 0.769 * g + 0.189 * b);
        const sg = Math.min(255, 0.349 * r + 0.686 * g + 0.168 * b);
        const sb = Math.min(255, 0.272 * r + 0.534 * g + 0.131 * b);
        d[i]     = r + (sr - r) * intensity;
        d[i + 1] = g + (sg - g) * intensity;
        d[i + 2] = b + (sb - b) * intensity;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    function applyGrainEffect(ctx, fx, context) {
      const { outW, outH, effectScale } = context;
      const pseudoLayer = {
        grain: true,
        grainAmount: fx.params.amount ?? 25,
        grainSize: fx.params.size ?? 25,
        grainRoughness: fx.params.roughness ?? 50
      };
      applyGrain(ctx, outW, outH, pseudoLayer, effectScale);
    }

    function applyInkBleedEffect(ctx, fx, context) {
      const { layer, geometry, forExport, outW, outH } = context;
      const pp = fx.params;
      if (!pp || (pp.spread ?? 0) <= 0) return;

      const origC = getScratchCanvas(`pp-orig-${fx.id}`, outW, outH);
      origC.getContext('2d').drawImage(ctx.canvas, 0, 0);

        gl.uniform1i(gl.getUniformLocation(prog, 'uTex'), 0);
        gl.uniform2f(gl.getUniformLocation(prog, 'uRes'), w, h);
        gl.uniform1f(gl.getUniformLocation(prog, 'uAmount'), amount);
        gl.uniform1f(gl.getUniformLocation(prog, 'uSize'), size);
        gl.uniform1f(gl.getUniformLocation(prog, 'uRoughness'), roughness);
        gl.uniform1f(gl.getUniformLocation(prog, 'uSeed'), (_glGrainSeed++) * 0.01);

      function glLens(tex, w, h, fx, effectScale) {

      function glFractalGlass(tex, w, h, fx, effectScale, geometry) {

        const distortion = (fx.params.distortion ?? 50) / 100;

        // Upload displacement map as 16-bit float texture for smooth gradients
        const mapKey = texture + '|' + tileW + '|' + scale + '|' + smoothness + '|' + (fx.params.centerX ?? 50) + '|' + (fx.params.centerY ?? 50) + '|' + jitterAmt;
        if (mapKey !== dispMapKey) {

        gl.uniform1i(gl.getUniformLocation(prog, 'uFullFrame'), FULL_FRAME_TEXTURES.has(texture) ? 1 : 0);

          gl.uniform2f(gl.getUniformLocation(prog, 'uCenter'),

      function glPixelate(tex, w, h, fx, effectScale, gridStep) {

      // ========== CMYK HALFTONE (GPU) ==========
      const FRAG_CMYK = `#version 300 es
        precision highp float;
        in vec2 vUv;
        out vec4 fragColor;
        uniform sampler2D uTex;
        uniform vec2 uRes;
        uniform float uCellSize;
        uniform float uContrast;
        uniform float uBleed;
        uniform float uInkWeight;
        uniform float uPaper;
        uniform float uColorMix;
        uniform float uMisreg;
        uniform float uDotGrain;
        uniform float uPaperTone;
        uniform float uAngleShift;
        uniform int uShape; // 0=round,1=elliptical,2=diamond,3=line,4=square,5=stochastic

        // Hash for deterministic noise
        float hash21(vec2 p) {
          p = fract(p * vec2(123.34, 456.21));
          p += dot(p, p + 45.32);
          return fract(p.x * p.y);
        }
        float hash11(float p) {
          p = fract(p * 0.1031);
          p *= p + 33.33;
          p *= p + p;
          return fract(p);
        }

        // 8x8 Bayer matrix for stochastic screening
        float bayer8(vec2 p) {
          ivec2 ip = ivec2(p) & 7;
          int idx = ip.x + ip.y * 8;
          // Compute Bayer value algorithmically
          int v = 0;
          int x = ip.x, y = ip.y;
          for (int i = 0; i < 3; i++) {
            v = v * 4 + ((x & 1) ^ (y & 1)) * 2 + (y & 1);
            x >>= 1; y >>= 1;
          }
          return float(v) / 64.0;
        }

        void main() {
          vec2 px = vUv * uRes; // pixel coordinates
          vec4 src = texture(uTex, vUv);
          vec3 rgb = src.rgb;

          // RGB -> CMYK
          float maxRGB = max(rgb.r, max(rgb.g, rgb.b));
          float k, c, m, y;
          if (maxRGB < 0.0001) {
            k = 1.0; c = 0.0; m = 0.0; y = 0.0;
          } else {
            k = 1.0 - maxRGB;
            float invK = 1.0 / (1.0 - k);
            c = (1.0 - rgb.r - k) * invK;
            m = (1.0 - rgb.g - k) * invK;
            y = (1.0 - rgb.b - k) * invK;
          }
          vec4 cmyk = vec4(c, m, y, k);

          // Paper tone: white -> warm cream
          vec3 paperColor = vec3(
            1.0 - uPaperTone * 0.039,
            1.0 - uPaperTone * 0.078,
            1.0 - uPaperTone * 0.137
          );

          // Ink opacity from ink weight
          float inkOpacity = 0.3 + uInkWeight * 0.7;

          // Contrast multiplier
          float contrastMul = 1.0 + uContrast * 3.0;

          // Bleed / dot gain params
          float innerMul = 1.0 - uBleed;
          float outerMul = 1.0 + uBleed * 0.5;

          // Misregistration offsets (deterministic per-channel)
          float misregPx = uMisreg * uCellSize * 1.5;
          vec2 offC = vec2(hash11(uCellSize * 7.919) - 0.5, hash11(uCellSize * 13.731) - 0.5) * misregPx * 2.0;
          vec2 offM = vec2(hash11(uCellSize * 23.197) - 0.5, hash11(uCellSize * 31.853) - 0.5) * misregPx * 2.0;
          vec2 offY = vec2(hash11(uCellSize * 47.629) - 0.5, hash11(uCellSize * 59.371) - 0.5) * misregPx * 2.0;

          // Channel angles (K@45, C@15, M@75, Y@0) + user shift
          float angles[4];
          angles[0] = radians(45.0 + uAngleShift); // K
          angles[1] = radians(15.0 + uAngleShift); // C
          angles[2] = radians(75.0 + uAngleShift); // M
          angles[3] = radians(0.0 + uAngleShift);  // Y

          // Channel indices: 0=K(cmyk.w), 1=C(cmyk.x), 2=M(cmyk.y), 3=Y(cmyk.z)
          float halfCell = uCellSize * 0.5;
          float halfCell2 = halfCell * halfCell;
          float invCell = 1.0 / uCellSize;

          vec3 out_rgb = paperColor; // start with paper
          float maxCov = 0.0;

          // Stochastic path
          if (uShape == 5) {
            float threshold = bayer8(px) + (hash21(px * 0.37) - 0.5) * 0.15;
            // Apply contrast to channels
            vec4 adj = cmyk;
            if (uContrast > 0.0) {
              adj = clamp((adj - 0.5) * contrastMul + 0.5, 0.0, 1.0);
            }
            // Dot noise
            if (uDotGrain > 0.0) {
              adj += (vec4(hash21(px*1.1), hash21(px*2.2), hash21(px*3.3), hash21(px*4.4)) - 0.5) * uDotGrain * 0.6;
              adj = clamp(adj, 0.0, 1.0);
            }
            // K channel
            float kCov = step(threshold, adj.w);
            out_rgb *= mix(vec3(1.0), vec3(1.0 - inkOpacity), kCov);
            maxCov = max(maxCov, kCov);
            // C channel (with misreg)
            vec2 cPx = px + offC;
            float cThresh = bayer8(cPx) + (hash21(cPx * 0.37) - 0.5) * 0.15;
            float cCov = step(cThresh, adj.x);
            out_rgb.r *= mix(1.0, 1.0 - inkOpacity, cCov);
            maxCov = max(maxCov, cCov);
            // M channel (with misreg)
            vec2 mPx = px + offM;
            float mThresh = bayer8(mPx) + (hash21(mPx * 0.37) - 0.5) * 0.15;
            float mCov = step(mThresh, adj.y);
            out_rgb.g *= mix(1.0, 1.0 - inkOpacity, mCov);
            maxCov = max(maxCov, mCov);
            // Y channel (with misreg)
            vec2 yPx = px + offY;
            float yThresh = bayer8(yPx) + (hash21(yPx * 0.37) - 0.5) * 0.15;
            float yCov = step(yThresh, adj.z);
            out_rgb.b *= mix(1.0, 1.0 - inkOpacity, yCov);
            maxCov = max(maxCov, yCov);
          } else {
            // AM screening (grid-based)
            for (int pass = 0; pass < 4; pass++) {
              float angle = angles[pass];
              float cosA = cos(angle), sinA = sin(angle);

              // Misregistration offset for this channel
              vec2 off = vec2(0.0);
              if (pass == 1) off = offC;
              else if (pass == 2) off = offM;
              else if (pass == 3) off = offY;

              // Rotate pixel to grid space
              vec2 rp = px + off;
              float u = rp.x * cosA + rp.y * sinA;
              float v = -rp.x * sinA + rp.y * cosA;

              // Grid cell
              float gu = floor(u * invCell);
              float gv = floor(v * invCell);

              // Cell center in rotated space
              float cu = (gu + 0.5) * uCellSize;
              float cv = (gv + 0.5) * uCellSize;

              // Un-rotate cell center to image space to sample CMYK
              vec2 sp = vec2(cu * cosA - cv * sinA, cu * sinA + cv * cosA) - off;
              vec2 sUv = clamp(sp / uRes, 0.0, 1.0);
              vec4 sampleColor = texture(uTex, sUv);

              // RGB->CMYK at sample point
              float sMax = max(sampleColor.r, max(sampleColor.g, sampleColor.b));
              float sK, sC, sM, sY;
              if (sMax < 0.0001) {
                sK = 1.0; sC = 0.0; sM = 0.0; sY = 0.0;
              } else {
                sK = 1.0 - sMax;
                float sInvK = 1.0 / (1.0 - sK);
                sC = (1.0 - sampleColor.r - sK) * sInvK;
                sM = (1.0 - sampleColor.g - sK) * sInvK;
                sY = (1.0 - sampleColor.b - sK) * sInvK;
              }

              // Select channel value
              float val;
              if (pass == 0) val = sK;
              else if (pass == 1) val = sC;
              else if (pass == 2) val = sM;
              else val = sY;

              // Dot noise
              if (uDotGrain > 0.0) {
                float noise = (hash21(vec2(gu, gv) * 127.1 + float(pass) * 311.7) - 0.5) * 2.0;
                val += noise * uDotGrain * 0.3;
                val = clamp(val, 0.0, 1.0);
              }

              // Contrast / ink curve
              if (uContrast > 0.0) {
                val = clamp((val - 0.5) * contrastMul + 0.5, 0.0, 1.0);
              }

              if (val < 0.01) continue;

              // Dot radius squared (density-dependent with dot gain)
              float dotR2 = halfCell2 * val;
              if (uBleed > 0.01) {
                dotR2 *= 1.0 + uBleed * val * 0.6;
              }

              // Distance from pixel to cell center (shape-dependent)
              float du = u - cu;
              float dv = v - cv;
              float dist2;
              if (uShape == 0) { // round
                dist2 = du * du + dv * dv;
              } else if (uShape == 1) { // elliptical
                float duS = du * 1.4;
                dist2 = duS * duS + dv * dv;
              } else if (uShape == 2) { // diamond
                float d = abs(du) + abs(dv);
                dist2 = d * d;
              } else if (uShape == 3) { // line
                dist2 = dv * dv;
              } else { // square
                float d = max(abs(du), abs(dv));
                dist2 = d * d;
              }

              // Coverage with dot gain edge softening
              float coverage;
              if (uBleed < 0.01) {
                coverage = dist2 <= dotR2 ? 1.0 : 0.0;
              } else {
                float innerR2 = dotR2 * innerMul * innerMul;
                float outerR2 = dotR2 * outerMul * outerMul;
                if (dist2 <= innerR2) {
                  coverage = 1.0;
                } else if (dist2 >= outerR2) {
                  coverage = 0.0;
                } else {
                  float d = sqrt(dist2);
                  float dotR = sqrt(dotR2);
                  float t = (d - dotR * innerMul) / (dotR * (outerMul - innerMul));
                  coverage = 1.0 - t * t * (3.0 - 2.0 * t);
                }
              }

              if (coverage <= 0.0) continue;
              maxCov = max(maxCov, coverage);

              // Multiply blend with ink weight
              float mult = 1.0 - coverage * inkOpacity;
              if (pass == 0) { // K -> all RGB
                out_rgb *= mult;
              } else if (pass == 1) { // C -> R
                out_rgb.r *= mult;
              } else if (pass == 2) { // M -> G
                out_rgb.g *= mult;
              } else { // Y -> B
                out_rgb.b *= mult;
              }
            }
          }

          // Paper show-through: blend uncovered areas with original
          if (uPaper < 1.0) {
            float showThrough = (1.0 - maxCov) * (1.0 - uPaper);
            out_rgb = mix(out_rgb, rgb, showThrough);
          }

          // Color mix: blend toward original colors
          if (uColorMix > 0.0) {
            out_rgb = mix(out_rgb, rgb, uColorMix);
          }

          fragColor = vec4(out_rgb, src.a);
        }
      `;

      // ========== FEEDBACK SHADER ==========
      const FRAG_FEEDBACK = `#version 300 es
        precision mediump float;
        in vec2 vUv;
        out vec4 fragColor;
        uniform sampler2D uTex;
        uniform sampler2D uPrev;
        uniform float uZoom;
        uniform float uRotation;
        uniform vec2 uCenter;
        uniform float uDecay;
        uniform float uColorShift;
        uniform float uIsFirst;
        vec3 hueShift(vec3 c, float a) {
          float co = cos(a), si = sin(a);
          vec3 w = vec3(0.2126, 0.7152, 0.0722);
          return vec3(
            dot(c, vec3(w.x+(1.0-w.x)*co-w.x*si, w.y-w.y*co-w.y*si, w.z-w.z*co+(1.0-w.z)*si)),
            dot(c, vec3(w.x-w.x*co+0.143*si, w.y+(1.0-w.y)*co+0.140*si, w.z-w.z*co-0.283*si)),
            dot(c, vec3(w.x-w.x*co-(1.0-w.x)*si, w.y-w.y*co+w.y*si, w.z+(1.0-w.z)*co+w.z*si))
          );
        }
        void main() {
          vec2 uv = vUv - uCenter;
          uv /= uZoom;
          float c = cos(uRotation), s = sin(uRotation);
          uv = vec2(uv.x*c - uv.y*s, uv.x*s + uv.y*c);
          uv += uCenter;
          // Soft edge fade instead of hard black cutoff
          vec2 edge = smoothstep(vec2(0.0), vec2(0.03), uv) * smoothstep(vec2(0.0), vec2(0.03), 1.0 - uv);
          float edgeFade = edge.x * edge.y;
          vec4 prev = texture(uPrev, clamp(uv, 0.0, 1.0)) * edgeFade;
          if (uColorShift > 0.001) prev.rgb = hueShift(prev.rgb, uColorShift);
          vec4 orig = texture(uTex, vUv);
          if (uIsFirst > 0.5) {
            fragColor = orig;
          } else {
            // Screen blend for brighter, more luminous trails
            vec3 blended = mix(orig.rgb, orig.rgb + prev.rgb * (1.0 - orig.rgb * 0.3), uDecay);
            fragColor = vec4(blended, max(orig.a, prev.a * uDecay));
          }
        }`;

      // ========== PIXEL SORT SHADER ==========
      // O(N) rank-offset: count how many in segment are darker, shift by rank difference
      const FRAG_PIXEL_SORT = `#version 300 es
        precision highp float;
        in vec2 vUv;
        out vec4 fragColor;
        uniform sampler2D uTex;
        uniform vec2 uRes;
        uniform float uAngle;
        uniform float uThreshold;
        uniform int uMaxLen;
        uniform int uMode;
        uniform float uReverse;
        float getSortVal(vec3 c) {
          if (uMode == 1) {
            float mx = max(c.r, max(c.g, c.b)), mn = min(c.r, min(c.g, c.b));
            float d = mx - mn;
            if (d < 0.001) return 0.0;
            float h = mx == c.r ? mod((c.g-c.b)/d, 6.0) : mx == c.g ? (c.b-c.r)/d+2.0 : (c.r-c.g)/d+4.0;
            return h / 6.0;
          }
          if (uMode == 2) {
            float mx = max(c.r, max(c.g, c.b)), mn = min(c.r, min(c.g, c.b));
            return mx < 0.001 ? 0.0 : (mx - mn) / mx;
          }
          return dot(c, vec3(0.2126, 0.7152, 0.0722));
        }
        void main() {
          vec2 dir = vec2(cos(uAngle), sin(uAngle));
          vec2 ps = dir / uRes;
          vec4 me = texture(uTex, vUv);
          float myVal = getSortVal(me.rgb);
          if (myVal < uThreshold) { fragColor = me; return; }
          // Find segment boundaries
          int back = 0;
          for (int i = 1; i <= 256; i++) {
            if (i > uMaxLen) break;
            vec2 uv = vUv - ps * float(i);
            if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) break;
            if (getSortVal(texture(uTex, uv).rgb) < uThreshold) break;
            back = i;
          }
          int fwd = 0;
          for (int i = 1; i <= 256; i++) {
            if (i > uMaxLen) break;
            vec2 uv = vUv + ps * float(i);
            if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) break;
            if (getSortVal(texture(uTex, uv).rgb) < uThreshold) break;
            fwd = i;
          }
          int segLen = back + fwd + 1;
          if (segLen < 2) { fragColor = me; return; }
          int myPos = back;
          // Count how many in segment have value < mine (= my rank in sorted order)
          int rank = 0;
          for (int i = -back; i <= fwd; i++) {
            float sv = getSortVal(texture(uTex, vUv + ps * float(i)).rgb);
            bool before = uReverse < 0.5 ? (sv < myVal) : (sv > myVal);
            if (before || (abs(sv - myVal) < 0.0001 && i < 0)) rank++;
          }
          // Shift: sample from the pixel whose position = rank
          int shift = rank - myPos;
          vec2 sampleUV = vUv + ps * float(shift);
          sampleUV = clamp(sampleUV, vec2(0.0), vec2(1.0));
          fragColor = texture(uTex, sampleUV);
        }`;

      // ========== GRADIENT MAP SHADER ==========
      const FRAG_GRADIENT_MAP = `#version 300 es
        precision mediump float;
        in vec2 vUv;
        out vec4 fragColor;
        uniform sampler2D uTex;
        uniform float uIntensity;
        uniform float uContrast;
        uniform float uMidpoint;
        uniform float uReverse;
        uniform vec3 uC0, uC1, uC2, uC3, uC4;
        vec3 sampleGradient(float t) {
          t = clamp(t, 0.0, 1.0);
          if (t < 0.25) return mix(uC0, uC1, t * 4.0);
          if (t < 0.5)  return mix(uC1, uC2, (t - 0.25) * 4.0);
          if (t < 0.75) return mix(uC2, uC3, (t - 0.5) * 4.0);
          return mix(uC3, uC4, (t - 0.75) * 4.0);
        }
        void main() {
          vec4 src = texture(uTex, vUv);
          float lum = dot(src.rgb, vec3(0.2126, 0.7152, 0.0722));
          float mid = uMidpoint;
          lum = mid + (lum - mid) * uContrast;
          lum = clamp(lum, 0.0, 1.0);
          if (uReverse > 0.5) lum = 1.0 - lum;
          vec3 mapped = sampleGradient(lum);
          fragColor = vec4(mix(src.rgb, mapped, uIntensity), src.a);
        }`;


      function glCmykHalftone(tex, w, h, fx, effectScale, gridStep) {
        const cellSize = gridStep > 0 ? gridStep : Math.max(2, Math.round((fx.params.dotSize || 8) * (effectScale || 1)));
        const prog = getProgram('cmykHalftone', FRAG_CMYK);
        if (!prog) return tex;
        const outFB = pingIsA ? fbA : fbB;
        gl.bindFramebuffer(gl.FRAMEBUFFER, outFB);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.useProgram(prog);
        gl.uniform1i(gl.getUniformLocation(prog, 'uTex'), 0);
        gl.uniform2f(gl.getUniformLocation(prog, 'uRes'), w, h);
        gl.uniform1f(gl.getUniformLocation(prog, 'uCellSize'), cellSize);
        gl.uniform1f(gl.getUniformLocation(prog, 'uContrast'), (fx.params.contrast ?? 50) / 100);
        gl.uniform1f(gl.getUniformLocation(prog, 'uBleed'), (fx.params.bleed ?? 30) / 100);
        gl.uniform1f(gl.getUniformLocation(prog, 'uInkWeight'), (fx.params.inkWeight ?? 50) / 100);
        gl.uniform1f(gl.getUniformLocation(prog, 'uPaper'), (fx.params.paper ?? 100) / 100);
        gl.uniform1f(gl.getUniformLocation(prog, 'uColorMix'), (fx.params.colorMix ?? 0) / 100);
        gl.uniform1f(gl.getUniformLocation(prog, 'uMisreg'), (fx.params.misreg ?? 0) / 100);
        gl.uniform1f(gl.getUniformLocation(prog, 'uDotGrain'), (fx.params.dotGrain ?? 15) / 100);
        gl.uniform1f(gl.getUniformLocation(prog, 'uPaperTone'), (fx.params.paperTone ?? 0) / 100);
        gl.uniform1f(gl.getUniformLocation(prog, 'uAngleShift'), fx.params.angleShift ?? 0);
        const shapeMap = { round: 0, elliptical: 1, diamond: 2, line: 3, square: 4, stochastic: 5 };
        gl.uniform1i(gl.getUniformLocation(prog, 'uShape'), shapeMap[fx.params.shape] ?? 0);
        drawQuad(prog);
        const outTex = pingIsA ? texA : texB;
        pingIsA = !pingIsA;
        return outTex;
      }

      // ========== NEW EFFECT RUNNERS ==========

      function glFeedback(tex, w, h, fx) {
        const p = fx.params;
        const zoom = p.zoom ?? 0.97;
        const rotation = (p.rotation ?? 1.5) * Math.PI / 180;
        const centerX = (p.centerX ?? 50) / 100;
        const centerY = (p.centerY ?? 50) / 100;
        const iterations = Math.max(1, Math.min(30, Math.round(p.iterations ?? 15)));
        const decay = (p.decay ?? 70) / 100;
        const colorShift = (p.colorShift ?? 8) / 100 * 0.4;
        const prog = getProgram('feedback', FRAG_FEEDBACK);
        if (!prog) return tex;
        const origTex = preserveOriginal(tex);
        let curTex = tex;
        for (let i = 0; i < iterations; i++) {
          const outFB = pingIsA ? fbA : fbB;
          gl.bindFramebuffer(gl.FRAMEBUFFER, outFB);
          gl.useProgram(prog);
          gl.activeTexture(gl.TEXTURE0);
          gl.bindTexture(gl.TEXTURE_2D, origTex);
          gl.uniform1i(gl.getUniformLocation(prog, 'uTex'), 0);
          gl.activeTexture(gl.TEXTURE1);
          gl.bindTexture(gl.TEXTURE_2D, curTex);
          gl.uniform1i(gl.getUniformLocation(prog, 'uPrev'), 1);
          gl.uniform1f(gl.getUniformLocation(prog, 'uZoom'), zoom);
          gl.uniform1f(gl.getUniformLocation(prog, 'uRotation'), rotation);
          gl.uniform2f(gl.getUniformLocation(prog, 'uCenter'), centerX, 1.0 - centerY);
          gl.uniform1f(gl.getUniformLocation(prog, 'uDecay'), decay);
          gl.uniform1f(gl.getUniformLocation(prog, 'uColorShift'), colorShift * (i + 1));
          gl.uniform1f(gl.getUniformLocation(prog, 'uIsFirst'), i === 0 ? 1.0 : 0.0);
          drawQuad(prog);
          curTex = pingIsA ? texA : texB;
          pingIsA = !pingIsA;
        }
        return curTex;
      }

      function glPixelSort(tex, w, h, fx) {
        const p = fx.params;
        const angle = (p.angle ?? 0) * Math.PI / 180;
        const threshold = (p.threshold ?? 25) / 100;
        const maxLen = Math.min(256, Math.max(1, Math.round(p.length ?? 80)));
        const modeMap = { luminance: 0, hue: 1, saturation: 2 };
        const mode = modeMap[p.mode] ?? 0;
        const reverse = (p.reverse ?? 0) > 0.5 ? 1.0 : 0.0;
        const prog = getProgram('pixelSort', FRAG_PIXEL_SORT);
        if (!prog) return tex;
        const outFB = pingIsA ? fbA : fbB;
        gl.bindFramebuffer(gl.FRAMEBUFFER, outFB);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.useProgram(prog);
        gl.uniform1i(gl.getUniformLocation(prog, 'uTex'), 0);
        gl.uniform2f(gl.getUniformLocation(prog, 'uRes'), w, h);
        gl.uniform1f(gl.getUniformLocation(prog, 'uAngle'), angle);
        gl.uniform1f(gl.getUniformLocation(prog, 'uThreshold'), threshold);
        gl.uniform1i(gl.getUniformLocation(prog, 'uMaxLen'), maxLen);
        gl.uniform1i(gl.getUniformLocation(prog, 'uMode'), mode);
        gl.uniform1f(gl.getUniformLocation(prog, 'uReverse'), reverse);
        drawQuad(prog);
        const outTex = pingIsA ? texA : texB;
        pingIsA = !pingIsA;
        return outTex;
      }

      function glGradientMap(tex, w, h, fx) {
        const p = fx.params;
        const intensity = (p.intensity ?? 100) / 100;
        if (intensity <= 0) return tex;
        const contrast = (p.contrast ?? 100) / 100;
        const midpoint = (p.midpoint ?? 50) / 100;
        const reverse = (p.reverse ?? 0) > 0.5 ? 1.0 : 0.0;
        // Use custom colors if preset is 'custom' or color params are hex strings
        let colors;
        if (p.preset === 'custom' || (p.color0 && p.color0.startsWith('#'))) {
          colors = [
            hexToRgb01(p.color0 || '#000000'),
            hexToRgb01(p.color1 || '#333333'),
            hexToRgb01(p.color2 || '#808080'),
            hexToRgb01(p.color3 || '#cccccc'),
            hexToRgb01(p.color4 || '#ffffff')
          ];
        } else {
          colors = GRADIENT_PRESETS[p.preset] || GRADIENT_PRESETS.neon;
        }
        const prog = getProgram('gradientMap', FRAG_GRADIENT_MAP);
        if (!prog) return tex;
        const outFB = pingIsA ? fbA : fbB;
        gl.bindFramebuffer(gl.FRAMEBUFFER, outFB);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.useProgram(prog);
        gl.uniform1i(gl.getUniformLocation(prog, 'uTex'), 0);
        gl.uniform1f(gl.getUniformLocation(prog, 'uIntensity'), intensity);
        gl.uniform1f(gl.getUniformLocation(prog, 'uContrast'), contrast);
        gl.uniform1f(gl.getUniformLocation(prog, 'uMidpoint'), midpoint);
        gl.uniform1f(gl.getUniformLocation(prog, 'uReverse'), reverse);
        gl.uniform3fv(gl.getUniformLocation(prog, 'uC0'), colors[0]);
        gl.uniform3fv(gl.getUniformLocation(prog, 'uC1'), colors[1]);
        gl.uniform3fv(gl.getUniformLocation(prog, 'uC2'), colors[2]);
        gl.uniform3fv(gl.getUniformLocation(prog, 'uC3'), colors[3]);
        gl.uniform3fv(gl.getUniformLocation(prog, 'uC4'), colors[4]);
        drawQuad(prog);
        const outTex = pingIsA ? texA : texB;
        pingIsA = !pingIsA;
        return outTex;
      }

      // ========== CHAIN RUNNER ==========
      // Returns true if the entire chain was handled on GPU, false otherwise
      function runChain(ctx, chain, context) {
        const { outW, outH, effectScale, geometry } = context;
        const w = outW, h = outH;

        // Check if all effects in chain can be handled by GL
        const glHandled = new Set(['sepia', 'grain', 'chromatic', 'pixelate', 'fractalGlass', 'lens', 'bloom', 'blur', 'halftone', 'feedback', 'pixelSort', 'gradientMap']);
        // Blur subtypes we handle
        const glBlurSubs = new Set(['gaussian', 'motion', 'radial', 'box']);
        const canDoAll = chain.every(fx => {
          if (!fx.enabled) return true;
          if (fx.type === 'blur') return glBlurSubs.has(fx.subtype);
          return glHandled.has(fx.type);
        });
        if (!canDoAll) return false;

        // Upload canvas to GPU
        let tex = uploadCanvas(ctx.canvas, w, h);

        for (const fx of chain) {
          if (!fx.enabled) continue;
          switch (fx.type) {
            case 'sepia': tex = glSepia(tex, w, h, fx); break;
            case 'grain': tex = glGrain(tex, w, h, fx, effectScale); break;
            case 'chromatic': tex = glChromatic(tex, w, h, fx, effectScale); break;
            case 'pixelate': tex = glPixelate(tex, w, h, fx, effectScale, context.gridStepY); break;
            case 'halftone': tex = glCmykHalftone(tex, w, h, fx, effectScale, context.gridStepY); break;
            case 'fractalGlass': tex = glFractalGlass(tex, w, h, fx, effectScale, geometry); break;
            case 'lens': tex = glLens(tex, w, h, fx, effectScale); break;
            case 'bloom': tex = glBloom(tex, w, h, fx, effectScale, context.asciiCanvas); break;
            case 'feedback': tex = glFeedback(tex, w, h, fx); break;
            case 'pixelSort': tex = glPixelSort(tex, w, h, fx); break;
            case 'gradientMap': tex = glGradientMap(tex, w, h, fx); break;
            case 'blur': {
              switch (fx.subtype) {
                case 'gaussian': tex = glGaussianBlur(tex, w, h, fx, effectScale); break;
                case 'motion': tex = glMotionBlur(tex, w, h, fx, effectScale); break;
                case 'radial': tex = glRadialBlur(tex, w, h, fx, effectScale); break;
                case 'box': tex = glGaussianBlur(tex, w, h, fx, effectScale); break; // box → gaussian approximation
              }
              break;
            }
          }
        }

        // Render final result to GL canvas and copy back
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        gl.viewport(0, 0, w, h);
        const copyProg = getProgram('copy', `#version 300 es
          precision mediump float;
          in vec2 vUv;
          out vec4 fragColor;
          uniform sampler2D uTex;
          void main() { fragColor = texture(uTex, vUv); }`);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.useProgram(copyProg);
        gl.uniform1i(gl.getUniformLocation(copyProg, 'uTex'), 0);
        drawQuad(copyProg);

        readBack(ctx, w, h);
        return true;
      }

      return { runChain, gl };
    })();

    const EFFECT_APPLY = {
      bloom: applyBloomEffect,
      grain: applyGrainEffect,
      sepia: applySepiaEffect,
      inkBleed: applyInkBleedEffect,
      chromatic: (ctx, fx, context) => applyChromaticAberration(ctx, context.outW, context.outH, fx),
      pixelate: (ctx, fx, context) => applyPixelate(ctx, context.outW, context.outH, fx, 1, null, context.gridStepY),
      halftone: (ctx, fx, context) => applyCmykHalftone(ctx, context.outW, context.outH, fx, context.effectScale, context.gridStepY, context.layer, context.geometry),
      fractalGlass: (ctx, fx, context) => applyFractalGlass(ctx, context.outW, context.outH, fx, context.effectScale, context.geometry, !!context.forExport, context.gridStepY, context.layer),
      blur: applyBlurEffect,
      lens: (ctx, fx, context) => applyLensEffect(ctx, context.outW, context.outH, fx, context.effectScale, context.geometry, !!context.forExport),
      feedback: () => {},
      pixelSort: () => {},
      gradientMap: () => {}
    };

    function getGlobalGridStep(geometry) {
      if (!state.forceGrid) return 0;
      return Math.max(2, Math.round(state.forceGridSize * geometry.scale));
    }

    function applyEffect(ctx, fx, context) {
      const fn = EFFECT_APPLY[fx.type];
      if (fn) fn(ctx, fx, context);
    }

    // Try to run an entire effect chain on the GPU. Returns true if handled.
    function applyEffectChainGL(ctx, chain, context) {
      if (!_glPipeline) return false;
      const enabled = chain.filter(fx => fx.enabled);
      if (enabled.length === 0) return true; // nothing to do
      return _glPipeline.runChain(ctx, enabled, context);
    }

    function buildPostProcessKey(layer, geometry, forExport) {
      const mask = getMask(layer);
      const chain = getEffectChain(layer);
      const frameKey = state.source === 'video'
        ? `${state.sourceVersion}:${state.sourceElement?.currentTime?.toFixed(3) || '0'}`
        : `${state.sourceVersion}`;
      const chainKey = chain.map(fx =>
        `${fx.type}:${fx.subtype || ''}:${fx.enabled ? 1 : 0}:${JSON.stringify(fx.params)}`
      ).join('|');
      // Include source layer effects in cache key for non-source layers,
      // since source effects propagate to all layers that render the source
      let srcEffectKey = '';
      if (layer.kind !== 'source') {
        const srcLayer = state.layers.find(l => l.kind === 'source');
        if (srcLayer) {
          const srcChain = getEffectChain(srcLayer);
          srcEffectKey = srcChain.map(fx =>
            `${fx.type}:${fx.enabled ? 1 : 0}:${JSON.stringify(fx.params)}`
          ).join('|');
        }
      }
      return [
        geometry.key,
        forExport ? 'export' : 'preview',
        frameKey,
        layer.variant,
        layer.cellSize,
        layer.gap,
        layer.font,
        layer.invert ? 1 : 0,
        layer.colorMode ? 1 : 0,
        layer.charRotation ? 1 : 0,
        state.forceGrid ? `${state.forceGridSize}:${state.forceGridPadding}` : 0,
        layer.brightness,
        layer.contrast,
        layer.saturation,
        layer.contourStyle,
        layer.contourSmoothing,
        layer.contourDetail,
        layer.contourThickness,
        layer.contourLevels,
        layer.contourFill ? 1 : 0,
        layer.contourSigmaRatio,
        layer.outlineStrokeSize,
        layer.outlineCornerRadius,
        layer.outlineLevels,
        layer.outlineSmoothing,
        layer.outlineMinSize,
        layer.outlineDepth,
        layer.outlineFillMode,
        layer.outlineStrokeOpacity,
        layer.wordArtifactEnabled ? 1 : 0,
        layer.wordArtifact,
        layer.wordArtifactDistribution,
        layer.wordArtifactDensity,
        layer.wordArtifactCoherence,
        chainKey,
        mask ? `${mask.inverted ? 1 : 0}:${mask.feather}:${mask.regions.map(r => r.op + r.points.length).join(',')}` : 'nomask',
        srcEffectKey
      ].join('|');
    }

    function computePostProcessWorkScale(outW, outH, forExport) {
      if (forExport) return 1;
      const targetPixels = state.source === 'video' ? 180000 : 360000;
      const raw = Math.sqrt(targetPixels / Math.max(1, outW * outH));
      return clamp(raw, 0.35, 1);
    }

    function buildInkBleedMask(sourceCanvas, layer, geometry, forExport) {
      const post = getPostProcess(layer);
      if (post.spread <= 0) return null;
      const { outW, outH, scale, offsetX, offsetY } = geometry;
      const workScale = computePostProcessWorkScale(outW, outH, forExport);
      const workW = Math.max(1, Math.round(outW * workScale));
      const workH = Math.max(1, Math.round(outH * workScale));
      const seed = hashString(layer.id);
      const cellPx = Math.max(1, layer.cellSize * scale * workScale);

      // Normalize controls to 0..1
      const nSpread = post.spread / 100;
      const nOrganic = post.organic / 100;
      const nSplatter = post.splatter / 100;
      const nRound = post.roundness / 100;
      const nSoft = post.softness / 100;

      /* ── 1. Source at work resolution ── */
      const srcC = getScratchCanvas(`pp-src-${layer.id}`, workW, workH);
      const srcX = srcC.getContext('2d', { willReadFrequently: true });
      srcX.clearRect(0, 0, workW, workH);
      srcX.drawImage(sourceCanvas, 0, 0, workW, workH);

      /* ── 2. Gaussian blur → SDF approximation ── */
      // Gentler curve: visible effect starts around spread=10,
      // ramps steadily, heavy merging at high values.
      const spreadCurve = Math.pow(nSpread, 1.15);
      const blurR = spreadCurve * cellPx * 1.5 + spreadCurve * 3;
      const sdfC = getScratchCanvas(`pp-sdf-${layer.id}`, workW, workH);
      blurCanvas(srcC, sdfC, blurR);

      /* ── 2b. Splatter: proximity field for scatter zone ── */
      // A moderate blur defines how far from content splatters can appear.
      // Cubic curve so low values are subtle, high values reach further.
      let splatterField = null;
      if (nSplatter > 0.01) {
        const splatterCurve = Math.pow(nSplatter, 2.5);
        const splatterReach = cellPx * (0.4 + splatterCurve * 2.5);
        const splC = getScratchCanvas(`pp-splat-field-${layer.id}`, workW, workH);
        blurCanvas(srcC, splC, splatterReach);
        const splX = splC.getContext('2d', { willReadFrequently: true });
        splatterField = splX.getImageData(0, 0, workW, workH).data;
      }

      /* ── 3. Noise-modulated threshold + splatter → organic blob shape ── */
      const sdfX = sdfC.getContext('2d', { willReadFrequently: true });
      const sdfImg = sdfX.getImageData(0, 0, workW, workH);
      const px = sdfImg.data;

      // Lower starting threshold so small spread values still produce
      // visible expansion. Range: 0.38 (spread=0) → 0.02 (spread=100)
      const baseThresh = 0.38 - spreadCurve * 0.36;
      const organicPow = Math.pow(nOrganic, 0.7);
      const noiseFreqA = 14 + (1 - nOrganic / 100) * 30;
      const noiseFreqB = noiseFreqA * 0.3;

      // Splatter noise uses a separate frequency for distinct small blobs
      const splatterFreq = 3 + (1 - nSplatter) * 5;
      // Cubic curve on threshold: at low values almost nothing passes,
      // gradually opens up. Range: 0.92 (splatter=0) → 0.52 (splatter=100)
      const splatterCurve = Math.pow(nSplatter, 2.5);
      const splatterThresh = 0.92 - splatterCurve * 0.40;
      // Require meaningful proximity — must be close-ish to content
      const splatterMinAlpha = 0.06;

      for (let y = 0; y < workH; y++) {
        for (let x = 0; x < workW; x++) {
          const i = (y * workW + x) * 4;
          const alpha = px[i + 3] / 255;

          const sx = ((x / workScale) - offsetX) / Math.max(1e-4, scale);
          const sy = ((y / workScale) - offsetY) / Math.max(1e-4, scale);

          const n1 = fbmNoise2D(sx / noiseFreqA, sy / noiseFreqA, seed);
          const n2 = fbmNoise2D(sx / noiseFreqB, sy / noiseFreqB, seed + 777);
          const noise = (n1 * 0.6 + n2 * 0.4) * 2 - 1;

          const thresh = baseThresh + noise * organicPow * 0.35;
          let keep = alpha > thresh;

          // Splatter: in the outer zone beyond normal expansion,
          // noise peaks create small isolated ink blobs
          if (!keep && splatterField) {
            const proximity = splatterField[i + 3] / 255;
            if (proximity > splatterMinAlpha) {
              const sn = fbmNoise2D(sx / splatterFreq, sy / splatterFreq, seed + 4919);
              // Proximity gates: closer to content = slightly easier to splatter
              const proxBoost = proximity * 0.12;
              keep = sn > (splatterThresh - proxBoost);
            }
          }

          px[i + 3] = keep ? 255 : 0;
        }
      }
      sdfX.putImageData(sdfImg, 0, 0);

      /* ── 4. Roundness: blur+threshold passes smooth the blob edges ── */
      // Each pass smooths jagged noise edges into rounder, more liquid shapes.
      const passes = Math.max(0, Math.round(nRound * 5));
      const smoothR = 0.6 + nRound * 2.0 + spreadCurve * 1.2;
      const tmpC = getScratchCanvas(`pp-round-${layer.id}`, workW, workH);

      for (let p = 0; p < passes; p++) {
        blurCanvas(sdfC, tmpC, smoothR);
        // Hard threshold at 0.5 to re-binarize
        const tX = tmpC.getContext('2d', { willReadFrequently: true });
        const tImg = tX.getImageData(0, 0, workW, workH);
        const td = tImg.data;
        for (let i = 3; i < td.length; i += 4) td[i] = td[i] > 128 ? 255 : 0;
        tX.putImageData(tImg, 0, 0);
        copyCanvas(tmpC, sdfC);
      }

      /* ── 5. Ensure original content always included ── */
      const sdfCtx = sdfC.getContext('2d');
      sdfCtx.globalCompositeOperation = 'lighter';
      sdfCtx.drawImage(srcC, 0, 0);
      sdfCtx.globalCompositeOperation = 'source-over';

      /* ── 6. Softness: optional gradient edges ── */
      // At softness=0 edges are crisp binary (print/stamp look).
      // At softness=100 edges fade out smoothly (spray-paint look).
      // Exponential curve: most of the 0-100 range is subtle feathering,
      // only the top end gives heavy spray-paint blur.
      if (nSoft > 0.01) {
        const softCurve = Math.pow(nSoft, 3);
        const softBlurR = softCurve * (cellPx * 0.5 + spreadCurve * cellPx * 0.8);
        const softC = getScratchCanvas(`pp-soft-${layer.id}`, workW, workH);
        blurCanvas(sdfC, softC, softBlurR);
        copyCanvas(softC, sdfC);
      } else {
        // Hard binarize for crisp edges
        const fX = sdfC.getContext('2d', { willReadFrequently: true });
        const fImg = fX.getImageData(0, 0, workW, workH);
        const fd = fImg.data;
        for (let i = 3; i < fd.length; i += 4) fd[i] = fd[i] > 20 ? 255 : 0;
        fX.putImageData(fImg, 0, 0);
      }

      /* ── 7. Upscale to output resolution ── */
      const outC = getScratchCanvas(`pp-final-mask-${layer.id}`, outW, outH);
      const outX = outC.getContext('2d', { willReadFrequently: true });
      outX.clearRect(0, 0, outW, outH);
      outX.imageSmoothingEnabled = true;
      outX.drawImage(sdfC, 0, 0, outW, outH);

      // Composite original at full res to guarantee it's always present
      outX.globalCompositeOperation = 'lighter';
      outX.drawImage(sourceCanvas, 0, 0);
      outX.globalCompositeOperation = 'source-over';

      return outC;
    }

    function applyPostProcess(layerCtx, layer, geometry, forExport) {
      const post = getPostProcess(layer);
      if (!post.enabled || post.spread <= 0) return;
      const { outW, outH, scale, offsetX, offsetY } = geometry;

      /* ── Snapshot original layer content ── */
      const origC = getScratchCanvas(`pp-orig-${layer.id}`, outW, outH);
      origC.getContext('2d').drawImage(layerCtx.canvas, 0, 0);

      /* ── Build or retrieve cached mask ── */
      const cacheKey = buildPostProcessKey(layer, geometry, forExport);
      let mask = null;
      const canCache = state.source !== 'video' || (state.sourceElement && state.sourceElement.paused);
      const entry = postProcessCache.get(layer.id);
      if (canCache && entry && entry.key === cacheKey) {
        mask = entry.canvas;
      } else {
        mask = buildInkBleedMask(origC, layer, geometry, forExport);
        if (canCache) postProcessCache.set(layer.id, { key: cacheKey, canvas: mask });
      }
      if (!mask) return;

      const nSpread = post.spread / 100;
      const nSplatter = post.splatter / 100;
      const nSoft = post.softness / 100;
      const spreadCurve = Math.pow(nSpread, 1.15);
      const splatterCurve = Math.pow(nSplatter, 2.5);

      /* ── Color-spread: blur original so expansion area picks up nearby colors ── */
      // Must reach at least as far as the mask (including splatter) expands,
      // otherwise expansion pixels have no color (show as black).
      const cellScreen = Math.max(1, layer.cellSize * scale);
      const splatterReach = splatterCurve * cellScreen * 2.5;
      const colorBlurR = Math.max(cellScreen * 0.6, spreadCurve * cellScreen * 1.2 + spreadCurve * 4, splatterReach);

      const fillC = getScratchCanvas(`pp-fill-${layer.id}`, outW, outH);
      const fillX = fillC.getContext('2d');
      fillX.clearRect(0, 0, outW, outH);
      if (colorBlurR > 0.5) fillX.filter = `blur(${colorBlurR}px)`;
      fillX.drawImage(origC, 0, 0);
      fillX.filter = 'none';
      // Crisp original on top so center stays sharp
      fillX.drawImage(origC, 0, 0);

      /* ── Apply mask ── */
      fillX.globalCompositeOperation = 'destination-in';
      fillX.drawImage(mask, 0, 0);
      fillX.globalCompositeOperation = 'source-over';

      /* ── Solidify alpha where mask is active (for hard mode) ── */
      const maskData = mask.getContext('2d', { willReadFrequently: true })
        .getImageData(0, 0, outW, outH).data;
      const fillImg = fillX.getImageData(0, 0, outW, outH);
      const fd = fillImg.data;

      if (nSoft < 0.01) {
        // Hard edges: fully opaque wherever mask > threshold
        for (let i = 0; i < outW * outH; i++) {
          if (maskData[i * 4 + 3] > 20) fd[i * 4 + 3] = 255;
        }
      } else {
        // Soft edges: preserve the gradient alpha from the mask
        for (let i = 0; i < outW * outH; i++) {
          const ma = maskData[i * 4 + 3];
          if (ma > fd[i * 4 + 3]) fd[i * 4 + 3] = ma;
        }
      }

      fillX.putImageData(fillImg, 0, 0);
      layerCtx.clearRect(0, 0, outW, outH);
      layerCtx.drawImage(fillC, 0, 0);
    }

    function clientToCanvasPoint(clientX, clientY) {
      const rect = outputCanvas.getBoundingClientRect();
      return {
        x: (clientX - rect.left) * (outputCanvas.width / rect.width),
        y: (clientY - rect.top) * (outputCanvas.height / rect.height)
      };
    }

    function canvasToSourcePoint(canvasX, canvasY, geometry) {
      const transform = getImageTransform(geometry);
      if (!transform) return { x: 0, y: 0, inside: false };
      const { rect, scaleX, scaleY } = transform;
      const rawX = (canvasX - rect.left) / Math.max(1e-4, scaleX);
      const rawY = (canvasY - rect.top) / Math.max(1e-4, scaleY);
      return {
        x: clamp(rawX, 0, geometry.srcW),
        y: clamp(rawY, 0, geometry.srcH),
        inside: rawX >= 0 && rawX <= geometry.srcW && rawY >= 0 && rawY <= geometry.srcH
      };
    }

    function sourceToCanvasPoint(x, y, geometry) {
      const transform = getImageTransform(geometry);
      if (!transform) return { x: 0, y: 0 };
      const { rect, scaleX, scaleY } = transform;
      return {
        x: rect.left + x * scaleX,
        y: rect.top + y * scaleY
      };
    }

    let lastFrameTime = 0;
    const targetFrameInterval = 1000 / 30;

    function renderLoop(timestamp) {
      if (state.source !== 'video') {
        animFrameId = null;
        return;
      }
      const video = state.sourceElement;
      if (video.paused && lastFrameTime > 0) {
        animFrameId = requestAnimationFrame(renderLoop);
        return;
      }
      if (timestamp - lastFrameTime >= targetFrameInterval) {
        render();
        updateTimeDisplay();
        lastFrameTime = timestamp;
      }
      animFrameId = requestAnimationFrame(renderLoop);
    }

    function updateTimeDisplay() {
      if (state.source !== 'video') return;
      const video = state.sourceElement;

      document.getElementById('seekBar').value = (video.currentTime / video.duration) * 100;

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;

    // ============ VARIANTS ============
    function popcount(n) { let c = 0; while (n) { c += n & 1; n >>= 1; } return c; }

    function generateBrailleChars() {
      const chars = [];
      for (let i = 1; i < 256; i++) {
        const bits = popcount(i);
        if (bits < 3) continue;
        chars.push({ cp: 0x2800 + i, bits });
      }
      chars.sort((a, b) => a.bits - b.bits || a.cp - b.cp);
      return chars.map(c => String.fromCharCode(c.cp)).join('');
    }

    // ============ ARROW KEY NUDGE FOR NUMBER INPUTS ============
    // Up/Down arrow keys adjust the value by the paired range slider's step.
    // Shift multiplies step by 10 for coarse adjustment.
    document.getElementById('settingsDrawer').addEventListener('keydown', (e) => {
      if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
      const el = e.target;
      if (el.tagName !== 'INPUT' || el.type !== 'text') return;
      // Find the paired range slider — it's the next range input in the same container
      const container = el.closest('.flex.flex-col.gap-2');
      if (!container) return;
      const slider = container.querySelector('input[type="range"]');
      if (!slider) return;

      e.preventDefault();
      const step = parseFloat(slider.step) || 1;
      const min = parseFloat(slider.min);
      const max = parseFloat(slider.max);
      const mult = e.shiftKey ? 10 : 1;
      const dir = e.key === 'ArrowUp' ? 1 : -1;
      const cur = parseFloat(el.value) || 0;
      const next = Math.round((cur + dir * step * mult) * 1e6) / 1e6;
      const clamped = Math.min(max, Math.max(min, next));
      el.value = clamped;
      el.dispatchEvent(new Event('change'));
    });

    function getSourceDimensions() {
      const src = state.sourceElement;
      if (src) {
        const w = src.videoWidth || src.naturalWidth || src.width || sourceCanvas.width;
        const h = src.videoHeight || src.naturalHeight || src.height || sourceCanvas.height;
        if (w > 0 && h > 0) return { w, h };
      }
      if (sourceCanvas.width > 0 && sourceCanvas.height > 0) {
        return { w: sourceCanvas.width, h: sourceCanvas.height };
      }
      return null;
    }

    function getAdaptiveCellSizeMax(layer = activeLayer()) {
      const dims = getSourceDimensions();
      const layerSize = layer && layer.kind !== 'source' ? layer.cellSize || CELL_SIZE_DEFAULT : CELL_SIZE_DEFAULT;
      if (!dims) return Math.max(CELL_SIZE_EMPTY_MAX, layerSize);
      const shorterEdge = Math.min(dims.w, dims.h);
      const adaptiveMax = Math.round(shorterEdge / 12);
      return clamp(Math.max(CELL_SIZE_BASE_MAX, adaptiveMax, layerSize), CELL_SIZE_BASE_MAX, CELL_SIZE_ABS_MAX);
    }

    function syncCellSizeControlRange(layer = activeLayer()) {
      const max = getAdaptiveCellSizeMax(layer);
      cellSizeInput.min = CELL_SIZE_MIN;
      cellSizeInput.max = max;

    function getEffectLabel(fx) {
      const reg = EFFECT_REGISTRY[fx.type];
      if (!reg) return fx.type;
      if (reg.subtypes && fx.subtype) {
        const st = reg.subtypes[fx.subtype];
        return st ? st.label : reg.label;
      }
      return reg.label;
    }

    function getEffectParams(fx) {
      const reg = EFFECT_REGISTRY[fx.type];
      if (!reg) return [];
      if (reg.subtypes && fx.subtype) {
        const st = reg.subtypes[fx.subtype];
        return st ? st.params : [];
      }
      return reg.params || [];
    }

    function renderEffectChainUI() {
