          if (comp.removed) { compColors.push(null); continue; }
          let rSum = 0, gSum = 0, bSum = 0;
          for (const idx of comp.cells) {
            rSum += cellR[idx]; gSum += cellG[idx]; bSum += cellB[idx];
          }
          const n = comp.cells.length;
          compColors.push({ r: rSum / n, g: gSum / n, b: bSum / n });
        }
      }

      // Depth shadow offset
      const depthOx = depth * scale * 0.5;
      const depthOy = depth * scale * 0.5;

      // Helper: draw filled rect for a cell
      function fillCell(row, col, color, ox, oy) {
        outputCtx.fillStyle = color;
        const x = offsetX + col * strideScale + ox;
        const y = offsetY + row * strideScale + oy;
        outputCtx.fillRect(x, y, strideScale, strideScale);
      }

      // Render levels back-to-front for depth
      const levelOrder = [];
      for (let l = 0; l < levels; l++) levelOrder.push(l);

      // Draw fill
      if (fillMode !== 'off') {
        const fillColor = layer.outlineFillColor || '#1f7a4f';
        const fillRgb = hexToRgb(fillColor) || { r: 31, g: 122, b: 79 };

        for (const l of levelOrder) {
          for (const comp of components) {
            if (comp.removed || comp.level !== l || comp.id === exteriorId) continue;

            // Depth shadow
            if (depth > 0) {
              for (const idx of comp.cells) {
                fillCell(Math.floor(idx / cols), idx % cols, 'rgba(0,0,0,0.3)', depthOx, depthOy);
              }
            }

            // Fill color
            let color;
            if (fillMode === 'solid') {
              color = fillColor;
            } else if (fillMode === 'source') {
              const cc = compColors[comp.id];
              color = cc ? `rgb(${Math.round(cc.r)},${Math.round(cc.g)},${Math.round(cc.b)})` : fillColor;
            } else if (fillMode === 'tinted') {
              const cc = compColors[comp.id];
              if (cc) {
                const lumFactor = (cc.r * 0.299 + cc.g * 0.587 + cc.b * 0.114) / 255;
                const tr = Math.round(fillRgb.r * lumFactor);
                const tg = Math.round(fillRgb.g * lumFactor);
                const tb = Math.round(fillRgb.b * lumFactor);
                color = `rgb(${tr},${tg},${tb})`;
              } else {
                color = fillColor;
              }
            }

            for (const idx of comp.cells) {
              fillCell(Math.floor(idx / cols), idx % cols, color, 0, 0);
            }
          }
        }
      }

      // Stroke rendering with corner radius
      const strokeColor = getLayerDrawColor(layer, '#ffffff');
      if (strokeOpacity > 0) {
        outputCtx.save();
        outputCtx.globalAlpha = strokeOpacity;
        outputCtx.strokeStyle = strokeColor;
        outputCtx.lineWidth = strokeWidth;
        outputCtx.lineJoin = 'round';
        outputCtx.lineCap = 'round';

        // Compute vertex corner codes for rounded corners
        const vertexCodes = new Uint8Array((rows + 1) * (cols + 1));
        if (cr > 0) {
          for (let vr = 0; vr <= rows; vr++) {
            for (let vc = 0; vc <= cols; vc++) {
              const hasLeft = vc > 0 && hEdges[vr * cols + (vc - 1)] === 1;
              const hasRight = vc < cols && hEdges[vr * cols + vc] === 1;
              const hasUp = vr > 0 && vEdges[(vr - 1) * (cols + 1) + vc] === 1;
              const hasDown = vr < rows && vEdges[vr * (cols + 1) + vc] === 1;
              const hc = (hasLeft ? 1 : 0) + (hasRight ? 1 : 0);
              const vc2 = (hasUp ? 1 : 0) + (hasDown ? 1 : 0);
              if (hc !== 1 || vc2 !== 1) continue;
              let code = 0;
              if (hasRight && hasDown) code = 1;
              else if (hasLeft && hasDown) code = 2;
              else if (hasRight && hasUp) code = 3;
              else if (hasLeft && hasUp) code = 4;
              vertexCodes[vr * (cols + 1) + vc] = code;
            }
          }
        }

        outputCtx.beginPath();
        // Horizontal edges
        for (let row = 0; row <= rows; row++) {
          for (let col = 0; col < cols; col++) {
            if (!hEdges[row * cols + col]) continue;
            const leftCode = vertexCodes[row * (cols + 1) + col];
            const rightCode = vertexCodes[row * (cols + 1) + col + 1];
            const trimStart = (leftCode === 1 || leftCode === 3) ? cr : 0;
            const trimEnd = (rightCode === 2 || rightCode === 4) ? cr : 0;
            const x1 = offsetX + col * strideScale + trimStart;
            const x2 = offsetX + (col + 1) * strideScale - trimEnd;
            const y = offsetY + row * strideScale;
            if (x2 <= x1) continue;
            outputCtx.moveTo(x1, y);
            outputCtx.lineTo(x2, y);
          }
        }
        // Vertical edges
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col <= cols; col++) {
            if (!vEdges[row * (cols + 1) + col]) continue;
            const topCode = vertexCodes[row * (cols + 1) + col];
            const bottomCode = vertexCodes[(row + 1) * (cols + 1) + col];
            const trimStart = (topCode === 1 || topCode === 2) ? cr : 0;
            const trimEnd = (bottomCode === 3 || bottomCode === 4) ? cr : 0;
            const x = offsetX + col * strideScale;
            const y1 = offsetY + row * strideScale + trimStart;
            const y2 = offsetY + (row + 1) * strideScale - trimEnd;
            if (y2 <= y1) continue;
            outputCtx.moveTo(x, y1);
            outputCtx.lineTo(x, y2);
          }
        }
        // Rounded corners using quadraticCurveTo for smoother results
        if (cr > 0) {
          for (let row = 0; row <= rows; row++) {
            for (let col = 0; col <= cols; col++) {
              const code = vertexCodes[row * (cols + 1) + col];
              if (!code) continue;
              const x = offsetX + col * strideScale;
              const y = offsetY + row * strideScale;
              if (code === 1) { // top-left corner of a shape going right-down
                outputCtx.moveTo(x + cr, y);
                outputCtx.quadraticCurveTo(x, y, x, y + cr);
              } else if (code === 2) { // top-right going left-down
                outputCtx.moveTo(x - cr, y);
                outputCtx.quadraticCurveTo(x, y, x, y + cr);
              } else if (code === 3) { // bottom-left going right-up
                outputCtx.moveTo(x + cr, y);
                outputCtx.quadraticCurveTo(x, y, x, y - cr);
              } else if (code === 4) { // bottom-right going left-up
                outputCtx.moveTo(x - cr, y);
                outputCtx.quadraticCurveTo(x, y, x, y - cr);
              }
            }
          }
        }
        outputCtx.stroke();
        outputCtx.restore();
      }
    }

    // ============ HIGHLIGHT MODE ============
    // Shared Canny pipeline used by both render and transparent export
    function computeHighlightEdges(pixels, srcW, srcH, cols, rows, cellSize, layer) {
      const stride = Math.round(cellSize * (1 + layer.gap));
      const n = rows * cols;
      const mags = new Float32Array(n);
      const angles = new Float32Array(n);

      // Sobel pass — sample multiple points per cell and keep the strongest edge
      const sampleStep = Math.max(1, Math.floor(cellSize / 3));
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          let bestMag = 0, bestAngle = 0;
          for (let dy = 0; dy < cellSize; dy += sampleStep) {
            for (let dx = 0; dx < cellSize; dx += sampleStep) {
              const px = col * stride + dx;
              const py = row * stride + dy;
              const { magnitude, angle } = sobelAt(pixels, srcW, srcH, px, py);
              if (magnitude > bestMag) { bestMag = magnitude; bestAngle = angle; }
            }
          }
          mags[row * cols + col] = bestMag;
          angles[row * cols + col] = bestAngle;
        }
      }

      // Non-maximum suppression
      const nms = new Uint8Array(n);
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const idx = row * cols + col;
          const mag = mags[idx];
          if (mag < 10) continue;
          const a = ((angles[idx] % Math.PI) + Math.PI) % Math.PI;
          let dr1, dc1, dr2, dc2;
          if (a < Math.PI * 0.125 || a >= Math.PI * 0.875) { dr1=0;dc1=-1;dr2=0;dc2=1; }
          else if (a < Math.PI * 0.375) { dr1=-1;dc1=-1;dr2=1;dc2=1; }
          else if (a < Math.PI * 0.625) { dr1=-1;dc1=0;dr2=1;dc2=0; }
          else { dr1=-1;dc1=1;dr2=1;dc2=-1; }
          const r1=row+dr1,c1=col+dc1,r2=row+dr2,c2=col+dc2;
          const m1=(r1>=0&&r1<rows&&c1>=0&&c1<cols)?mags[r1*cols+c1]:0;
          const m2=(r2>=0&&r2<rows&&c2>=0&&c2<cols)?mags[r2*cols+c2]:0;
          if (mag >= m1 && mag >= m2) nms[idx] = 1;
        }
      }

      // Hysteresis
      const strongThresh = 50;
      const weakThresh = 20;
      const keep = new Uint8Array(n);
      const queue = [];
      for (let i = 0; i < n; i++) {
        if (!nms[i]) continue;
        if (mags[i] >= strongThresh) { keep[i] = 2; queue.push(i); }
        else if (mags[i] >= weakThresh) keep[i] = 1;
      }
      while (queue.length > 0) {
        const idx = queue.shift();
        const r = Math.floor(idx / cols), c = idx % cols;
        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
          if (!dr && !dc) continue;
          const nr = r+dr, nc = c+dc;
          if (nr>=0 && nr<rows && nc>=0 && nc<cols) {
            const ni = nr*cols+nc;
            if (keep[ni] === 1) { keep[ni] = 2; queue.push(ni); }
          }
        }
      }

      // Connected component filtering — remove short fragments
      const minChainLength = Math.max(3, Math.min(10, Math.floor(Math.min(cols, rows) / 5)));
      const labels = new Int32Array(n).fill(-1);
      const components = []; // array of arrays of indices
      let labelId = 0;
      for (let i = 0; i < n; i++) {
        if (keep[i] !== 2 || labels[i] >= 0) continue;
        const comp = [];
        const bfs = [i];
        labels[i] = labelId;
        while (bfs.length > 0) {
          const idx = bfs.shift();
          comp.push(idx);
          const r = Math.floor(idx / cols), c = idx % cols;
          for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
            if (!dr && !dc) continue;
            const nr = r+dr, nc = c+dc;
            if (nr>=0 && nr<rows && nc>=0 && nc<cols) {
              const ni = nr*cols+nc;
              if (keep[ni] === 2 && labels[ni] < 0) {
                labels[ni] = labelId;
                bfs.push(ni);
              }
            }
          }
        }
        components.push(comp);
        labelId++;
      }

      // Build final keep set — only cells in long-enough chains
      const finalKeep = new Uint8Array(n);
      for (const comp of components) {
        if (comp.length >= minChainLength) {
          for (const idx of comp) finalKeep[idx] = 1;
        }
      }

      return { mags, angles, finalKeep };
    }

    function angleToChar(angle) {
      // Sobel gives gradient direction (perpendicular to edge).
      // Rotate 90° to get edge direction, then map to character.
      const edgeAngle = angle + Math.PI * 0.5;
      const a = ((edgeAngle % Math.PI) + Math.PI) % Math.PI;
      if (a < Math.PI * 0.125 || a >= Math.PI * 0.875) return '-';
      if (a < Math.PI * 0.375) return '\\';
      if (a < Math.PI * 0.625) return '|';
      return '/';
    }

    function drawHighlightChars(ctx, mags, angles, finalKeep, pixels, srcW, cols, rows, cellSize, scale, offsetX, offsetY, layer, maskMetrics) {
      const stride = Math.round(cellSize * (1 + layer.gap));
      const fontSize = cellSize * scale * gapFontScale(layer.gap);
      ctx.font = `${fontSize}px ${layer.font}`;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const idx = row * cols + col;
          if (!finalKeep[idx]) continue;
          const cx = col * stride + Math.floor(cellSize / 2);
          const cy = row * stride + Math.floor(cellSize / 2);
          const strength = sampleMaskStrength(maskMetrics, cx, cy);
          if (!shouldRenderByStrength(strength, row, col)) continue;

          let char = angleToChar(angles[idx]);
          if (strength < 0.7) char = strength < 0.4 ? '.' : ':';
          const aChar = wordArtifactChar(row, col, layer);
          if (aChar && strength > 0.66) char = aChar;
          const x = offsetX + (col + 0.5) * stride * scale;
          const y = offsetY + (row + 0.5) * stride * scale;

          let fill = '#ffffff';
          if (layer.colorMode) {
            const pi = sourcePixelOffset(srcW, srcH, cx, cy);
            fill = `rgb(${pixels[pi]},${pixels[pi+1]},${pixels[pi+2]})`;
          }

          ctx.fillStyle = getLayerDrawColor(layer, fill);
          const hlPad = state.forceGrid ? state.forceGridPadding / 100 : 0;
          if (hlPad > 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(1 - hlPad, 1 - hlPad);
            ctx.fillText(char, 0, 0);
            ctx.restore();
          } else {
            ctx.fillText(char, x, y);
          }
        }
      }
    }

    function renderHighlight(pixels, srcW, srcH, cols, rows, cellSize, scale, offsetX, offsetY, layer, maskMetrics) {
      const drawW = srcW * scale;
      const drawH = srcH * scale;

      // Background: render() handles black fill and imageUnderlay image draw

      const { mags, angles, finalKeep } = computeHighlightEdges(pixels, srcW, srcH, cols, rows, cellSize, layer);
      drawHighlightChars(outputCtx, mags, angles, finalKeep, pixels, srcW, cols, rows, cellSize, scale, offsetX, offsetY, layer, maskMetrics);
    }

    // Update selection mode label on modifier key changes
    function updateModeFromModifiers(e) {
      if (!selectionState.active || selectionState.drawing) return;
      selectionState.compositionMode =
        (e.shiftKey && e.altKey) ? 'intersect' :
        e.shiftKey ? 'add' :
        e.altKey ? 'subtract' : 'new';
      updateSelectionModeLabel();
    }

    outputCanvas.addEventListener('pointerdown', (e) => {
      if (!state.sourceElement) return;
      // Click-and-drag to set center for full-frame fractal textures (e.g. lens)
      if (!selectionState.active) {
        const layer = activeLayer();
        if (layer && layer.effectChain) {
          const fx = layer.effectChain.find(f => f.enabled && (
            (f.type === 'fractalGlass' && FULL_FRAME_TEXTURES.has(f.params.texture)) ||
            f.type === 'feedback'
          ));
          if (fx) {
            const geometry = getRenderGeometry();
            if (geometry) {
              const cp = clientToCanvasPoint(e.clientX, e.clientY);
              const sp = canvasToSourcePoint(cp.x, cp.y, geometry);
              if (sp.inside) {
                fx.params.centerX = Math.round(sp.x / geometry.srcW * 1000) / 10;
                fx.params.centerY = Math.round(sp.y / geometry.srcH * 1000) / 10;
                syncUIToLayer(layer);
                scheduleRender();
                // Start drag tracking
                outputCanvas.setPointerCapture(e.pointerId);
                const dragState = { fx, layer, pointerId: e.pointerId };
                const onMove = (me) => {
                  if (me.pointerId !== dragState.pointerId) return;
                  const curGeo = getRenderGeometry();
                  if (!curGeo) return;
                  const mcp = clientToCanvasPoint(me.clientX, me.clientY);
                  const msp = canvasToSourcePoint(mcp.x, mcp.y, curGeo);
                  dragState.fx.params.centerX = clamp(Math.round(msp.x / curGeo.srcW * 1000) / 10, 0, 100);
                  dragState.fx.params.centerY = clamp(Math.round(msp.y / curGeo.srcH * 1000) / 10, 0, 100);
                  syncUIToLayer(dragState.layer);
                  scheduleRender();
                };
                const onUp = (ue) => {
                  if (ue.pointerId !== dragState.pointerId) return;
                  outputCanvas.removeEventListener('pointermove', onMove);
                  outputCanvas.removeEventListener('pointerup', onUp);
                  outputCanvas.removeEventListener('pointercancel', onUp);
                  if (outputCanvas.hasPointerCapture(ue.pointerId)) outputCanvas.releasePointerCapture(ue.pointerId);
                };
                outputCanvas.addEventListener('pointermove', onMove);
                outputCanvas.addEventListener('pointerup', onUp);
                outputCanvas.addEventListener('pointercancel', onUp);
                e.preventDefault();
              }
            }
          }
        }
        return;
      }
      const geometry = getRenderGeometry();
      if (!geometry) return;
      const canvasPoint = clientToCanvasPoint(e.clientX, e.clientY);
      const sourcePoint = canvasToSourcePoint(canvasPoint.x, canvasPoint.y, geometry);
      if (!sourcePoint.inside) return;

      selectionState.compositionMode =
        (e.shiftKey && e.altKey) ? 'intersect' :
        e.shiftKey ? 'add' :
        e.altKey ? 'subtract' : 'new';
      updateSelectionModeLabel();
      selectionState.drawing = true;
      selectionState.pointerId = e.pointerId;
      selectionState.rawPoints = [[sourcePoint.x, sourcePoint.y]];
      selectionState.previewPoints = [];
      selectionCapture.points = [[sourcePoint.x, sourcePoint.y]];
      selectionCapture.stabilized = [sourcePoint.x, sourcePoint.y];
      outputCanvas.setPointerCapture(e.pointerId);
      e.preventDefault();
      render();
    });

    outputCanvas.addEventListener('pointermove', (e) => {
      if (!selectionState.active || !selectionState.drawing || e.pointerId !== selectionState.pointerId) return;
      const geometry = getRenderGeometry();
      if (!geometry) return;
      const events = typeof e.getCoalescedEvents === 'function'
        ? e.getCoalescedEvents()
        : [e];
      const captureSpacing = Math.max(0.5, 1.5 / geometry.scale);
      let changed = false;
      for (const sampleEvent of events) {
        const canvasPoint = clientToCanvasPoint(sampleEvent.clientX, sampleEvent.clientY);
        const sourcePoint = canvasToSourcePoint(canvasPoint.x, canvasPoint.y, geometry);
        changed = appendSelectionStrokePoint([sourcePoint.x, sourcePoint.y], captureSpacing) || changed;
      }
      if (changed) {
        render();
      }
      e.preventDefault();
    });

    function finishPointerStroke(e) {
      if (!selectionState.drawing || e.pointerId !== selectionState.pointerId) return;
      const geometry = getRenderGeometry();
      if (geometry) {
        const events = typeof e.getCoalescedEvents === 'function'
          ? e.getCoalescedEvents()
          : [e];
        const captureSpacing = Math.max(0.5, 1.5 / geometry.scale);
        for (const sampleEvent of events) {
          const canvasPoint = clientToCanvasPoint(sampleEvent.clientX, sampleEvent.clientY);
          const sourcePoint = canvasToSourcePoint(canvasPoint.x, canvasPoint.y, geometry);
          appendSelectionStrokePoint([sourcePoint.x, sourcePoint.y], captureSpacing, sampleEvent === events[events.length - 1]);
        }
      }
      if (outputCanvas.hasPointerCapture(e.pointerId)) outputCanvas.releasePointerCapture(e.pointerId);
      finalizeSelectionStroke();
      selectionState.pointerId = null;
      e.preventDefault();
    }

    outputCanvas.addEventListener('pointerup', finishPointerStroke);
    outputCanvas.addEventListener('pointercancel', (e) => {
      if (outputCanvas.hasPointerCapture(e.pointerId)) outputCanvas.releasePointerCapture(e.pointerId);
      cancelSelectionStroke();
      selectionState.pointerId = null;
    });

    // ============ PNG EXPORT ============
    // Re-render at source image native dimensions onto a temp canvas
    function renderToExportCanvas(transparent) {
      if (!state.sourceElement) return null;
      const src = state.sourceElement;
      const srcW = sourceCanvas.width;
      const srcH = sourceCanvas.height;

      const tmpCanvas = document.createElement('canvas');
      tmpCanvas.width = srcW;
      tmpCanvas.height = srcH;
      const tmpCtx = tmpCanvas.getContext('2d');

      const geometry = getRenderGeometry(srcW, srcH);
      if (!geometry) return null;

      // Background
      if (transparent) {
        tmpCtx.clearRect(0, 0, srcW, srcH);
      } else {
        tmpCtx.fillStyle = '#0e0e0e';
        tmpCtx.fillRect(0, 0, srcW, srcH);
      }

      // Swap outputCtx for rendering functions
      const realCtx = outputCtx;
      state._exporting = true;

      // Pixel data cache
      const pixelCache = new Map();
      _effectedSourceCanvas = null;

      for (let i = 0; i < state.layers.length; i++) {
        const layer = state.layers[i];
        if (!layer.visible) continue;

        // === Adjustment layer compositing for export ===
        if (layer.kind === 'adjustment') {
          const chain = getEffectChain(layer);
          const activeEffects = chain.filter(fx => fx.enabled);
          const adjBright = layer.brightness ?? 1;
          const adjContrast = layer.contrast ?? 1;
          const adjSat = layer.saturation ?? 1;
          const hasBCS = Math.abs(adjBright - 1) > 0.001 || Math.abs(adjContrast - 1) > 0.001 || Math.abs(adjSat - 1) > 0.001;
          if (activeEffects.length === 0 && !hasBCS) continue;
          const effectScale = getScreenEffectScale(geometry, true);
          const hasMask = !!(layer.mask?.regions?.length);
          const needsBlend = hasMask || layer.opacity < 1 || layer.blendMode !== 'source-over';

          const expGrid = getGlobalGridStep(geometry);

          if (needsBlend) {
            const before = getScratchCanvas('adj-export-before', srcW, srcH);
            before.getContext('2d').drawImage(tmpCanvas, 0, 0);

            if (hasBCS) {
              const bcsFilter = `brightness(${adjBright}) contrast(${adjContrast}) saturate(${adjSat})`;
              const temp = getScratchCanvas('adj-export-bcs', srcW, srcH);
              const tempCtx = temp.getContext('2d');
              tempCtx.clearRect(0, 0, srcW, srcH);
              tempCtx.filter = bcsFilter;
              tempCtx.drawImage(tmpCanvas, 0, 0);
              tempCtx.filter = 'none';
              tmpCtx.clearRect(0, 0, srcW, srcH);
              tmpCtx.drawImage(temp, 0, 0);
            }

            const adjExpCtx1 = { asciiCanvas: tmpCanvas, outW: srcW, outH: srcH, layer, geometry, forExport: true, effectScale, gridStepX: expGrid, gridStepY: expGrid };
            if (!applyEffectChainGL(tmpCtx, activeEffects, adjExpCtx1)) {
              for (const fx of activeEffects) {
                applyEffect(tmpCtx, fx, adjExpCtx1);
              }
            }

            const after = getScratchCanvas('adj-export-after', srcW, srcH);
            const afterCtx = after.getContext('2d');
            afterCtx.clearRect(0, 0, srcW, srcH);
            afterCtx.drawImage(tmpCanvas, 0, 0);
            if (hasMask) applyLayerMask(afterCtx, layer, geometry, true);

            tmpCtx.clearRect(0, 0, srcW, srcH);
            tmpCtx.drawImage(before, 0, 0);
            tmpCtx.save();
            tmpCtx.globalAlpha = layer.opacity;
            tmpCtx.globalCompositeOperation = layer.blendMode;
            tmpCtx.drawImage(after, 0, 0);
            tmpCtx.restore();
          } else {
            if (hasBCS) {
              const bcsFilter = `brightness(${adjBright}) contrast(${adjContrast}) saturate(${adjSat})`;
              const temp = getScratchCanvas('adj-export-bcs', srcW, srcH);
              const tempCtx = temp.getContext('2d');
              tempCtx.clearRect(0, 0, srcW, srcH);
              tempCtx.filter = bcsFilter;
              tempCtx.drawImage(tmpCanvas, 0, 0);
              tempCtx.filter = 'none';
              tmpCtx.clearRect(0, 0, srcW, srcH);
              tmpCtx.drawImage(temp, 0, 0);
            }

            const adjExpCtx2 = { asciiCanvas: tmpCanvas, outW: srcW, outH: srcH, layer, geometry, forExport: true, effectScale, gridStepX: expGrid, gridStepY: expGrid };
            if (!applyEffectChainGL(tmpCtx, activeEffects, adjExpCtx2)) {
              for (const fx of activeEffects) {
                applyEffect(tmpCtx, fx, adjExpCtx2);
              }
            }
          }
          continue;
        }

        let pixels = null;
        if (layer.kind !== 'source') {
          const filterKey = `${layer.brightness}-${layer.contrast}-${layer.saturation}`;
          pixels = pixelCache.get(filterKey);
          if (!pixels) {
            sourceCtx.filter = `brightness(${layer.brightness}) contrast(${layer.contrast}) saturate(${layer.saturation})`;
            sourceCtx.drawImage(src, 0, 0, srcW, srcH);
            sourceCtx.filter = 'none';
            pixels = sourceCtx.getImageData(0, 0, srcW, srcH).data;
            pixelCache.set(filterKey, pixels);
          }
        }

        const layerCanvas = renderLayer(layer, pixels, geometry, true);

        tmpCtx.save();
        tmpCtx.globalAlpha = layer.opacity;
        tmpCtx.globalCompositeOperation = layer.blendMode;
        tmpCtx.drawImage(layerCanvas, 0, 0);
        tmpCtx.restore();
      }

      state._exporting = false;
      outputCtx = realCtx;
      return tmpCanvas;
    }

    };

    function pickRecordingMimeType() {
      const candidates = [
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm'
      ];
      for (const candidate of candidates) {
        if (window.MediaRecorder?.isTypeSupported?.(candidate)) return candidate;
      }
      return '';
    }

    function getRecordingSettings() {
      const quality = recordQualitySelect?.value || 'high';
      const fps = parseInt(recordFpsSelect?.value || '60', 10);
      return {
        quality: RECORDING_PRESETS[quality] ? quality : 'high',
        fps: fps === 30 ? 30 : 60
      };
    }

    function estimateRecordingBitrate(width, height, fps, quality) {
      const preset = RECORDING_PRESETS[quality] || RECORDING_PRESETS.high;
      const pixelScale = Math.max(0.55, (width * height) / (1920 * 1080));
      const fpsScale = Math.pow(Math.max(1, fps) / 30, 0.9);
      return Math.round(clamp(preset.baseBitrate * pixelScale * fpsScale, 12000000, 80000000));
    }

    function updateRecordingCodecHint() {
      const hint = document.getElementById('recordCodecHint');
      if (!hint) return;
      const mimeType = pickRecordingMimeType();
      let label = 'Auto';
      if (mimeType.includes('vp9')) label = 'VP9';
      else if (mimeType.includes('vp8')) label = 'VP8';
      else if (mimeType.includes('webm')) label = 'WebM';
      hint.textContent = `Codec: ${label}`;
    }

    function startRecording() {
      if (!state.sourceElement) return;
      const { quality, fps } = getRecordingSettings();
      const stream = outputCanvas.captureStream(fps);
      const mimeType = pickRecordingMimeType();
      const recorderOptions = {
        videoBitsPerSecond: estimateRecordingBitrate(outputCanvas.width, outputCanvas.height, fps, quality)
      };
      if (mimeType) recorderOptions.mimeType = mimeType;
      mediaRecorder = new MediaRecorder(stream, recorderOptions);
      recordedChunks = [];
      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };
      mediaRecorder.onstop = () => {
        const blobType = mediaRecorder?.mimeType || mimeType || 'video/webm';
        const blob = new Blob(recordedChunks, { type: blobType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'ascii-recording.webm';
        a.click();
        URL.revokeObjectURL(url);
        state.recording = false;
        updateRecordButton();
        render();
      };
      mediaRecorder.start();
      state.recording = true;
      updateRecordButton();
      render();
    }

    function moveLayerRelative(draggedId, targetId, placement) {
      const fromIdx = state.layers.findIndex(l => l.id === draggedId);
      const targetIdx = state.layers.findIndex(l => l.id === targetId);
      if (fromIdx === -1 || targetIdx === -1) return false;

      let insertIdx = placement === 'before' ? targetIdx + 1 : targetIdx;
      const [moved] = state.layers.splice(fromIdx, 1);
      if (fromIdx < insertIdx) insertIdx--;

      return true;

          item.type = 'button';
          item.className = `ui-menu-item${value === current ? ' active' : ''}`;
          item.textContent = label;
          const preview = () => {
            if (_layerBlendBeforePreview === null) _layerBlendBeforePreview = layer.blendMode;
            layer.blendMode = value;
            render();
          };
          item.addEventListener('mouseenter', preview);
          item.addEventListener('focus', preview);
          item.addEventListener('click', () => {

            _layerBlendTargetLayer = null;
            layer.blendMode = value;
            hideFloatingPanel(dropdown);
            dropdown.remove();

      const list = document.getElementById('layerList');

        const isActive = layer.id === state.activeLayerId;
        const isSource = layer.kind === 'source';

        group.dataset.layerId = layer.id;
        // Clicking the group background selects the layer without toggling effects
        group.addEventListener('click', (e) => {
          if (e.target === group && state.activeLayerId !== layer.id) {
            if (selectionState.active) cancelSelectionStroke();
            state.activeLayerId = layer.id;
            syncUIToLayer(layer);
            renderLayerPanel();
            render();

        // === Header row ===

        row.className = 'layer-row flex items-center gap-2 px-3 py-2 cursor-pointer';
        row.dataset.layerId = layer.id;

          </div>
          <button class="layer-dup flex-shrink-0 flex items-center justify-center text-[9px] font-mono uppercase tracking-wider text-[#555] hover:text-on-surface h-[22px] ${duplicateHidden}" data-id="${layer.id}">DUP</button>

        // === Inline controls (blend + opacity on one row) — not for source ===
        if (!isSource) {
          const controls = document.createElement('div');
          controls.className = 'px-3 pb-2 pt-0.5';

          // Blend + Opacity on single compact row
          const topRow = document.createElement('div');
          topRow.className = 'flex items-center gap-2 mb-1';

          // Blend button (compact)
          const bmEntry = BLEND_MODES.find(b => b[0] === layer.blendMode);
          const blendBtn = document.createElement('button');
          blendBtn.type = 'button';
          blendBtn.className = 'text-[9px] font-mono px-1.5 py-0.5 text-[#71717a] hover:text-on-surface bg-[#1a1a1a] hover:bg-surface-high cursor-pointer uppercase tracking-wider transition-colors flex-shrink-0 self-center leading-none';
          blendBtn.textContent = bmEntry ? bmEntry[1] : 'Normal';
          blendBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            openLayerBlendDropdown(blendBtn, layer);
          });
          topRow.appendChild(blendBtn);

          // Opacity slider (fills remaining space)
          const opSlider = document.createElement('input');
          opSlider.type = 'range';
          opSlider.min = '0'; opSlider.max = '100'; opSlider.step = '1';
          opSlider.value = Math.round(layer.opacity * 100);
          opSlider.className = 'flex-1 self-center';
          opSlider.style.minWidth = '0';
          const opVal = document.createElement('span');
          opVal.className = 'text-[9px] font-mono tabular-nums text-[#71717a] w-[26px] text-right flex-shrink-0 leading-none self-center';
          opVal.textContent = `${Math.round(layer.opacity * 100)}%`;
          opSlider.addEventListener('input', () => {
            layer.opacity = parseInt(opSlider.value) / 100;
            opVal.textContent = `${opSlider.value}%`;
            scheduleRender();
          });
          topRow.appendChild(opSlider);
          topRow.appendChild(opVal);
          controls.appendChild(topRow);

          group.appendChild(controls);
        }

        // === Effects section (collapsible) ===
        // Mask appears as first item in the effects list (AE-style) — not for source
        {
          const chain = getEffectChain(layer);
          const mask = isSource ? null : getMask(layer);
          const hasMask = !!(mask && mask.regions && mask.regions.length);
          const fxCount = chain.length + (hasMask ? 1 : 0);
          const isExpanded = expandedFxLayers.has(layer.id);

          const fxToggle = document.createElement('div');
          fxToggle.className = 'flex items-center justify-between px-3 py-1.5 cursor-pointer hover:bg-[#181818] transition-colors';
          const toggleLabel = document.createElement('span');
          toggleLabel.className = 'text-[9px] font-mono text-[#4a4a4a] uppercase tracking-wider select-none';
          toggleLabel.textContent = `${isExpanded ? '\u25BE' : '\u25B8'} Effects${fxCount > 0 ? ` (${fxCount})` : ''}`;
          fxToggle.appendChild(toggleLabel);

          // Inline "+ Add" on the toggle row
          const inlineAdd = document.createElement('button');
          inlineAdd.type = 'button';
          inlineAdd.className = 'lp-inline-add text-[12px] text-primary hover:text-[#ff5627] font-mono bg-transparent border border-primary hover:border-[#ff5627] cursor-pointer transition-colors w-[18px] h-[18px] flex items-center justify-center rounded-none';
          inlineAdd.textContent = '+';
          inlineAdd.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!expandedFxLayers.has(layer.id) && !isAdjustment) {
              expandedFxLayers.add(layer.id);
              renderLayerPanel();
            }
            // After re-render, re-grab this layer's "+" button to anchor the dropdown
            requestAnimationFrame(() => {
              const groups = document.querySelectorAll('.layer-group');
              for (const g of groups) {
                if (g.dataset.layerId === layer.id) {
                  const btn = g.querySelector('.lp-inline-add');
                  if (btn) openAddEffectDropdown(btn, layer);
                  break;
                }
              }
            });
          });
          fxToggle.appendChild(inlineAdd);

          fxToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            if (expandedFxLayers.has(layer.id)) expandedFxLayers.delete(layer.id);
            else expandedFxLayers.add(layer.id);
            renderLayerPanel();
          });
          group.appendChild(fxToggle);

          if (isExpanded) {
            const fxContainer = document.createElement('div');
            fxContainer.className = 'px-2 pb-4 flex flex-col gap-1';

            // === Mask as top-of-list effect card (AE-style) — not for source ===
            const maskCard = document.createElement('div');
            const showMaskCard = !isSource;
            maskCard.className = `mask-effect-card flex flex-col gap-1.5 ${hasMask ? 'mask-active' : ''}`;

            const maskHeader = document.createElement('div');
            maskHeader.className = 'flex items-center gap-2';

            const maskEnabled = !mask || mask.enabled !== false;
            const maskIcon = document.createElement('button');
            maskIcon.type = 'button';
            maskIcon.className = 'text-[9px] flex-shrink-0 bg-transparent border-none cursor-pointer transition-colors p-0 flex items-center justify-center';
            maskIcon.style.color = hasMask ? (maskEnabled ? 'rgba(251,70,13,0.7)' : '#3a3a3a') : '#3a3a3a';
            maskIcon.title = hasMask ? (maskEnabled ? 'Disable mask' : 'Enable mask') : 'Mask';
            maskIcon.innerHTML = '<svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="8" r="5.5"/><path d="M8 2.5A5.5 5.5 0 0 1 8 13.5Z" fill="currentColor"/></svg>';
            if (hasMask) {
              maskIcon.addEventListener('click', (e) => {
                e.stopPropagation();
                const m = getMask(layer);
                if (!m) return;
                m.enabled = m.enabled === false ? true : false;
                invalidateMaskCaches(layer.id);
                invalidatePostProcessCache(layer.id);
                renderLayerPanel();
                render();
              });
            }

            const maskLabel = document.createElement('span');
            maskLabel.className = 'text-[9px] font-mono uppercase tracking-wider flex-1';
            maskLabel.style.color = hasMask && maskEnabled ? 'rgba(251,70,13,0.7)' : '#52525b';
            maskLabel.textContent = hasMask ? ((!maskEnabled ? 'Mask (Off)' : mask.inverted ? 'Mask (Inv)' : 'Mask')) : 'Mask';

            const maskActions = document.createElement('div');
            maskActions.className = 'flex items-center gap-1';

            const mkBtn = (text, handler, disabled = false) => {
              const b = document.createElement('button');
              b.className = 'text-[9px] font-mono uppercase tracking-wider px-1.5 py-0.5 transition-colors cursor-pointer bg-transparent border-none flex items-center justify-center h-[22px]';
              b.style.color = disabled ? '#2a2a2a' : '#555';
              b.textContent = text;
              b.disabled = disabled;
              if (!disabled) {
                b.addEventListener('mouseenter', () => { b.style.color = '#fb460d'; });
                b.addEventListener('mouseleave', () => { b.style.color = '#555'; });
              }
              b.addEventListener('click', (e) => { e.stopPropagation(); if (!disabled) handler(); });
              return b;
            };
            maskActions.appendChild(mkBtn('Edit', () => {
              if (state.activeLayerId !== layer.id) {
                state.activeLayerId = layer.id;
                syncUIToLayer(layer);
                renderLayerPanel();
              }
              if (!selectionState.active) activateSelectionMode();
              else updateSelectionUI();
              render();
            }, !state.sourceElement));
            if (hasMask) {
              maskActions.appendChild(mkBtn('Inv', () => {
                const m = getMask(layer);
                if (!m) return;
                m.inverted = !m.inverted;
                invalidateMaskAlphaCache(layer.id);
                invalidatePostProcessCache(layer.id);
                renderLayerPanel();
                render();
              }));
              maskActions.appendChild(mkBtn('\u2715', () => {
                layer.mask = null;
                clearSelectionTransient();
                invalidateMaskCaches(layer.id);
                invalidatePostProcessCache(layer.id);
                renderLayerPanel();
                render();
              }));
            }

            maskHeader.appendChild(maskIcon);
            maskHeader.appendChild(maskLabel);
            maskHeader.appendChild(maskActions);
            maskCard.appendChild(maskHeader);

            // Feather slider — only when mask has regions
            if (hasMask) {
              const featherRow = document.createElement('div');
              featherRow.className = 'flex items-center gap-2 pl-5';
              const fLabel = document.createElement('label');
              fLabel.className = 'text-[#52525b] text-[8px] uppercase tracking-[0.08em] font-label flex-shrink-0';
              fLabel.textContent = 'Feather';
              const fSlider = document.createElement('input');
              fSlider.type = 'range';
              fSlider.min = '0'; fSlider.max = '200'; fSlider.step = '1';
              fSlider.value = mask.feather || 0;
              fSlider.className = 'flex-1';
              const fVal = document.createElement('span');
              fVal.className = 'text-[9px] font-mono tabular-nums text-[#71717a] w-[20px] text-right flex-shrink-0';
              fVal.textContent = mask.feather || 0;
              fSlider.addEventListener('input', () => {
                mask.feather = clamp(parseInt(fSlider.value) || 0, 0, 200);
                fVal.textContent = mask.feather;
                invalidateMaskCaches(layer.id);
                invalidatePostProcessCache(layer.id);
                scheduleRender();
              });
              featherRow.appendChild(fLabel);
              featherRow.appendChild(fSlider);
              featherRow.appendChild(fVal);
              maskCard.appendChild(featherRow);
            }

            if (showMaskCard) fxContainer.appendChild(maskCard);

            // Render effect cards
            const fxList = document.createElement('div');
            fxList.className = 'flex flex-col gap-1';
            renderEffectChainForLayer(layer, fxList);
            fxContainer.appendChild(fxList);

            group.appendChild(fxContainer);
          }
        }

        // Drag-and-drop reordering (on the header row)
        row.draggable = true;
        row.addEventListener('dragstart', (e) => {
          layerDragState.draggedId = layer.id;
          e.dataTransfer.setData('text/plain', layer.id);
          e.dataTransfer.effectAllowed = 'move';
          group.classList.add('dragging');
        });
        row.addEventListener('dragend', () => {
          clearLayerDropIndicators();
          layerDragState.draggedId = null;
          layerDragState.targetId = null;
          layerDragState.placement = null;
        });
        group.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (layerDragState.draggedId === layer.id) return;
          const rect = group.getBoundingClientRect();
          const placement = e.clientY < rect.top + rect.height / 2 ? 'before' : 'after';
          clearLayerDropIndicators();
          group.classList.add(placement === 'before' ? 'drop-before' : 'drop-after');
          layerDragState.targetId = layer.id;
          layerDragState.placement = placement;
        });
        group.addEventListener('dragleave', (e) => {
          if (!group.contains(e.relatedTarget)) {
            group.classList.remove('drop-before', 'drop-after');
          }
        });
        group.addEventListener('drop', (e) => {
          e.preventDefault();
          const draggedId = layerDragState.draggedId || e.dataTransfer.getData('text/plain');
          clearLayerDropIndicators();
          if (draggedId && draggedId !== layer.id && moveLayerRelative(draggedId, layer.id, layerDragState.placement || 'after')) {
            renderLayerPanel();
            render();
          }
          layerDragState.draggedId = null;
          layerDragState.targetId = null;
          layerDragState.placement = null;
        });
        row.addEventListener('click', (e) => {
          e.stopPropagation();
          if (e.target.closest('.layer-vis') || e.target.closest('.layer-dup') || e.target.closest('.layer-del')) return;
          if (selectionState.active) cancelSelectionStroke();
          state.activeLayerId = layer.id;
          syncUIToLayer(layer);
          renderLayerPanel();
          render();
        });
        // Visibility toggle
        row.querySelector('.layer-vis').addEventListener('click', (e) => {
          e.stopPropagation();
          layer.visible = !layer.visible;
          renderLayerPanel();
          render();
        });
        row.querySelector('.layer-dup').addEventListener('click', (e) => {
          e.stopPropagation();
          duplicateLayer(layer.id);
        });
        // Delete button
        row.querySelector('.layer-del').addEventListener('click', (e) => {
          e.stopPropagation();
          removeLayer(layer.id);
        });
        list.appendChild(group);
      });

      // Update selection toolbar mask controls
      updateSelectionToolbarMaskControls();
      requestAnimationFrame(initAllRangeFills);
    }

    function updateSelectionToolbarMaskControls() {
      const mask = getMask(activeLayer());
      const hasMask = !!mask;
      document.getElementById('selectionClearBtn').disabled = !hasMask;
      document.getElementById('selectionInvertBtn').disabled = !hasMask;
      updateSelectionUI();
    }

    function cloneLayerData(layer, overrides = {}) {
      const duplicate = {
        ...layer,
        ...overrides,
        id: crypto.randomUUID()
      };
      if (layer.postProcess) duplicate.postProcess = { ...layer.postProcess };
      if (layer.effectChain) {
        duplicate.effectChain = layer.effectChain.map(fx => ({
          ...fx,
          id: newFxId(),
          params: { ...fx.params }
        }));
      }
      if (layer.mask) {
        duplicate.mask = { ...layer.mask };
        if (layer.mask.regions) {
          duplicate.mask.regions = layer.mask.regions.map(region => ({
            ...region,
            points: region.points.map(point => [...point])
          }));
        }
        if (layer.mask.points) {
          duplicate.mask.points = layer.mask.points.map(point => [...point]);
        }
      }
      return duplicate;
    }

    function addLayer() {
      if (selectionState.active) cancelSelectionStroke();
      const layer = createLayer();
      state.layers.push(layer);
      state.activeLayerId = layer.id;
      syncUIToLayer(layer);
      renderLayerPanel();
      render();
    }

    function addAdjustmentLayer() {
      if (selectionState.active) cancelSelectionStroke();
      const layer = createAdjustmentLayer();
      expandedFxLayers.add(layer.id); // auto-expand effects for adjustment layers
      state.layers.push(layer);
      state.activeLayerId = layer.id;
      syncUIToLayer(layer);
      renderLayerPanel();
      render();
    }

    function duplicateLayer(id) {
      const source = state.layers.find(layer => layer.id === id);
      if (!source || source.kind === 'source') return;
      // Adjustment layers can be duplicated too
      if (selectionState.active) cancelSelectionStroke();
      const idx = state.layers.findIndex(layer => layer.id === id);
      const duplicate = cloneLayerData(source, { name: `${source.name} Copy` });
      state.layers.splice(idx + 1, 0, duplicate);
      state.activeLayerId = duplicate.id;
      syncUIToLayer(duplicate);
      renderLayerPanel();
      render();
    }

    function removeLayer(id) {
      const layerToRemove = state.layers.find(l => l.id === id);
      if (!layerToRemove) return;
      const idx = state.layers.findIndex(l => l.id === id);
      state.layers.splice(idx, 1);
      if (state.activeLayerId === id) {
        if (state.layers.length > 0) {
          state.activeLayerId = state.layers[Math.min(idx, state.layers.length - 1)].id;
          syncUIToLayer(activeLayer());
        } else {
          state.activeLayerId = null;
        }
      }
      layerCanvasPool.delete(id);
      layerRenderCache.delete(id);
      invalidateMaskCaches(id);
      invalidatePostProcessCache(id);
      if (selectionState.active) cancelSelectionStroke();
      renderLayerPanel();
      render();
    }

    function setLayerPanelOpen(open) {
      state.layerPanelOpen = open;
      const panel = document.getElementById('layerPanel');
      if (open) {
        panel.classList.remove('w-0');
        panel.classList.add('w-[260px]');
      } else {
        panel.classList.remove('w-[260px]');
        panel.classList.add('w-0');
      }
      document.getElementById('layerPanelToggle').classList.toggle('nav-tab-active', open);
      updateProjectButtonPosition();
    }

    // Layer panel event listeners
    document.getElementById('layerPanelToggle').addEventListener('click', () => {
      setLayerPanelOpen(!state.layerPanelOpen);
    });
    document.getElementById('selectionClearBtn').addEventListener('click', () => {
      const al = activeLayer();
      if (!getMask(al)) return;
      al.mask = null;
      clearSelectionTransient();
      invalidateMaskCaches(al.id);
      invalidatePostProcessCache(al.id);
      renderLayerPanel();
      render();
    });
    document.getElementById('selectionInvertBtn').addEventListener('click', () => {
      const mask = getMask(activeLayer());
      if (!mask) return;
      mask.inverted = !mask.inverted;
      invalidateMaskAlphaCache(activeLayer().id);
      invalidatePostProcessCache(activeLayer().id);
      renderLayerPanel();
      render();
    });
    document.getElementById('selectionGuidesBtn').addEventListener('click', () => {
      selectionState.showGuides = !selectionState.showGuides;
      const btn = document.getElementById('selectionGuidesBtn');
      btn.classList.toggle('tb-active', selectionState.showGuides);
      btn.style.color = selectionState.showGuides ? '' : '#2a2a2a';
      render();
    });
    document.getElementById('selectionDoneBtn').addEventListener('click', () => {
      exitSelectionMode();
      render();
    });

    // Add layer button — dropdown with ASCII Layer + Adjustment Layer
    document.getElementById('addLayerBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      let dropdown = document.getElementById('addLayerDropdown');
      if (dropdown) {
        hideFloatingPanel(dropdown);
        dropdown.remove();
        return;
      }
      dropdown = document.createElement('div');
      dropdown.id = 'addLayerDropdown';
      dropdown.classList.add('ui-menu-panel');

      const addAscii = document.createElement('button');
      addAscii.type = 'button';
      addAscii.className = 'fx-menu-item';
      addAscii.textContent = 'ASCII Layer';
      addAscii.addEventListener('click', () => {
        hideFloatingPanel(dropdown);
        dropdown.remove();
        addLayer();
      });
      dropdown.appendChild(addAscii);

      const addAdj = document.createElement('button');
      addAdj.type = 'button';
      addAdj.className = 'fx-menu-item';
      addAdj.textContent = 'Adjustment Layer';
      addAdj.addEventListener('click', () => {
        hideFloatingPanel(dropdown);
        dropdown.remove();
        addAdjustmentLayer();
      });
      dropdown.appendChild(addAdj);

      // Separator
      const sep = document.createElement('div');
      sep.className = 'border-t border-[#353535] my-1';
      dropdown.appendChild(sep);

      // Import Image
      const addImage = document.createElement('button');
      addImage.type = 'button';
      addImage.className = 'fx-menu-item';
      addImage.textContent = 'Image';
      addImage.addEventListener('click', () => {
        hideFloatingPanel(dropdown);
        dropdown.remove();
        document.getElementById('imageInput').click();
      });
      dropdown.appendChild(addImage);

      // Import Video
      const addVideo = document.createElement('button');
      addVideo.type = 'button';
      addVideo.className = 'fx-menu-item';
      addVideo.textContent = 'Video';
      addVideo.addEventListener('click', () => {
        hideFloatingPanel(dropdown);
        dropdown.remove();
        document.getElementById('videoInput').click();
      });
      dropdown.appendChild(addVideo);

      const btn = document.getElementById('addLayerBtn');
      document.body.appendChild(dropdown);
      showFloatingPanel(dropdown, btn, { align: 'left', placement: 'bottom', gap: 4 });
      setupMenuNavigation(dropdown, {
        itemSelector: '.fx-menu-item',
        onEscape: () => {
          hideFloatingPanel(dropdown);
          dropdown.remove();
          document.removeEventListener('click', closeDropdown);
        }
      });
      requestAnimationFrame(() => focusMenuNavigationDefault(dropdown, '.fx-menu-item'));

      const closeDropdown = (ev) => {
        if (!eventIsInsidePanel(dropdown, btn, ev)) {
          hideFloatingPanel(dropdown);
          dropdown.remove();
          document.removeEventListener('click', closeDropdown);
        }
      };
      setTimeout(() => document.addEventListener('click', closeDropdown), 0);
    });

    // ============ PROJECT MENU EVENTS ============
    const projectBtn = document.getElementById('projectBtn');
    const projectMenu = document.getElementById('projectMenu');
    setupMenuNavigation(projectMenu, {
      itemSelector: 'button',
      onEscape: () => {
        hideFloatingPanel(projectMenu);
        projectBtn.focus({ preventScroll: true });
      }
    });

    projectBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const wasHidden = projectMenu.classList.contains('hidden');
      if (wasHidden) {
        renderProjectList();
        showFloatingPanel(projectMenu, projectBtn, { align: 'center', placement: 'bottom', gap: 4, maxHeight: 360 });
        requestAnimationFrame(() => focusMenuNavigationDefault(projectMenu, 'button'));
      } else {
        hideFloatingPanel(projectMenu);
      }
    });

    document.getElementById('projectSave').addEventListener('click', () => {
      doSaveProject();
      hideFloatingPanel(projectMenu);
    });
    document.getElementById('projectSaveAs').addEventListener('click', () => {
      doSaveAsProject();
      hideFloatingPanel(projectMenu);
    });
    document.getElementById('projectRename').addEventListener('click', () => {
      doRenameProject();
      hideFloatingPanel(projectMenu);
    });
    document.getElementById('projectDelete').addEventListener('click', () => {
      doDeleteProject();
      hideFloatingPanel(projectMenu);
    });
    document.getElementById('projectClose').addEventListener('click', () => {
      doCloseProject();
      hideFloatingPanel(projectMenu);
    });

    document.addEventListener('click', (e) => {
      if (projectMenu.classList.contains('hidden')) return;
      if (!eventIsInsidePanel(projectMenu, projectBtn, e)) {
        hideFloatingPanel(projectMenu);
      }
    });

    // Ctrl/Cmd+S to save project
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        doSaveProject();
      }
    });

    // ============ FULL-RES QUICK VIEW (hold ` to preview at full resolution) ============
    let _quickViewActive = false;
    let _quickViewPrev = null;
    document.addEventListener('keydown', (e) => {
      if (e.key === '`' && !_quickViewActive && !e.ctrlKey && !e.metaKey && !e.altKey) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
        e.preventDefault();
        _quickViewActive = true;
        _quickViewPrev = state.previewResolution;
        state.previewResolution = 'full';
        const lbl = document.getElementById('previewResLabel');
        if (lbl) lbl.textContent = 'FULL';
        layerRenderCache.clear();
        render();
      }
    });
    document.addEventListener('keyup', (e) => {
      if (e.key === '`' && _quickViewActive) {
        _quickViewActive = false;
        state.previewResolution = _quickViewPrev || 'auto';
        const lbl = document.getElementById('previewResLabel');
        if (lbl) {
          const labels = { auto: 'AUTO', full: 'FULL', '1/2': '1/2', '1/4': '1/4' };
          lbl.textContent = labels[state.previewResolution] || 'AUTO';
        }
        _quickViewPrev = null;
        layerRenderCache.clear();
        render();
      }
    });

    // ============ INIT ============
    syncUIToLayer(activeLayer());
    renderLayerPanel();
    resizeCanvas();
    updateProjectButtonPosition();
    initAllRangeFills();
  </script>
</body>
</html>
