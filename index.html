<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLYPH_STUDIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./dense-glyph-paths.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary': '#fb460d',
            'primary-container': '#ff5627',
            'surface': '#131313',
            'surface-low': '#1b1b1b',
            'surface-container': '#1f1f1f',
            'surface-high': '#2a2a2a',
            'surface-highest': '#353535',
            'on-surface': '#e2e2e2',
            'on-surface-variant': '#e6bdb3',
            'outline-variant': '#5d4038',
            'tertiary': '#008af8',
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'monospace'],
            headline: ['Space Grotesk', 'sans-serif'],
            label: ['Space Grotesk', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { font-family: 'JetBrains Mono', monospace; }

    /* Scrollbar — technical feel */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #0e0e0e; }
    ::-webkit-scrollbar-thumb { background: #1f1f1f; }
    ::-webkit-scrollbar-thumb:hover { background: #fb460d; }

    /* Brutalist range slider — filled track + square notched thumb */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, #fb460d var(--range-fill, 0%), #2a2a2a var(--range-fill, 0%));
      border-radius: 0;
      outline: none;
      cursor: pointer;
      vertical-align: middle;
      margin: 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 8px;
      height: 10px;
      background: #fb460d;
      background-image: linear-gradient(to bottom, #fb460d 2px, transparent 2px, transparent calc(100% - 2px), #fb460d calc(100% - 2px)),
                        linear-gradient(to right, #fb460d calc(50% - 0.5px), #000 calc(50% - 0.5px), #000 calc(50% + 0.5px), #fb460d calc(50% + 0.5px));
      border-radius: 0;
      cursor: pointer;
      border: none;
    }
    input[type="range"]::-moz-range-track {
      height: 1px;
      background: #2a2a2a;
      border: none;
    }
    input[type="range"]::-moz-range-progress {
      height: 1px;
      background: #fb460d;
    }
    input[type="range"]::-moz-range-thumb {
      width: 8px;
      height: 10px;
      background: #fb460d;
      background-image: linear-gradient(to bottom, #fb460d 2px, transparent 2px, transparent calc(100% - 2px), #fb460d calc(100% - 2px)),
                        linear-gradient(to right, #fb460d calc(50% - 0.5px), #000 calc(50% - 0.5px), #000 calc(50% + 0.5px), #fb460d calc(50% + 0.5px));
      border-radius: 0;
      cursor: pointer;
      border: none;
    }

    /* Toggle — brutalist square, orange accent */
    .toggle-switch {
      position: relative;
      width: 32px;
      height: 16px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #1b1b1b;
      transition: background-color 0.15s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      height: 10px;
      width: 10px;
      left: 2px;
      bottom: 3px;
      background-color: #353535;
      transition: transform 0.15s, background-color 0.15s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background-color: rgba(251,70,13,0.15);
    }
    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(16px);
      background-color: #fb460d;
    }
    .toggle-switch-cyan input:checked + .toggle-slider {
      background-color: rgba(0,229,255,0.15);
    }
    .toggle-switch-cyan input:checked + .toggle-slider::before {
      background-color: #00e5ff;
    }

    /* Drawer min-width */
    #settingsDrawer > div { min-width: 280px; }

    /* Recording indicator */
    @keyframes rec-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }
    .recording {
      color: #ff3b30 !important;
      border-bottom-color: #ff3b30 !important;
    }
    .recording .rec-dot {
      display: inline-block;
    }

    /* Select arrow override */
    select { background-image: none; }

    /* Nav tab — top bar navigation */
    .nav-tab {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #52525b;
      background-color: transparent !important;
      border: none;
      padding: 0;
      padding-top: 2px;
      cursor: pointer;
      transition: color 0.12s;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      height: 100%;
      display: flex;
      align-items: center;
      box-sizing: border-box;
      outline: none;
      box-shadow: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
    }
    .nav-tab:hover { color: #fb460d; }
    .nav-tab:focus, .nav-tab:focus-visible, .nav-tab:active {
      background-color: transparent !important;
      outline: none !important;
      box-shadow: none !important;
    }
    .nav-tab-active {
      color: #fb460d;
      border-bottom-color: #fb460d;
    }

    /* Toolbar button base — ghost border style */
    .tb {
      background: transparent;
      color: #52525b;
      padding: 6px 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: color 0.1s, background-color 0.1s;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .tb:hover { color: #fb460d; background: rgba(251,70,13,0.06); }
    .tb:disabled,
    .tb[disabled] {
      color: #2a2a2a;
      cursor: not-allowed;
    }
    .tb-active {
      color: #fb460d;
      border-color: #fb460d;
    }
    .variant-arrow { position: relative; border-color: #2a2a2a; }
    .variant-arrow:hover { color: #fb460d; border-color: #5d4038; z-index: 1; }
    .panel-trigger-open {
      position: relative;
      z-index: 2;
      border-color: #fb460d !important;
      color: #fb460d !important;
      background: rgba(251,70,13,0.06);
    }
    #variantBtn { position: relative; }
    #variantBtn:hover,
    #variantBtn:focus-visible {
      z-index: 2;
    }
    .artifact-word-input {
      width: 116px;
      min-height: 26px;
      padding: 5px 10px;
      border: none;
      border-left: 2px solid transparent;
      background: #1f1f1f;
      color: #e2e2e2;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.12s, color 0.12s;
    }
    .artifact-word-input::placeholder {
      color: #52525b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .artifact-word-input:focus {
      border-left-color: #fb460d;
      color: #e2e2e2;
    }

    /* Section divider — Space Grotesk label style */
    .section-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #52525b;
      padding-bottom: 8px;
      margin-bottom: 14px;
      border-bottom: 1px solid #1f1f1f;
    }

    /* Scrollbar overrides */
    #settingsDrawer::-webkit-scrollbar { width: 4px; }
    #settingsDrawer::-webkit-scrollbar-track { background: transparent; }
    #settingsDrawer::-webkit-scrollbar-thumb { background: #1f1f1f; }
    #layerList { scrollbar-width: thin; scrollbar-color: #2a2a2a #0e0e0e; }
    #layerList::-webkit-scrollbar { width: 4px !important; }
    #layerList::-webkit-scrollbar-track { background: #0e0e0e !important; }
    #layerList::-webkit-scrollbar-thumb { background: #2a2a2a !important; border-radius: 0; }
    #layerList::-webkit-scrollbar-thumb:hover { background: #fb460d !important; }
    .layer-group {
      border-bottom: 1px solid #1a1a1a;
    }
    .layer-group + .layer-group {
      border-top: 1px solid #252525;
    }
    .layer-group.lg-active {
      background: #161616;
      border-left: 3px solid #fb460d !important;
    }
    .layer-group.lg-inactive {
      border-left: 3px solid transparent;
    }
    .layer-group.lg-inactive:hover {
      background: #161616;
    }
    .layer-group.lg-adjustment.lg-active {
      border-left-color: #fb460d !important;
    }
    .layer-group.dragging, .layer-row.dragging {
      opacity: 0.35;
      transform: scale(0.985);
    }
    .layer-group.drop-before, .layer-row.drop-before {
      box-shadow: inset 0 2px 0 0 #fb460d;
      background: #1b1b1b;
    }
    .layer-group.drop-after, .layer-row.drop-after {
      box-shadow: inset 0 -2px 0 0 #fb460d;
      background: #1b1b1b;
    }
    .layer-controls-grid {
      display: grid;
      grid-template-columns: 38px 1fr 32px;
      align-items: center;
      gap: 4px 6px;
    }
    .layer-controls-grid label {
      color: #52525b;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: 'Space Grotesk', sans-serif;
    }
    .mask-effect-card {
      background: #1b1b1b;
      padding: 6px 8px;
    }
    .mask-effect-card.mask-active {
      background: rgba(251, 70, 13, 0.04);
      border-left: 2px solid rgba(251, 70, 13, 0.35);
    }
    #addLayerDropdown {
      z-index: 100;
      background: #2a2a2a;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
      min-width: 160px;
    }
    #addLayerDropdown .fx-menu-item {
      display: block;
      width: 100%;
      padding: 8px 14px;
      border: 0;
      background: transparent;
      text-align: left;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #a1a1aa;
      cursor: pointer;
      white-space: nowrap;
    }
    #addLayerDropdown .fx-menu-item:hover {
      background: #353535;
      color: #fb460d;
    }
    .fx-card { background: #1b1b1b; margin-bottom: 2px; border: none; border-radius: 0; }
    .fx-card.dragging { opacity: 0.35; transform: scale(0.985); }
    .fx-card.drop-before { box-shadow: inset 0 2px 0 0 #fb460d; background: #1f1f1f; }
    .fx-card.drop-after { box-shadow: inset 0 -2px 0 0 #fb460d; background: #1f1f1f; }
    .fx-drag { cursor: grab; user-select: none; font-size: 14px; line-height: 1; }
    .fx-card[draggable="true"]:active .fx-drag { cursor: grabbing; }
    #addEffectDropdown { position: absolute; z-index: 50; background: #2a2a2a; min-width: 180px; max-height: 300px; overflow-y: auto; }
    #addEffectDropdown .fx-menu-item { display: block; width: 100%; padding: 6px 12px; border: 0; background: transparent; text-align: left; font-size: 10px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; color: #71717a; cursor: pointer; white-space: nowrap; }
    #addEffectDropdown .fx-menu-item:hover { background: #353535; color: #fb460d; }
    #addEffectDropdown .fx-menu-header { padding: 6px 12px; font-size: 9px; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.15em; color: #52525b; pointer-events: none; }
    .ui-select-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      min-height: 31px;
      padding: 6px 12px;
      border: none;
      border-left: 2px solid transparent;
      background: #1f1f1f;
      color: #e2e2e2;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s, background-color 0.12s;
    }
    .ui-select-btn:hover {
      background: #2a2a2a;
    }
    .ui-select-btn.ui-select-open {
      border-left-color: #fb460d;
      background: #2a2a2a;
    }
    .ui-select-btn-sm {
      min-height: 26px;
      padding: 5px 10px;
      font-size: 10px;
    }
    .ui-select-value {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }
    .ui-select-caret {
      color: #52525b;
      font-size: 10px;
      line-height: 1;
      flex-shrink: 0;
    }
    .ui-menu-panel {
      z-index: 80;
      background: #2a2a2a;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-color: #353535 transparent;
    }
    .ui-menu-panel::-webkit-scrollbar {
      width: 6px;
    }
    .ui-menu-panel::-webkit-scrollbar-track {
      background: transparent;
    }
    .ui-menu-panel::-webkit-scrollbar-thumb {
      background: #353535;
    }
    .ui-menu-panel::-webkit-scrollbar-thumb:hover {
      background: #fb460d;
    }
    .ui-menu-item {
      display: block;
      width: 100%;
      padding: 10px 20px;
      border: 0;
      background: transparent;
      color: #71717a;
      text-align: left;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.1s, color 0.1s, box-shadow 0.1s;
    }
    .ui-menu-item:hover,
    .fx-menu-item:hover {
      background: #353535;
      color: #fb460d;
      box-shadow: inset 3px 0 0 #fb460d;
    }
    .ui-menu-item.active {
      background: #353535;
      color: #fb460d;
      box-shadow: inset 3px 0 0 #fb460d;
    }
    .fx-menu-item.active {
      background: #353535;
      color: #fb460d;
      box-shadow: inset 3px 0 0 #fb460d;
    }
    .ui-menu-item-compact {
      padding: 9px 12px;
    }
    .ui-menu-panel button:focus,
    .ui-menu-panel button:focus-visible,
    .ui-menu-item:focus,
    .ui-menu-item:focus-visible,
    .fx-menu-item:focus {
      outline: none;
    }
    .fx-menu-item:focus-visible {
      outline: none;
    }
    .menu-nav-active {
      background: #353535 !important;
      color: #fb460d !important;
      box-shadow: inset 3px 0 0 #fb460d;
    }
    .ui-menu-panel:hover .ui-menu-item.active:not(:hover):not(.menu-nav-active),
    .ui-menu-panel:hover .fx-menu-item.active:not(:hover):not(.menu-nav-active) {
      background: transparent;
      color: #71717a;
      box-shadow: none;
    }
    .ui-menu-panel.keyboard-nav .ui-menu-item.active:not(.menu-nav-active),
    .ui-menu-panel.keyboard-nav .fx-menu-item.active:not(.menu-nav-active) {
      background: transparent;
      color: #71717a;
      box-shadow: none;
    }
    .layer-vis svg {
      width: 16px;
      height: 16px;
      display: block;
    }
    .layer-mask-btn {
      background: none;
      border: none;
      padding: 3px;
      cursor: pointer;
      color: #fb460d;
      transition: opacity 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .layer-mask-btn:hover { opacity: 0.7; }
    .layer-mask-btn svg {
      width: 12px;
      height: 12px;
      display: block;
    }
    .layer-vis {
      padding: 3px;
    }
    .mini-swatch {
      width: 18px;
      height: 18px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.55);
    }

    #outputCanvas.masking-active {
      cursor: crosshair;
      touch-action: none;
    }

    .app-modal-backdrop {
      background:
        radial-gradient(circle at top, rgba(251,70,13,0.06), transparent 38%),
        rgba(5,5,5,0.82);
      backdrop-filter: blur(8px);
    }
    .app-modal-card {
      background: #1f1f1f;
      box-shadow: 0 28px 80px rgba(0,0,0,0.55);
    }
    .app-modal-field {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      border-left: 2px solid transparent;
      background: #131313;
      color: #e2e2e2;
      outline: none !important;
    }
    .app-modal-field:focus {
      outline: none !important;
      border-left-color: #fb460d;
    }
    .app-modal-field:focus-visible {
      outline: none !important;
      border-left-color: #fb460d;
    }
    .app-modal-btn {
      border: 1px solid rgba(93,64,56,0.3);
      background: #1b1b1b;
      color: #71717a;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
    }
    .app-modal-btn:hover {
      color: #e2e2e2;
      background: #2a2a2a;
    }
    .app-modal-btn-primary {
      border-color: #fb460d;
      background: #fb460d;
      color: #000;
    }
    .app-modal-btn-primary:hover {
      border-color: #ff5627;
      background: #ff5627;
      color: #000;
    }
  </style>
</head>
<body class="bg-[#0e0e0e] h-screen overflow-hidden flex flex-col font-mono text-on-surface">

  <!-- Top Bar -->
  <div id="topBar" class="relative flex items-center px-4 h-12 bg-[#0e0e0e] gap-2 border-b border-[#232323]">
    <div class="flex flex-shrink-0 items-center">
      <!-- Brand -->
      <div class="text-[15px] tracking-tight text-primary font-bold font-headline mx-1 hidden sm:block">GLYPH_STUDIO</div>
    </div>

    <!-- Action Tabs (left) -->
    <nav class="hidden md:flex items-center gap-5 ml-6 h-full">
      <div class="relative flex items-center h-full">
        <button id="exportPngBtn" class="nav-tab" title="Export">EXPORT</button>
        <div id="exportMenu" class="ui-menu-panel hidden absolute left-0 top-full mt-px z-50 whitespace-nowrap overflow-y-auto">
          <button id="exportNormal" class="ui-menu-item ui-menu-item-compact">PNG</button>
          <button id="exportTransparent" class="ui-menu-item ui-menu-item-compact">PNG Transparent</button>
          <div class="border-t border-[#353535] my-1"></div>
          <div class="px-3 py-2 flex flex-col gap-2">
            <div class="text-[9px] uppercase tracking-[0.2em] text-[#52525b] font-label">Rec WebM</div>
            <div class="flex items-center justify-between gap-3">
              <label for="recordQualitySelect" class="text-[10px] uppercase tracking-wider text-[#52525b] font-label">Quality</label>
              <div class="relative w-[92px]">
                <button id="recordQualityBtn" type="button" class="ui-select-btn ui-select-btn-sm">
                  <span class="ui-select-value">High</span>
                  <span class="ui-select-caret">▾</span>
                </button>
                <input id="recordQualitySelect" type="hidden" value="high">
              </div>
            </div>
            <div class="flex items-center justify-between gap-3">
              <label for="recordFpsSelect" class="text-[10px] uppercase tracking-wider text-[#52525b] font-label">FPS</label>
              <div class="relative w-[92px]">
                <button id="recordFpsBtn" type="button" class="ui-select-btn ui-select-btn-sm">
                  <span class="ui-select-value">60</span>
                  <span class="ui-select-caret">▾</span>
                </button>
                <input id="recordFpsSelect" type="hidden" value="60">
              </div>
            </div>
            <div id="recordCodecHint" class="text-[9px] uppercase tracking-[0.14em] text-[#52525b] font-mono">Codec: Auto</div>
          </div>
        </div>
      </div>
      <button id="recordBtn" class="nav-tab" title="Record Video" style="gap:5px"><span class="rec-dot" style="display:none;width:6px;height:6px;background:#ff3b30;border-radius:50%;animation:rec-blink 1s ease-in-out infinite;flex-shrink:0"></span><span class="rec-label">REC</span></button>
    </nav>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Workspace Toggles (right) -->
    <div class="hidden md:flex items-center gap-5 h-full mr-4">
      <button id="layerPanelToggle" class="nav-tab nav-tab-active" title="Toggle Layers">LAYERS</button>
      <button id="settingsBtn" class="nav-tab" title="Settings">CONFIG</button>
    </div>

    <!-- Separator -->
    <div class="w-px h-5 bg-[#2a2a2a] hidden md:block"></div>

    <!-- Project -->
    <div id="projectAnchor" class="relative z-[60] h-full flex items-center ml-4">
      <button id="projectBtn" title="Project" class="font-label text-[11px] uppercase tracking-[0.1em] text-on-surface bg-transparent border-none cursor-pointer hover:text-primary transition-colors whitespace-nowrap" style="max-width:min(42vw,220px);overflow:hidden;text-overflow:ellipsis">Untitled ▾</button>
      <div id="projectMenu" class="ui-menu-panel hidden absolute right-0 top-full mt-px z-[60] whitespace-nowrap min-w-[180px] overflow-y-auto">
        <button id="projectSave" class="ui-menu-item ui-menu-item-compact">Save<span class="float-right text-[#52525b] normal-case tracking-normal ml-4">&#8984;S</span></button>
        <button id="projectSaveAs" class="ui-menu-item ui-menu-item-compact">Save As…</button>
        <button id="projectRename" class="ui-menu-item ui-menu-item-compact">Rename</button>
        <button id="projectDelete" class="ui-menu-item ui-menu-item-compact">Delete</button>

  <script>
    // ============ RANGE SLIDER FILL ============
    function updateRangeFill(input) {
      if (!input || input.type !== 'range') return;
      const min = parseFloat(input.min) || 0;
      const max = parseFloat(input.max) || 100;
      const val = parseFloat(input.value) || 0;
      const pct = ((val - min) / (max - min)) * 100;
      input.style.setProperty('--range-fill', pct + '%');
    }
    function initAllRangeFills() {
      document.querySelectorAll('input[type="range"]').forEach(updateRangeFill);
    }
    document.addEventListener('input', (e) => {
      if (e.target.type === 'range') updateRangeFill(e.target);
    });

    // ============ STATE ============
    let layerCounter = 1;
    /* ── Effect Registry ── */
    const EFFECT_REGISTRY = {

      },
      pixelate: {
        label: 'Pixelate',
        defaults: { amount: 8 },
        params: [
          { key: 'amount', type: 'range', min: 2, max: 64, step: 1, label: 'Block Size' }

      },
      fractalGlass: {
        label: 'Fractal',
        defaults: { texture: 'reeded', distortion: 50, smoothness: 3, scale: 40, angle: 0, jitter: 0, centerX: 50, centerY: 50 },
        params: [
          { key: 'texture',    type: 'select', options: ['reeded', 'frosted', 'blocks', 'tinyLens', 'diamond', 'radial', 'spiral', 'honeycomb', 'ripple', 'chevron', 'lens'], label: 'Texture' },
          { key: 'distortion', type: 'range', min: 0,   max: 500, step: 1, label: 'Distortion' },
          { key: 'smoothness', type: 'range', min: 0,   max: 50,  step: 1, label: 'Smoothness' },

              { key: 'centerX',  type: 'range', min: 0, max: 100, step: 1, label: 'Center X' },
              { key: 'centerY',  type: 'range', min: 0, max: 100, step: 1, label: 'Center Y' }
            ]
          },
          swirl: {
            label: 'Swirl',
            defaults: { angle: 180, radius: 60, centerX: 50, centerY: 50 },
            params: [
              { key: 'angle',    type: 'range', min: -720, max: 720, step: 1, label: 'Angle' },
              { key: 'radius',   type: 'range', min: 10, max: 100, step: 1, label: 'Radius' },
              { key: 'centerX',  type: 'range', min: 0, max: 100, step: 1, label: 'Center X' },
              { key: 'centerY',  type: 'range', min: 0, max: 100, step: 1, label: 'Center Y' }

          },

            label: 'Zoom',
            defaults: { strength: 50, centerX: 50, centerY: 50 },
            params: [
              { key: 'strength', type: 'range', min: -100, max: 100, step: 1, label: 'Strength' },
              { key: 'centerX',  type: 'range', min: 0, max: 100, step: 1, label: 'Center X' },
              { key: 'centerY',  type: 'range', min: 0, max: 100, step: 1, label: 'Center Y' }
            ]
          }
        }
      },
      feedback: {
        label: 'Feedback',
        defaults: { zoom: 0.97, rotation: 1.5, centerX: 50, centerY: 50, iterations: 15, decay: 70, colorShift: 8 },
        params: [
          { key: 'zoom',       type: 'range', min: 0.8,  max: 1.2,  step: 0.005, label: 'Zoom' },
          { key: 'rotation',   type: 'range', min: -360, max: 360,  step: 0.5,   label: 'Rotation' },
          { key: 'centerX',    type: 'range', min: 0,    max: 100,  step: 0.1,   label: 'Center X' },
          { key: 'centerY',    type: 'range', min: 0,    max: 100,  step: 0.1,   label: 'Center Y' },

        params: [
          { key: 'preset',    type: 'select', options: ['neon', 'midnight', 'sunset', 'infrared', 'vintage', 'arctic', 'toxic', 'ember', 'tealOrange', 'cyanotype', 'portra', 'vaporwave', 'bleach', 'velvia', 'crossProcess', 'cyberpunk', 'desert', 'sapphire', 'custom'], label: 'Preset' },

          { key: 'contrast',  type: 'range',  min: 0,   max: 200, step: 1, label: 'Contrast' },

    let _fxIdCounter = 0;
    function newFxId() { return 'fx-' + (++_fxIdCounter); }

    function createEffect(type, subtype) {
      const reg = EFFECT_REGISTRY[type];
      if (!reg) return null;
      let defaults;
      if (reg.subtypes) {
        const st = reg.subtypes[subtype || Object.keys(reg.subtypes)[0]];
        defaults = st ? { ...st.defaults } : {};
        subtype = subtype || Object.keys(reg.subtypes)[0];
      } else {
        defaults = { ...reg.defaults };
        subtype = null;
      }
      return { id: newFxId(), type, subtype, enabled: true, params: defaults };
    }

    const DEFAULT_ASCII_LAYER_SETTINGS = Object.freeze({
      visible: true,
      opacity: 1.0,
      blendMode: 'source-over',
      variant: 'None',
      cellSize: 10,
      gap: 0,
      font: 'monospace',
      invert: false,
      colorMode: false,
      charRotation: false,
      manualColorEnabled: false,
      manualColor: '#f2f0d8',
      outlineLevels: 8,
      outlineSmoothing: 0,
      outlineMinSize: 3,
      outlineDepth: 0,
      outlineFillMode: 'off',
      outlineFillColor: '#1f7a4f',
      outlineStrokeOpacity: 100,
      brightness: 1,
      contrast: 1,
      saturation: 1,
      contourStyle: 'edge',
      contourSmoothing: 2,
      contourDetail: 5,
      contourThickness: 2,
      contourLevels: 8,
      contourFill: false,
      contourSigmaRatio: 1.6,
      outlineStrokeSize: 1.5,
      outlineCornerRadius: 0,
      bloom: false,
      bloomStyle: 'soft',
      bloomRadius: 8,
      bloomIntensity: 0.6,
      grain: false,
      grainAmount: 25,
      grainSize: 25,
      grainRoughness: 50,
      wordArtifactEnabled: false,
      wordArtifact: '',
      wordArtifactDistribution: 'stream',
      wordArtifactDensity: 0.05,
      wordArtifactCoherence: 0.3,
      postProcess: {
        enabled: false,
        spread: 50,
        organic: 30,
        splatter: 0,
        roundness: 60,
        softness: 0
      },
      effectChain: null,
      mask: null
    });

    function getDefaultAsciiLayerSettings() {
      return {
        ...DEFAULT_ASCII_LAYER_SETTINGS,
        postProcess: { ...DEFAULT_ASCII_LAYER_SETTINGS.postProcess },
        effectChain: null,
        mask: null
      };
    }

    function applyLayerDefaults(layer, overrides = {}) {
      return Object.assign(layer, getDefaultAsciiLayerSettings(), overrides);
    }

    function createLayer(overrides = {}) {
      return {
        id: crypto.randomUUID(),
        name: `Layer ${layerCounter++}`,
        kind: 'ascii',
        ...getDefaultAsciiLayerSettings(),
        ...overrides
      };
    }

    function createSourceLayer(overrides = {}) {
      return createLayer({
        kind: 'source',
        name: 'Source',
        variant: 'Source',
        ...overrides
      });
    }

    function createAdjustmentLayer(overrides = {}) {
      return {
        id: crypto.randomUUID(),
        name: `Adjustment ${state.layers.filter(l => l.kind === 'adjustment').length + 1}`,
        kind: 'adjustment',
        visible: true,
        opacity: 1,
        blendMode: 'source-over',
        effectChain: null,
        mask: null,
        brightness: 1, contrast: 1, saturation: 1,
        ...overrides
      };
    }

    // Track which layers have their effects section expanded (transient, not serialized)
    const expandedFxLayers = new Set();
    // Track which individual effect cards are collapsed (by fx.id)
    const collapsedFxCards = new Set();

    const state = {
      source: null,
      sourceElement: null,
      drawerOpen: false,
      layerPanelOpen: true,
      recording: false,
      _exporting: false,
      sourceVersion: 0,
      layers: [],
      activeLayerId: null,
      forceGrid: false,
      forceGridSize: 10,
      forceGridPadding: 0,
      previewResolution: 'full'  // 'full' | '1/2' | '1/4' | 'auto'
    };
    state.activeLayerId = state.layers.length ? state.layers[0].id : null;

    // ============ PROJECT SAVES ============
    let currentProjectName = null;
    const STORAGE_KEY = 'glyphStudio_projects';

    function getProjects() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function saveProjectToStorage(name, data) {
      const projects = getProjects();
      projects[name] = { saved: Date.now(), data };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
    }

    function deleteProjectFromStorage(name) {
      const projects = getProjects();
      delete projects[name];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
    }

    function listProjects() {
      const projects = getProjects();
      return Object.entries(projects)
        .map(([name, v]) => ({ name, saved: v.saved }))
        .sort((a, b) => b.saved - a.saved);
    }

    function serializeProject() {
      return {
        version: 2,
        activeLayerId: state.activeLayerId,
        sourceHint: state.source,
        forceGrid: state.forceGrid,
        forceGridSize: state.forceGridSize,
        forceGridPadding: state.forceGridPadding,
        previewResolution: state.previewResolution,
        layers: state.layers.map(l => {
          const clone = { ...l };
          if (l.postProcess) clone.postProcess = { ...l.postProcess };
          if (l.effectChain) {
            clone.effectChain = l.effectChain.map(fx => ({
              ...fx, params: { ...fx.params }
            }));
          }
          if (l.mask) {
            clone.mask = { ...l.mask };
            if (l.mask.regions) {
              clone.mask.regions = l.mask.regions.map(r => ({ ...r, points: r.points.map(p => [...p]) }));
            }
            if (l.mask.points) clone.mask.points = l.mask.points.map(p => [...p]);
          }
          return clone;
        })
      };
    }

    function deserializeProject(data) {
      // Clean up previous project state (same as doCloseProject)
      if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
      resetSelectionForSourceChange();
      hideVideoControls();
      layerCanvasPool.clear();
      layerRenderCache.clear();

      state.layers = data.layers.map(l => {
        if (l.postProcess) l.postProcess = { ...l.postProcess };
        if (typeof l.wordArtifactDistribution !== 'string') {
          l.wordArtifactDistribution = 'stream';
        }
        if (l.mask) {
          l.mask = { ...l.mask };
          if (l.mask.points && !l.mask.regions) {
            l.mask.regions = [{ points: l.mask.points, op: 'new' }];
            delete l.mask.points;
          }
        }
        // Trigger effect chain migration from old format if needed
        getEffectChain(l);
        return l;
      });
      // Reset layer counter to avoid ID collisions with restored layers
      const maxId = state.layers.reduce((max, l) => {
        const n = parseInt((l.id || '').replace(/\D/g, ''), 10);
        return n > max ? n : max;
      }, 0);
      layerCounter = maxId + 1;

      state.activeLayerId = data.activeLayerId || state.layers[0]?.id;
      if (typeof data.forceGrid === 'boolean') state.forceGrid = data.forceGrid;
      if (typeof data.forceGridSize === 'number') state.forceGridSize = data.forceGridSize;
      if (typeof data.forceGridPadding === 'number') state.forceGridPadding = data.forceGridPadding;
      if (typeof data.previewResolution === 'string') {
        state.previewResolution = data.previewResolution;
        const lbl = document.getElementById('previewResLabel');
        if (lbl) {
          const labels = { auto: 'AUTO', full: 'FULL', '1/2': '1/2', '1/4': '1/4' };
          lbl.textContent = labels[state.previewResolution] || 'AUTO';
        }
      }
      invalidateMaskCaches();
      invalidatePostProcessCache();
      renderLayerPanel();
      syncUIToLayer(activeLayer());
      if (state.sourceElement) {
        document.getElementById('emptyState').classList.add('hidden');
        resizeCanvas();
        render();
      } else {
        // Show empty state with upload prompt
        const es = document.getElementById('emptyState');
        es.classList.remove('hidden');
        es.children[0].textContent = 'LAYERS RESTORED';
        es.children[1].textContent = 'UPLOAD AN IMAGE TO RENDER';
        outputCtx.fillStyle = '#0e0e0e';
        outputCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
        // Auto-open file picker so user can quickly re-upload
        document.getElementById('imageInput').click();
      }
    }

    function updateProjectBtnText() {
      document.getElementById('projectBtn').textContent = (currentProjectName || 'Untitled') + ' \u25BE';
    }

    const projectNameModal = document.getElementById('projectNameModal');
    const projectNameModalForm = document.getElementById('projectNameModalForm');
    const projectNameModalTitle = document.getElementById('projectNameModalTitle');
    const projectNameModalLabel = document.getElementById('projectNameModalLabel');
    const projectNameModalHint = document.getElementById('projectNameModalHint');
    const projectNameModalInput = document.getElementById('projectNameModalInput');
    const projectNameModalConfirm = document.getElementById('projectNameModalConfirm');
    let projectNameModalResolve = null;

    function closeProjectNameModal(value = null) {
      if (projectNameModal.classList.contains('hidden')) return;
      projectNameModal.classList.add('hidden');
      const resolve = projectNameModalResolve;
      projectNameModalResolve = null;
      if (resolve) resolve(value);
    }

    function openProjectNameModal({ title, label, value = '', confirmLabel = 'Save', hint = 'Names are saved locally' }) {
      projectNameModalTitle.textContent = title;
      projectNameModalLabel.textContent = label;
      projectNameModalInput.value = value;
      projectNameModalConfirm.textContent = confirmLabel;
      projectNameModalHint.textContent = hint;
      projectNameModal.classList.remove('hidden');
      requestAnimationFrame(() => {
        projectNameModalInput.focus();
        projectNameModalInput.select();
      });
      return new Promise(resolve => {
        projectNameModalResolve = resolve;
      });
    }

    projectNameModal.addEventListener('click', (e) => {
      if (!projectNameModalForm.contains(e.target)) closeProjectNameModal(null);
    });
    projectNameModalForm.addEventListener('click', (e) => e.stopPropagation());
    document.getElementById('projectNameModalClose').addEventListener('click', () => closeProjectNameModal(null));
    document.getElementById('projectNameModalCancel').addEventListener('click', () => closeProjectNameModal(null));
    projectNameModalForm.addEventListener('submit', (e) => {
      e.preventDefault();
      closeProjectNameModal(projectNameModalInput.value);
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !projectNameModal.classList.contains('hidden')) {
        e.preventDefault();
        closeProjectNameModal(null);
      }
    });

    async function doSaveProject() {
      if (!currentProjectName) {
        const name = await openProjectNameModal({
          title: 'Save Project',
          label: 'Project Name',
          confirmLabel: 'Save',
          value: currentProjectName || ''
        });
        if (!name || !name.trim()) return;
        currentProjectName = name.trim();
      }
      saveProjectToStorage(currentProjectName, serializeProject());
      updateProjectBtnText();
    }

    async function doSaveAsProject() {
      const name = await openProjectNameModal({
        title: 'Save As',
        label: 'Project Name',
        confirmLabel: 'Save Copy',
        value: currentProjectName || ''
      });
      if (!name || !name.trim()) return;
      currentProjectName = name.trim();
      saveProjectToStorage(currentProjectName, serializeProject());
      updateProjectBtnText();
    }

    async function doRenameProject() {
      if (!currentProjectName) return;
      const name = await openProjectNameModal({
        title: 'Rename Project',
        label: 'New Name',
        confirmLabel: 'Rename',
        value: currentProjectName
      });
      if (!name || !name.trim() || name.trim() === currentProjectName) return;
      const oldName = currentProjectName;
      const projects = getProjects();
      if (projects[oldName]) {
        projects[name.trim()] = projects[oldName];
        delete projects[oldName];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
      }
      currentProjectName = name.trim();
      updateProjectBtnText();
    }

    function doDeleteProject() {
      if (!currentProjectName) return;
      if (!confirm(`Delete project "${currentProjectName}"?`)) return;
      deleteProjectFromStorage(currentProjectName);
      currentProjectName = null;
      updateProjectBtnText();
    }

    function doCloseProject() {
      currentProjectName = null;
      // Clear source
      if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
      resetSelectionForSourceChange();
      state.source = null;
      state.sourceElement = null;
      state.sourceVersion = 0;
      sourceCanvas.width = 0;
      sourceCanvas.height = 0;
      hideVideoControls();
      layerCanvasPool.clear();
      layerRenderCache.clear();
      // Reset to a single default layer
      layerCounter = 1;
      state.layers = [createLayer()];
      state.activeLayerId = state.layers[0].id;
      invalidateMaskCaches();
      invalidatePostProcessCache();
      renderLayerPanel();
      syncUIToLayer(activeLayer());
      updateProjectBtnText();
      const es = document.getElementById('emptyState');
      es.classList.remove('hidden');
      es.children[0].textContent = 'NO SOURCE';
      es.children[1].textContent = 'DROP FILE OR SELECT INPUT';
      outputCtx.fillStyle = '#0e0e0e';
      outputCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
    }

    function doLoadProject(name) {
      const projects = getProjects();
      const entry = projects[name];
      if (!entry) return;
      currentProjectName = name;
      deserializeProject(entry.data);
      updateProjectBtnText();
    }

    function renderProjectList() {
      const list = document.getElementById('projectList');
      const divider = document.getElementById('projectListDivider');
      const projects = listProjects();
      list.innerHTML = '';
      if (projects.length === 0) {
        divider.classList.add('hidden');
        return;
      }
      divider.classList.remove('hidden');
      for (const p of projects) {
        const btn = document.createElement('button');
        btn.className = `ui-menu-item ui-menu-item-compact${p.name === currentProjectName ? ' active' : ''}`;
        btn.textContent = p.name;
        btn.addEventListener('click', () => {
          doLoadProject(p.name);
          hideFloatingPanel(document.getElementById('projectMenu'));
        });
        list.appendChild(btn);
      }
    }

    function activeLayer() {
      return state.layers.find(l => l.id === state.activeLayerId) || state.layers[0];
    }

    function getSourceLayer() {
      return state.layers.find(layer => layer.kind === 'source') || null;
    }

    function asciiLayerCount() {
      return state.layers.filter(layer => layer.kind === 'ascii').length;
    }

    function ensureSourceLayer(name = 'Source') {
      let sourceLayer = getSourceLayer();
      if (!sourceLayer) {
        sourceLayer = createSourceLayer({ name });
        state.layers.unshift(sourceLayer);
        state.activeLayerId = sourceLayer.id;
      } else {
        sourceLayer.name = name;
        sourceLayer.visible = true;
      }
      return sourceLayer;
    }

    const selectionState = {
      active: false,
      drawing: false,
      rawPoints: [],
      previewPoints: [],
      pointerId: null,
      videoWasPlaying: false,
      compositionMode: 'new',
      showGuides: true
    };
    const maskPathCache = new Map();
    const maskAlphaCache = new Map();
    const postProcessCache = new Map();
    const scratchCanvasPool = new Map();
    const layerDragState = {
      draggedId: null,
      targetId: null,
      placement: null
    };

    // ============ DOM REFS ============
    const sourceCanvas = document.getElementById('sourceCanvas');
    const sourceCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const outputCanvas = document.getElementById('outputCanvas');
    let outputCtx = outputCanvas.getContext('2d');
    const topBar = document.getElementById('topBar');
    const canvasArea = document.getElementById('canvasArea');
    const projectAnchor = document.getElementById('projectAnchor');
    const drawer = document.getElementById('settingsDrawer');
    const settingsBtn = document.getElementById('settingsBtn');

    let animFrameId = null;
    window.addEventListener('resize', refreshFloatingPanels);
    document.addEventListener('scroll', (e) => {
      const target = e.target;
      for (const panel of activeFloatingPanels.keys()) {
        if (!panel || panel.classList.contains('hidden')) continue;
        if (target === panel || (target instanceof Node && panel.contains(target))) {
          return;
        }
      }
      refreshFloatingPanels();
    }, true);

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    const activeFloatingPanels = new Map();

    function positionFloatingPanel(panel, anchor, options = {}) {
      if (!panel || !anchor) return;
      const margin = options.margin ?? 8;
      const gap = options.gap ?? 4;
      const anchorRect = anchor.getBoundingClientRect();
      const viewportMaxWidth = Math.max(160, window.innerWidth - margin * 2);

      panel.style.position = 'fixed';
      panel.style.left = '0px';
      panel.style.top = '0px';
      panel.style.right = 'auto';
      panel.style.bottom = 'auto';
      if (options.matchWidth) {
        const targetWidth = Math.min(Math.round(anchorRect.width), viewportMaxWidth);
        panel.style.width = `${targetWidth}px`;
        panel.style.minWidth = `${targetWidth}px`;
      } else {
        panel.style.width = '';
        panel.style.minWidth = '';
      }

      panel.style.maxWidth = `${viewportMaxWidth}px`;
      panel.style.maxHeight = `${Math.max(120, window.innerHeight - margin * 2)}px`;

      const panelRect = panel.getBoundingClientRect();
      const availBelow = window.innerHeight - anchorRect.bottom - margin - gap;
      const availAbove = anchorRect.top - margin - gap;
      const preferTop = options.placement === 'top';
      const placeAbove = preferTop
        ? (panelRect.height > availAbove && availBelow > availAbove)
        : (panelRect.height > availBelow && availAbove > availBelow);
      const availableHeight = Math.max(80, placeAbove ? availAbove : availBelow);
      panel.style.maxHeight = `${Math.min(options.maxHeight ?? availableHeight, availableHeight)}px`;

      const finalRect = panel.getBoundingClientRect();
      let left;
      if (options.align === 'right') left = anchorRect.right - finalRect.width;
      else if (options.align === 'center') left = anchorRect.left + (anchorRect.width - finalRect.width) * 0.5;
      else left = anchorRect.left;

      let top = placeAbove
        ? anchorRect.top - finalRect.height - gap
        : anchorRect.bottom + gap;

      left = clamp(left, margin, Math.max(margin, window.innerWidth - finalRect.width - margin));
      top = clamp(top, margin, Math.max(margin, window.innerHeight - finalRect.height - margin));

      panel.style.left = `${Math.round(left)}px`;
      panel.style.top = `${Math.round(top)}px`;
    }

    function updateProjectButtonPosition() {
      // Project button is now in normal flow (right-aligned), no repositioning needed
    }

    function showFloatingPanel(panel, anchor, options = {}) {
      if (!panel || !anchor) return;
      if (!options.preserveParentPanels) closeFloatingPanelsExcept(panel);
      panel.classList.remove('hidden');
      anchor.classList.add(options.anchorOpenClass || 'panel-trigger-open');
      activeFloatingPanels.set(panel, { anchor, options });
      positionFloatingPanel(panel, anchor, options);
    }

    function hideFloatingPanel(panel) {
      if (!panel) return;
      const config = activeFloatingPanels.get(panel);
      if (config?.anchor) {
        config.anchor.classList.remove(config.options?.anchorOpenClass || 'panel-trigger-open');
      }
      panel.classList.remove('keyboard-nav');
      panel.querySelectorAll('.menu-nav-active').forEach(item => item.classList.remove('menu-nav-active'));
      panel.classList.add('hidden');
      activeFloatingPanels.delete(panel);
    }

    function toggleFloatingPanel(panel, anchor, options = {}) {
      if (!panel || !anchor) return false;
      if (panel.classList.contains('hidden')) {
        showFloatingPanel(panel, anchor, options);
        return true;
      }
      hideFloatingPanel(panel);
      return false;
    }

    function refreshFloatingPanels() {
      for (const [panel, config] of activeFloatingPanels.entries()) {
        if (panel.classList.contains('hidden') || !document.body.contains(panel)) {
          activeFloatingPanels.delete(panel);
          continue;
        }
        positionFloatingPanel(panel, config.anchor, config.options);
      }
    }

    let activeOptionMenu = null;

    function closeFloatingPanelsExcept(exceptPanel = null) {
      if (activeOptionMenu && activeOptionMenu.panel !== exceptPanel) {
        closeOptionMenu();
      }
      for (const panel of Array.from(activeFloatingPanels.keys())) {
        if (!panel || panel === exceptPanel) continue;
        hideFloatingPanel(panel);
        if (panel.id === 'addEffectDropdown' && panel.parentNode) {
          panel.parentNode.removeChild(panel);
        }
      }
    }

    function setSelectButtonLabel(button, label) {
      if (!button) return;
      const valueEl = button.querySelector('.ui-select-value');
      if (valueEl) valueEl.textContent = label;
      else button.textContent = label;
    }

    function closeOptionMenu() {
      if (!activeOptionMenu) return;
      const { panel, anchor, cleanup } = activeOptionMenu;
      if (anchor) anchor.classList.remove('ui-select-open');
      if (panel) {
        hideFloatingPanel(panel);
        if (panel.parentNode) panel.parentNode.removeChild(panel);
      }
      if (cleanup) cleanup();
      activeOptionMenu = null;
    }

    function openOptionMenu(anchor, config) {
      if (!anchor || !config?.options?.length) return false;
      if (activeOptionMenu?.anchor === anchor) {
        closeOptionMenu();
        return false;
      }
      closeOptionMenu();

      const panel = document.createElement('div');
      panel.className = 'ui-menu-panel';
      panel.addEventListener('pointerdown', (e) => e.stopPropagation());
      panel.addEventListener('click', (e) => e.stopPropagation());

      config.options.forEach(option => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = `ui-menu-item${config.compact ? ' ui-menu-item-compact' : ''}${option.value === config.value ? ' active' : ''}`;
        item.textContent = option.label;
        item.addEventListener('click', () => {
          config.onSelect?.(option.value, option);
          closeOptionMenu();
        });
        panel.appendChild(item);
      });

      document.body.appendChild(panel);
      anchor.classList.add('ui-select-open');
      const anchorInsidePanel = Array.from(activeFloatingPanels.keys()).some(p => p && p.contains(anchor));
      showFloatingPanel(panel, anchor, {
        align: config.align ?? 'left',
        placement: config.placement ?? 'bottom',
        gap: config.gap ?? 6,
        matchWidth: config.matchWidth ?? true,
        maxHeight: config.maxHeight ?? 320,
        anchorOpenClass: 'ui-select-open',
        preserveParentPanels: anchorInsidePanel
      });
      setupMenuNavigation(panel, {
        itemSelector: '.ui-menu-item',
        onEscape: () => closeOptionMenu()
      });
      requestAnimationFrame(() => focusMenuNavigationDefault(panel));

      const onDocClick = (e) => {
        if (!eventIsInsidePanel(panel, anchor, e)) {
          closeOptionMenu();
        }
      };
      const onKeyDown = (e) => {
        if (e.key === 'Escape' && activeOptionMenu?.panel === panel) {
          e.preventDefault();
          closeOptionMenu();
        }
      };
      setTimeout(() => document.addEventListener('click', onDocClick), 0);
      document.addEventListener('keydown', onKeyDown);
      activeOptionMenu = {
        panel,
        anchor,
        cleanup: () => {
          document.removeEventListener('click', onDocClick);
          document.removeEventListener('keydown', onKeyDown);
        }
      };
      return true;
    }

    function labelForOption(options, value) {
      return (options.find(option => option.value === value) || options[0] || { label: '' }).label;
    }

    function bindStaticPicker(button, input, options, onChange, config = {}) {
      if (!button || !input) return;
      setSelectButtonLabel(button, labelForOption(options, input.value));
      button.addEventListener('click', (e) => {
        e.stopPropagation();
        openOptionMenu(button, {
          options,
          value: input.value,
          align: config.align ?? 'left',
          placement: config.placement ?? 'bottom',
          gap: config.gap ?? 6,
          matchWidth: config.matchWidth ?? true,
          maxHeight: config.maxHeight ?? 320,
          compact: config.compact ?? false,
          onSelect: (value, option) => {
            input.value = value;
            setSelectButtonLabel(button, option.label);
            onChange?.(value, option);
          }
        });
      });
    }

    function getTopFloatingPanelForEscape(target) {
      const panels = Array.from(activeFloatingPanels.keys()).filter(panel => panel && !panel.classList.contains('hidden'));
      if (!panels.length) return null;
      const focused = document.activeElement;
      for (let i = panels.length - 1; i >= 0; i--) {
        const panel = panels[i];
        if (panel === target || panel.contains(target) || panel.contains(focused)) {
          return panel;
        }
      }
      return panels[panels.length - 1];
    }

    function pointWithinPanelBounds(panel, clientX, clientY) {
      if (!panel || !Number.isFinite(clientX) || !Number.isFinite(clientY)) return false;
      const rect = panel.getBoundingClientRect();
      return clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom;
    }

    function eventIsInsidePanel(panel, anchor, event) {
      if (!panel || !event) return false;
      const target = event.target;
      if (target && (panel.contains(target) || target === anchor || anchor?.contains?.(target))) {
        return true;
      }
      return pointWithinPanelBounds(panel, event.clientX, event.clientY);
    }

    function getTopFloatingPanelForPointer(clientX, clientY, target = null) {
      const panels = Array.from(activeFloatingPanels.keys()).filter(panel => panel && !panel.classList.contains('hidden'));
      for (let i = panels.length - 1; i >= 0; i--) {
        const panel = panels[i];
        if ((target && panel.contains(target)) || pointWithinPanelBounds(panel, clientX, clientY)) {
          return panel;
        }
      }
      return null;
    }

    document.addEventListener('wheel', (e) => {
      const panel = getTopFloatingPanelForPointer(e.clientX, e.clientY, e.target);
      if (!panel || panel.scrollHeight <= panel.clientHeight) return;
      const delta = e.deltaMode === 1
        ? e.deltaY * 16
        : e.deltaMode === 2
          ? e.deltaY * panel.clientHeight
          : e.deltaY;
      if (!delta) return;
      e.preventDefault();
      e.stopPropagation();
      panel.scrollTop += delta;
    }, { passive: false, capture: true });

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (activeOptionMenu) {
        e.preventDefault();
        const anchor = activeOptionMenu.anchor;
        closeOptionMenu();
        anchor?.focus?.({ preventScroll: true });
        return;
      }
      const panel = getTopFloatingPanelForEscape(e.target);
      if (!panel) return;
      e.preventDefault();
      const config = activeFloatingPanels.get(panel);
      hideFloatingPanel(panel);
      if (panel.id === 'addEffectDropdown' && panel.parentNode) {
        panel.parentNode.removeChild(panel);
      }
      config?.anchor?.focus?.({ preventScroll: true });
    });

    const menuNavigationConfigs = new WeakMap();
    const menuPointerPositions = new WeakMap();

    function getMenuNavigationItems(panel) {
      const config = menuNavigationConfigs.get(panel) || {};
      const selector = config.itemSelector || 'button';
      return Array.from(panel.querySelectorAll(selector)).filter(item => {
        if (!item || item.disabled) return false;
        const style = window.getComputedStyle(item);
        return style.display !== 'none' && style.visibility !== 'hidden';
      });
    }

    function focusMenuNavigationItem(panel, item) {
      if (!panel || !item) return;
      const items = getMenuNavigationItems(panel);
      items.forEach(entry => {
        entry.tabIndex = entry === item ? 0 : -1;
        entry.classList.toggle('menu-nav-active', entry === item);
      });
      panel.classList.add('keyboard-nav');
      item.focus({ preventScroll: true });
      item.scrollIntoView({ block: 'nearest' });
    }

    function focusMenuNavigationByIndex(panel, index) {
      const items = getMenuNavigationItems(panel);
      if (!items.length) return;
      const clamped = clamp(index, 0, items.length - 1);
      focusMenuNavigationItem(panel, items[clamped]);
    }

    function focusMenuNavigationDefault(panel, preferredSelector = '.active') {
      const items = getMenuNavigationItems(panel);
      if (!items.length) {
        panel.focus({ preventScroll: true });
        return;
      }
      const preferred = preferredSelector ? panel.querySelector(preferredSelector) : null;
      focusMenuNavigationItem(panel, items.includes(preferred) ? preferred : items[0]);
    }

    function syncMenuNavigationFromPointer(panel, clientX, clientY) {
      if (!panel || !Number.isFinite(clientX) || !Number.isFinite(clientY)) return;
      if (!pointWithinPanelBounds(panel, clientX, clientY)) return;
      const hovered = document.elementFromPoint(clientX, clientY);
      const item = hovered instanceof HTMLElement ? hovered.closest('button') : null;
      if (!item || !panel.contains(item)) return;
      const items = getMenuNavigationItems(panel);
      if (!items.includes(item) || item.classList.contains('menu-nav-active')) return;
      focusMenuNavigationItem(panel, item);
    }

    function setupMenuNavigation(panel, config = {}) {
      if (!panel) return;
      const existing = menuNavigationConfigs.get(panel) || {};
      menuNavigationConfigs.set(panel, { ...existing, ...config });
      if (panel.dataset.menuNavReady === '1') return;
      panel.dataset.menuNavReady = '1';
      panel.tabIndex = -1;
      panel.addEventListener('pointerdown', (e) => e.stopPropagation());
      panel.addEventListener('wheel', (e) => {

            phase[x] = segPhase + ((x - pxStart) / segW) * Math.PI;

        for (let y = 0; y < tileH; y++) {

      },
      frosted(tileW, tileH, seed, jitter) {
        const map = new Float32Array(tileW * tileH);

        const basePeriod = Math.max(1, Math.round(4 * freqBoost));
        for (let y = 0; y < tileH; y++) {

              norm += amp;

      },
      blocks(tileW, tileH, seed, jitter) {
        const map = new Float32Array(tileW * tileH);
        const numDivs = 4;
        function makeDivs(size, axisSeed) {
          const divs = [0];
          for (let i = 1; i < numDivs; i++) {
            const uniform = Math.round(i / numDivs * size);
            const noise = (hashNoise2D(i, 0, axisSeed) * 2 - 1) * (size / numDivs) * jitter * 0.6;
            divs.push(Math.max(divs[i - 1] + 1, Math.min(size - (numDivs - i), Math.round(uniform + noise))));

          divs.push(size);

        const yDivs = makeDivs(tileH, seed + 300);

        const yCell = new Uint8Array(tileH);
        for (let c = 0; c < numDivs; c++)

        for (let r = 0; r < numDivs; r++)
          for (let y = yDivs[r]; y < yDivs[r + 1]; y++) yCell[y] = r;
        // Wrap last cell to match first for seamless tiling
        const wrapX = numDivs - 1, wrapY = numDivs - 1;
        for (let y = 0; y < tileH; y++) {
          for (let x = 0; x < tileW; x++) {
            map[y * tileW + x] = hashNoise2D(xCell[x] % wrapX, yCell[y] % wrapY, seed);
          }
        }
        return map;
      },
      tinyLens(tileW, tileH, seed, jitter) {
        const map = new Float32Array(tileW * tileH);
        const numCells = 4;
        const csx = tileW / numCells;
        const csy = tileH / numCells;
        const halfCX = csx / 2;
        const halfCY = csy / 2;
        const halfCell = Math.min(halfCX, halfCY);
        for (let y = 0; y < tileH; y++) {
          for (let x = 0; x < tileW; x++) {
            const col = Math.floor(x / csx);
            const row = Math.floor(y / csy);
            let minD2 = Infinity;
            for (let dr = -1; dr <= 1; dr++) {
              for (let dc = -1; dc <= 1; dc++) {
                const cc = col + dc, cr = row + dr;
                const wcx = ((cc % numCells) + numCells) % numCells;
                const wcr = ((cr % numCells) + numCells) % numCells;
                let cenX = wcx * csx + halfCX;
                let cenY = wcr * csy + halfCY;
                if (jitter > 0) {
                  cenX += (hashNoise2D(wcx, wcr, seed + 50) * 2 - 1) * halfCX * jitter * 0.7;
                  cenY += (hashNoise2D(wcx, wcr, seed + 51) * 2 - 1) * halfCY * jitter * 0.7;
                }
                let dx = x - cenX, dy = y - cenY;
                if (dx > tileW * 0.5) dx -= tileW;
                else if (dx < -tileW * 0.5) dx += tileW;
                if (dy > tileH * 0.5) dy -= tileH;
                else if (dy < -tileH * 0.5) dy += tileH;
                const d2 = dx * dx + dy * dy;
                if (d2 < minD2) minD2 = d2;
              }
            }
            const dist = Math.sqrt(minD2) / halfCell;
            map[y * tileW + x] = Math.max(0, 1 - dist * dist);

        }
        return map;
      },
      diamond(tileW, tileH, seed, jitter) {
        const map = new Float32Array(tileW * tileH);
        const numCells = 4;
        const csx = tileW / numCells;
        const csy = tileH / numCells;
        const halfCX = csx / 2;
        const halfCY = csy / 2;
        const halfCell = Math.min(halfCX, halfCY);
        for (let y = 0; y < tileH; y++) {
          for (let x = 0; x < tileW; x++) {
            const col = Math.floor(x / csx);
            const row = Math.floor(y / csy);
            let minD = Infinity;
            for (let dr = -1; dr <= 1; dr++) {
              for (let dc = -1; dc <= 1; dc++) {
                const cc = col + dc, cr = row + dr;
                const wcx = ((cc % numCells) + numCells) % numCells;
                const wcr = ((cr % numCells) + numCells) % numCells;
                let cenX = wcx * csx + halfCX;
                let cenY = wcr * csy + halfCY;
                if (jitter > 0) {
                  cenX += (hashNoise2D(wcx, wcr, seed + 60) * 2 - 1) * halfCX * jitter * 0.7;
                  cenY += (hashNoise2D(wcx, wcr, seed + 61) * 2 - 1) * halfCY * jitter * 0.7;
                }
                let dx = x - cenX, dy = y - cenY;
                if (dx > tileW * 0.5) dx -= tileW;
                else if (dx < -tileW * 0.5) dx += tileW;
                if (dy > tileH * 0.5) dy -= tileH;
                else if (dy < -tileH * 0.5) dy += tileH;
                const d = Math.abs(dx) + Math.abs(dy);
                if (d < minD) minD = d;
              }
            }
            map[y * tileW + x] = Math.max(0, 1 - minD / halfCell);

        }

      },
      radial(tileW, tileH, seed, jitter) {
        const map = new Float32Array(tileW * tileH);
        for (let y = 0; y < tileH; y++) {
          for (let x = 0; x < tileW; x++) {
            const cx = x / tileW - 0.5, cy = y / tileH - 0.5;
            const dist = Math.sqrt(cx * cx + cy * cy) * 2;
            let freqMod = 1;
            if (jitter > 0) {
              const angNoise = tilingValueNoise2D(x * 4 / tileW, y * 4 / tileH, seed + 101, 4, 4);
              freqMod = 1 + (angNoise * 2 - 1) * jitter * 0.5;
            }
            map[y * tileW + x] = 0.5 + 0.5 * Math.sin(dist * Math.PI * 6 * freqMod);
          }
        }
        return map;
      },
      spiral(tileW, tileH, seed, jitter) {
        const map = new Float32Array(tileW * tileH);
        for (let y = 0; y < tileH; y++) {
          for (let x = 0; x < tileW; x++) {
            const cx = x / tileW - 0.5, cy = y / tileH - 0.5;
            const dist = Math.sqrt(cx * cx + cy * cy) * 2;
            const angle = Math.atan2(cy, cx);
            let freqMod = 1, armWobble = 0;
            if (jitter > 0) {
              const angNoise = tilingValueNoise2D(x * 4 / tileW, y * 4 / tileH, seed + 111, 4, 4);
              freqMod = 1 + (angNoise * 2 - 1) * jitter * 0.5;
              const radNoise = tilingValueNoise2D(x * 3 / tileW, y * 3 / tileH, seed + 112, 3, 3);
              armWobble = (radNoise * 2 - 1) * jitter * 0.8;
            }
            map[y * tileW + x] = 0.5 + 0.5 * Math.sin((angle + armWobble) * 3 + dist * Math.PI * 6 * freqMod);
          }
        }
        return map;
      },
      honeycomb(tileW, tileH, seed, jitter) {
        const map = new Float32Array(tileW * tileH);
        const targetCellSize = Math.max(1, Math.round(Math.min(tileW, tileH) / 4));
        // Adjust spacings to divide tile dimensions evenly for seamless tiling
        const rawHSpacing = targetCellSize * Math.sqrt(3);
        const numCols = Math.max(1, Math.round(tileW / rawHSpacing));
        const hSpacing = tileW / numCols;
        const rawVSpacing = targetCellSize * 1.5;
        let numRows = Math.max(2, Math.round(tileH / rawVSpacing));
        if (numRows % 2 !== 0) numRows++;
        const vSpacing = tileH / numRows;
        const cellSize = hSpacing / Math.sqrt(3);
        for (let y = 0; y < tileH; y++) {
          for (let x = 0; x < tileW; x++) {
            const row = Math.floor(y / vSpacing);
            const wr0 = ((row % numRows) + numRows) % numRows;
            const isOddRow = wr0 % 2 === 1;
            const colOffset = isOddRow ? hSpacing * 0.5 : 0;
            const col = Math.floor((x + colOffset) / hSpacing);
            let minDist = Infinity;
            for (let dr = -1; dr <= 1; dr++) {
              for (let dc = -1; dc <= 1; dc++) {
                const r = row + dr, c = col + dc;
                const wr = ((r % numRows) + numRows) % numRows;
                const wc = ((c % numCols) + numCols) % numCols;
                const isOddR = wr % 2 === 1;
                let cenX = wc * hSpacing + (isOddR ? hSpacing * 0.5 : 0);
                let cenY = wr * vSpacing + vSpacing * 0.5;
                if (jitter > 0) {
                  cenX += (hashNoise2D(wc, wr, seed + 70) * 2 - 1) * cellSize * jitter * 0.4;
                  cenY += (hashNoise2D(wc, wr, seed + 71) * 2 - 1) * cellSize * jitter * 0.4;
                }
                let dx = x - cenX, dy = y - cenY;
                if (dx > tileW * 0.5) dx -= tileW;
                else if (dx < -tileW * 0.5) dx += tileW;
                if (dy > tileH * 0.5) dy -= tileH;
                else if (dy < -tileH * 0.5) dy += tileH;
                const d = Math.sqrt(dx * dx + dy * dy);
                if (d < minDist) minDist = d;
              }
            }
            const norm = minDist / (cellSize * 0.5);
            map[y * tileW + x] = Math.max(0, 1 - norm * norm);

        }

      },
      ripple(tileW, tileH, seed, jitter) {
        const map = new Float32Array(tileW * tileH);
        const numSources = 8 + Math.round(jitter * 12);
        const sources = [];
        for (let i = 0; i < numSources; i++) {
          sources.push({
            x: hashNoise2D(i, 0, seed + 50),
            y: hashNoise2D(i, 1, seed + 50),
            freq: 6 + hashNoise2D(i, 2, seed + 50) * 14,
            phase: hashNoise2D(i, 3, seed + 50) * Math.PI * 2,
            amp: 0.3 + hashNoise2D(i, 4, seed + 50) * 0.7,
            decay: 1.5 + hashNoise2D(i, 5, seed + 50) * 2.0
          });

        for (let y = 0; y < tileH; y++) {
          for (let x = 0; x < tileW; x++) {
            const nx = x / tileW, ny = y / tileH;
            let sum = 0, totalAmp = 0;
            for (const s of sources) {
              let minDist = Infinity;
              for (let wy = -1; wy <= 1; wy++) {
                for (let wx = -1; wx <= 1; wx++) {
                  const dx = nx - (s.x + wx), dy = ny - (s.y + wy);
                  const d = Math.sqrt(dx * dx + dy * dy);
                  if (d < minDist) minDist = d;
                }
              }
              const envelope = Math.exp(-minDist * s.decay * 4);
              sum += Math.sin(minDist * Math.PI * 2 * s.freq + s.phase) * envelope * s.amp;
              totalAmp += s.amp * envelope;
            }
            const val = totalAmp > 0.001 ? sum / (totalAmp * 0.7) : 0;
            map[y * tileW + x] = 0.5 + 0.5 * Math.max(-1, Math.min(1, val));

      },
      chevron(tileW, tileH, seed, jitter) {
        const map = new Float32Array(tileW * tileH);
        for (let y = 0; y < tileH; y++) {
          for (let x = 0; x < tileW; x++) {
            const nx = x / tileW, ny = y / tileH;
            const pattern = nx + Math.abs(ny - 0.5);
            let freqMod = 1;
            if (jitter > 0) {
              const n = tilingValueNoise2D(nx * 3, ny * 3, seed + 130, 3, 3);
              freqMod = 1 + (n * 2 - 1) * jitter * 0.5;
            }
            map[y * tileW + x] = 0.5 + 0.5 * Math.sin(pattern * Math.PI * 4 * freqMod);

      },
      lens(tileW, tileH, seed, jitter, scale, cnx, cny) {
        // Jitter: angular + radial ring thickness modulation
        const map = new Float32Array(tileW * tileH);
        const rings = Math.max(1, (scale || 40) / 5);
        for (let y = 0; y < tileH; y++) {
          for (let x = 0; x < tileW; x++) {
            const cx = x / tileW - cnx, cy = y / tileH - cny;
            const dist = Math.sqrt(cx * cx + cy * cy) * 2;
            let freqMod = 1;
            if (jitter > 0) {
              const angle = Math.atan2(cy, cx);
              const angNoise = valueNoise2D(Math.cos(angle) * 2 + 3, Math.sin(angle) * 2 + 3, seed + 141);
              const radNoise = valueNoise2D(dist * 5, 0.5, seed + 142);
              freqMod = (1 + (angNoise * 2 - 1) * jitter * 0.5) * (1 + (radNoise * 2 - 1) * jitter * 0.3);
